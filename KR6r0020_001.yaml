body:
  text: 宋括山一菴釋本覺編集明羼提居士畢熙志較訂周姬姓起武王己卯止赧王乙巳三十七主合八百六十七年世尊乃第四主昭王時生故今斷自昭王甲寅起止赧王乙巳歷三十四主共七百七十二年甲寅昭王二十六年此周朝年歲諸書不同今據歷代年譜依康節經世書編不必致疑釋迦牟尼佛賢劫第四佛也是年四月八日示生於中天竺迦毗羅衛國彼國乃三千世界之中故佛生於彼也父淨飯王母摩耶夫人母於是日遊歡喜園手攀無憂樹枝太子化從右脅而生自行七步分手指天地曰天上天下唯我獨尊空中九龍吐水灌太子身父王字之曰悉達多也見釋迦譜但諸傳録皆曰佛生昭王甲寅或指為二十四年或曰九年今准琳法師辨正論據隋博士姚長謙紀佛生的是昭王二十六年甲寅歲也佛生之日此方江河泛漲泉井溢出大地皆動五色光貫太微遍於西方昭王怪而問羣臣太史蘇由奏曰西方有聖人生王曰於此何如由曰即時無它一千年後聲教被此王乃刻石立記埋南郊祀出周書異記隋費長房撰三寶紀起於莊王甲午年北山諸師皆指其訛故不可遵也乙卯二十七年丙辰二十八年佛年三歲淨飯王携太子謁天神廟神像忽能起敬王驚嘆曰我子於天神中更尊因字之曰天中天丁巳戊午己未庚申三十二年佛年七歲詣師習學而夙慧煥發世間書典皆悉自通統紀辛酉壬戌癸亥三十五年佛年十歲與兄弟角力以手擲象於城外還以手接園中有金鼓銀鼓石鼓鐵鼓各七重太子一箭徹過諸鼓珠林甲子乙丑丙寅丁卯戊辰己巳庚午四十二年佛年十七歲王為納妃耶輸氏久而不接但修禪觀一覽辛未壬申四十四年佛年十九歲出城四門遊觀於東南西見老病死生厭離心於城北門見出家人生欣樂心二月八夜乘天馬踰城陵虗而去至檀特山自以寶劒絶其鬚髮淨居天人奉僧伽梨因乃服之入彌樓山阿藍迦處習不用處定者三年正宗記等癸酉甲戌乙亥四十七年世尊遷頭藍弗處習非非想處定又三年丙子丁丑戊寅五十年世尊遷象頭山同諸外道日䬸麻麥鵲巢于頂以無心意無受行而外道摧伏又居六載正宗記等己卯五十一年庚辰穆王元年辛巳壬午癸未四世尊自思曰今此苦行非正解脫即沐浴於尼連河受乳糜於牧牛女尋詣畢鉢木下降伏天魔以二月七夕入正三昧八日明星出時示豁然大悟成等正覺升金剛座梵天請轉法輪即入鹿苑說法度憍陳如等五人證果甲申五世尊度優樓頻螺迦葉等千人出家證果等乙酉六世尊在象頭山為龍鬼說法等丙戌七世尊度舍利弗目連等二百五十人出家證果等丁亥八舍衛國須達長者布金買祇陀太子園造寺奉佛等戊子九世尊枸耶尼國為婆陀和菩薩說苦行般若等己丑十世尊在柳山為純真陀羅王弟說法等庚寅十一世尊在穢澤中為阿掘摩說法等辛卯十二世尊還摩竭國為弗沙王說法等壬辰十三世尊在恐懼樹下為彌勒說修行本起經等癸巳十四世尊還迦毗羅國為父淨飯王說法等普曜經甲午乙未丙申丁酉戊戌十九世尊成道十六年於欲色二界天宮之間出大寶坊說大集等經法苑珠林己亥二十世尊自此始說十六會八部般若等經庚子辛丑二二世尊始檢約徒衆創置戒律壬寅癸卯甲辰乙巳丙午二七世尊從弟阿難始出家丁未戊申己酉庚戌辛亥三二阿難始勸請世尊度女人出家為尼壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥甲子乙丑丙寅丁卯戊辰己巳庚午辛未五十二年世尊至此始說金光明法華等經統記大梵天王至靈山會上以金色娑羅花獻世尊世尊拈花示衆人天百萬悉皆罔措獨金色頭陀破顏微笑世尊曰吾有正法眼藏涅槃妙心實相無相微妙法門分付摩訶迦葉聽吾偈曰法本法無法無法法亦法今付無法時法法何曾法其拈華付法出大藏梵王問佛經其傳法偈出正宗記壬申五十三年世尊應世七十九年化緣周畢二月十五日於拘尸那城娑羅雙木間臨涅槃時說涅槃經已而遍觀三界告大衆言我以甚深般若遍觀三界根本性離畢竟寂滅同虗空相一無所有法相如是其知是者名出世人是事不知名生死始如是三入禪定三出三告乃云以是因緣我今安住常寂滅光名大涅槃乃於寶牀右脅而臥於其中夜寂然無聲便般涅槃寶樹變白人天悲慟迦葉遠來奔禮金棺自開即現雙足出於棺外衆禮足已還自入棺如來自從胸中踴火荼毗天人各分舍利建塔涅槃經前後分是日此方暴風忽起損舍折樹地動木陰西方有白虹十二道南北通貫連夜不滅穆王怪而問羣臣太史扈多對曰西方聖人入滅之相耳周書異記癸酉甲戌五十五年乙亥共王元年丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌十二年丁亥懿王元年戊子己丑庚寅辛卯壬辰癸巳甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥二十五年壬子考王元年癸丑甲寅乙卯丙辰五年初祖迦葉尊者此云飲光勝尊以正法付阿難偈曰法法本來法無法無非法何於一法中有法有不法乃奉世尊僧伽梨衣於雞足山入滅盡定以俟彌勒下生五燈丁巳戊午己未庚申辛酉壬戌癸亥甲子乙丑丙寅十五年丁卯夷王元年戊辰周國自此衰矣己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午十六年癸未厲王元年甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳十一年二祖阿難尊者此云慶喜以正法付商那和修偈曰本來付有法付了言無法各各須自悟悟了無無法乃入三昧分身四分與天宮龍宮二國王供養住世凡百三十二年甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未三十七年王奔于彘庚申三十八年周召行政號曰共和辛酉壬戌癸亥甲子乙丑丙寅丁卯戊辰四十六年東天竺國阿育王此云無憂盡收西域諸塔及龍宮舍利夜役鬼神碎七寶末造八萬四千寶塔命耶舍尊者舒指放光八萬四千道令捷疾鬼各隨一光盡處安置一塔遍娑婆界在此震旦國者一十九所育王傳己巳庚午辛未壬申癸酉五十一年甲戌宣王元年周召二公還政而夾輔之周室中興乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳甲午乙未二十二年叱利國三祖商那和修尊者以正法付優波毱多尊者偈曰非法亦非心無心亦無法說是心法時是法非心法既付法已即隱於罽賓國南象白山中後於三昧中見毱多五百徒衆多懈慢乃往彼現龍奮迅三昧以調伏之乃作十八變化火光三昧自焚其身五燈丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未四十六年庚申幽王元年辛酉壬戌癸亥甲子乙丑丙寅丁卯戊辰己巳庚午十一年西戎弒王辛未平王元諸候奉王遷都于洛是謂東周壬申二年諸候浸盛政由方伯癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳甲午乙未丙申丁酉戊戌己亥庚子三十年西天四祖優波毱多尊者付法於提多迦偈曰心自本來心本心非有法有法有本心非心非本法乃踊身虗空呈十八變復于本座跏趺而逝五燈辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未四十九魯隱公元年也孔子修魯史春秋以是歲始庚申辛酉壬戌威王元年癸亥甲子乙丑丙寅丁卯戊辰己巳庚午九年魯威公元年辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申二十三年乙酉莊王元年丙戌丁亥戊子魯莊公元年己丑五年五祖提多迦尊者於中天竺國以法付彌遮迦尊者偈曰通達本法心無法無非法悟了同未悟無心得無法遂示寂五燈庚寅辛卯壬辰癸巳甲午十年魯莊公七年夏四月五日辛亥恆星不現星殞如雨乃西方文殊菩薩於雪山化五百仙人而歸本國光明掩於常星不見也北山録初隋費長房撰三寶紀指此年為佛初生之年者非也乙未丙申十二齊相用管仲為相丁酉戊戌己亥十五年庚子僖王元年辛丑二年齊桓始霸壬寅癸卯甲辰乙巳惠王元年丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申十六魯閔公元年辛酉壬戌十八魯僖公元年癸亥甲子乙丑丙寅丁卯戊辰己巳二十五年庚午襄王元年辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申十五年西天六祖彌遮迦尊者以法付婆須蜜多尊者偈曰無心無可得說得不名法若了心非心始解心心法遂示寂乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳甲午乙未二十六魯文公元年丙申丁酉戊戌己亥庚子辛丑壬寅三十三年癸卯頃王元年甲辰乙巳丙午丁未戊申己酉正王元年庚戌辛亥壬子癸丑五年魯宣公元年甲寅六年梓潼帝君降筆有言豫聞方外之言曰西方之國有大聖人古皇先生者視死生如朝暮等冤仇如夢覺浮生不久求於無生者也豫嘗慕之及逢隱者歌之乃謂曰適聆妙理深契愚衷願惠格言隱者嘆曰指豫以心印授豫以正法此西方大聖人歸寂法也能念習之可度生死可成正覺若中道而廢亦可為神仙豫受教焉化書其書雖不紀年今參詳乃此時故今附此年下後倣此乙卯定王元年楚莊王問九鼎輕重丙辰丁巳三年九月十四日老聃生于楚國陳郡苦縣賴鄉曲仁里姓李名耳字伯陽諡聃也老子之生距佛之滅凡三百四十六年戊午己未庚申辛酉壬戌癸亥甲子乙丑丙寅丁卯戊辰己巳庚午辛未十七年魯成公元年西天七祖婆須密多尊者以法付佛陀難提尊者偈曰心同虗空界示等虗空法證得虗空時無是無非法遂示寂五燈壬申癸酉甲戌乙亥丙子簡王元年丁丑戊寅己卯四年老子仕周為守藏吏庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子十三年老子遷為柱下史自是五十四年一職不遷時人目為吏隱己丑十四年魯襄公元年庚寅靈王元年辛卯壬辰癸巳甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌二十一魯襄公二十二年十一月庚子孔子生於魯國陬邑平鄉母顏氏禱於尼丘而生故名丘字仲尼孔子之生距佛之滅凡四百年辛亥壬子癸丑甲寅乙卯丙辰丁巳景王元年戊午己未庚申四年魯昭公元年辛酉壬戌癸亥甲子乙丑丙寅十年西天八祖佛陀難提尊者以法付伏馱密多尊者偈曰虗空無內外心法亦如是若了虗空故是達真如理遂示寂丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥十九年孔子朝周問禮於柱下史老聃老子時年七十九孔子年二十六統紀一云丙寅年孔見老子丙子丁丑戊寅己卯庚辰辛巳二十五年壬午敬王元年周柱下史老聃時年八十六歲以王室陵遲遂去周與散關令尹喜西游流沙死於扶風郡葬於槐里老子嘗至罽賓國見浮圖自傷不及乃說偈供養對像陳情云我生何以晚佛出一何早不見釋迦文心中常懊惱故詠史詩云七雄戈戟亂如麻四海無人得坐家老氏却思西域住便將徐甲去流沙是年佛滅已四百三十一年矣世謂老子化胡者出於晉惠帝時道士王浮改西域傳為化胡經以誣於世魏世道士姜斌復引僞撰開天經當時為僧曇謨辨妄姜斌獲罪唐高宗朝復追僧道定奪化胡經真僞而僧法明指其妄於是敕搜天下化胡經焚不在道經之數凡道經有記化胡事者並皆削除有司條為罪制自是化胡之說泯矣況道家西升經云吾師化遊