body:
  text: 宋括山一菴釋本覺編集明麟喻居士羅所蘊較訂後漢戊午明帝永平元年己未二年庚申三年佛知此震旦國衆生緣熟將來教化梓潼帝君嘗言豫受業報為卭池龍羈於積水之下連年旱虐水復為泥身既廣大無穴可容烈日上臨內外熱惱諸鱗甲中各生小蟲咂齧困苦一日晨涼天光忽開五色雲氣浮空而過中有瑞相紺髮螺旋金容月瑩山靈河伯萬衆稽首讚歎歡喜聲動天地天香繚繞隨處生春豫乃仰首哀號乞垂救度萬靈諸聖咸謂豫曰此西方大聖正覺世尊釋迦文佛也今以教法流行東土隨教化身將往中國爾既遭逢宿業可脫豫乃身自踴躍入天光中具陳往昔報應之理世尊答言善哉帝子汝於向來孝家忠國又復憫世生護持心因果未周仇敵相爭以人我相肆興殘忍遷怒于物業債當償今復自悔欲求解脫汝於此時復有冤親之想與夫嗔恚愚癡念否豫聞至理心地開明內外罄然如虗空住自顧其身隨念消滅復為男子得灌頂智豫歸依焉出六十六化其書雖不紀年今云佛以教法流行東土隨教化身將往中國故在此年也明帝夜夢金人長大項有日光飛至殿庭旦問羣臣太史傅毅奏曰周昭王時西域有佛出世其形長丈六尺而黃金色陛下所夢將必是乎博士王遵推周書異記佐之帝遂遣中郎蔡愔博士秦景等一十八人使于西域求佛法焉法苑珠林弘明集等諸家紀載感夢與經至之年往往不同或謂七年感夢求法至十年還或謂二年感夢七年遣使十年還審如此說果是則迢迢數萬里豈三載之餘所可往返況資治通鑑今載八年佛已入中國則七年方求其教豈有八年已有佛哉信知七年遣使之說非也今據方志等書當是三年感夢求教至八年還之說為是辛酉四年壬戌五年癸亥六年蔡愔等至天竺鄰境月支國遇梵僧攝摩騰竺法蘭欲奉經像來此震旦遂同東還甲子七年乙丑八年蔡愔等還洛陽摩騰入闕獻經像帝大悅館于鴻臚寺蘭亦間行而後至漢書丙寅九年皇弟楚王英最先奉佛喜為浮圖齊戒嘗奉縑贖罪帝還之以助伊蒲塞桑門之盛饌王公貴人遂爭效之漢書丁卯十年帝於城西雍門外別立一寺與滕蘭居之以白馬䭾經而來遂名曰白馬寺滕蘭初譯出四十二章經一卷譯記戊辰十一年帝幸白馬寺滕蘭進曰寺東何館帝曰昔有阜無因而起夜有異光民呼聖冢滕曰阿育王藏如來舍利於天下凡八萬四千所今震旦境中十有九處此其一也帝大驚即駕幸拜之忽有圓光現冢上三身現光中帝喜曰不遇二大士安知上聖遺祐哉詔塔其上是年竺法蘭出佛本行經五卷三寶紀己巳十二年詔以釋迦寶像奉安顯節陵及清涼臺供養庚午十三年法蘭出十地斷結經釋教録辛未十四年五嶽道士費叔才褚善信等七百餘人咸生忌心詣闕斥言佛法虗僞滕蘭乃言佛法水火不能壞請與道士驗之帝從其請敕叔才等盡出其經訣與佛經築壇以火驗之正月十五日火作而道經俱燼唯佛之經像儼然善信等自愧而死由是道士一衆稽首欽服蘭法師於大衆中即唱偈言狐非師子類燈非日月明池無江海納丘無山嶽榮法雲垂世界善種得開萌顯通希有法處處化群生帝至是彌加崇敬佛法自此興焉漢法本內傳太宗皇帝題白馬寺詩云門徑蕭蕭長緑苔一回登此一徘徊青牛謾說函關去白馬親從印土來欲定是非憑烈焰要分真僞築高臺春風也解嫌狼藉吹盡當年道教灰延光集壬申十五年癸酉十六年騰法師示寂法蘭自譯經五部十三卷甲戌十七年西天二十祖奢夜多尊者以法付婆修盤頭偈曰言下合無生同於法界性若能如是解通達事理竟即以首倒植木枝奄然而化五燈乙亥十八年丙子章帝建初元年丁丑戊寅己卯庚辰辛巳壬午癸未八年甲申元和元年有神鳳凰白鹿白烏之瑞徐州刺史王景上金人頌美先帝致佛之功漢書乙酉丙戌三年丁亥章和元年戊子二年己丑和帝永元元年庚寅辛卯壬辰癸巳甲午乙未丙申丁酉戊戌己亥庚子辛丑十三壬寅癸卯甲辰十六乙巳元興元年丙午殤帝延平元年丁未安帝永初元年戊申己酉庚戌辛亥壬子癸丑七年甲寅元初元年乙卯丙辰丁巳四年西天二十一祖婆修盤頭尊者以法付摩拏羅偈曰泡幻同無礙如何不了悟達法在其中非今亦非古即跏趺而逝五燈統紀戊午己未六年庚申永寧元年辛酉建光元年壬戌延光元年癸亥甲子乙丑四年丙寅順帝永建元丁卯戊辰己巳庚午辛未六年壬申陽嘉元年癸酉甲戌乙亥四年丙子永和元年丁丑戊寅己卯庚辰辛巳六年蜀郡鶴鳴山張道陵號天師造符水醮籙之術著道書二十四卷陵死子孫傳之遂盛于世道家醮禱宗此而始壬午漢安元年癸未甲申建康元乙酉冲帝永嘉元年丙戌質帝本初元年丁亥威帝建和元年月支國支婁迦讖至洛譯經戊子二安息國沙門安清字世高至京譯經己丑三年庚寅和平元年辛卯元嘉元年壬辰二年癸巳永興元年甲午二帝於宮中鑄黃金浮圖老子像覆以百寶華蓋身奉祀之由是百姓向化事佛彌盛漢書世人以金銀作佛鑄像自此而始三寶紀乙未永壽元年丙申丁酉戊戌延熹元年己亥庚子辛丑壬寅癸卯甲辰乙巳丙午九西天二十二祖摩拏羅尊者以法付鶴勒那偈曰心隨萬境轉轉處實能幽隨流認得性無喜亦無憂即示寂丁未永康元戊申靈帝建寧元己酉庚戌三沙門安世高自至京譯經九十五部凡一百一十五卷辛癸四沙門安世高至廬山有䢼亭廟甚靈會三十餘船奉牲請福神輒降語曰舟有沙門可與請來客請高至神復降語曰吾昔與子俱出家學道吾好施而多嗔今為廟神而壽盡旦夕後恐墮地獄吾有縑千段并雜寶物可為立法營塔使生善處高使出形神現大蟒悲淚如雨高取絹物辭別而去高至豫章為建大安寺由高而名乃江淮寺塔之始也俄而神即命過報云得生善處後人於山西澤中見死蠎頭尾數里今潯陽縣有大蛇村是也自鏡録壬子熹平元癸丑甲寅乙卯丙辰丁巳戊午光和元年己未二天竺沙門竺佛朔於洛陽譯般舟三昧道行二經三卷庚申三遣中大夫於洛陽佛塔寺中飯諸沙門懸繒燒香散華然燈三寶紀辛酉四安息優婆塞安玄同嚴佛調譯經二部三寶紀壬戌癸亥六年甲子中平元年支讖自至京譯經六十七卷乙丑丙寅三西域支曜譯成具等經十二卷丁卯四沙門康巨譯經一卷戊辰己巳光熹元年庚午獻帝初平元年辛未壬申癸酉四年甲戌興平元年乙亥二年牟子避世隱居鋭志佛道著理惑三十七篇其文有問曰佛道至尊至大堯舜周孔曷不修之六經不見其辭子既悅詩書禮樂奚為復好佛道彼豈能踰經傳美聖業哉牟子曰書不必孔子之言藥不必扁鵲之方合義者從愈病者良君子博取衆善以輔其身子貢曰夫子何常師之有乎堯事君疇舜事務成昭旦學呂望丘學老聃亦俱不見於六經也四師雖聖比之於佛猶鳥獸之於麟鳳也而堯舜周孔且猶與之況佛之智見窮諸法原奧焉捨而不學乎六經事義或有所關佛不見記何足怪疑哉又問曰身體髮膚受之父母不敢毀傷今沙門剃頭異俗豈合聖人孝子之道也子曰昔齊人乘船渡江其父墮水其子攘臂捽頭顛倒使水從口出而父命得蘇夫捽頭顛倒不孝莫大然以全父之身若拱手修孝子之常父命絶於水矣孔子曰可與適道未可與權所謂時宜施者也而泰伯斷髮文身孔子稱之至德未嘗毀之也由是而觀苟有大德不拘於小沙門捐家財棄妻子不聽音視色可謂讓之至也何違聖語不合孝乎豫讓吞炭漆身聶政皮面自刑伯姬蹈火高行截容君子為勇而死義不聞譏其自毀沒也沙門除髮進德比之四人不已遠乎又問曰不孝莫大無後沙門棄妻子捐財貨何違孝之行也子曰夫長左者必短右大前者必狹後妻子財物世之餘也清躬無為道之妙也孝子曰名與身孰親身與貨孰多又曰誦詩書修禮節鄉人傳業名譽洋溢此中士所施行恬淡者所不恤故許由栖巢木夷齊餓首陽孔子稱其賢曰求仁得仁者也不聞譏其無後無貨也沙門修道德以易遊世之樂反淑賢以貸妻子之歡是不為奇孰與為奇哉又問曰孟子曰吾聞用夏變夷未聞用夷變夏吾子學周孔之道捨而學夷狄之術不已惑乎曰子但見禮制之華而暗道德之實窺炬燭之明未覩天庭之日也孟軻所云疾專一耳昔孔子欲居九夷曰君子居之何陋之有禹出西羌而聖哲由余産狄而羈秦況傳曰北辰之星在天之中在人之北以此觀之漢地未必為天中也佛經以十方界統皆屬佛之化而其法乃萬法之原是以吾復尊而學之何為當捨周孔之道金玉不相傷隋璧不相妨謂人為惑特自惑乎問曰佛道無為淡泊世人多譏毀云其說廓落難用虗無難信何也曰至味不合於衆口大音不比於衆耳作咸池發蕭韶莫之和也張鄭衛之絃歌時俗之音必不期而拊手也韓非以管窺之見而謗堯舜接輿以毛氂之分而刺仲尼皆耽小而忽大者也夫聞清商而謂之角非彈絃之過也聽者之不聰矣見和璧而名之石非璧之賤也視者之不明矣大道無為非俗所見不為譽者貴不為毀者賤也餘文見藏中弘明集丙子建安元年西土千歲寶掌和尚願住世千歲至是東遊此土常不食日誦經千餘卷後入蜀禮普賢五燈丁丑二沙門康猛詳竺大力於洛陽譯四諦及興本起行等經六部十一卷戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥十二天竺沙門曇果猛詳共譯中本起經二卷戊子十三西天二十三祖鶴勒那尊者以法付師子比丘偈曰認得心性時可說不思議了了無可得得時不說知復告以後難乃示寂衆欲分舍利復現空中說偈一法一切法一切一法攝吾身非有無何分一切塔五燈正宗記竝己丑歲入滅己丑庚寅辛卯壬辰癸巳甲午乙未丙申丁酉戊戌己亥二十四自永平十年丁卯至是年共一百五十三年中緇素十二人譯經二百九十二部三百九十五卷開元釋教録三國魏姓曹都洛陽五主凡四十五年蜀姓劉都成都二主凡四十三年吳姓孫都武昌建業四主凡五十九年庚子魏高祖丕黃初元蜀昭烈王備吳太祖權十一月獻帝禪位于魏王丕改元辛丑二章武元據西蜀元全有吳楚壬寅三二黃武元癸卯四後主建興元二月支支謙至吳譯經甲辰五二三西域僧維祇難此云障礙於武昌譯阿差末菩薩等經沙門竺律炎同至譯經乙巳六三四丙午七四五丁未烈祖睿太和元五六戊甲二六七陳思王曹植字子建精通書藝不好黃老惟每讀佛經必留連嗟玩以為至道之宗嘗著辨道論以見意今載藏弘明集己酉三七黃龍元庚戌四八二辛亥五九三壬子六十嘉禾元癸丑青龍元十一二甲寅二十二三乙卯三十三四丙辰四十四五丁巳景初元建丑為正十五六戊午二延熙元赤烏元己未三齊王即位復用夏正二二庚申邵陵厲公芳正始元三三辛酉二四四康居三藏康僧會至金陵設像行道國人初見沙門驚異之有司以聞權詔至問之會廣陳如來之化因曰如來化已千年然靈骨舍利神應無方昔育王奉為八萬四千塔此遺化也權曰舍利可得當為塔之苟其無驗國有常刑會請期七日謂其屬曰佛法廢興在此一舉當加意懇求至期無驗乃展二七又無應權曰趣烹之會更展期又七日衆懼矣至五鼓聞鎗然有聲起視瓶中五色錯發黎明進之王臣大悅歎曰希世之瑞也會又言舍利威神無能壞者吳主使力士槌之砧碎而光明自若於是建塔佛陀里又為寺額曰建初江南寺塔自此而始闞澤仕吳官太子太傅吳主問澤曰佛何年入中國何緣未及此方澤曰永平年佛法初至計今赤烏四年百七十餘年矣永平十四年道士褚善信等乞與西僧角法善信負妄而死凡中國人既不出家無人流布加之罹亂故歲深方至本國吳主曰孔子老子之教與佛比對若何澤曰孔老二教法天制用不敢違天佛之設教天法奉行不敢違佛以此言之優劣可見矣宗炳明佛論等壬戌三五五癸亥四六六甲子五七七乙丑六八八丙寅七九九丁卯八十十戊辰九十一十一西天二十四祖師子尊者以法付婆舍斯多偈曰正說知見時知見俱是心當心即知見知見即于今付法已祖留罽賓統紀己巳嘉平元十二十二庚午二十三十三天竺沙門曇柯迦羅此云法時至洛陽譯僧祇戒本時比丘特剪髮而已未有律儀迦羅始出戒本而以戒心為日用通論辛未三十四太元元天竺波羅芬多至洛神異不測壬申四十五侯官侯亮建興元魏天竺沙門康僧鎧於洛陽譯無量壽等經三部四卷癸酉五十六二甲戌高貴卿公正元元十七五鳳元支謙自至吳至是譯經八十八部合一百一十八卷謙博覽經籍時語曰支郎眼中黃形雖細是智囊吳主高其才拜為博士固辭不受一云輔導東宮甚有稗益謙初受業於支亮亮受業於支讖世稱天下博知不出三支釋教録乙亥二十八二西域沙門曇無德此云法藏賫四分律至洛陽安息沙門曇諦至亦善律學遂同出戒經一卷曇摩迦羅又請曇無德等立羯磨法凡中國戒法自是而始丙子甘露元十九太平元西域沙門支彊梁接此云無畏於交州譯法華三昧經六卷丁丑二二十二朱士衡棄俗出家是為漢地沙門之始士衡嘗於洛陽講道行經又為此土講經之始戊寅三景耀元景帝休永安元西域白延至洛譯經己卯四二二罽賓國以賊竊釋子形服作亂王怒毀寺殺僧王秉劒至師子尊者前曰師得蘊空否曰已得蘊空王曰離生死否曰已離生死王曰既離生死可施我頭祖曰身非我有何吝於頭王即斬之白乳涌高數尺王臂自墮于地而死後弟子收師報體而建塔焉庚辰元帝奐景元元三三竺大力入吳譯經至是還西域辛巳二四四天竺支疆梁樓至洛譯經正宗竺律炎於揚都譯經三部沙門朱士行於洛陽講道行經義有不通乃發迹往于闐求正本焉壬午三五五癸未四炎興元為魏所滅六甲申魏咸熙元吳歸命侯皓元興元魏四十五年中西域沙門六人所出經律論十二部凡一十八卷西晉姓司馬都洛邑及長安為東西京至元帝都建康為東晉西晉四主五十二年乙酉晉世祖炎泰始元十二月受魏禪吳歸命侯皓甘露元十二月晉世祖武帝即位帝龍顏奇偉盛明革運大崇佛事廣造伽藍方志吳主孫皓遍毀神祠波及梵宇遣臣詰僧會會挫其辭皓乃召會問佛之善惡報應會曰明主以仁德治天下則赤烏翔嘉禾苗善既有應惡亦如之易稱積善餘慶詩美求福不回皓曰周孔既明安用佛教會曰周孔不欲深言故略示其迹佛教不止淺言故詳示其要皆為善也聖人唯恐善之不多陛下以為嫌何也皓無以酬之遂罷他日宿衛治圃得金像皓使置穢處以為笑樂俄得腫疾隱處尤痛卜曰坐犯大神皓禱諸廟不效宮人曰乃不請福於佛耶皓曰佛神若是怪乎曰佛之威靈若天皓悟曰吾以慢像致此耳乃迎像供事之仍請會說法悔罪會為開示玄要及授五戒少頃疾愈由是奉會為師崇飾寺塔法苑丙戌二寶鼎元竺曇摩羅察此云法護燉煌人初遊西域大賫梵經還歸東夏是年至長安譯經教相廣流此土者法護深有殊功護為此土求經沙門之始也丁亥三二戊子四三己丑五建衡元庚寅六二辛卯七三西域揵陀勒至洛陽人莫能測偶曰盤鵄山有古寺基可共修立衆人依言發掘果得石基因共修立以勒為寺主去洛百里朝朝至洛赴齊暮乞油一鉢還寺然燈其行如飛僧傳壬辰八鳳凰元法護出新道行經十卷河州唐述谷至是立寺寺東谷中有一天寺常聞鐘聲人入其山每逢仙聖恍惚現寺東北嶺上出於醴泉甜而且白服者不老癸巳九二甲午十三乙未咸寧元天冊元丙申二天璽元丁酉三天紀元闕公則悟放蕭然唯勤法事至是遷寂忽現空中報言生西方安樂界矣僧史戊戌四二己亥五三庚子太康元四為晉所滅九月康僧會卒會譯經十四部三十卷吳五十九年中道俗四人譯經百八十九部凡四百十七卷辛丑二壬寅三劉薩何病死入冥見梵僧指往會稽育王塔處懺悔既蘇出家名慧達至會稽遍求不見偶一夜聞地下鐘聲即誠懇經三日忽從地涌出寶塔高一尺四寸廣七寸佛像悉具達既見塔精勤禮懺瑞應頗多明州育王塔自是始也塔傳癸卯四抵世常供養沙門不憚忽有僧來貌陋衣斃令常洗足常不肯僧乃現大身升空而去常悔焉感通傳甲辰五乙巳六丙午七丁未八初太康三年朱士衡得道行經梵本遣弟子送歸洛陽未發之間于闐小乘衆白王云漢僧欲以婆羅門書惑亂正典王若不禁之將聾盲漢地也王即不聽賫經士衡憤慨乃求燒經為證王乃積火燔之士衡誓曰若大法應流漢地者經當不燒言已投經火中火滅經存更覺光鮮大衆駭服至是遂送達到洛陽住三年復至許昌二年後無羅叉譯放光般若是也戊申九己酉十四月武帝崩庚戌惠帝衷永熙元辛亥元康元帝於洛下造興聖寺常供百僧方志壬子二于闐無叉羅譯放光般若經三十卷癸丑三甲寅四乙卯五優婆塞竺叔蘭譯經二部丙辰六天竺耆域初來交廣竝有靈異既達襄陽欲寄載過江舟人見是胡僧輕而不載及船達岸域已前行路見兩虎虎弭耳掉尾域以手摩其頭虎下道而去見者皆敬至是于洛陽或告人前世事指支法淵從羊中來竺法興從天中來又曰比丘衣服華麗不應素法有太守滕永文經年得病兩腳攣屈不能起行域取淨水以楊柳誦呪拂之者三文即能行一寺有樹數十株枯死域呪之尋即敷榮有病癥將死域以布覆應器於病者腹上舉器有若淤泥數升病者遂活丁巳七戊午八訶羅竭太康九年至洛呪治疫疾十差八九後入婁至山以腳蹍石出水清美是年坐化己未九庚申永康元辛酉永寧元沙門支法度譯經五卷壬戌太安元沙門耆域知洛將亂辭歸天竺有僧乞一言為識域令會衆人衆集域升座曰守口攝身意慎莫犯衆惡修行一切善如是得度世言訖便默於是數百人各請域中食域皆許往明日五百舍皆有一域始謂獨過及相讐問方知分身降焉既行有達送者域徐行追者弗及域畫地曰於此別矣其日有從長安來者見域在彼寺又賈客其夕會域于流沙計已九千餘里癸亥太安二漢高祖劉淵成始祖李特建初元涼西平武穆公張軌燕高祖慕容廆代昭帝拓跋祿官九沙門支孝龍有機辨是年講放光般若人皆宗仰阮瞻庚凱尤敬之有嘲其胡服者龍曰以道觀之誠不見有容服之異彼謂我辱我棄彼榮則無心之貴愈貴無心之安愈安耳甲子永興元元熙元太宗雄建興元十時沙門白遠字法祖才敏絶倫譯經二十五卷乙丑二二二十一釋法立共法炬等譯法喻等經十二卷丙寅光熙元三晏平元十二沙門安法欽自太康二年至是譯經五部十六卷丁卯懷帝永嘉元四二十三法護譯普曜經八卷護究通三十六國典籍世稱燉煌菩薩戊辰二永鳳元三穆帝猗盧元法護譯經優婆塞聶承遠執筆承旨至是遠自譯三昧等經己巳三漢河瑞元後趙高祖石勒成四涼燕代二法矩譯法律等經五十卷高僧安慧則直天下疫病祈得神水兩甕服者皆愈又自書大品經入火不燒庚午四漢淵死子聰立改光興元五三天竺沙門佛圖澄至洛陽已年百餘歲常服氣自養能積日不食能役使鬼神腹旁有一孔常以絮塞之夜則拔絮孔中出光照于一室又嘗至流水側從腹旁孔中引出五臟六腑洗之訖還內腹中又以油雜胭脂塗掌千里外事皆見掌中如對面焉或聽鈴音事無不驗晉書辛未五嘉平元玉衡元四法師白遠才思雋徹敏朗絶倫道化遠被崤崡以西奉之如神南陽張光字世孺為涼州刺史欲令反俗為己僚佐祖固志不移遂遇害祖弟法祚德行冲允亦為害之先是法祖語弟子曰我數日對當至便辭別分衣資訖明日詣光語忤光意光使收祖祖乃曰我來畢對此宿命久結非今日事也隴上羌胡將迎祖西歸中路聞其遇害咸欲復祖之讐率騎與光逆戰生擒光斬之乃分祖之骸各立寺廟而禮事焉本傳張光一作張輔壬申六二二五信士聶道真即承遠之子承遠既卒真乃詢稟咨承及護絶筆真自譯經三十六卷癸酉晉愍帝建興元三三六愍帝即位於長安造通靈白馬二寺六帖是年有古維衛迦葉二佛石像泛海而入吳松江滬瀆口遙見浮游道士巫師往迎竝風濤洶湧吳縣朱膺素奉正法乃同數人共往迎像於是乘流自到背有銘鋕接之登舟其輕如羽乃奉安於通玄寺蓋上古時先佛教法亦流化此土矣法苑竺法護譯經一百七十五部至是絶筆釋教録甲戌二日隕于地復有三日出於西而東行四四七時石勒屯兵葛陂專事殺戮佛圖澄欲化之勒有將軍郭黑略素奉佛法澄即見之略乃受五戒崇弟子禮略隨勒戰澄皆豫記勝負勒以略有異見問之曰有澄也勒曰天賜也召之勒曰佛法何靈澄知勒不達深理可以相從乃請燒香以鉢盛水呪之須臾生青蓮華光色耀目勒由此神敬之本傳乙亥三天下太饑民相食死建元元五涼西平公實八丙子四麟嘉元六九十二月劉曜攻陷長安帝出降曜乃據中原西晉四主五十二年中華戎譯經道俗一十二人譯經律等六百有餘卷寺一百八十所僧尼三千七百餘人
