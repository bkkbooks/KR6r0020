body:
  text: 宋括山一菴釋本覺編集明羼提居士畢熈志較訂唐德宗下己卯十五年四月帝誕節敕有司備儀輦迎教授和尚澄觀入內殿闡揚華嚴宗旨觀陞高座曰大哉真界萬法資始包空有而絕相入言象而無迹妙有不有真空不空我佛得之妙踐真覺廓淨塵習寂寥於萬化之域動用於一虗之中融身利以相含流聲光而遐燭我皇得之靈鑒虗極保合大和聖文掩於百王淳風扇於萬國敷玄化以覺夢垂天真以性情是如華嚴教旨廓沖䆳不可得而思議矣失其旨也徒脩因於曠劫得其門也等諸佛於一朝云云帝顧謂羣臣曰朕之師言雅而簡辭典而富能以聖法清涼朕心仍以清涼賜為國師之號朕思從來執身心我人及諸法定相斯為顛倒羣臣再拜稽首頂奉明命由是中外台輔重臣咸以八戒禮而師之是歲廬山東林律大德熈怡示寂許堯佐製其略曰師精貫六藝旁達百氏甞與魯公顏真卿丞相趙公憬御史盧羣等為禪侶門人法粲等傳其教四明庾承宣作福州無垢淨光塔銘略曰觀察使柳公監軍使魚公相與言曰報君莫大於崇福崇福莫大於樹善樹善莫大於佛教教之本其在浮圖歟夫塔者上參諸天下鎮三界影之所蔭如日月之照破昏為明鈴之所響如金石之奏聞聲生善如是諸福盡歸人王謀之既藏相顧踴躍食王祿者樂於檀施荷帝力者悅而獻工役無告勞功用斯畢皇帝嘉焉御扎題額錫名真元無垢淨光之塔云庚辰十六年逸士劉軻游廬山黃石岩遇高僧因為記略曰軻至黃石岩岩有棲禪子問其所住幾年但以手指松桂曰毫髮我植今環人臂烏飛兔走吾復何齒世之人名為利鈎利為名餌吞鈎食餌手足覊鎻彼焉得跳躍於此乎夫禪子脫去桎梏四支宣展動與雲無心靜將石何機物我一致端邪徑塞所謂非斯人不能住斯境也師俗姓黃名常進以師久住遂以其姓名岩焉辛巳十七年金陵沙門惠炬天竺三藏勝持編次諸祖傳法偈讖及宗師機緣為寶林傳南嶽雲峰律師法證示寂凡度學者五萬人壽七十八柳子厚銘其塔復為之略曰乾元元年皇帝曰予欲俾慈仁怡愉治于生人惟浮圖道允廸乃命五岳求厥元德以義于下惟慈岳上于尚書其首曰雲峯大師法證凡蒞事五十年貞元十七年乃沒其徒曰詮曰遠曰振曰巽曰素凡三千餘人有來受律者吾師示以尊嚴整齊明列義類而人知其所不為有來求道者吾師示以高廣通達統其空有而人知其所必至元臣碩老稽首受教髫童毀齒踴躍執役故從吾師之命而度者凡五萬人吾師冬不燠裘饑不豐食每歲會其類讀群經俾聖言畢出有以見其大又率其仵伐木輦土作佛塔廟洎經典俾像法益廣有以見其用云云以至厥徒蒸蒸惟大教是膺惟憲言是懲溥博弘如川之增如雲之興如嶽之不崩終古其承柳集壬午十八年癸未十九年東都聖善寺大師凝公示寂翰林白居易作八漸偈吊之其序曰居易甞求心要於師師賜教焉曰觀覺定慧明通濟捨由是入於耳貫於心嗚呼今師之報身則化師之八言不化至哉八言實先生忍觀之漸門也故廣一言為一偈謂之八漸偈蓋欲以發揮師之心教且明居易不敢失墜也既而升于堂禮于牀跪而唱泣而去偈曰觀以心中眼觀心外相從何而有從何而喪觀之又觀則辨真妄覺惟真常在為妄所蒙真妄苟辨覺生其中不離妄有而得真空定真若不滅妄即不起六根之源湛如止水是為禪定乃脫生死慧專之以定定猶有繫濟之以慧慧則無滯如珠在盤盤定珠慧明定慧相合合而後明明彼萬物物無遺形如大圓鏡有權無高通慧至乃明明則不昧明至乃通通則無礙無礙者何變化自在濟通力不常應念而變二相非有隨求而見是大慈悲一濟萬捨眾苦既濟大悲亦捨苦既非真悲亦是假是故眾生實無度者濬上人歸淮南柳宗元子厚作序送之略曰金仙氏之道蓋本於孝敬而後積以眾德歸於空無其教曰禪曰法曰律以誘掖謎濁世用寂無上人窮討祕義發明上乘奉威儀三千雖造次必備甞以此道宣於江湖之人皆悅其風而受賜攀慈航望彼岸者蓋千百計天子聞之徵至闕以問焉導揚本教頗甚稱旨京師士眾方且翹然仰大雲之澤以植德本而上人不勝顧復之恩退懷省侍之禮𢢽迫上乞遂無以奪由是杖錫東顧振衣晨往右司員外郎劉公通達釋教與上人為方外游始榮其至今惜其去於是合郎署之友詩以貺之退使孺子執簡而序之因繫其辭曰上人專於律行恒久彌固其儀刑後學者歟誨於生靈觸類蒙福其積眾德者歟覲干骨堂視遠如邇其本孝敬者歟若然者是將心歸空無捨筏登地固何從而識之乎柳集甲申二十年正月南岳般舟和尚卒柳子厚作第二其詞略曰和尚曰日悟心大而行密體卑而道尊以為由定發慧必用毗尼為之室宇遂究觀祕義登壇蒞事度比丘眾歲凡千人者三十有七而道不慁以為去凡即聖必以三昧為之軌道遂脩明要奧得以觀佛道場專精長跪右遶凡七日者百有二十而志不衰師即崇嶺作精室凡南方人顓念佛三昧者必由於是命曰般舟臺焉嗚呼無得而脩故念為實相不取於法故律為大乘萬行方厲一性恒如寂用之涯不可得也柳集順帝乙酉永正元正月德宗崩順宗即位帝初在東宮時問佛光如滿禪師曰佛從何方來滅向何方去既言常住世今佛在何處答曰佛從無為來滅向無為去法身等虗空常住無心處有念歸無念有住歸無住來為眾生來去為眾生去清淨真如海湛然體常住智者善思惟更勿生疑慮帝又問曰佛向王宮生滅向雙林滅住世四十九又言無法說山河及大海天地及日月時至皆歸盡誰言不生滅疑情猶若斯智者善分別答曰佛禮本無為迷情妄分別法身等虗空未曾有生滅有緣佛出世無緣佛入滅處處化眾生猶如水中月非常亦非斷非生亦非滅了見無心處自然無法說帝聞大悅帝甞問尸利禪師大地眾生如何得見性成佛去尸利對曰佛性如水中月可見不可取帝甞問心要於清涼國師師答之略曰至道本乎其心心法本乎無住無住心體靈知不昧性相寂然包含德用迷現量則惑苦紛然悟真性則空明廓徹雖即心即佛唯證者方知然有證有知則慧日沉沒於有地若無照無悟則昏雲掩芘於空門若一念不生則前後際斷照體獨立物我皆如直造心源無智無得然迷悟相依真妄相待若求真去妄如棄影勞形若體妄即真似處陰影滅若無心忘照則萬慮俱捐若任運寂知則眾行爰啟放曠任其去住靜鑒覺其源流語默不失玄微動靜未離法界言止則雙亡知寂論觀則雙照寂知語證則不可示人說理則非證不了是以悟寂無寂真知無知以知寂不二之一心契空有雙亡之中道八月順宗遜位于憲宗自稱太上皇次年正月崩九月太尉中書令韋皐薨皐初生厥父飯僧祈福忽有應真尊者至齊畢乳媼抱兒求呪願尊者起謂眾曰此兒諸葛武侯也他日有美政於蜀宜以武字之言訖恍然不見其後皐游宦出處名節大槩與武侯相類治蜀二十一年封南康郡王四川至今奉祀之雅好釋氏法嘉州石像初成皐為記有曰頭圍千尺目廣二丈其餘相好一一稱是又甞訓鸚鵡念佛鸚鵡斃以桑門故事闍維之得舍利皐為記略曰元精以五氣授萬類雖鱗介毛羽必有感清英純粹者矣或炳耀離火或稟奇蒼精皆應乎人文以奉若時政則有革彼禽類習乎能言了空相於不念留真骨於已斃殆其元聖示現感於人心同夫異緣用一真化云云通論憲宗丙戌元和元年十月詔天下有道行僧赴上都闡化西堂智藏因張拙秀才問三世諸佛天堂地獄是有是無師皆云有張云錯師曰汝見甚人來云曾參百丈一曰徑山他道總無師曰汝有甚眷屬曰有一山妻兩箇頑子師曰待汝得似百丈時一切道無即得張禮謝而去丁亥二年詔鵝湖大義禪師入麟德殿論義帝臨聽有法師問何謂四諦答曰聖上一帝三諦何在又問欲界無禪禪居色界此土憑何而立答曰法師只知欲界無禪不知禪界無欲曰如何是禪義以手點空法師無對帝曰法師講無窮經論只這一點尚不奈何義却問眾師曰畢竟以何為道有對知者是道義曰不可以智知不可以識識安得知者是道有對無分別是道義曰善能分別諸法相於第一義而不動安得無分別是道有對四禪八定是道義曰佛身無為不墮諸數安得四禪八定是道復有數人致對義皆乘機剉之即舉順宗甞問尸利禪師佛性可見否利曰佛性如水中月可見不可取湖因謂帝曰尸利既見水月何不捉取帝因問湖何者是佛性湖答曰不離陛下所問帝默契由是益重禪宗二月制法師端甫掌內殿法事儀注錄左右街僧事僧錄自甫而始四月荊州天皇道悟禪師命弟子先期告終至晦日大眾問疾師曰會麼乃拈枕子拋於地上即便告寂壽六十臘三十五師嗣石頭戊子三年二月長沙龍安寺如海禪師示寂柳宗元為略曰師居長沙在定十四日人即其處而成室宇遂為寶應寺去湘之西人又從之負木石以益其居又為龍安寺焉尚書裴公某李公某侍郎李公某陽公某中丞房公某咸尊師之道執弟子禮年八十一為僧五十三朞弟子玄覺懷直等全見柳文海有弟子浩初與子厚善子厚有序送初其辭略曰儒者韓退之病予嗜浮圖言訾予與浮圖遊且曰見送元生序不斥浮圖浮圖誠有不可斥者往往與易論語合誠樂之其與性情然不與孔子異道退之好儒未能過楊子楊子之書於莊墨申韓皆有取焉浮圖者反不及莊墨申韓之怪僻險賊耶曰以其夷也果不信道而斥焉以夷則將友惡來盜跖而賤季扎由余乎非所謂去名求實者矣吾之所取者與易論語合雖聖人復生不可得而斥也退之所罪者其迹也曰髠而緇無夫婦父子不為耕農蚕桑而活乎人若是雖吾亦不樂也退之忿其外而違其中是知石而不知韞玉也吾之所以嗜浮圖之言以此與其人游者非必能通其言者且凡為其道者不愛官不爭能樂山水而嗜安閑者為多吾病世之逐逐然唯印組為務則捨是其焉從吾之好與浮圖遊以此今浩初閑其性安其情讀其書通易論語唯山水之樂又父子咸為其道以養而居泊焉而無求則其賢於為莊墨申韓之言而逐逐然唯印組為務者其亦遠矣見柳文詔栢岩惟惲禪師居章敬每歲入麟德殿論道十月十三日荊南城西天王道悟禪師入滅壽八十二坐六十三夏一云元和十三年四月十三化師嗣馬祖其嗣法即龍潭信也覺夢堂重校五家宗派謂今傳燈却收雲門法眼兩宗歸石頭下誤矣緣同時道悟者有兩人一曰江陵城西天王寺道悟者諸宮人嗣馬祖元和十三年四月十三日化正議大夫丘玄素撰塔銘文數千言一曰江陵城東天皇道悟婺州東王人嗣石頭元和二年丁亥化律師符載撰二所載生緣出處甚詳張無盡討得二塔記示諸方曰元甞疑德山洞山同出石頭下因甚垂手處死活不同今以丘符二記證之朗然明白己丑元和四年五月敕有司別鑄金印加清涼國師澄觀號僧統國師主教門事宰相權德輿著草衣禪師宴坐記略曰信州南嶽有宴坐之地而禪師在焉師居三十年州人以草衣號焉足不蹈地口不甞味時無寒暑一繩牀而已身及智慧二俱清淨微言軟語有時而聞涉其境之遠近隨其根之上下如雨潤萬物風行空中履其門閾皆獲趣入若非幹玄機於無際窮實相之源底則四時攻於外百疾生於內矣古所謂遺物離人而立於獨者禪師得之嗚呼世人感物以游心心遷於物則利害生焉吉㐫形焉牽縻覊瑣蕩而不復至人則返靜於動復性於情夭壽仁鄙之殊由此作也斯蓋世諦之一說耳於禪師之道其猶梯稗耶本集福州閩縣白鹿院開山第一代道弘禪師法嗣大度是年領徒入槦溪山中鄉老槖糧而往飯之遂請移今院處偶逢白鹿開剏道場一日空中忽降五十三佛及錫杖一條借雜青鳧紛紛而下高可盈尺師悉收之鑄為聖像三百餘軀師將示滅自於槦溪源遷塔基一所前溪潺潺師謂此水喧吾之定荷錫泝流振之數下㵎流當隨錫聲而滲沽流可餘百步別為泉眼湧出其㵎遂涸以長慶壬寅十二月二日趺化長樂集庚寅五年帝問國師澄觀曰華嚴所詮何謂法界奏曰法界者眾生身心之本體也從本以來虗明廣大唯一真境而已無有形貌而森羅大千無有邊際而含容萬有昭昭於心目之間而相不可覩晃晃於色塵之內而理不可分非徹法之慧目離念之明智不能見自心如此之靈通也故世尊初成正覺歎曰奇哉一切眾生具有如來智慧德相但以妄想執著而不證得於是稱法界性說華嚴經全以真空簡情事理融攝周遍凝寂帝一聽玄談廓然自得三月敕諫議孟簡補闕蕭俛於醴泉寺監護譯經潤文舊史本紀廬山西林水閣院齊朗律師法化大行初自洪州升龍興寺至頭陀總一十四會承羯麼者數盈萬計考工員外郎李公渤中書舍人白公居易甞視郡事得之精微每至道場膜拜起敬云廬山記辛卯六年龐居士自元和初方寓襄陽棲止嵓竇今鹿門南二十里有居士嵓時太守于公頔尤加慕異乃伺良便躬就謁之一面周旋如宿善友既深契於情分亦無間於往來及居士將入滅令女靈照視日及中即報照遽報曰日已中而有蝕士出觀照即登座合掌而逝士笑曰我女鋒捷於是更延七日大守于公聞之乃往問安居士曰但願空諸所有謹勿實諸所無好住世間猶如影響言訖枕公膝而逝妻聞之曰這兩个愚癡不報而去其男斸畬母往告曰老漢與靈照去也男遂按鋤笑曰嗄亦立而化母曰汝更愚癡既為焚燒畢乃遍別鄉閭歸隱自後不知其所壬辰七年柳子厚製南岳彌陀和尚其詞略曰代宗時法照國師言其師南岳長老有異德天子南向而禮焉度其道不可徵乃名其居曰般若道場用尊其位洎德宗申詔褒立是為彌陀寺人從而化者以萬計公為僧五十六年壽九十一柳文是歲永州脩淨土院成柳子厚為記略曰中州之西數萬里有國曰身毒釋迦如來示現之地彼佛言西方過十萬億佛土有世界曰極樂佛號阿彌陀其國無三毒八難眾寶以為飾其人無十纏九惱羣聖以為友有能誠心大願歸心是土者苟念力具足則生彼國永出三界得不退轉其言無所欺也晉時廬山遠法師作念佛三昧詠大勸于時其後天臺顗大師著釋淨土十疑論宏宣其教迷者賴焉蓋其留異迹而去者甚眾刺史李承晊等立淨土堂于龍興寺之西巽上人復葺茲宇以開後學有信士圖為佛像法相甚具今刺史馮公作大門以表其位余遂周環廊廡繢大士像繒蓋幢幡以成就之嗚呼有能求無生之生者知舟筏之存乎是遂以天臺十疑論書于城宇使觀者起信焉柳集癸巳八年法師智𧦬悟解絕倫然寡徒侶偶有耆宿閱𧦬著述乃曰汝識至高頗符佛意今寡徒眾蓋缺人緣耳佛猶不能度無緣況初心者乎可辦食布施飛走却後二十年當自有眾𧦬如其教炊米散郊外感羣烏大集搏飯而去𧦬祝曰食吾飯者願為法侶後二十年𧦬往鄴城開講座下有眾千餘人果皆少年比丘是歲道樹禪師示寂初結茆壽州三峰有怪化現百端或現佛菩薩天仙等形或放光出響凡十年方滅迹師曰野人作無限伎倆眩惑於人只消老僧不見不聞伊伎倆有窮吾不見不聞無盡由是遠近欽服所謂見怪不怪其怪自敗云甲午九年正月百丈懷海禪師示寂春秋九十五諡大智禪師師丱歲離塵三學該煉依附馬祖與西堂藏同入室時馬祖之門會學千百二大士為角立焉及祖沒師往新吳百丈山玄徒輻湊師雖﨟高凡作息必與眾同均甞謂一日不作則一日不食僧問如何是大乘頓悟法門師曰心地若空慧日自現若垢淨心盡處於生死其心自在畢竟不與虗幻塵勞蘊界和合逈然無寄去留無礙若能一生心如木石相似不為五欲八風之所漂溺即生死因斷去住自由僧問如何得自由去師曰如今得即得對五欲八風情無取舍垢淨俱亡如日月在空不緣而照亦如香象渡河截流而過此又天堂地獄所不能攝也師每說法竟大眾下堂乃召大眾回首師云是什麼師以禪宗自少室至曹溪多居律寺說法乃剏立禪居凡具道眼有德者曰長老學眾無高下竝入僧堂置十務寮舍每用主領一人營眾事其後叢林日盛當代宗師從而廣之今所謂禪苑清規者備矣是月柳子厚作南岳大明律師略曰儒以禮立仁義無之則壞佛以律持定慧去之則喪是以離禮於仁義者不可與言儒異律於定慧者不可與言佛達是道者惟大明師凡浮圖之道衰其徒必小律而去經大明恐焉於是究戒律而大法以立通經教而奧義以脩凡衣服器用動有師法言語行止皆為物軌北山法師神清示寂清著北山錄行于世乙未十年南海經略馬總以曹溪六祖未有諡請于朝帝賜諡曰大鑑塔曰靈照總乃命柳子厚撰其詞略曰自有生物則好鬬奪相賊喪其本實誖乖謠流莫返于初孔子無大位沒以餘言持世更楊墨黃老益雜其術分裂而浮圖說後出推離還源合所謂生而靜者梁氏好作有為達磨譏之空術益顯六傳大鑒其道以無為為有以空侗為實以廣大不蕩為歸其教人始以性善終以性善不假耘鋤本其靜矣柳文異僧惠昭示寂于武陵年二百九十會通禪師初姓吳名元卿為供奉官一日對帝曰臣幼不食葷志願從釋浹旬乃詔許尋母患歸鄉謁鳥窠願授僧相窠曰今時為僧鮮有精苦者行多浮濫通曰本淨非琢磨元明不隨照窠曰汝若了淨智妙圓體自空寂即真出家元卿三請窠乃與披剃具戒法號會通忽辭往諸方學佛法窠曰佛法此間亦有少於身上拈起布毛吹之通遂悟玄旨時號布毛侍者五燈丙申十一年鄧隱峰之五臺道由淮右屬吳元濟阻兵蔡州與官軍戰師曰吾當少解其患乃振錫空中飛身而過兩軍仰觀歎異鬪心頓息以是官軍得成其功焉撫州景雲寺律師上弘示寂白居易製略曰師主法二十年得度者萬五千餘人銘曰佛滅度後薝蔔香衰孰反是香景雲大師景雲之生中興毗尼景雲之滅法將疇依昔景雲來入室者歸今景雲去入室者悲云云白集歸宗智常禪師目有重瞳遂用藥手按摩久而目眥俱赤世號拭眼歸宗江州刺史李渤問芥子納須彌莫妄談否師云人傳史君讀萬卷書是否曰然師曰自頂至踵如椰子大萬卷向甚處著渤俛首而已師沒有贊其像曰知見一何高拭眼避天位回觀洗耳人千古未為愧章敬寺栢岩禪師示寂敕塟陵諡曰大覺傳燈紀師十二年二月晦日入滅敕諡大徹相國權德輿製略曰師諱懷惲弟子智朗智操等師甞著師資傳一編論次諸祖最為詳實宰官大臣皆尊信之東巽法師赴叔父連中丞之請柳子厚贈序謂有得於師之道又孟常州鄭中書皆以師友命之高僧靈徹示寂文集二十卷尚書劉禹錫製序通論柳宗元為柳州刺史州有大雲寺久焚宗元復之又自為記丁酉十二年岳州無姓和尚名法釰居楞伽峰不越閫者五十祀是年示寂柳子厚為柳文馬郎婦欲化陝右乃之其所人見其姿貌風韵欲求為眷曰我亦欲有歸但一夕能誦普門品者則事之至明誦徹者二十輩婦曰女子一身豈配汝等可誦金剛至旦通者猶十數婦更授法華七軸約三日通至期獨馬氏通婦令具禮成姻馬氏具禮迎之婦曰適體中不佳俟少安相見客未散而婦死已而壞爛遂塟之數日有老僧仗錫來詣馬氏問所由馬氏引至塟所僧以錫撥開見屍已化唯金鎻子骨在焉僧以骨挑錫上謂眾曰此聖者憫汝等障重故垂方便化汝宜思善因免墮苦海忽飛空而去自此陝右奉佛者眾泉州粲和尚甞贊曰丰姿窈窕鬢欹斜賺盡郎君念法華一把骨頭挑去后不知明月落誰家戊戌十三年正月鵝湖大義禪師示寂諡曰慧覺三月五洩靈默禪師焚香端坐告眾畢奄然順化是年禪師元浩示寂浩弘台教翰林梁肅請撰涅槃經疏浩感異夢即述之議者以浩疏比王輔嗣易而與清涼華嚴疏抗衡焉己亥十四年鳳翔法雲寺有護國真身塔塔內有釋迦文佛指骨一節其法三十年一開開則歲稔人泰至是年正月帝遣中使杜英奇押宮人三十持香華迎入大內帝御安福門迎拜留禁中供養三日五色光現百僚皆賀帝大悅乃歷送諸寺具釋部威儀及太常長安萬年音樂旌旛鼓吹騰沓係路王公士庶奔走膜拜瞻奉捨施唯恐弗及有然香臂頂供養者有竭產充施者刑部侍郎韓愈上表切諫以為佛者夷狄之一法耳自黃帝至文武皆享壽考百姓安樂是時未有佛也漢明帝時始有佛法其後亂亡相繼運祚不長佛不能福事可知矣乞以此骨投諸水火絕後代之惑上得表大怒持示宰相將抵以死裴度崔羣為言愈言雖狂發於忠懇宜寬容以開言路戚里諸王舊臣皆為愈哀請遂貶潮州刺史古賢有詩詠韓曰紛紛易盡百年身舉正何人識道真力去陳言誇末俗可憐無補廢精神出王荊公文集愈到郡之初以表哀謝勸帝東封太山久而無報不樂因聞郡有大顛禪師道德名重以書三招而大顛至三書甚加禮敬見公全集顛之言論超勝留數十日或入定數日方起愈甚敬焉因祀神海上登靈山復造師之廬甞問大顛春秋多少師提起數珠示之愈不會次日再至寺門首見僧舉前話僧扣齒公入寺問師師即三扣公云佛法一般師乃打僧出院公一日問云弟子軍州事繁省要何乞師一句大顛良久不顧公罔措時三平為侍者乃敲禪床一下顛云作麼平云先以定動後以智拔公乃拜謝三平云和尚門風高峻愈却於侍者處得箇入路又大顛甞問愈曰子之貌然似有不懌何也對曰愈之用於朝享祿厚矣一旦以忠言不用竄逐八千里播越嶺海喪吾女孥毒霧瘴氣日夕發作今黜於無人之地其生詎可保乎愈之來也道出廣陵廟而禱之幸蒙其力而卒以無恙以主上有中興之功已奏章道之使東巡太山奏功皇天倘有意於此則庶幾召愈述作功德而薦之郊廟焉愈早夜待之而未至冀萬一於速歸愈安能有懌乎顛曰子直言於朝也忠於君而不顧其身耶抑尚顧其身而強言之以狥名耶言用則獲忠直之名享報言之利不用而逐事之必至何介介於胸中哉苟患乎逐則盍勿言而已吾聞之為人臣者不擇地而安不量勢而行今子遇逐而不懌趍時而求狥殆非人臣之正也且子之死生禍福豈不懸諸天乎子姑自內脩而外任命可也彼廣陵其能福汝耶主上以奸臣負國而討之不暇僅能克平而瘡痍未瘳方此之際而子又欲封禪告功以騷動天下而屬意在乎己之欲歸子奚忍於是耶且夫以窮自亂而祭其鬼是不知命也動天下而不顧以便己是不知仁也強言以示忠遇困而抑是不知義也以亂為治而告皇天是不知禮也而子何以為之且子之遭黜也所言何事乎愈曰主上迎佛骨入大內愈以佛者夷狄之法耳三代無佛而年祚永久晉宋梁魏事佛而不夭則亂愈恐主上惑於此是以不顧其身而斥之顛曰若是則子言謬矣且佛也者覆天人之大器也其道則妙萬物而為言其言則盡性命之理其教則捨惡而趨善去偽而歸真其視天下猶父之於子也而子毀之是猶子而刃父也吾聞善觀人者觀其道之所存而不較其所居之地桀紂之君跖蹻之臣皆中國人也然不可法者以其無道也舜生東夷文王生西夷由余生於戎季札出於蠻彼二聖二賢豈可謂之夷狄而不法乎今子不觀佛之道而徒以為夷狄何言之陋也子以上古未有佛而不法耶則孔孟生衰周而尤瞽叟生上古矣豈可捨衰周聖賢而法上古㐫頑哉子以帝王之代未有佛而長壽耶則書無逸曰自時厥後亦罔或克壽或十年或四三年也以漢陳之間人主夭且亂也則漢明為一代之英主梁武壽八十六豈必皆夭且亂耶愈曰余謂佛者口不道先王之法言而妄倡乎輪回生死之說身不踐仁義忠信之行而詐造乎報應禍福之故無君臣之義無父子之親賊先王之道愈安得默而不斥之乎顛曰甚哉子之不達也有人於此終日數十而不知二五則人必以為狂矣子之終日言仁義忠信而不知佛之言常樂我淨誠無以異也且子誦佛書其疑與先王異者可道之乎曰愈何暇讀彼之書顛曰子未甞讀彼之書則安知不談先王之法言耶無乃以甞讀孔子之書而遂疑彼之非乎抑聞人以為非而遂非之乎苟以甞讀孔子之書而疑彼之非是舜犬也聞人以為非而遂非之是妾婦也昔舜畜犬犬所見者唯舜一日堯過而吠之非愛舜而惡堯以所常見者舜而未甞見堯也又聞女子之嫁也母送之曰往之汝家必敬必戒無違夫子然則從人者妾婦之事安可從人之非而不考其所以非之者乎夫輪迴生死非妄造也此天地之至數幽明之妙理也以物理觀之草木根荄槁而復生則其往復又何怪焉孔子曰原始要終故知死生之說莊子曰萬物出於機入於機賈誼曰化為異類兮又何足患此皆輪迴之說不俟於佛而明也焉得謂之妄乎且子又以禍福報應為詐造此尤足見子之非也夫善惡之報皆神理自然之應易曰積善有餘慶積惡有餘殃又曰鬼神害盈而福謙曾子曰戒之戒之出乎爾者返乎爾者也此皆報應之說也唯佛能隱惻乎人之禍福是以彰明較著言其必至之理使不自陷乎此耳豈詐造哉又言佛無君臣之義父子之親此固非子之所及也事固有在方之內者有在方之外者方之內者眾人所共守方之外者非天下之至神莫之能及也故聖人之為言也有與眾人共守而言之者有盡天下之至神而言之者彼各有所當也孔子之言道也極之則無思無為寂然不動感而遂通此非眾人所共守之言也眾人而不思不為則天下之理幾乎息矣佛與人臣言必依於忠與人子言必依於孝此眾人所共守之言也及其言之至則有至於無心非唯無心也則有至於無我非唯無我也則又至於無生無生矣則陰陽之序不能亂而天地之數不能役也則其於君臣父子固有在矣此豈可為單見淺聞者道哉今吾告汝以佛之理蓋無方者也無體者也妙之又妙者也其比則天也有人於此終日譽天而天不加榮終日詬天而天不加損然則譽之詬之者皆過也夫自漢至於今歷年如此其久也天下事物變革如此其多也君臣士民如此其眾也天地神明如此其不可誣也而佛之說乃行於中無敢議而去之者此必有以蔽天地而不恥關百聖而不慚妙理存乎其間然後至此也子盍深思之乎今吾教汝以學者必考乎道之遠者焉道之遠則吾之志不能測者矣則必親夫人之賢於我者彼之賢於我者以此為是矣而我返見其非則是我心有所未盡知者也是故深思彼之所是而力求之則庶幾乎有所發也今子屑屑於形器之內奔走乎聲色利欲之間少不如志則憤悲躁若將不容其生何以異於蚊虻爭穢壤於積藁之間哉於是愈瞠目而不收氣喪而不揚返求其所答茫然有若自失逡巡謂大顛曰言盡於此乎顛曰吾之所以告子者蓋就子之所能而為之言非至乎至者也曰愈也不肖欲幸聞其至者可乎顛曰誠爾心盡爾性窮物之理極天之命然後可聞也爾去吾不復言矣愈趍而出外傳八月帝與宰臣語次因語及愈有可怜者而皇甫鏄素薄愈為人即奏曰愈終疎狂可且內移帝納之遂授袁州刺史復造大顛之廬施衣二襲而請別曰愈也將去師矣幸聞一言卒以相愈大顛曰吾聞易信人者必其守易改易譽人者必其謗易發子聞吾言而易信之矣庸知復聞異端不復以我為非哉遂不告愈知其不可聞乃去至袁州孟簡尚書知愈與大顛游以書抵愈嘉其改迷信向愈答書稱大顛頗聰明識道理實能外形骸以理自勝不為事物侵亂雖不盡解其語要且自胸中無滯礙因與之往還也近世黃山谷謂愈見大顛之後文章理勝而排佛之詞亦少沮云韓子外傳十月刺史柳宗元卒宗元字子厚甞著送文暢上人序曰昔之桑門多與賢士夫游晉宋以來有道林道安遠法師休上人其所與游則謝安石王逸少習鑿齒謝靈運鮑昭之徒由是真乘法與儒典竝用而人知向方如今釋文暢者服道江表三十年躡虗而西驅錫逾紀秦人𫎇利益眾天官顧公夏官韓公廷尉鄭公郎中楊公有安石之德逸少之高鑿齒之才皆厚於上人而襲其道風云云又永州送琛上人南游序大要嫉逃禪趣寂而脫略方便又送元暠師序推原釋氏之道本乎孝暠師不違且與儒合又送方及師序大要譏業文而昧已又送玄舉上人序大要誡切服而苟安其辭略曰佛之道大而多容凡有志乎物外而恥制於世者則思入焉故有貌而不心名而異行其類不一而皆童髮毀服以遊於世其孰能知之柳集庚子十五年正月帝崩穆宗即位穆宗辛丑長慶元年三月盧龍節度使劉總舉幽燕二十餘郡歸朝總乞度為僧詔可賜僧衣號大覺大師署所居第為報恩寺壬寅二年是歲帝遣左街僧錄靈阜賷詔起汾陽無業禪師赴闕阜至宣詔畢稽首曰主上此度恩旨不同願師起赴業笑曰貧道何德累煩人主汝可先行吾即往矣遂沐浴淨髮至中夜告門人惠愔等曰汝等見聞覺知之性與太虗同壽一切境界本自空寂迷者不了即被境惑一為境惑流轉不窮常了一切空無一法當情是諸佛用心處言訖端坐而逝阜回奏其事帝欽歎久之師憲穆兩朝凡三詔不赴既沒賜諡大達禪師十月帝幸善因寺施僧緡錢一百萬白居易初由中書舍人出為杭州刺史聞鳥窠道德因見之窠棲止長松上居易問曰師住處甚險師曰太守危險尤甚曰弟子位鎮江山何險之有師曰薪火相交識浪不停得非險乎又問佛法大意師曰諸惡莫作眾善奉行曰三歲孩兒也解恁麼道師曰三歲孩兒雖說得八十翁翁行不得居易欽歎而去自是數從之問道至是為忠州刺史閏十月撰江州興果寺湊律師塔碣有云師遷化時予題一四句為別因取為銘曰本結香火菩薩社共慊露泡煩惱身不須戀戀任師去先請西方為主人十一月幸瓦官設大會十二月帝不豫太后百僚詣佛寺齋僧唐史癸卯三年八月帝幸長慶宮遇持鉢僧施絹二百疋八月十九日東寺如會禪師示寂壽八十諡傳明大師師初參馬祖自祖去世師患門徒滯於即心即佛之語遂示眾曰心不是佛智不是道劒去久矣爾方刻舟時號東寺為禪窟焉甲辰四年正月穆宗崩敬宗即位杭州永福寺刊石壁法華經成相國元稹為之記通論時福州古靈神讚禪師初參百丈回本寺受業師浴次喚靈揩背靈向師背撫一掌云好所佛堂只是無佛師叱之靈曰雖然無佛亦解放光師疑之又看經次有䗈子撞窻靈曰世界如許廣大須要鑽故紙作什麼師曰汝何發言殊常靈曰某有頌空門不肯出投窻也大奇百年鑽故紙何日出頭時師驚曰汝得上人法願與吾說靈曰自別和尚依棲百丈因舉百丈語師忽有悟乃欲回禮靈為得法之師靈請遙禮大智為師某為同參五月上谷侯高纂廬山東林熈怡律師墳誌略曰師居廬山耶舍塔院外規內寂有神童隨侍左右匿形以至怡智遺形則雙烏入掌索噉不去灰心與物則二鼠穴處閾前食香積而上巾又有猛虎逐鹿鹿求救於師師指鹿入房虎遂却去若師有情則神童不侍慈烏不止碩鼠不親猛虎不去及一定寂滅其院白蓮枯死庭樹衰零噫師平生見乎四異則烏鼠虎鹿著矣寂滅彰乎兩奇則蓮花翠樹明矣續廬山記十二月中書令王智興請於泗州置戒壇於誕聖月度僧制可李德裕奏禁罷帝不納舊唐史敬宗乙巳寶曆元年尚書李翱字習之甞刺朗州慕藥山之道入山謁之山誦經不顧李曰見面不如聞名山呼太守李應諾山云何得貴耳賤目李謝之問曰如何是道山以手指上下云會麼曰不會山云雲在青天水在瓶李忻然答以偈曰鍊得身形似鶴形千株松下兩函經我來問道無餘說雲在青天水在瓶又問如何是戒定慧山云這裏無此閑家具李辭去一夕藥山登山忽雲開見月大笑一聲聲落澧陽八九十里翱聞之復寄偈曰選得幽居愜野情終年無送亦無迎有時直上孤峰頂月下披雲笑一聲李甞著復性書三篇其一篇謂情昏則性匿忘情則復性誠則明明則盡性命之道其二謂無思則寂照致知在格物其三謂昏而不思終不明道文集丙午二年裴肅字中明任越州觀察使重建龍興寺大佛殿應三百年讖記先是越州沙門曇彥與許詢元度同造二塔塔未就詢亡彥師壽百二十猶待得詢後身為岳陽王蕭察來撫越州及到州人寺見彥彥以三昧力加被王忽悟前身造塔之事由是二塔益資壯麗時龍興寺大殿隳壞眾請重脩彥曰非貧道緣力也後三百年有緋衣功德主來興此殿寺眾刻石記之及是裴守赴任施俸脩殿方應彥師懸記肅乃裴休父也傳燈十二月帝崩文帝即位文宗丁未太和元五月太洪山善信大士示寂時龍潭崇信禪師玄化大行師初家于悟和尚天王寺巷日以十餅饋之悟每食畢常留一餅曰吾惠汝以蔭子孫因請出家由是服勤左右一日請示心要悟曰吾何處不指示汝心要師低頭良久悟曰見則便見擬思即差師當下開解復問如何保任悟曰任性逍遙隨緣放曠但盡凡心別無勝解五燈戊申二年澧州藥山惟儼禪師臨順世呌云法堂倒法堂倒眾皆持拄撑之師舉手云子不會我意乃告寂壽八十四敕諡弘道大師塔曰化城唐伸藥山傳燈又謂終于大和八年一本又謂憲宗元和八年化者非是五臺鄧隱峰以神異頗顯恐成惑眾乃入臺山金剛窟前將示寂問於眾曰諸方遷化坐去臥去吾皆見之還有立化者否眾曰有之師曰還有倒化者否眾曰未甞有也師乃倒殖而化亭亭然其衣順體眾為舁屍荼毗屹然不動遠近瞻禮歎異師有妹為尼乃咄云老兄平昔不循法律死更熒惑於人以手推之而踣於是闍維收舍利塔于五臺己酉太和三蘇州重玄寺刊石壁經成白居易為略云夫開示悟入諸佛知見以了義度無邊以圓教垂無窮莫尊於法華經凡六萬九千五百五言證無生忍造不二門住不思議解脫莫極於維摩經凡二萬七千九十二言攝四生九類入無餘涅槃實無得度者莫先於金剛經凡五千二百八十七言壞罪集福淨一切惡道莫急於尊勝陀羅尼經凡三千二十言應念隨願生極樂土莫急於彌陀經凡一千八百言用正見觀真相莫出於普賢行法經凡六千九百九十言詮自性認本覺莫深於實相法密經凡三千一百五言空法塵依佛智莫過於般若心經凡二百五十八言是八種經具十二部三乘之要旨萬佛之祕藏盡矣文集丹霞天然禪師將終命具浴浴畢乃頂笠䇿杖受屨垂一足未及地而化壽八十三師本儒生偶應舉遇禪者問何往曰選官去禪者曰選官何如選佛曰選佛當何所詣禪者曰江西馬祖出世即選佛之場也師遂見馬祖以手托幞頭額祖曰南嶽石頭是汝之師師抵南嶽石頭曰著槽厰去乃禮謝入行者堂執務後因普請剗草次師獨沐頭跪於石頭之前頭忻然與之落髮尋為說戒即掩耳而去便返江西再見馬祖未參禮便入僧堂騎聖僧頸而坐眾驚異以白祖祖入堂見之曰我子天然師即下地拜曰謝師賜與法名久之遍歷諸方後元和三年於天津橋橫臥留守鄭公出呵之不起吏問其故師曰無事僧鄭奇之自給米洛下翕然敬向十五年卜居鄧州丹霞致數百眾師甞著玩珠吟二篇今傳于世諡智通禪師傳監云長慶四年示寂庚戌太和四五月侍御劉軻作福州東山聖泉法華院記略云天下精剎往往稱閩州勝絕有東山法華院為東南窟之一景龍初有神僧懷道始卜於愛同之西卓一泉騰湧噴出兩道分注一注濯所一流為池繼有懷一居之一之後智常居之常有天童密侍舍利潛降山神聽經問中佛法實自三大師始焉是院不宿女子不入葷血真絕特也長樂集十月鄂州無等禪師示寂壽八十二師嗣馬祖辛亥太和五帝好嗜蛤蜊一日御厨有劈不開者忽變菩薩像帝驚異之有旨送興善寺令眾僧瞻禮因問侍臣此何祥也或對太乙山有惟政禪師深明佛法請詔問之帝召政而問焉對曰物無虗應啟陛下信心耳經云應以菩薩身得度者即現菩薩身而為說法帝曰菩薩形今見矣未聞其說法何也對曰陛下見此以為常耶非常耶信耶弗信耶帝曰非常之瑞朕焉不信政曰陛下聞其說法竟帝大悅因詔天下竝立觀音菩薩像奉祀焉時有凌行婆謁浮盃及趙州五燈有機緣壬子六年希運禪師初見百丈問馬祖機緣丈舉再參馬祖掛拂話師大悟得法後乃住洪州高安縣黃蘗山鷲峰下大安寺海眾奔湊常千餘人其道峻其行孤其言簡其理直故學徒悟道者眾癸丑七年十月帝誕節召法師知玄與道士入麟德殿論道石霜慶諸禪師初參溈山次參道吾悟旨即隱瀏陽陶家坊因僧旋洞山舉師出門便是草語洞山驚曰瀏陽有古佛耶自是僧多依之乃成法席號霜華山甲寅八年十二月南泉普願禪師將示寂首座問曰和尚百年後向什麼處去師云山下作一頭水牯牛去座云某甲隨和尚去得否師云汝若隨吾則須銜一莖草來乃集門人告曰星翳燈幻其來久矣勿謂吾有去來也言訖而逝師得法於馬祖後歸池陽三十年不下南泉會宣城觀察使陸亘大夫請下山伸弟子之禮由是學徒雲集云五燈乙卯九年四月丁巳宰相李訓上疏請罷內道場沙汰僧尼濫偽者制可是日詔下方毀大內靈像俄暴風聿起含元殿鴟吻俱落內外城門樓觀俱壞士民震恐帝以訓所請忤天意亟詔停前沙汰詔復立大內聖像風遂頓息舊史五行志是冬李訓受誅八月白居易以所著文集勒成六十卷編納盧山東林大藏自為記欲與二林結他生之緣廬山記九月道吾圓智禪師示寂壽六十七敕諡脩一大師丙辰開成元年左街僧錄內供奉三教談論引駕大德賜紫大達法師端甫卒忠舘脩撰裴休製略曰為丈夫者在家則張仁義禮樂輔天子以扶世導俗出家則運慈悲定慧佐如來以闡教剎生捨此無以為丈夫也師年十七為比丘自是經律論無敵於天下德宗聞其名徵之一見大悅常出入禁中與儒道論議賜紫方袍復詔侍皇太子於東朝順宗深仰其風親之若昆弟相與臥起恩禮特隆憲宗數幸其寺待之若賓友常承顧問注納偏厚由是天子益知佛為大聖人其教有大不思議事當是時朝廷方削平區夏縛吳幹蜀潴蔡蕩鄆而天子端拱無事詔和尚率緇屬迎真骨於靈山開法場於祕殿為人請福親奉香火既而刑不殘兵不黷赤子無愁聲江海無驚浪蓋參用真乘以毗大政之明效也掌內殿法儀錄左街僧事以標表清眾者十一年以開成元年六月一日向西右脇而滅荼毗得舍利三百餘粒丁巳二年衢州子湖利蹤禪師初入南泉之室乃抵衢州馬蹄山結茅宴居是年邑人翁遷貴施山下子湖創院後咸通二年敕賜額曰安國師甞示眾曰子湖有一隻狗上取人頭中取人心下取人足擬議即喪身失命戊午三年三月僧統清涼國師澄觀示寂師生歷九朝為七帝門師春秋一百有二僧臘八十有三身長九尺四寸垂手過膝目夜發光視晝不瞬才供二筆聲韻如鐘文宗以祖聖崇仰特輟朝三日重臣縞素奉全身塔于終南山未幾有梵僧到闕表稱於葱嶺見二使者凌虗而過問之答曰北印土文殊堂神也東取華嚴菩薩大牙歸國供養有旨啟塔果失一牙唯三十九存焉遂闍維舍利光明瑩潤舌如紅蓮色賜號清涼國師塔曰妙覽相國裴休奉敕撰敕寫國師真奉安大興唐寺己未四年四月祕丞劉軻撰廬山東林寶稱律師塔略云師諱智滿凡講四分律二十七過前後臨壇一十四會以戒律度數萬人其縉紳君子與師游者有若白侍郎居易李賓客渤李中書肇裴宣州誼門弟子數十人軻甞執門人之禮敢忘實錄
