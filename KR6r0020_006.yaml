body:
  text: 宋括山一庵釋本覺編集明十林居士周之訓較訂南北朝北周宇文姓都長安五主二十六年禪于隋齊高姓都鄴六主二十八年國入周南後梁蕭姓都江陵三主三十三年國入隋陳陳姓都建康五主三十三年國入隋丁丑周孝愍帝元後梁中宗大定三陳高祖永定元北齊顯祖天保八周孝愍帝覺自丙子十二月受魏禪帝明研機疏通弘遠天縱神武民歸獄訟握金鏡以居尊齊玉衡而建極大弘像化廣闢慈門海內名德咸慕義歸仁焉辨正論九月愍帝崩世宗孝明帝育即位是月陳高祖武帝羈先受梁禪膺寶歷以君臨起會昌而司牧身長九尺鬚長三尺垂手過膝神明高放戡剪多難復梁舊政崇重釋氏金陵舊來七百餘寺侯景焚蕩幾盡帝既登極悉皆修復翻經講道不替前朝天竺那羅提黎耶舍此云尊稱至齊鄴都文宣禮請於天平寺譯經舍大興正法弘暢羣心於宣譯之暇時陳神呪冥救顯助立功多矣本傳戊寅明帝二四二周孝明帝上奉三乘內親九族乃至本枝維翰列辟庶官五向十行俱識歸依之道外觀內覺同登解脫之門是年為先皇造盧舍那織成像一軀并二菩薩高二丈六尺等身檀像一十二軀各二菩薩及金剛師子等麗極天成妙同神製卞正陳高祖時設無遮大會供僧布施放生宥罪弘宣十善汲引四民於楊州造東安寺復為國家爰逮群生于楊都治下造興皇一云興聖天居等四寺皆宏麗莫比卞正五月陳高祖幸莊嚴寺捨身羣臣表請還宮通鑑陳真諦還豫章譯經周三藏攘那跋陀羅此云智賢於長安譯五明論一聲論二醫論三工巧論四呪術論五符印論己卯武成元五三五月帝崩世祖文帝蒨立十十月帝崩廢帝茵立五月陳高祖崩帝親寫經一十二藏造金銅像百萬軀修故寺三十二所度僧尼七千人卞正高祖崩後將欲修葬造溫凉車文帝欲取梁武重雲殿中佛帳珠佩以飾送終人力既足忽見雲氣擁結大雨洪注雷震電燁烟張殿表火烈雲中歘見重雲殿影金銀二像八部神王并及帳座一時騰舉烟火挾之忽然遠逝觀者傾國及晴之後覆看故所唯礎存焉是日人見殿像乘空飛於海上云感通録十月齊顯祖崩帝在位十年佛法大盛所度僧尼八千餘人先是帝至谷口木井佛寺有癡人不解語忽謂帝曰我去爾後來是夜癡人死帝尋崩焉論衡及卞正論庚辰二世宗崩武帝立六文帝天嘉元廢帝乾明元年十一月肅宗演改皇建元周世宗崩高祖武帝雍即位為文皇帝造錦釋迦像一丈六尺并菩薩聖僧金剛師子周回寶塔二百二十軀仍於京下造寧國會昌永寧等三寺卞正四月齊稠禪師無疾端坐而逝壽八十一敕遣襄樂王宣慰施物五百段送千僧供以崇追福仍詔起塔立初師所住禪窟前有深淵嘗見被毛之人偉而胡貌置釜然火水將沸涌俄有大蠎從水中出欲入釜內稠以足撥之蠎遂入水毛人亦隱其夜見一男子拜云弟子有兒歲歲為惡神所噉兒子等惜命不敢當弟子衰老將死故自供食蒙師力故得免斯難又齊帝每年元日常問師一歲吉凶至天保十年師云今年不好帝不悅復問師何如答云貧道亦不久至冬帝崩是夏師亦滅云帝暇日常欲覩佛之靈異稠曰非沙門所宜帝強之乃投袈裟于地帝使數十人舉之不動稠命沙彌取之初無難焉因爾篤信兼常寺宇僧供勞賜優渥齊滅周廢以寺賜大夫柳務文及入住時有神怒曰何敢凌犯須陀洹寺後隋初興復奄同初建云本傳二祖慧可大師以衣法付僧璨偈曰本來緣有地因地種花生本來無有種華亦不曾生復云汝且處深山勿罹世難然吾亦有夙纍今要償之祖遂留鄴都隨宜行化普燈云天平二年接僧璨陳法師洪偃初梁武及太宗諸王皆禮敬之至是講于宣武寺學徒肅服會齊使崔子武來朝而子武擅其專對之才帝以偃內外優敏敕令館伴子武加歎而歸帝益敬之本傳辛巳武帝保定元七二齊太寧元十一月肅宗孝昭帝崩世祖武成帝湛立齊肅宗孝昭帝即位以來奉為先皇寫一切經一十二藏合三萬八千四十七卷度僧尼三千人辨正論傅大士於婺州雙林山行道感七佛隨之本録周初正光元年涼州御谷山雷雨震巖挺出石像高丈八尺唯無其首至周元年凉州城東㵎忽出光視之乃像首也奉安像身宛然符合四十餘年靈像方足是年立為瑞像寺建德將廢教首又自落帝令安之次早如故遂有廢法滅國之讖周雖毀教不及此像後開皇通法依前置寺靈異非一感通録壬午二後梁世宗歸天保元三河清元齊世祖武成帝篤敬佛乘創營寶塔脫珍御服竝入檀財轉大品經月盈數遍層臺別觀皆建伽藍璧玉珠璣咸充供具躬自頂禮每事經行辨正癸未三二四二陳文帝設無礙大會會畢於太極殿前捨身七日始復于位三藏真諦初欲泛舶西歸值風飄還廣州刺史歐陽頠延之制止寺譯俱舍攝大乘等論諦曾以坐具鋪江水而過如乘大舟而坐具不濕或折荷葉而濟神異甚衆時人多𦘕而奉祀之本傳齊世祖築壇於內具問道禮儀請上法師授歸戒帝布髮于地令上踐其髮而升座帝授大戒畢次命八座重臣及妃后戚屬皆授菩薩戒創報德寺移上法師主之上性儉素雖當大統位國師而壞衣布褐未嘗乘肩輿世益以此重之諺曰四海俗望道場法上本傳周禪師僧實王臣禮敬一日告僧曰急修法事誦觀世音救江南某寺堂崩厄也爾時揚都講堂正論法集道俗充滿忽聞西北異香空中伎樂合堂驚出而堂欻摧倒大衆無損奏聞梁主乃移以問方知實之所祐由是名振二國事參至聖是年七月十八日示寂壽八十八帝泣之慟敕圖其像於大福田寺本傳甲申四三五三天竺闍那耶舍此云藏稱亦云勝名共二弟子耶舍崛多此云稱藏闍那崛多此云志德結志遊方弘法武成之歲初屆長安詔入後園殊禮別供啓欲通法即別敕為造四天王寺是年乃共翻經九月陳法師洪偃謂其徒曰世人為貪心之所暗貪己則惜落一毫貪他則永無厭足身死復高墳重槨一何可歎吾今瞑目之後以此晡臘鄙形布施飛走言畢合掌而逝次日弟子如其誡尸陀於鍾山東岡焉偃咨容德行草隸文草皆為衆冠時稱四絶本傳齊署沙門法常為國師統紀居士萬天懿善梵書兼工呪術於齊譯尊勝問經陳慧勇法師文帝聞其名請講於大極殿百辟具陳七衆咸萃因敕住大禪衆寺警韶法師初在豫章請真諦譯光明等經諦深歎美之後文帝敕請還都至是衆請長講於白馬寺弘化十有餘年後入幽巖宴坐十有餘載至德元年十月澄然而逝乙酉五四六齊後主天統元四月齊武成帝以法為樂乃傳位于太子緯是為後主溫公陳月婆首那出勝天王般若經七卷那自太清三年遇得梵本屬侯景之亂携負東西至是方果譯出那備歷魏齊梁陳四朝譯經法師寶瓊身長七尺五寸背脾龍文口三十九齒異相奇挺梁武帝嘗召講法復還鄉開講于建安寺有白龍出現之異後復出都道俗欽慕陳武帝尤加尊敬永定三年夏於重雲殿閣正弘大品夢朱衣神催其疾講講竟而雷震陳祖尋即升遐方知前告文帝即位敕為京邑大僧正師鎮之以清淨馭之以無為篇禁不煩遮罰每省僧尼肅服自梁僧之於此任薰灼威儀翼衛亞於王公吏卒喧於堂廡瓊臨已來頓祛前政朝野嘉其真素海東諸國圖像還蕃頂禮遙敬本傳丙戌天和元五天康元四月帝崩臨海王伯宗立二四月陳文帝崩帝在位八年紹隆三寶弘化五乘修治故寺六十所寫經五十藏度僧尼二萬人六帖齊署摩訶衍匠僧璨為三國論師統紀丁亥二六臨海王光大元三釋亡名初周帝敕為夏州三藏尋欲官之是年五月冢宰宇文護以書勉之名答以收迹巖中攝心塵外此本志也安能憒憒久住閻浮地乎因著寶人銘云余十五而尚文三十而重勢位乃喟然歎曰夫以回天倒日之力一旦早凋岱山盤石之固忽焉燼滅定知世相無常浮生虗僞富貴名譽徒勞人耳乃棄簪辨剃須髮衣納杖錫聽講談玄誓欲枯木其形死灰其慮降此患纍求以虗寂乃作絶學息心針銘曰法界中有如意寶人焉九緘其身銘其膺曰多知多事不如息意多慮多失不如守一慮多志散知多心亂心亂生惱志散妨道英賢才藝是為愚弊其文有數十句甚切至見僧傳及禪宗偈頌南嶽思大禪師自止大蘇山凡涉十稔師示衆有云道源不遠性海非遙但向己求莫從他覔覔即不得得亦非真其他隨扣而應以道俗所施造金字般若法華經時衆請師講二經隨文發解復命門人智顗代講至一心具萬行有疑請決顗即咨受法華行三七日得悟是年自大蘇山將四十餘僧徑趨南嶽既至謂其徒曰吾寄此山止期十載已後必事遠遊師曰吾前生曾居此處領徒陟嶺見一所林泉勝異曰古寺也吾昔居之掘地果得僧用器皿殿宇基址又指兩石下得遺骸乃建塔今三生塔是也又於東畔靈巖之傍建臺為衆講般若法正當大嶽之心今般若寺是也南北學徒慕義而來師患無水忽見巖下潤以錫杖卓之果得一泉猶未周果續有二虎引師登嶺跑地哮吼泉水流迸今虎跑泉是也或問何不下山教化衆生一向目視雲漢作麼師曰三世諸佛被我一口吞盡更有甚麼衆生可度昔江左佛學盛學義門自思南度定慧雙舉為時之宗行狀戊子三七二四齊那羅提黎耶舍至是譯經七部五十一卷齊主授以昭玄統所獲供祿每興福業飯僧施貧濟給獄囚多造義井親自漉水津給衆生收養癘疾四事周給於汲郡酉山建立三寺廣勸持齊德業具如本傳冬嵩頭陀入滅傅大士謂弟子曰嵩公已還兜率天宮我同度衆生之人去已盡矣我決不久住世作還源詩十二章本録十一月周河陽仙城寺慧命禪師趺坐面西佛來而逝師與思大禪師齊名有濟北名士戴逵嘗咨於師有問答書見傳己丑四八高宗皇帝瑱太建元五正月十一日陳三藏真諦遷寂壽七十一真諦至此共二十一年譯經論六十四部二百七十八卷本傳陳高宗孝宣帝即位值歲豐民康域中無事於揚州禁中里造太皇寺又以追遠情切為昭烈王孝大妃於太皇寺造七級浮圖金珠交映又造崇皇寺辦正周法師道安善弘法武帝禮敬之勑住大中興寺是年三月召名儒僧百道官於正殿帝升御座親量三教優劣至四月初勑又廣召道俗令極言陳理又勑大夫甄鸞詳佛道二教定其先後淺深鸞乃上笑道論三卷今在藏五月帝又集羣臣詳鸞之論以為傷其道九月道安慨之乃作二教論十二篇以救形之教教稱為外濟神之教教稱為內若通論內外則該彼華夷若局命此方則可云儒釋以儒道九流同屬儒宗為外教以釋之窮理盡性為內教詳闡正義奏之于朝文今在藏帝為張賓搆讚意在排斥佛教及覽安論其議遂𥨊僧傳四月傅大士告其子普建普成二法師等曰我從第四天來為度衆生汝等慎護三業精勤六度行悔懺法免墮三塗至二十四日入涅槃壽七十三至七日有法猛上人將織彌勒像并鍾安大士床上猛泣禮忽不見初大士在日常以經目繁多人或不能遍閲乃就山中建大層龕一柱八面實以諸經運行不礙謂之輪藏仍有願言登吾藏門者生生世世不失人身從勸世人有發於菩提心者能推輪藏是人即與持誦諸經功德無異今天下所建輪藏皆設大士像實始於此山有古松大士曾於松間願度衆生以斧為誓至今松木斧痕猶在其飼虎之餘飯棄擲林間化而為石青白錯雜可作數珠謂之飯石至今長存靈異之迹豈容思議耶本録陳三祖僧璨大師奉傳法衣來自北齊遁于司空山泉州嚴恭因感放之報捨田為湖今曰嚴湖復捨宅為寺今光嚴寺也長樂集周達磨流支出天文二十卷庚寅五九二武平元法師曇延才望與慧遠相埒初齊太祖從之問道給月俸會陳使周弘正來聘大臣舉延接伴弘正恃才氣見延悠然氣消及還求延畫像并疏論而歸帝益重之進位昭玄上統本傳周釋僧瑋禪棲山藪帝召至京親奉清誨勑妃后公卿咸受十善是年東歸勑為安州三藏又勑居京城天寶寺建德二年九月卒帝製大周二教鍾銘有云五月丙寅造鍾一口弘宣兩教同歸一揆九宮九地遙徹洞玄三千大千遠聞邊際延法侶而銀閣應供候仙冠而金闕降真云弘明陳宣帝重為孝太妃建靈剎高一十五丈下安佛爪長二寸闊一寸藏諸寶篋或光飛五色焰起一尋神變不窮覩者生信辛卯六十三二陳詔國內初受戒者未滿五夏皆參律部可於都邑大寺廣置聽場仍勑瑗律師總知監檢明示科舉有司給衣食不踰數載律學更新帝又勑瑗為國僧正瑗以太建中戒徒端坐而逝安廩法師初在魏十二年講四分律及大乘經論梁太清中還都勑住天安講華嚴陳高祖請入內殿接足盡敬長承戒範勑住耆闍講法世祖文帝請入昭德殿開講至是宣帝於華林園北面受道大闡法化以至德元年遷化僧傳壬辰建德元十一四三九月陳宣帝詔僕射徐陵為傅大士僕射周弘正為慧和闍梨周釋僧勐以邪正相參乃著難道論十八章以三科釋之賢聖既序凡位皎然其序略云勐以老子與尹喜化胡出家又稱鬼谷先生撰南山四皓注乃無識異道所作也然教有內外用生疑似人有聖賢多述本迹故班固漢書品人九等以孔丘之徒為上上類例皆是聖以李老之儔為中上類例皆是賢何晏王弼云老子未及於聖魏文帝勑云老聃賢人未宜先孔子此賢聖天分優劣自顯今依內經外典區別真假使一覽便見也僧傳周闍那耶舍至是共出同性等經六部十五卷耶舍崛多出光明等經三部八卷闍那崛多後隨宇文儉入蜀譯普門偈等三卷釋教癸巳二十二五四周帝集羣臣僧道帝自升高座辨三教先後以儒為先道為次釋為後通鑑帝自是年以前頗奉佛法造寺建塔度僧二千寫經千餘部後為張賓所始為不善之首方志釋僧安住王屋山講涅槃有雌雉伏聽三卷未了遂絶不至安曰雉生人道矣是年安至越州至一家喚雌雉一女走出如舊相識禮拜歡喜父母異之引安設食其父言見此女生時髮如雉毛因以為名安大笑為述本緣女聞涕泣苦求出家二親從之為講涅槃聞便領解至後三卷茫然不了時年十四便就講說遠近歎服因斯躬勸從學者衆矣僧傳後梁僧遷為荊州大僧正恂恂七衆不齊而成自晉置僧司迄茲四代求之備業罕有斯焉四年四月遷逝壽七十九師初年弱冠便誦法華數溢六千定中親見普賢香光照燭仍降摩頂云本傳甲午三十三六五五月周武帝惑於道士張賓等妖言惡黑衣之讖乃欲偏廢釋教因大集百僚命沙門道士辨優劣且云長留短廢預令道士張賓飾詭辭以挫釋子冀即其義負而擠之時法師智炫對帝抗酬辭吐精壯帝意賓不能制即逞天威垂難辭左右叱炫聽制旨炫安詳應對陳義益高帝有難曰佛法有三惡一納耶輪生羅睺主不淨二食三淨肉法不淨三比丘犯重衆不淨道無此也炫曰陛下所引蓋權教爾道門三惡又甚於此一天尊紫微宮常侍有五百童女主不淨二章醮請福鹿脯百斤清酒百斛教不淨三道士于吉亂常姜斌犯法代代有之衆不淨也僧衆造罪乃欲除法豈以臣叛子逆遂欲空於大寶之位耶大寶之位固不可以臣子叛逆而空佛法正真豈得以衆僧犯罪而廢今欲廢佛存道猶如以庶代嫡也帝動色下座羣臣莫不欽嘆帝既不能屈至十七日詔下遂兼道教廢之僧傳帝置通道觀凡僧道有學業者皆召為學士帝以釋道安宿望欲官之安竟不就尋卒于周世有遺誡九章在本傳甚有激勵之文辭多不載法師靜靄初開講終南山山本無水忽有虎跑飛泉供其用至是聞詔下慨然曰食周之粟而忘其事謂之忠乎即詣闕求見帝引對極陳毀教禍福報應帝為改容顧業已成既行之詔不可返因謝遣之藹退而泣曰大教厄塞吾何忍見之遂遁入終南山帝尋欲官之遣衛士求藹藹聞徙入太乙山衛士不獲而返藹以法滅號泣七日夜聲不絶撰三寶録二十卷自藹入法繒纊皮革一無踐服唯履毳布終于報盡至宣政元年七月告弟子曰吾生無補于世將事捨身因自條其肉布於石上引腸胃掛于松枝五臟皆外見餘筋骨手足頭面咼折都盡以刀割心捧之端坐而逝餘骸竝無遺血但白乳傍流疑於石次襄州副將孫哲毀檀溪寺金佛像融毀未畢哲即堛然仆地失瘖直視四肢不舉至夜便死感通是年六月有民部侍郎任君者與府屬宴次仰見雲間有物五六段隱隱而沒一最小者翔空如幡俄墜其所任君取視之乃般若經第十九卷自火焰間出而不燼者因祕之後宣帝復教任乃奏上蓋帝年十九云齊釋圓通在鄴寺以涅槃為業武平四年夏講有客僧因疾投寺通延之房中經理湯藥仍持酒飲之夏滿病愈辭曰前以酒見及非正理也從今宜斷曾往鼓山石窟竹林寺否當相訪也是夏通升山初見老公逐其同侶唯通獨往見林木深茂間南嶺上有吟誦聲其客僧乃披林出引入其寺金碧逈異又引見大和尚及諸僧通欲求住和尚未許通怏快而別行一二里返顧惟峰崿耳僧傳乙未四十四七六後梁孝明帝文明在政中興大寶復梁社稷光被生民於荊州造天皇陟屺大明寶光四望等寺辨正陳宣帝造七級大塔陳沙門智周等十一人往西域求經三寶經天台智者大師智顗字德安姓陳荊州人眼有重瞳七歲聞誦法華便能憶記十八出家及謁大蘇山思禪師即示普賢道場為說四安樂行師入觀三夕便悟法華三昧旋陀羅尼及學成往辭思曰汝於陳國有緣往必利益思既遊南嶽顗便詣金陵在瓦官寺創弘禪法僕射徐陵尚書毛喜等明時貴望竝稟禪旨自是隨處闡化道俗歸敬嘗夢登高山見一僧以手招之門人曰此天台山也是年九月領徒至天台山定光出迎曰憶昨相招否師驚異而禮之光曰此處金地吾既有之佛隴北峰螺溪銀地宜居行道於是師開山創庵光曰且隨宜安堵至國清時三方總一當有貴人為師立寺矣北峰螭魅百端驚惱師定忍不動所感即滅陳宣帝以師為國之望割始豐縣調以充衆費蠲兩戶民用供薪水師之夏講衆見三道寶階從空而降數十梵僧乘階而下入堂禮拜繞師三匝久之乃去永陽王百智出撫吳興請戒習觀願世世歸依陳帝七使詔師還都師乃出焉陳主禮迎講法百僚盡敬又移居光宅陳主幸寺修行大施又講仁王帝於衆中起拜殷勤儲后已下竝崇戒範請為國師師往居臨海民以滬魚為業罾網相連四百餘里師以施金買斯海曲為放生池表聞宣帝勑嚴禁不得採捕仍為立本傳丙申五十五八隆化元齊法師曇遷研精華嚴十地維摩楞伽地持起信等咸究其賾嘗講唯識論遂感心熱病專憑三寶夜夢月墮其懷乃擘而食之脆如氷片既寤所苦頓除以食月成德遂私名月德後授八戒常云於我月德前三說受菩薩戒丁酉六十六九齊初主恆承光元為周滅南嶽思大禪師道風既盛名稱普聞俄有道士生妬害心密告陳主誣師乃北僧受齊國券𣃁斷嶽心釘石興妖帝遂遣使追師使至石橋忽見二虎跑憤大蛇當路使驚乃誓曰我見思禪師當如佛想若起惡心任汝所傷蛇虎乃退使見師再拜以事白師使未至之前師見一小蜂來螫其面即為大蜂咬殺銜至師前師入定觀之知是宿冤欲相嬈害師謂使曰使者先去貧道續來七日後飛錫而往四門關吏齊奏師入帝已驚異及師朝見帝遂下迎復問左右卿等見此僧何如人對云常僧帝曰朕見其踏寶花乘空而至乃迎師入殿供養其道士罪以欺罔欲盡誅之師懇帝曰此宿冤願陛下赦之乃可其奏勑彼道士以供師役師奏辭還山帝餞以殊禮師還未幾道士誣師者一人暴死一人為犬所嚙而斃應蜂兆矣自是每年陳主三信參勞供填衆積榮盛莫加而神異難測遇雨不濕履泥不污或現形小大或寂爾藏身是年六月臨將終時連日說法苦切呵責聞者寒心至二十二日屏衆泯然而逝小師靈辨號慟乃開目曰何驚動吾耶癡人出去言訖長往壽六十四師有著述行五部及偈頌見行于世行狀高齊六主二十八年中譯經六人所出經論五十二卷僧二百餘萬寺院四萬餘所周武既滅齊據鄴都集僧道宣廢教之旨略曰世弘三教其風彌遠考定至理多愆陶化六經儒教文通治道於世有宜故須存立且真佛無像遙敬表誠而崇飾塔廟無能恩惠既虗縻費不足以留凡是經像皆從毀滅父母恩重僧道不敬竝宜反服以崇孝養朕意如此卿等若別有理可對無退有謗言法師惠遠出對曰陛下統臨大域憲章三教而明詔曰真佛無像誠如綸旨然耳目蒼生賴經聞佛藉像表真若將廢之無以興善帝曰虗空真佛咸自有之何假經像遠曰漢明以前經像未至何故不知真佛帝無答又曰若不籍經三皇以前未有文字人何不知五常常無答遠又曰若以泥像無情事之無益國家七廟亦是敬順之道詎可廢耶又詔旨遣僧反服以崇孝養孔曰立身行名以顯父母即是孝行何必還家帝以遠抗旨怒見詞色遠坦然無懼復曰陛下縱勢力毀大教佛言幽冥之報不揀貴賤貧道切為陛下惜之帝曰但令百姓得樂朕亦不辭地獄之苦達曰陛下以邪法化人現種苦業當共陛下同趣阿鼻何處有樂帝理屈但云僧等且還乃勑左右引退不懌而罷時齊境僧尼竝令反服僧傳初晉州靈石寺僧護願造丈八石像於北谷見一臥石乃雇匠營造面腹粗了而背著地舉之不動至夜自番旦即就營移置佛堂至是晉州陷日像汗流地周兵入境燒諸寺塔此像獨不變色又欲倒之人牛六十挽不可動忽有異僧以瓦木土塹圍之須臾失僧所在像後降夢信心者曰吾患指痛其人視之乃木傷二指遂即補之隋代屢顯靈迹戊戌宣政元六月帝崩高祖宣帝贇立改元大成十七十不疾而逝周五主二十五年中初宇文泰及大冢宰宇文護竝崇佛法與西域三藏十餘人譯經百餘卷隋楊氏都長安三主共三十八年辛丑隋高祖開皇元大定元年二月周靜帝禪位于高祖改元梁世宗天保二十陳太建十三二月隋高祖文帝堅受周禪即帝位帝君臨億兆庶政咸新薄賦輕刑省徭減役含齒戴髮俱喜太平既清廓兩儀即興復三寶由是佛日還曜法水通流三月詔於五嶽之下各置僧寺一所三寶紀初帝以魏大統七年六月十三日生于同州般若尼寺時赤光照室紫氣滿庭有神尼曰智仙謂太祖曰此兒佛天所祐身如舍利不可壞也遂名帝曰那羅延又曰兒來處異倫俗家穢污可就寺養之大祖乃割宅為寺以兒委尼後皇妣來抱忽化為龍驚惶墮地尼曰何因妄觸我兒遂令晚得天下及年七歲尼告帝曰兒後大貴當自東方來佛法時滅賴汝而興尼沉靜寡言時言吉凶莫不符驗帝年至十三方始還家及周武滅教尼隱于帝之家未幾而逝至是帝果自山東入為天子大興佛法皆如尼言及登位後每顧羣臣道念阿闍梨以為口實又云朕興由佛法而好食麻豆前身似從道人中來由少時在寺至今樂聞鍾磬之聲後於寺塔立神尼之像仍命史官為厄作傳論衡七月制曰伏惟太祖武元皇帝間關三代造我帝基追仰神猷事冥真寂思欲廣崇寶剎經始伽藍增長福因微副幽旨其襄陽隋郡江陵晉陽竝宜立寺一所建頌德庶使莊嚴寶剎比虗空而不壞導揚茂實同天地而長久自是每年至國忌日廢務設齊造像行道八關懺悔舉資神靈八月制曰昔歲周道既衰羣凶鼎沸朕出車練卒蕩滌妖醜節義之徒輕生忘死干戈之下每聞徂落永念羣生蹈兵刃之苦有懷至道興度脫之業思建福田法力冥助庶死事之臣菩提增長悖逆之侶從暗入明竝究苦空咸拔生死鯨鯢之觀化為微妙之臺龍蛇之野永作玻瓈之境可於相州戰地建伽藍一所又民犯法處盡之人率為營齊帝志思弘法是冬有沙門智周等賫梵經二百六十部膺期自西域而還勑付有司召人番譯開皇録釋道舜廣行法化獨不為一女受戒以當生牛中其相已現衆疑其言舜乃踏其裙後空地云是尾影女即不能起衆驚信求救其女盡捨家資舜為營福懺悔惡業即滅方為受戒僧統曇衍卒衍初生而四十齒已具壬寅二二十十四正月陳宣帝殂帝在位十四年修寺五十所造七級大塔靈剎十五丈造金銅佛二萬軀修故像百三十萬軀寫經十二藏度僧尼萬人三寶初達摩般若此云法智齊末為昭玄都周滅齊授智以洋川郡守至是隋帝即召智還譯經又天竺毗尼多流支此云滅喜適至帝亦召番譯二月滅喜出象頭經三月智出業報差別經六月隋詔以龍首山宜建都邑因即域城曰大興城殿曰大興殿縣及門園皆曰大興寺曰大興善寺三寶慈化自是大興萬國仁風緣茲重闡伽藍峙綺錯城隍幡蓋騰飛莊嚴國界法堂佛殿既等天宮震旦神州還同淨土沙門濟濟習六度以熏心信士詵詵修十善以為行於是鼓腹黃齒爭買祇陀之園擊壞青襟競聚育王之土浮圖於焉間發寶剎翕爾星羅矣三寶紀帝詔境內之民任聽出家仍計口出錢營造經像於是時俗從風而靡民間佛書多於六經數千百倍通鑑法師曇延初值廢教遁入太行山隋文受禪即日削髮以沙門謁見帝大悅至是以延為昭玄統其冬勑對譯本傳法師僧猛年俱德重勑住大興善寺即前陟岵寺也尋進為隋國大統三藏法師委以佛法令其弘護開皇八年二月奄然而化七月滅喜又出總持經是月召那連提耶舍到京勑止大興善寺給以上供至十二月就手番譯給事李道寶等四人度語興善寺主靈藏等二十餘僧監掌三寶帝昔龍潛所經四十五州至是同時起大興國寺論衡九月陳帝設無礙會於大極殿捨身及乘輿御服大赦癸卯三二十二長城公至德元法師彥琮十歲出家即有慧聲十二究法華十四齊主延入宣德殿講仁王經二十一周勑預通道觀學士大象二年佛法稍興便為諸賢講釋般若大定元年正月再落髮自是每預講筵是年帝見老子化胡像怪之因集僧道論議琮乃作辨教論明道教妖妄二十五條是年勑預番譯隋下詔曰朕欽崇聖教念存宇其周朝神所廢之寺咸可修復京兆太守蘇感奉勑於京城之內選形勝之地安置伽藍於是合京城內無問寬狹有僧行處皆許立寺辨正帝降勑云好生惡殺王政之本佛道垂教善業可憑稟氣含靈唯命為重宜勸勵天下同心救護其京城及諸州官立寺之所每年正月五月九日常起八日至十五日當寺行道其日遠近民庶凡是有生之類悉不得殺開皇紀勑召法師明贍番譯住大興善寺本傳高僧敬脫為帝所重帝欲試沙門器度勑禁甲奮劒逐僧唯脫步武若暇帝美其弘遠命升殿錫法服旌異帝常曰真僧傑也北山録慧勇法師講法于大禪衆寺十八載是年五月遷逝僧法慶塑造釋迦像未了而死經三日蘇說至冥王殿忽見大像謂殿上人曰慶造我未了何為令死其人遽拜呼階下人曰慶合死未答命未盡而食盡曰可給荷葉而終其壽言已失像所在慶蘇後日以湯進荷葉十餘枚率諸士女以成其像大業初卒壽七十六釋慧遠仍落髮帝敕授洛州門都甲辰四二十三二關輔旱帝引民就食洛州先是律師靈藏與帝為布衣交至是命藏陪駕既而趍向藏者極盛帝聞之手勑曰弟子是俗人天子律師是道人天子有樂離俗者任師度之藏由是度人前後數萬晚以事聞帝大悅曰律師化人為善弟子禁人為惡言雖有異意則無殊師多處內禁與帝等倫坐必同榻行必同輿榮莫加矣本傳帝以初生同州寺乃為太祖武元皇帝元明皇太后以般若故基造大興國寺辨正勑以周武之時毀滅佛法凡諸形像悉遣除之其金銅等或為官物如有現在竝可安置寺觀其木石之像有司亦存意知則遣迎供養所以興心厝意皆崇福基布令吐言必懷善誘開皇紀河東曇延法師初造涅槃疏恐不合聖心乃陳於舍利塔前啓以若合聖理願垂神應言訖其經即放光明舍利塔亦放光明三日騰耀感通録陳三月僧統寶瓊示寂壽八十一勑有司給葬具仍以天子鹵簿仗借為榮飾本傳乙巳開皇五自太極上元庚戌之歲至是年積有十四萬三千七百八十年辨正二十四三隋帝請經法師受菩薩戒因放獄囚仍下詔曰朕夙膺多祉嗣恭寶命方欲歸依正覺欽崇勝果今請經法師於大興善殿受菩薩戒然菩薩之教以解脫為先戒行之本以慈悲為始今囹圄幽暗有慟于懷自流罪以下悉可原放計天下輕囚預得放者二萬四千九百餘人其死罪降等者三千七百餘人有生之類同知遷善也其年勑云佛以正法付囑國王朕是人尊受佛付囑自今以後訖朕一世每月常請二七僧隨番上下誦經經師四人大德三人於大興善殿讀一切經辨正十月那連提耶舍自至隋又譯經八部二十八卷後移住廣濟寺為外國僧主丙午六梁公琮廣運元四釋智璪初染疾專念月光菩薩夢人吸三夜即愈及從智者受道定中見九頭龍涌升虗空是年住寶林寺行法華三昧有惡鬼於三七日中夜夜惱之璪坦然無懼鬼乃不現釋法進有德業為蜀王秀及妃姬受戒能分身赴數十家之食異迹非一本傳釋僧就以大集舊譯多本合成一部六十卷大興善寺律師靈藏示寂壽六十八一云十八年終釋曇詢嘗山行過虎鬪詢執錫分之虎妥尾而散屢逢熊虎交諍皆解之而入馬不亂獸見如偶每入禪定七日方起化流河朔盛闡禪門隋帝重其德勑儀同三司元壽親奉香供詢開皇末卒丁未七二為隋滅禎明元律師法願自齊朝號為律虎皇隋受命勑任并州大興國寺主頻登綱管善御大衆化移前政實濟濟焉是年六月示寂隋徵梁主入朝梁國除後梁三主三十三年竝崇信佛法廣造塔寺寺有二百八所僧尼三千二百人辨正陳法師慧布初從攝山僧詮法師妙知論旨語詮公四友曰四句朗領語辨文章勇得意布嘗謁思禪師思曰萬里空矣無此智者至德中建攝山栖霞寺名聞光遠請謁如市陳主諸王竝受其戒奉之如佛是年十一月二十三日示寂地動七日太史奏云得道人星滅矣人見菩薩迎之本傳陳傅大士長男普建法師是年燒身滅度大士録曇遷法師以齊滅入陳獲究攝大乘論時北土未聞也隋既興法遷乃携論渡江忽風浪騰涌遷捧論告江神曰今欲以大法開彼未悟北土必應聞大教請停風浪須臾恬靜安流達岸及遷廣弘攝論道俗欽承者衆矣是年詔曰皇帝敬問徐州曇遷法師承勤精道教利益無邊承風餐德實懷虗想願即來儀以沃勞望當與師崇建正法刊定經典且道法初興觸途草創弘獎建立終藉通人云遷乃至京大弘法化焉本傳勑慧遠住興善寺遠形長九尺眼長三寸腰有九圍聲如雷吼戊申八禎明三李士謙卒謙少事母孝施藥散穀積三十年雅好佛舉止約以戒定客有疑佛報應之說士謙喻之曰積善餘慶積惡餘殃豈非休咎之徵耶佛曰輪轉五道無復窮已而賈喧亦云千變萬化未始有極至若鮌為黃龍杜宇為鶗鴂褒君為龍牛哀為虎君子為鵠小人為猿彭生為豕如意為大黃母為宣武為鱉鄧文為牛徐伯為魚羊祜前身李氏子此皆佛家變異形報之驗也又問三教優劣士謙曰佛日也道月也儒五星也客不能難而去北史京兆杜祈死三日蘇云見閻王問曰卿父作何官曰臣父作周司命上士王曰若然錯追可速放去卿識周武帝否遂引至一處於鐵窗中見一人極瘦身作鐵色著鐵枷鎖祈見泣曰大家何因苦困乃爾答曰我以信衛元嵩毀廢佛法故受此苦祈蘇每思冥事勤修善業云僧傳釋普安以華嚴為業周氏滅法隱終南山谷屢遭擒執皆得解免隋文興教他僧皆應詔唯安守素林壑既多異迹是年勑入京為皇儲門師長公主建靜法寺延安住之而常棲岩谷本傳己酉九三為隋滅五月滅陳天下混一陳五主三四年中譯經三人所出經論二百餘卷寺有一千二百三十二所國家新寺一十七所百官造者六十八所郭內大寺三百餘所僧尼三萬二千人辨正八月那連提耶舍忽告衆曰佛法難逢宜勤修學人身難獲謹勿空過言訖奄爾而化壽滿百歲師形貌瓌奇頂如肉髻耳長而聳目正處中真傳法碩德之相也師四十許年遊五十餘國涉十五萬里山神海獸無非奉敬異迹頗多具見本傳闍那崛多初在周譯經以滅法還西勑遣使召之開皇四年復來五年勑多於內史省番梵古書時廣濟寺唯獨耶舍一人譯經至七年別勑崛多兼譯兩頭來往及耶者卒乃勑多專主番譯移法席就大興善寺更召達摩笈多等同番庚戌十春帝幸晉陽敕遷法師隨駕既達并部又詔令僧御殿行道至夜追遷入內與御同榻帝曰弟子行幸至此承大有私度之僧意欲度之遷曰昔周武滅法衆僧遁迹陛下統臨大運更闡法門無不歌詠有歸來投聖德雖屢蒙引度而來有先後致差際會旦天地覆載莫匪王民至尊汲引萬方寧止一郭蒙慶帝沉慮少時方乃允焉因下勑曰自十年四月已前諸有僧尼私度者竝聽出家故率土蒙度數十萬人遷之力矣尋下勑為第四皇子蜀王秀於京置勝光寺勑請遷之徒衆住此寺中受王供養僕射公卿朝務之暇皆執卷承旨本傳天竺達磨笈多此云法密十月至京帝延入興善寺同番譯是歲旱有旨命法師曇延祈雨雨不降帝問其故對曰陛下君臣雖通治體然尚愆玄化欲雨不雨事由一二也帝識其意勑有司擇日於正殿設儀命延授以八戒羣臣以次授訖方炎威如焚而大雨沛然帝悅自是每入朝必親手奉御膳供之召智正法師住勝光寺頗有聲譽本傳智舜禪師初事稠公居白鹿十載專習定觀或妄念卒起即刺腹流血由是塵慮不入其操益勵稠奇之曰汝於人事殆無心哉今而後可與言道矣後北入贊皇山道聲遠播是年詔曰皇帝敬問趙州章洪山智舜禪師道體清勝教導蒼生使早成就朕甚嘉焉朕弘護正法夙夜無怠今遣開府盧元壽指宣往意并送香物如別本傳辛亥十一帝制曰如來設教義存平等菩薩用心本無差別故能津梁庶品濟度羣生朕位在人王紹隆三寶永言至理弘闡大乘諸法豁然體無彼我況於福業乃有公私自今凡是營建功德普天之內混同施造隨其意願勿生分別庶一切法門同歸不二十方世界俱至菩提開皇紀天台智者大師金陵敗覆乃憩廬山剗迹雲峰煬帝在藩為晉王任總淮海請師求戒是年十一月二十三日於楊州總管金城設僧會敬屈授菩薩戒即於內第躬傳戒香授律儀法乃奉名為智者久之重返廬山晉王再請出城乃著淨名疏偶蕭妃疾苦王致書請救師建齊七日行光明懺忽鳥飛入壇宛轉而死須臾飛去師知妃當愈翌日果瘳王大喜慶師後歸天台焉法師僧裕學通內外撰陶神因果等論三十卷開皇十年召見帝甚敬之未幾請還是春厚禮送之還山本傳法師曇延示寂延為三朝帝師臨終以表辭帝託以外護帝哭之哀甚葬日百僚縞素送之內史薛道衡文祭略曰往逢道喪玄綱落紐棲心幽岩確乎不拔高位厚祿不能回其慮嚴威峻法不足懼其心聖皇啓運像法再興卓爾緇衣為稱首屈宸極之重申師資之義三寶由之弘護二諦藉以宣揚信足以追蹤澄什超邁安遠矣律師洪遵自開皇七年勑住興善是年勑與天竺僧共譯經大府寺丞趙昌因患致死久而復蘇云冥王以誦金剛經更合延牟即令放還見周武帝鎖械杻身語昌曰汝似我國人煩致意大隋天子我不合信任衛元嵩讒除滅佛法冥司追之對證而元嵩已釋罪矣我今久處幽繫極受大苦可為造功德濟拔昌奏帝勑天下每人出一文為周武帝作功德懺罪焉金剛證驗釋灌頂字法雲初受業天台至德元年從智者出居光宅研繹觀門又隨師上江之廬阜及衡蜂後屆荊部停玉泉寺傳法轉化是年從智者止揚之禪衆寺為上將復隨智者東旋台山晚出稱心精舍開講焉壬子十二勑搜三學業長者海內通化釋曇崇於禪府選得二十五人法應為長勑城內別置五衆各使一人曉夜教習四事竝出有司本傳勑召琮法師掌譯帝盛弘三寶每設大齊皆陳懺悔琮為宣導曲盡帝情本傳信行禪師自開皇初被召至京法化大行置寺五所十四春卒蔣州嚴恭顧人寫法華經務在清淨嘗有人從貸經錢一萬恭不獲已與之貸者船翻錢失人活恭入庫見錢濕如水洗後聞其事方知靈異又宮亭湖神令人送物為經之用及大業末子孫猶傳經業盜不入里里人賴之感通録釋慧越住羅浮山聚衆業禪性多慈愛曾有羣獸來前因為說法虎以頭枕師之膝師乃將其鬚後晉王召入府宣化本傳癸丑十三帝幸岐州遷師隨從勑蜀王行春搜之事王逐一獸入一故窑見滿窑故像王遂罷獵具以事聞遷奏曰周武毀道聖儀散落陛下興建已得修營至碎身遺影尚遍原野也帝悵然乃下詔諸故像仰所在官司精加撿括運送近寺率土蒼生口施一文委官莊飾本傳二祖慧可大師晦迹混俗三十餘年隨宜行化是年於管城縣匡救寺三門下說法聽者雲集有辨和法師於寺中講涅槃經學徒聞可師說法稍稍引去和忿興謗于邑宰翟仲侃侃惑其說加師以非法遂怡然委順時三月十六日也師壽一百有七歲唐德宗諡太祖禪師本傳十二月八日隋皇帝佛弟子楊堅敬白十方三寶仰惟如來慈悲弘道濟度含生斷邪惡之源開仁善之路自朝及野咸所依憑屬周代亂常侮懱聖跡塔寺毀廢經像淪亡致愚者無以導昏迷智者無以尋靈聖弟子往藉三寶因緣今膺昌運作民父母思拯黎元重顯尊容再崇神化頽基毀跡更事莊嚴廢像遺經悉令雕撰雖誠心懇利猶恐未周故重勤求今得顯出而沉頓積年汙毀非處如此之事事由弟子今於三寶前志心懺悔周室除滅之時公私上下毀像殘經慢僧破寺如此重罪悉為懺悔敬施一切毀廢經像絹十二萬匹皇后又敬施絹十二萬匹王公已下爰至黔黎又敬施錢百萬願三寶證明受弟子懺悔時臺宮主將省府官僚州縣佐史諸寺僧尼京城宿老等竝相勸率再日設齊奉慶經像日十萬人寺別勑使香湯浴像開皇紀帝雖日覽萬機而耳喰法味每夜行道皇后宮人親聽讀經若有疑處問三大德又詔於諸州名山之下各置僧寺一所并賜用莊甲寅十四柴燎岱宗遷法師奏諸廢山寺并無貫逃僧請帝安之因勑率土之內但有山寺一僧已上皆聽給額私度附貫僧傳勑法門法經二十大德撰衆經目録七卷總標九録區別品類今在藏曇崇法師道重當世時入大內為宣淨業帝每禮接自稱師兒皇后延德又稱師女師所獲外利盡施伽藍緣身資蓄衣鉢而已是年十月三十日無疾而化皇情哀慘下勑葬終南山皂白弟子五千餘人送于山所為建白塔師初以禪學盛化周武勑為周國三藏并任陟岵寺主後法淪返俗授金紫光祿等官竝不就皇隋肇命勑住興善因奏欲造寺帝為立九寺高祖唐公捨宅為寺以居之晉王欽敬定林降威為寺檀越開皇初勑送絹萬四千匹及綾錦綿布又皇后送錢五千貫及氈等師乃建塔一區帝聞之內送舍利五粒帝及后又送千餘衣服以助是年方成高十一級竦耀大虗本傳乙卯十五帝以僧尼時有過失內律佛制不許俗看勑有司依大小乘經有禁約沙門語處悉令録出為衆經法式十卷獎導出家遏惡弘善開皇紀二月帝作書與婺州雙林寺惠則等略曰朕君臨天下重興法教欲使三寶永崇四生蒙福想師等宣揚聖道殊應勞德云云大士録帝及皇后於京師法界尼寺造連基浮圖其下安置舍利是年七月有神光自基而下右繞露槃赫若冶爐之𦦨云襄州禪居寺岑闍梨禪念為業常就厨請粥入房養一犬并寺內鼠數十每旦來集犬鼠同食偶失一鼠意必犬殺之即責犬犬便銜來乃以杖捶犬又寺僧被鼠嚙衣以告岑岑召諸鼠各令相保一鼠無保岑曰汝何嚙人衣杖捶之鼠不敢動岑為寺貧指泉下某處為厨某處為倉人笑之經宿水縮地出如語便作遂令豐渥帝請法純禪師入內為皇后受戒本傳丙辰十六年勑請洪遵律師為講律衆主時唯尚僧祇師乃弘四分漸皆附宗焉釋法藏勑為落髮僧首其所住為濟法寺晉王施藏靈壽杖是年王公造觀音竝勑安濟法供養丁巳十七年正月沙門寶貴以開皇已來新所製經奏上帝親製序寶貴以金光明三部又二品合為新本八卷內典録五月羣鹿來馴仁壽宮門百宮表賀至六月制曰往經離亂聖法不行習俗生常專事殺害朕遵行聖教務存愛育由王公所助野鹿來馴官人等但以至誠化導民俗自可編戶之人皆為君子宜存心仁善副此休祥開皇紀蔣州興皇寺佛殿被焚丈六金銅大像全不變色大衆駭嘆後移白馬寺鳥無踐靈異非一感通録天台智者大師自歸台山告衆曰吾當卒此地矣至是年十一月二十二日於石城寺施床面西稱彌陀佛又與晉王別遺書七紙囑以大法便令唱法華經題又聽無量壽竟索湯嗽口說十如三觀六度四教等法有問其位者曰吾不領衆必淨六根損己利他只五品內位耳觀音勢至皆來迎我波羅提木叉是汝宗仰四種三昧是汝明導且各默然吾將去矣言已端坐如定而逝壽六十七臘四十仁壽末年凡七現身重降山寺師身過七尺目佩異光東西垂範化通萬里屢感幽祥殆非可測所造大寺三十六所寫經一十五藏著疏百餘卷造金銅土木等像八十萬軀度僧一萬五千人五十餘州道俗受菩薩戒者不可勝紀傳業學士三十二人習禪學士散流江漢天下後世宗之目為四教法性觀行宗謂之天台教本傳釋灌頂奉智者遺書授晉王王乃遣司馬王弘送頂還山為智者設千僧齊置國清寺又於前峰佛隴丹丘智者初曾標基處營寺焉翻經學士費長房成都人初為僧周廢教返俗隋興仍習白衣時預參譯筆受詞義是年十二月二十三日奏其所撰歷代三寶紀一部十五卷下勑行之其紀備載歷代翻譯之經法與傳譯之道俗首末云譯教録戊午十八釋法充住廬山化成寺修定每勸僧衆無以女人入寺上損佛化下墜俗謠然世以基業事重有不從者充以教不行乃投身於香爐峰下千有餘仞不損一毛僧迎還寺即斷女人矣帝與雙林寺沙門惠則等書曰朕受天命撫育黎元尊崇三寶情深救護望十方含靈蒙茲福業俱登仁壽汝等普為羣生宣揚聖教精誠苦行深慰朕懷既利益處多勿辭勞也大士録己末十九二月智文律師卒壽九十一師器宇剛物風範肅人歷梁陳隋廣弘律教釋法通少出家極尫弱通唯禮觀音乞賜聖力後夢人遺三驢馱筋通噉始一驢忽母呼之而覺自是身力雄勇嘗以僧袈裟安於柱下僧謂神所為通笑為舉柱抽取有大石臼可五百斤通於南山負來供僧隋高祖重之有西蕃貢一人云大壯能相撲國無對者帝召通撲之通曰出家人何為此事雖然亦可試氣力便喚彼來通任其把捉通後搦其兩手彼即血出蟠臥在地乞命通放之曰我不敢重捉恐爾手碎去於是大伏舉朝稱慶時壯士稱之曰天力士後煬帝末避亂隱山負一具磑并犢子大神通也雖力兼百夫未曾忤物精誠節約以武德初卒本傳庚申二十帝晚年深信佛法詔有毀佛道像者以惡逆論通鑑詔法師曇遷靈裕惠藏僧休洪遵五人見太興殿帝執弟子禮咨詢法要統紀釋智曠初值道流誘以神仙符籙曠謂非道又請度世法乃示斷粒必到玉清七日便飛至期不應道曰爾猶飲水也次七日絶水又無應道曰爾夜尚眠致無感耳又七日常坐不臥三期既滿靡克升天後值高僧授戒為佛弟子德行動人漸示潛迹江陵張詮二世眼盲曠曰爾家冢內棺枕古井移墳開甃必獲禳焉因即隨言瞽者見道請求剃落衆咸憚焉年將不惑始獲為僧又於成陽造佛迹寺有牛産犢出首還隱其母將亡曠曰此犢是寺居士侵用佛物今來償債其羞不出因呵戒之應言便出其神異甚多是年九月克期而逝所造八寺咸有靈奇本傳辛酉仁壽元初帝潛龍時遇梵僧以舍利一裹授之曰檀越他日為普天慈父此大覺遺靈故留與供養帝登極後嘗與法師曇遷各置舍利於掌而數或少或多竟不能定遷曰諸佛法身過於數量非世間取測帝始作七寶箱貯之至是海內大定帝憶其事於是以岐雍泰華嵩衡州等三十州各建舍利塔六月詔曰仰惟正覺大慈大悲救護衆生津梁庶品朕歸依三寶重興聖教思與四海共修福業永作善因同登妙果宜請沙門三十人諳解法相堪宣導者各將侍者二人散官一人薰陸香百二十斤分道送舍利往三十州建塔每州僧三百六十人為朕及內外臣民七日行道任人布施限十文而止所施之錢以供營塔別外州郡僧尼普為舍利設齊限十月十五日午時同下石函總管刺史以下自非軍機停常務七日專檢校行道務盡誠敬是月十三日帝親以七寶箱奉三十舍利自內而出置於御案與諸沙門燒香禮拜願弟子常以正法護持三寶救度衆生乃取金瓶琉璃瓶各三十琉璃盛金瓶置舍利於其內諸沙門各奉舍利而行初入州境總管刺史諸官夾道步引四部大衆威儀齊肅共以幢蓋臺輦種種音樂盡來供養圍繞讚唄於是沙門對四部大衆作是唱言至尊以菩薩大慈哀愍衆生是故分布舍利共天下同作善因又引經文種種方便訶責之教導之乃讀懺悔文曰菩薩戒弟子皇帝某敬白三寶弟子蒙三寶力為蒼生君父今故分布舍利起塔願為衆生懺悔衆罪時大衆聞言捨施財賄衣物不可勝計咸發誓言從今已往修善斷惡雖屠獵殘賊之人亦躬念善至舍利將入函沙門高奉寶瓶巡示大衆共覩光明哀戀號泣聲響震地凡安置處悉皆如之帝於十月十五日午時在大興殿西南執圭而立延請佛像及沙門三百六十人幡蓋香華讚唄音樂自大興善寺來居殿堂燒香禮拜降御東廊親率文武百僚素食齊戒及舍利入塔畢帝曰佛法重興必有感應其後處處表奏皆有瑞應弘明集王邵記十月內帝及后每因食於齒下得舍利以銀碗水浮其一出示百官須臾忽見有兩凡得十九粒多放光明王公百官以舍利應感非一拜表奉賀復下詔曰仰惟正覺覆護衆生朕所以志心回向思崇勝業普及率土共為善因故分布舍利營建神塔而大聖垂慈頻示光相宮殿之內舍利降靈斯實羣生多幸延此嘉福朕與王公等及一切民庶宜更加勉勵興隆三寶今真身舍利猶有五十餘有司可依前式分送海內庶三塗六道俱免蓋纏稟識含靈同登妙果時高麗百濟新羅三國使者將還各請一舍利於本國起塔供養詔竝許之十二月二日勑送舍利於京師太興善寺起塔道俗萬億迎引至寺設無遮大會而禮懺焉弘明釋道仙初作商有寶貨兩船貪心未已值僧說法豁然勇悟曰吾當沉寶江中出家離著索然無擾豈不樂哉即沉一船衆止其次令修福業仙曰終為紛擾勞苦自他即又沉之投灌口山寺落髮誓不得道不出由是逈絶人蹤結宇岩曲入定常四五日禪學之侶皆造問焉因旱乃至龍穴叱其龍即雨至民皆敬之蜀王秀召之不出欲躬往加刃及至山足雨雹水涌王乃遙歸懺禮天即明霽至山盡敬邀出城都厚禮崇仰舉城恭敬號仙闍梨至是返山尋即示寂本傳是年帝造等身釋迦六軀勑置法藏師住寺晉王入嗣巡至台城灌頂出山參賀王又遣侍郎張乾威送還山寺設千僧齊塔寺臺殿更加修飾焉壬戌二年正月帝復分布舍利於秦陝恆杭等五十三州建立靈塔令總管刺史已下縣尉已上停常務七日請僧行道施錢十文一如前式期用四月八日午時同下石函每州各有所感瑞應弘明集陝州四度放光內見華樹佛菩薩等靈瑞二十一事五月雍州京城內天雨銀屑天華六月諸州送舍利使還宮慰勞訖令九日起慈善寺為慶光齊復雨銀屑天華陝州所現像樹光瑞模得形像獻勝光寺自五月末日日放光禮者塞路皆發道意其內外諸州以絹模將去者亦皆放光七月十五日京城延興寺鑄丈六金銅佛像其日雨寶屑銀華香氣甚異弘明闍那崛多自開皇五年至是出護國等經總三十九部合一百九十二卷竝理教圓通文義俱暢現行於世釋教録時譯經館崛多控權至於深義每啓於達摩笈多而笈多容範滔然惟事謙抑至是崛多因事東適笈多乃專掌翻譯勑請興善寺番經沙門學士撰衆經目録五卷總為五録隨類區辨釋教録法師元琬造丈六釋迦金像像成感天雨華狀如雲母是夕天樂彌空凌晨乃息又造經四藏備盡莊嚴釋道幽忽夢天人稱天帝請講經幽未諾久之又夢乃依天請天以少香注幽手中克時來迎及覺見掌中有香氣熏一寺後講法次諸僧遙見香煙充滿床側幽奄爾而逝衆見雲氣從寺而出騰空直上飄飄而沒本傳天竺闍提斯那至京帝禮敬之及獻后崩空發樂音因問那那曰皇后生彌陀淨土諸天奉迎也僧傳癸亥三年帝以獻后崩於京邑西南置禪定寺架塔七層駭臨雲際堂宇等宮闕林圃如天苑舉國崇盛莫有高者仍召海內名德禪師百二十人竝委遷禪師搜揚有司具禮即以遷為寺主僧傳釋法純四十五年常處淨場宗經檢失除食便利餘無闕廢嘗於道場然燈燈油七日不竭又忽失油瓫經宿還來而油已滿不間僧俗皆為苦役是年五月臨終有童子手捧光明立于座右弟子問之純曰第六天頻來命我以諸天著樂有妨修道竟不許之願生無佛處化衆生耳至十二日乃逝本傳甲子四年七月帝崩太子煬帝廣即位正月二十日智舜禪師遷寂師性少貪惱手不執財每見貧餒或解衣以給或割口以施處山積歲剪剃無人便以火淨髮有奉其米者師避去一無所受或問其故曰山居櫲栗足以禦饑何煩於人其簡易如此有獵者逐雉飛入師房苦勸而不止師乃割耳遺之彼即投弓解鷹從師學道於是諫篤數村捨其獵業或見啖肉者必慘容戒之曰六道殊形汝無不經一切有命皆汝父母一切有生皆汝曩形而食其肉者是食汝父母汝心安忍哉聞者莫不悛革本傳帝又詔曰朕祗受肇命撫育生民遵奉聖教重興善法而如來大慈覆護羣品感見舍利開尋含生朕已分布遠近皆起靈塔其間諸州猶有未遍今更請大德奉送舍利各往諸州依前造塔當與蒼生同斯福業乃敕法遵律師等送舍利往博絳等三十餘州於四月八日同時下塔而諸州皆有瑞應高僧傳七月帝崩帝在位二十四年寫經四十六藏十三萬卷修治故經四百部造金銅檀像六千餘萬軀修治故像一百五十萬九千餘軀宮內常造刺繡織成像及畫像五彩珠幡不可稱計崇緝寺宇五千餘所于斯時也四海靜浪九州無塵番譯道俗二十四人所出經論垂五百卷方志等八月釋慧實卒實一生習禪脅不親物精節之志老而彌厲衣鉢隨身外無一纍真輕清之丈夫也壽九十六本傳乙丑煬帝大業元通幽律師正月十五日端坐而逝師戒約內結仁洽外弘立四大井各施漉具生常不用巾幞手濕則任其自乾涕唾返咽不棄寺中每欲開經必盥手及腕舉經對目臂不下垂臨終誡以殘身遺諸禽獸釋僧善住馬頭山禪道盛化三月十一日將終告弟子以不須焚燎外損物命可坐于瓮中埋之即趺坐而化道俗依言而殯于岩有弟子僧襲時適他行及回到巖莫知葬所設會悲慟忽𪹼聲震谷瓮涌于地骸骨如雪唯舌存焉紅赤鮮映因取骨舌兩為塔焉本傳帝為文皇帝造西禪定寺又於高陽造隆聖寺帝與婺州雙林寺書略曰朕欽承寶命撫育萬方思弘德化覃被遐邇云云大士録十月克新羅林邑獲梵書五百六十夾竝貝葉崑崙寫之尋侍譯經館釋慧侃少受學於和闍梨和以慈救為業每多靈異見豬被縛和曰解脫首楞嚴豬尋解脫主因放之侃奉和多載後事真諦深悟善法末住棲霞時往揚都偲法師所將還山寺請現神力侃即從窗中出臂長數十丈解齊熙寺佛殿上額將還房中云恐世人驚異故吾不為耳是年以三衣拋堂中云衣還衆僧吾今去也便還房內大衆驚來乃見白骨一具跏坐床上就而撼之鏗然不散駕幸江都台山智璪出參引見命坐顧問乃遣舍人盧正方送璪還山為智者設千僧齊度四十九人出家施寺物二千段米三千石香酥等釋慧藏善華嚴帝每召之講法即六大德之一也丙寅二帝於道場設無遮大會度清信士女百二十人奉為文帝造金銅釋迦坐像一軀又於并州造弘善寺傍龍山作彌陀坐像高百三十尺揚州造慧日道場京師造清禪寺日嚴寺香臺寺又捨九宮為九寺於泰陵莊陵二所竝各造寺辨正六月元景法師卒師自生常立囑以沉骸水中衆乃葬于紫陌河深瀅之內三日後所沉之處返成沙墳極高峻而分水兩派道俗異其雅瑞本傳三祖僧璨大師初周武廢教師往來司空山十餘年人無識之者開皇十二年壬子遇沙彌道信禮師曰乞和尚與解脫法門師曰誰縛汝曰無人縛曰何更求解脫乎信大悟久之與授具戒後知其緣熟乃付以法衣而說偈曰花種元因地從地種花生若無人下種花地亦無生師即優游江國歷羅浮諸山復還舊止十月十五日當說法次即於衆會中儼立合掌而逝唐代宗一云元宗諡鏡智禪師一云鑒智師嘗著信心銘言約義豐妙盡宗極世傳誦之丁卯三正月二十八日皇帝菩薩戒弟子白三寶謹於率土之內建立勝緣州別請僧七日行道仍總度一千人出家以此功德普為衆生清淨罪垢同至菩提弘明帝既定鼎東都復於上林園置番譯館延達摩笈多譯經帝又為文皇獻后於長安造二寺二塔立別寺十所修治故經六百十二藏計九十萬三千五百八十卷修治故像十萬一千軀鑄造新像三千八百五十六軀度僧一萬六千二百人戊辰四始平令楊宏率道士名儒人智藏寺啓會義法筵命法師慧淨與道士余永通論義淨問老子云有物混成先天地生吾不知其名字之曰道且道體一故混耶體異故混耶若體一故混則正混之時已自成一是則一非道生若體異故混且未混之時已自成二則二非一起矣通茫然不知所對無言而罷僧傳五月興善寺洪遵律師示寂壽七十九釋法濟通微知異發迹陳世及隋二主皆宿禁中呪水治病無不治者是年辭帝而化高僧傳己巳五初大業三年帝下令云僧道有所啓請者竝先須致敬然後陳理雖有此令僧正不行時番經學士釋彥琮不忍其事乃著福田論以抗之總有七條一無德不報二無善不攝三方便無礙四寂滅無榮五儀不可越六服不可亂七因不可忘意在諷刺言之者無罪聞之者自誡也其論高竪三寶之儀崇尚歸敬之本文極該贍今在藏弘明集帝後朝見諸沙門竝無致敬者是年至京南郊大張文物兩宗朝見仍令致拜道流聞命連拜不已諸僧依舊不拜帝詰之曰詔條久頒僧等固不奉命何也法師明贍對曰陛下弘護三寶當順佛言經中不令拜俗所以不敢違教敕曰但拜僧等峙然如是數四令拜僧曰陛下若使準制罷道則敢不奉命如知大法可崇則法服之下僧無敬俗之禮帝夷然無何而止後語羣臣曰朕謂僧中無人昨南郊對答亦有人矣仍下敕於西禪定寺設盡京僧齊凡敬字之議由此而絶焉弘明集釋大志上表願帝興顯三寶乃然一臂以報十一月普安法師示寂師多異迹有賊索陀欲射師而手張不息舌噤經宿衆令懺悔方解又張暉盜油瓮而若有所縛不能動轉衆為懺謝方脫又程暉和信法身死兩宿將殮而喚之數聲即能起坐更壽二十許歲又白村老母失瘖一百日而見安來迎便解言說又龕側村中縛豬三頭將加烹宰安贖之不得而合社失明安即自割䏶肉曰彼此肉耳社人聞見一時同放豬既脫而繞安伏拜故使郊之南西五十里內雞豬絶嗣其感發慈善皆此類也本傳是月釋智興鳴鍾感通有亡者托夢於其妻云正受地獄苦今賴僧智興鳴鍾響震地獄得解脫矣庚午六帝常以僧尼道士女官自隨謂之四道場通鑑敕僧慧乘為大講主七月番經館彥琮遷寂壽五十四八月詔法師靈潤入京署鴻臚教授是月釋惠達遷逝達初於陳國修故寺三百餘所又癘疫大行於揚都修大藥藏以濟之仁壽中於白塔寺建七層木塔又於鄱陽豫章諸郡見有寺塔儀像竝率化成造又上廬山西林造七間重閣誓用黃楠果感得一谷竝是楠木筏經灘澓不失一根閣後傾斜風吹還正又往長沙鑄鍾造像施金者唯恐其不受辛未七釋僧照初立鄠縣神田寺後隱岐山文帝令僕射楊素賫敕召之照不出帝乃重敕素賫香油再伸景仰素乃捨其金帛開廣寺塔照不受是年示寂壽八十三師自受具六十餘夏三衣不改雖重補緝而受持無離本傳釋僧朗一名法朗陳末隋初行於江嶺之表常誦法華常養一猴一犬出必隨行或作龜藏其頭手足俱縮不見又嘗坐舟猴狗馴側舟自泝流而上有尼為鬼所著能講經朗呵小婢其尼走至朗前立不移處百日已後方復本性其通感非一大業末終本傳台山釋智璪往涿郡參帝帝施物還山凡經八回參見天子竝供給豐厚七月杭州天竺寺釋真觀端坐而逝初洪偃相之曰顴高多智耳白有名我有四絶爾具八能謂義導書詩辨貌聲棊也壬申八年帝於西京為二皇建兩塔敕慧乘送舍利瘞于塔所摩訶衍匠三國論師僧璨示寂時釋智顯能知遠事每有苦處輒往救拔釋轉明是年來洛邑告有賊起帝令收禁明年凶醜充斥方驗其言敕放之後僞鄭世充倍嘉信奉武德三年知鄭將敗西止京師唐高祖隆禮敬之不測其終時法師道積法化大行先是沙門寶證於普救寺創營彌勒大像百丈萬工才登其一而證逝衆請積繼之夢二師子連吐明珠有財施不窮之讖積乃修建十年雕粧竝畢道俗欣慶及隋末河東守堯素議以沙門登城守固敢諫者斬積乃引道遜歷階諫曰城之存亡公之略也世之否泰公之運也豈在三五虗怯而能濟乎昔漢欽四皓天下隆平魏重干木舉國大治今拘梵徒而從軍役反天常以會靈祇恐納不祥之兆耳願深圖之無空肆一朝自傾於後為天下笑也素張目直視曰異哉斯人心氣若是壯耶因捨而不問復詣積陳懺而素卒為城人所害後積於正觀十年卒臨終三日鍾不發聲本傳癸酉九年釋道辨經史洞達偏解數術觀寺山勢備知盛哀又至諸墓亦陳休咎有俗士請為圖墳辨巡山示一所曰此中安墓足食豐財入地三尺獲粟一升又深一丈獲五彩石掘之果獲遂行卜葬久猶殷有又能推星度時月臨井宿告人宜為水備果漢江大漲襄邑將沒預見之明類若此云釋惠恭與同寺惠遠相別三十年遠因問曰仁者無所得耶恭曰性暗無解遠曰可不誦一部經乎恭曰唯誦觀音普門經一卷遠曰皆能誦之恭曰無生輕慢當為誦一遍遠笑曰吾數講之矣始欲閙人耳乎恭曰但至心聽乃結壇升高座始發聲異香滿房及入文樂聲振空雨華滿地經訖華樂方歇遠泣禮謝之本傳甲戌十年神僧法喜語默不常然皆為吉凶之兆煬帝幸維楊聞其異召之一日繞宮索羊頭帝惡之以付廷尉禁衛嚴甚喜日丐于市飲食自若有司以聞帝命啓戶視之唯見袈裟覆黃金骨骨皆連鎖遽以白帝詔以香泥樹骨塑之是夕喜以泥像起行言笑如故遂釋其禁及煬帝於江都遇弒方悟喜索羊頭之驗云後喜忽示疾因置身簀上下以熾炭炙之數日半身紅爛乃示寂葬之香山寺後數歲有自海南歸者見喜無恙其人發冢視之唯空棺焉計是時喜已壽三百餘歲乙亥十一釋真惠初於蒲坂麻谷創宇修禪仁壽末召住棲岩寺大業初絶粒餌黃菁是年十月遷寂臨終有異香蓮華來迎曰吾生淨土矣本傳釋法安開皇中見晉王便住慧日王所遊履必賫隨從及幸泰山四顧無水安以刀刺石出泉供用或當遭變皆預避之得無損敗大業之始帝彌重之威轢王公見皆屈膝常侍三衛奉之若神是年春無疾而化壽九十八本傳釋道遜法道大行王臣歸敬因夜宿關首其家有五男見遜馬壯欲私盜之見數十雄人圍繞衆乃退又往還見進退至五更天明全不見人知是神感乃合面歸懺焉丙子十二釋慧乘於東都圖畫龜茲國檀像一丈六尺屢感禎瑞釋慧祥禪講精修因食際口得舍利不辨棄地輒還在口疑是真身砧槌不碎遂聲鍾告衆放五色光遠近嘆異屠獵改業市無肉肆然祥日止一食身長八尺人皆怪仰云本傳智越法師初事智者深達禪法嘗誦法華瓶水自盈智者晦迹台山之衆一囑於越二十年間恂恂善誘四部歸崇每於師忌敕設千僧齊越以衣資充於大施是年十一月右脅而逝丁丑十三年十一月恭帝改義寧元是年文中子王通卒通嘗為中說其周公篇曰詩書盛而秦世滅非孔子之罪也玄虗長而晉室亂非老莊之罪也齊戒修而梁國亡非釋迦之罪也易不云乎苟非其人道不虗行或問佛子曰聖人也又曰觀皇極讜議三教於是乎一矣四祖道信大師抵吉州值羣盜圍城祖教合城人念摩訶般若波羅蜜時賊衆望城有神兵乃俱引去五燈釋法進初在益州修水觀家人見繩床有清水以二石投之是晚進覺背痛家人云曾投石於水進令明日除之及旦進入禪家人還見清水乃除其石所苦即愈自是習定不出此山八十年開皇中蜀王秀臨益州妃患心腹諸治不損使人兩度入山諸師師堅不往王大怒自入山將手加罪既見進不覺戰汗王乃殷勤請行進令王先行兩日進一旦便至徑入妃堂見進流汗自此即安進即辭還山王與妃見進足離地四五寸是年正月示寂戊寅太業十四恭帝義寧二越王同改皇泰元五月唐改武德元達摩笈多自初譯經至是共出九部四十六卷竝文義顯暢見行于世釋教録釋明恭住鄭州會善寺其力若神曾山行見虎豬交鬪豬漸不如恭語虎曰可放令去虎不肯恭以一手捉頭一手撮尾擲之山下又以僧衣置磉下僧怪之恭笑為捧柱取衣至是賊起抄掠令其寺辦數十人大豬食具恭延賊食賊讓恭先恭乃餔餅數十安豬啖之須臾食盡賊衆驚伏恭召為護寺檀越羣賊許之故隋唐交軍其境絶賊往來恭之力也本傳五月隋恭帝遜位于唐王隋二主三十七年譯經道俗二十餘人所出經論六百三十六卷
