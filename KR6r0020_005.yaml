body:
  text: 宋括山一庵釋本覺編集明如如居士畢熙載較訂南北朝梁蕭姓都建康四主共五十六年禪于陳魏元氏至孝武分東西東魏都鄴一主一十七年禪于齊西魏都長安三主二十三年禪于周壬午梁武帝衍天監元魏世宗景明三四月梁武帝即位時年三十七帝既登極思與蒼生同契等覺共會遍知垂拱臨朝盛敷經教廣延博古旁採遺文扇以淳風利于法俗三寶紀帝召寶志至闕甚尊寵之因下詔曰志公迹居塵俗神遊冥寂水火不能焚浸蛇虎不能侵懼語其佛理則聲聞以上談其隱論則遁仙高者豈得以俗士常情空相拘制自今隨意行化勿得復禁志由是多出入禁內本傳僕射沈約啓帝敕請惠約法師居省中供養時講法焉敕以釋慧超為大僧正超形過八尺腰帶十圍戒德內修威儀外潔凡在緇侶皆遵成訓天子給傳詔羊車局足健步衣服等供自聲教所被五部憲章咸稟風則嘗于講論之暇忽見大力善神言當集同緣共來餐受及就講之日倐然滿座容貌瓌異莫有識者竟席方散其威迹徵異若此本傳冬天竹求那毗地卒地自至江淮譯出要經王公宗事建寺養徒德業甚著釋録天竹僧智藥自西土來泛舶至漢土尋流上至韶州曹溪水口聞其香掬嘗其味曰此水上流有勝地尋之遂開山創立寶林乃云此去百七十年當有無上法寶在此演法今六祖南華是也事文類聚癸未二四天竺國獻梁帝珊瑚佛像統紀法雲寺雲光師講經天為雨花帝意其證聖夜於含光殿焚疏請寶志偕法雲雲光二師齋翌日志獨赴而雲光未知帝敬志焉僧史帝一日召志公至闕賜坐便殿志忽顰蹙引頸興歎帝怪問之志曰仇敵生也帝罔測蓋是年侯景生於鮮卑懷朔鎮即東昏侯後身也隱子論沙門慢陀羅此云弱聲出寶雲等經十一卷初帝妃郗氏適帝有三女帝為雍州刺史而妃薨其性酷妬及是化為巨蟒入于後宮通夢于帝求功德拯拔離苦帝閲大藏製慈悲道場懺法為其請僧禮佛懺罪尋化為天人於空中謝帝功德已得生天帝畢世亦不復議立皇后出南史法雲法師帝欽禮之敕出入諸殿時揚法要嘗講法華經感天華如雪志公敬之呼為大林法師本傳甲申三正始元四月八日帝率道俗二萬餘人升重雲殿捨道奉佛親製願文略曰弟子梁國皇帝蕭衍稽首和南十方佛法僧寶伏見經云發菩提心者即是佛心其餘諸善不得為喻能出三界之苦門入無為之勝路弟子在昔迷荒耽事老子歷葉相承染此邪法今捨舊習歸憑正覺願使未來生世童男出家廣化衆生共取成佛寧可在正法中長淪惡道不樂依老子教暫得生天陟大乘因永離邪見十一日降敕云敕門下大經中説道有九十六種惟佛一道是為正道餘皆外道朕捨外道以事如來若公卿能入此誓者各可發菩提心老子孔子等雖是如來弟子而為化止是世間之善不能革凡成聖公卿百官侯王宗族宜反偽就真捨邪入正經論云若事外道心重佛法心輕即是邪見若心一等是無記性事佛心強老子心弱者乃是清信清是表裏俱淨信是信正不邪故言清信佛弟子其餘諸善皆是邪見不得稱正信也門下速施行十四日公卿抗表遵承詔命帝手敕答曰能反迷入正可謂夙植善根宜加勇猛也辨正論詔隱士何點點見帝特除侍中不受復詔以司空起虎丘何胤胤不至有旨給白衣尚書祿胤辭不受點胤並建大義伸明佛法南史沙門僧盛出戒比丘經又道歡出衆經要覽三寶經帝于本第立光宅寺鑄金銅丈八像匠臨就冶疑銅不足始欲上請忽有使者領銅十五車至云奉敕送寺即就鎔寫一鑄便成惟覺高大試量乃二丈二尺以狀奏聞敕云初不送銅斯乃神寄應感也遂鐫花趺以為靈志感通録乙酉四歲大穰米斛三十錢一二初帝夢神僧告曰六道四生受大苦惱何不為作水陸大齋而救拔之帝問沙門惟志公勸帝尋經必有因緣乃取藏經躬自據覽創造儀文三年乃成於夜捧文停燭白佛若此文理協聖凡願拜起此燈自明或儀式未詳燈暗如初言訖投地一禮初起燈燭盡明至是二月十五日於金山寺依儀修設帝親臨地席詔祐律師宣文利洽幽明矣葦江集舒州潛山最寄絶而山麓尤勝志公與白鶴道人皆欲之因稟武帝帝以二人俱具靈通俾各以物識其地得者居之道人云某以鶴止處為記志公云某以卓錫處為記已而鶴先飛去至麓將止忽聞空中錫飛聲志公之錫遂卓於山麓而鶴驚止他所道人不懌然以前言不可食遂各以所識築室焉事文類聚三月十七日侍中蕭綸啓略曰臣聞如來降慈悲雲垂甘露雨屬值皇帝菩薩應天御物以法化民講道傳經德音盈耳臣今啓迷方組知歸向受菩薩大戒戒節身心捨老子之邪風入法流之真教伏願天慈曲垂矜許自是百官皆捨邪歸正矣辨正論太學博士江泌女小而出家名僧法齊永元元年年八歲時靜坐閉目誦出新經以至是年年十六歲所誦出經二十一部計三十五卷皆世所未傳者蓋其宿習不忘乃爾也嘗在華光殿親對武帝誦出異經楊都道俗咸稱神授三寶紀釋僧融住九江東林寺於江陵勸一家受戒奉佛先有神廟不復宗事七日後主人母見一鬼欲縛之母懼乃請僧讀經鬼怪遂息融晚還廬山宿旅店有衆鬼對融曰君何謂鬼神無靈耶速曳下地諸鬼將欲加手融默念觀音見一天將持金剛杵擬之鬼便驚散僧傳魏曇摩流支此云法希出信力入印等經八卷丙戌五三法師僧旻至京帝下筵禮接自此優位日隆扶南國沙門僧伽婆羅此云僧養又云衆鎧梁帝敕徵於楊都壽光殿等五處傳譯冬旱雩祭備至而雨未降志啓講勝鬘請雨上即命法雲法師於華光殿講勝鬘講竟夜大雪志又云須一盆水加刀其上俄雨大降高下皆足丁亥六四帝假寶公神力見地獄苦相問何以救之寶公曰夙生定業不可頓滅惟聞鐘聲其苦暫息耳帝於是詔天下寺院擊鐘當舒徐其聲欲以佇苦也魏曇摩流支此云法希譯經共三十五部至是絶筆帝注般若經命僧旻等五法師講之自是帝請旻為家僧四事供給又敕於慧輪殿講勝鬘經香闍梨止益州青城山寺時俗每至三月三必往山遊賞多將酒肉酣樂香屢勸之不斷後因三月又如前集香令人穿坑方丈許忽曰檀越等嘗自飲噉未曾與香今日須餐一頓諸人爭奉肴酒隨得隨盡若填巨壑至晚曰我大醉飽扶我就坑不爾汙地及至坑所張口大吐雉肉自口出即能飛鳴羊肉自口出即馳走酒食亂出將欲滿坑魚鮓鵝鴨遊泳交錯衆咸驚嗟誓斷宰殺自後酒肉永絶上山此香之風德也後因志公寄語遂化于寺弟子等營墓將殯怪棺太輕及開止見几杖而已見本傳釋智順虗靖恭恪形器若神止禹穴之雲門士庶歸敬嘗有盜者其徒追摛之順留盜宿于房明旦遺以錢絹喻而遣之其仁恕如此是年卒本傳戊子七永平元詔畫工張僧繇寫寶公像志𠢐面門出十二面觀音相或慈或威僧繇竟不能寫他日與帝臨江縱望有物沂流而上志以杖引之而至乃紫旃檀即雕志像神采如生帝注大品臣僚命雲法師講之雲辭疾不赴帝遣使強起之曰將冀流通非高德無以憑也雲始從之雲儒釋兩優最有聲譽雅為昭明大子所敬尋詔為家僧又敕為光宅寺主創立僧制釋慧韶年十二出家具戒遊京聽講以義淺乃聽開善藏法師講遂覺理勝當夕夢採得李子數斛撮欲噉之先得枝葉覺而悟曰吾從學必踐深極矣後梁武陵王鎮蜀請以龍淵寺彼講見一青衣神拜曰願法師常在此弘法當相擁衛言訖而隱後法化盛行是年七月告衆安坐而逝本傳敕僧旻等撰衆經要抄八十八卷敕法寵法師住齊隆宣武寺請為家僧四事供給豐厚魏勒那摩提此云寶意在洛陽太極殿譯論菩提流支此云覺希在紫極殿譯論支遍通三藏妙入總持兼攻雜術呪井能涌己丑八二上以寶亮法師德居時望每延談説亮每對上惟稱貧道五月因敕亮撰涅槃義疏十餘萬言九月疏成上為之序有曰舉要論經不出兩途佛性開本有之源涅槃明歸極之宗空空不能測其真際玄玄不能窮其妙門自非德均平等心合無生則金墻玉室豈易入哉亮福德招感供施纍積性不蓄金皆散營福業身沒之後房無留財十月四日遷寂弟子法雲等為立云五月釋法悅造丈八無量壽像敕於小莊嚴寺營鑄匠初計四萬斤融瀉已竭尚未至胸又馳啓聞敕給功德銅三千斤未至而像處已有羊車載銅爐側一鑄便滿人車倐爾俱失比臺內銅出方知向所送者乃靈感也及開模而踊成丈九其年九月移像光宅寺屢有光感本傳魏主於式乾殿為諸僧及朝臣講維摩經時魏朝專尚釋氏不事經籍中書侍郎裴延雋上疏以為陛下升法座親講大覺凡在瞻聽塵蔽俱開伏願經書互覽孔釋兼存則內外俱周真俗斯暢時洛陽中國沙門之外自西域來者三千餘人魏主別立永明寺千餘間以處之遠近承風無不事佛比及延昌州郡凡一萬三千餘寺僧至二百萬北史庚寅九三帝為太祖文皇於鍾山竹澗建大愛敬寺供給千有餘僧正殿造旃檀像高二丈二尺又於寺中龍淵別殿造金銅像舉高丈八又為獻太后於青溪西岸起大智度寺正殿亦造丈八金像五百諸尼四時講誦帝幸愛敬寺設無礙會以滿鉢水泛佛舍利有最小者隱不出帝拜之舍利乃於鉢中放光屬天旋回久之舉國咨嗟未曾有敕沙門寶唱撰名僧傳八十一卷魏齊州釋志湛住太山北谷中寺省事少言入鳥不亂人不測之臨終時志公謂梁武曰北方須陀洹聖僧今日滅度湛之亡也無惱而化感通傳辛卯十四初天監元年帝夢檀像入國乃令郝騫等八十人往天竺迎請優填王所刻佛像其王乃模刻紫檀一相付騫等歸是年四月五日騫等達于楊都帝與百僚徒行四十里迎還太極殿建齋度人大赦斷殺帝自是菜蔬斷欲感通録壬辰十一延昌元釋法通晦迹鍾阜三十餘載坐禪誦念禮懺精苦精講衆經學徒雲聚齊文宣王丞相文獻王皆親承頂禮一時名士並稟戒法白黑弟子七千餘人是年九月見佛來乃索湯沐浴而逝本傳惠約法師帝請相見禮敬甚優與師談法動經晨夜自是去來禁省賞遇崇信無與比者傅大士年十六歲娶留氏名曰妙光有子二人曰普建普成癸巳十二二魏西域勒那摩提譯寶積論等六部二十四卷宣武請講華嚴忽於高座見天神云天帝請講華嚴與都講維那等五人同時於座而逝凡所聞見歎未曾有菩提流支譯楞伽經十卷甲午十三三寶志大士顯寄知名四十餘載將欲示寂因詣內殿永訣帝大驚問曰朕壽幾何志不答以手指脰及頸而出指脰頸者喉頸也神見言于未兆耳一云志然一燭付後閣舍人以聞帝帝曰師不復留矣將以後事囑我乎回山以十二月六日入滅壽九十三帝為建塔于鍾山乙未十四四正月世宗崩肅宗孝明帝翊立盤盤國獻梁帝佛牙敕僧紹撰經目四卷十月廣州何規採藥於豫章胡翼山遇異人以慧印三昧經一卷授規令持與建安王言畢不見梁弘明集釋慧集精於論學帝每請開講是年卒本傳智藏法師初遊京輦帝深加禮敬至是帝為志公建塔寺曰開善敕藏居之時帝之宮闕恣其遊踐而御座唯天子所升藏踞坐曰我金輪王子也帝亦聽之初相者曰師壽止三十一藏乃竭精修道專誦金剛經至厄年之暮俄空中曰承般若力得倍壽矣藏後出山相者驚曰短壽之相今無矣藏問今得至幾曰可六十餘於是江左道俗競誦此經乃至于今感通屢著丙申十五魏肅宗熙平元釋明達初巴峽蠻夷抄掠州邑達喻之未服雷雨震擊賊驚而求哀令歸三寶昏霾立霽遂使江路肅清又欲起木塔而水自流至材木患攣者授杖即行化行楚蜀是冬卒越州隱嶽寺石佛像初釋僧護擬造十丈石佛齊建武中僅成面朴而亡次有僧淑襲其功而未成至天監六年吳郡陸咸夢僧云建安王感疾未瘳能治剡縣石像成者必愈咸經年稍忘而僧復來促之咸乃啓建安王王乃捨金委僧祐專任像事以十二年就功是春方竟座高五丈而佛身十丈像成之後王疾即瘳僧傳敕沙門寶唱撰經律異相五十五卷又比丘尼傳四卷今在藏魏胡太后作永寧石窟二寺永寧有真金像高丈八尺如中人者又十軀為浮圖九級其高九十丈上立剎復高十丈夜靜鈴鐸聲聞十里佛殿如太極殿三門如端門僧房千楹珠玉錦繡駭人心目自佛法入中國塔廟之盛未之有也太后既事佛民多絶戶為沙門李瑒上言謂缺當世養親之禮而求將來之益安有棄堂堂之政而從鬼教乎都統僧暹等忿瑒謂之鬼教泣訴於太后后責瑒瑒曰天神地祇人鬼佛本出於人名之為鬼臣謂非謗暹曰若此則周孔之教亦鬼教也后於是罰瑒金一兩北史丁酉十六二敕沙門寶唱撰衆經佛名三卷三寶紀六月詔廢省天下道觀帝雖億兆務殷而卷不釋手察姦聽訟明若通神自非享宴許不音樂後宮侍御皆無羅綺內殿寢處衣衾率素布被莞席草履葛巾因敕織官文錦不得為仙人鳥獸之形為其裁剪有乖仁恕乃至郊廟皆以麵為牲牷其餘盡用蔬果戊戌十七神龜元釋曇裴善辭辨孝王元簡及何胤等並延講説是年卒本傳僧祐律師自齊初大弘律法梁武深相禮遇凡僧事有疑皆就審決年衰腳疾敕聽輿入內殿為六宮受戒王公貴戚白黑門徒一萬餘人是年五月二十六日遷寂壽七十四師有三藏記法苑記世界記釋迦譜弘明集等皆行於世本傳嵩頭陀法師居婺州雙林北四十里巖谷間樓偃常侍為創香山寺及建靈剎道俗萬衆共引麻筰舉剎筰忽中斷引者皆顛躓師乃曰有何魔事使之然乎因以鉢盛淨水內外攬之呪而作禮捧鉢繞剎一周剎乃不假人功屹然自立後又至萊山立寺師常曰萊山王而不久香山久而不王後果如所言本傳敕沙門寶唱撰衆經目四卷閏八月釋慧彌卒彌止鍾山定林寺足不出山三十餘年常習定及誦般若六時禮懺僧傳己亥十八二帝以道資人弘理無虗授事藉躬親民信乃立慧約法師德高人世道被幽冥以四月八日帝躬請師授菩薩戒延師於等覺殿上屈萬乘之尊申在三之敬暫屏衮服恭受田衣宣度淨儀曲躬誠肅復設無遮大會朝野白黑十餘萬衆香花伎樂法事之盛振古未有也因大赦天下詔曰梵網經云居帝王位者應先受菩薩戒故知貴為天子富有四海宜修身戒心以弘治道朕思若不受菩薩戒豈能起慈悲心行平等行所以受持正法在豫不疑欲以億兆蒼生同茲福慶凡天下罪無輕重咸赦除之自是約法師入見別施漆榻上先作禮然後就坐皇儲已下爰至王姬道俗士庶咸希度脫舉國臣民一切盡敬弟子著籙者凡四萬八千人法師尊重極焉本傳帝自受戒後口味備斷日惟一食食止菜蔬方四十已上便斷房室寢處略同沙門自古帝王莫能爾也由是一人履道四方化之國內普持六齋兆民皆受八戒敕於莊嚴寺建八座法輪講者五僧番次主之以僧旻為冠當旻講日聽者傾都堂無容足會稽釋惠晈著高僧傳十四卷始漢永平終于是歲凡四百五十餘載二百五十七人附見者二百餘人今在藏富陽縣泉林寺釋道琳持戒誦淨名等經寺有鬼怪琳居之便歇弟子為屋壓頭陷入胸琳為祈請夜見兩梵僧拔出其頭旦遂平復琳又設聖僧齋鋪新帛於牀上齋畢見帛上有人迹皆長三尺衆皆服其精感琳是年卒魏太后令諸州各建五級浮圖諸王貴宦各建寺於洛陽太后數設齋施僧物動以萬計北史庚子普通元正光元扶南國獻旃檀瑞像傅大士年二十四泝水取魚於稽停塘下遇嵩頭陀語曰我昔與汝於毗婆尸佛前發願度生汝今何時還兜率宮指令臨水觀影大士乃見圓光寶蓋便悟前因乃曰度生為急何暇思天宮之樂乎於是棄魚具擕行歸舍因問修道之地嵩指松山雙檮樹曰此可矣即今雙林寺也大士結庵自號雙林樹下當來解脫善慧大士種植蔬果為人傭作與妻妙光晝作夜歸敷演佛法本傳時慧達禪師得水觀三昧每入定有窺者見清水滿室沙門道仙得火光三昧所居之室玄夜大明通論魏孝明帝加元服命沙門道士講道於禁中時沙門曇無最與道士薑斌對論帝曰佛老同時否斌曰按開天經老子西入化胡佛充侍者明是同時最曰老子周何年生斌曰定王三年生敬王元年年八十六西入化胡最曰吾佛以周昭王二十六年生穆王五十三年入滅自佛滅後至定王三年凡三百四十五年老子方生及敬王元年老子西遊則佛滅已四百三十一年矣相去懸遠化胡無乃謬乎斌曰佛生周昭有何文記最曰周書異記漢法本內傳並有明文時侍中劉騰宣敕曰薑斌論無宗旨宜退席又問開天經何從而得可取來及取至帝命群臣詳定真偽蕭綜李實等一百七十人讀訖劾奏曰老子止著五千文今薑斌所據文詞鄙俚宗旨乖謬罪當惑衆制可將抵以刑流支奏解斌特流馬邑魏史九月二十一日天竺二十八祖菩提達磨大師至廣州刺史表聞武帝帝遣使詔迎十一月一日至金陵帝問朕即位以來造寺捨經度僧不可勝數有何功德師曰並無功德帝曰何以並無功德師曰此但人天小果有漏之因雖有非實帝曰如何是真功德師曰淨智妙圓體自空寂如是功德不以世求帝問如何是聖諦第一義師曰廓然無聖帝曰對朕者誰師曰不識帝不省玄旨師知機不契十九日遂去梁折蘆渡江二十三日北趨魏境尋至雒邑初止嵩山少林寺終日面壁而坐此據嵩明教正宗記紀年也而傳燈等傳録多紀八年至此國則後孝莊啓壙等緣皆差而不合據五燈會元又謂普通七年丙午九月二十一至廣州刺史蕭昂表聞武帝帝遣使詔迎丁未十月一日至金陵今據普燈指傳燈為訛依正宗為準千歲寶掌和尚宋大明中遊五臺徙居祝融華巖黃梅雙峰廬山東林等處至于建鄴至是達磨入梁師就扣其旨開悟智證帝高其道臘延入內庭未機如吳後遍遊二浙五燈辛丑二二九月帝建同泰寺時釋子多違律者僧正莫能制帝欲自以律行僧正事詔下獨智藏法師不奉詔帝訝之召問藏以五方之衆不可以一己好惡繩之為對帝不能奪遂從之魏主於鄴下造大覺寺壬寅三三智藏法師晚以禪自晦是年九月十五日示寂敕葬獨龍山僧伽婆羅於楊都譯育王等經至是十七年共出經十一部三十三卷帝躬臨法座筆受其文釋明徽於大律內抄出尼戒一卷今見行于世魏胡太后熙平初遣宋雲與比丘惠生往西域求未至經再期至乾羅國是冬還達洛陽得佛經一百七十部北史法師明徹講學有聲武帝時延於內帝以律章富博欲以類撮要敕入華林園於寶雲僧省抄撰將成忽感疾乃移還本寺是年十二月七日卒敕給葬具本傳自魏有天下至於斯時佛經流通大進中國凡四百十五部合一千九百一十九卷正光已後天下多虞僧多猥濫矣癸卯四四制中外毋斥法師惠約名別號智者沙門別號自是而始隱士阮孝緒著七録載內外圖書也前五曰內篇六曰佛録七曰仙道録謂之外篇隱士何胤初侈於味至是周顒遺書勸令食菜曰變之大者莫過生死生之重者無逾性命性命之於彼甚切滋味之在我可賒若云三世理誣則可爾若使此理果然而受形未息一往一來生死常事則傷心之慘行亦自及丈人於血味之類雖不身踐至於辰鴈夜鯉能不取備於屠門財貝之一經盜手猶為廉士之所棄生性之一啓金刀寧復慈心之所忍騶虞雖飢非自死之草不食聞其風者豈不使人多愧丈人得此有素聊復片言啓發耳胤由此絶去血味嘗遇異僧受以大莊嚴論世所未有者晚入虎丘講維摩經後臨終夢見天女六十餘人列于前寤猶見之即具浴儼衣冠少頃而卒甲辰五五法寵法師帝每義集必以禮致之略其年臘敕常居坐首不呼其名號為上座法師是年三月遷寂皇上傷悼敕葬定林師初年三十八有僧相之四十當死寵對鏡面有黑氣乃閉房禮懺晝夜不息迄年四十歲暮覺耳腫痛戶外人曰君死業已盡明日黑氣都除兩耳生骨至是壽七十四終釋僧副深於觀行武帝考室於開善寺以待之有胡翼山神現以慧印三昧授何規曰可以此經與南平王觀為病行齋三七日也不曉則問於副及訪副果是其所行法南平遂行齋祀疾便康復是年師示寂本傳僧神光聞達磨在少林遂往彼晨夕參承莫聞誨勵忽夜大雪光立不動積雪過膝師憫而問曰汝久立雪中當求何事光曰惟願大慈開甘露門廣度群品師曰諸佛妙道曠劫難逢豈可以小德小智輕心慢心欲冀真乘徒勞勤苦光潛取刀斷臂置師前師曰諸佛最初求道為法忘身汝今斷臂吾前求亦可矣即易名慧可可問曰諸佛法印可得聞乎師曰諸佛法印匪從人得曰我心未寧乞師與安曰將心來與汝安曰覔心了不可得師曰與汝安心竟據傳燈録謂神光年甫四十而參達磨又高僧傳謂光參達磨六年而一乘精究則光參達磨的台在此年也釋明琛經論雖富而以徵難為心深忌時之講者初為屋子法誘人次撰蛇勢法以授學者因同伴二人止一林下琛曰我今內熱便解衣赤臥翻復不定須臾兩足合為蛇尾乃曰我作蛇勢論今報至矣卿可上樹蛇心若至則有吞噬之緣伴便上樹奄便全身作蛇惟頭未變在地自打欻作蠎頭忽長五丈舉首四視目如火星時諸蛇總至相隨趣谷而去其伴目驗斯報至鄴説之僧傳乙巳六孝昌元敕法雲法師為大僧正於同泰寺設千僧會集衆演儀文皆見所未聞西域使還獲佛爪髮髮青紺色以物伸之隨物長短放之則旋屈為螺魏佛陀扇多此云覺定內外博通尤工藝術至京譯經達磨大師道德孤高緇白之衆靡然趨向其聲既振遂聞於明帝帝三屈詔命師竟不下少林帝高之遂就錫二摩納袈裟金銀器物若干師皆遜去凡三返帝終授之正宗記丙午七二昭明太子於東宮創惠義殿招天下名僧居之謂之法集之所僧正慧超自天監中帝請為家僧禮問殊積嘗詔超受菩薩戒屢請講法未啓莊嚴寺園接連南澗因搆起重房晚年乃求解職閉房養素是年五月遷寂本傳法師慧超武帝敕為壽光學士又敕與僧伽婆羅傳譯為筆受講業盛化是年卒本傳丁未大通元三敕延僧旻法師住開善寺在途以疾留莊嚴寺二月一日卒於寺房壽六十一敕葬鍾山開善師稟性謙和好放生布施無左道卜筮不假託奇怪君子皆景慕之營居負販者望風畏敬聞其名者偽夫正鄙夫立本傳是春造同泰寺成三月帝幸同泰寺捨身三日始還宮通鑑釋道穆初入荊州神山忽風雷震吼蛇虎亂圍穆心泰然入定七日蛇虎方隱山神變形謝過云是田伯王也來請受戒及施法式諸毒潛亡祭祀絶於羶辛祈澤應時雲雨如此靈異非一居山三十餘年道俗欽德本傳戊申二魏敬宗孝莊帝收永安元傅大士苦行七年弟子日衆大士欲導群品乃化妻子鬻身助設大會有沙門惠集來願為弟子助大士教化二月魏明帝崩四月孝莊即位造五所寺刻萬佛像己酉中大通元二三月二十七日法雲法師遷寂壽六十三二宮悲慟敕給東園祕器凡百喪事皆從王府下敕令葬定林寺側立銘志云九月癸巳上幸同泰寺設四部無遮大會上釋御服持法衣行清淨大捨以便省為房升講堂法座為四部大衆開涅槃經題癸卯群臣以錢一億萬祈白三寶奉贖皇帝菩薩僧衆默許百辟詣寺東門奉表請還臨極三請乃許通鑑十月又設四部無遮大會道俗五萬人會畢十一月上還宮大赦改元達磨大師默坐九年學者益衆至是忽謂其徒曰吾西返之時至矣汝等盍言所得道副曰如我所見不執文字不離文字而為道用師曰汝得吾皮尼總持曰我見如慶喜見阿閦佛國一見更不再見師曰汝得吾肉道育曰四大本空五陰非有而我見處無一法可得師曰汝得吾骨慧可禮三拜依位而立師曰汝得吾隨即顧謂可曰世尊正法眼藏展轉授吾吾今付汝吾滅後二百餘年衣止不傳法周沙界潛符密契千萬有餘汝當闡化勿輕未悟一念回機便同本有聽吾偈曰吾本來茲土傳法救迷情一花開五葉結果自然成乃往禹門千聖寺十月初五日端坐而逝壽一百五十歲門人奉全身葬熊耳山定林寺明年魏使宋雲西域回遇師于蔥嶺手擕隻履翩翩獨逝雲問師何往曰西天去且云汝主已厭世及雲歸朝具奏其事莊帝有旨令啓壙唯空棺隻履存焉舉朝驚歎奉詔取履供養梁武聞師顯化親製刻之鍾山其末云嗟乎見之不見逢之不逢今之古之悔之恨之朕雖一介凡夫敢師之於後云至唐代宗諡師曰圓覺大師據普燈紀此年入滅也正宗則謂終于戊申而五燈會元通論謂魏文丙辰大統二年終以丁未至梁而等也傳燈謂太和十九年卒者訛也太和在天監前數十年蓋集傳燈時以寶林為據失之稽考故差之特甚庚戌二三貞節處士庾詵卒遠近皆聞空中唱云處士已生彌陀淨域辛亥三魏二月節閔帝恭改元普泰十月安定王改元中興四月昭明太子統卒太子五歲遍誦五經十二歲於內省決獄平允帝既留心內典躬自講説太子亦天性好佛凡釋部經論披覽略遍撰次法事儀注及立三諦等義自出宮二十年不畜聲樂唯法為樂至是感疾而終天下哭之如喪其親焉梁史十月武帝幸同泰寺講涅槃經凡七日始還宮魏釋僧照喜觀靈迹入滎山洞穴見神僧眉長丈餘與共談論仍以梨棗令噉次旦辭出重往莫測其處本傳壬子四孝武帝永熙元約法師夢舊宅華麗仍發願造寺詔乃號為大生魏四月孝武帝修即位造陟𡵆寺供僧講法僧稠禪師初受道房禪法入山習定數年復詣少林寺跋陀更授深要乃住嵩嶽寺僧有百人泉水才足忽有婦人弊衣坐階聽僧誦經衆呵遣之婦有慍色以足踏泉泉即竭身亦不現衆以告稠稠三呼優婆夷神乃出稠謂曰衆僧行道宜加擁護婦即以足撥於故泉水即上涌後詣懷州西王屋山修定聞兩虎交鬪乃以錫杖中解各散而去後又移止青羅山懷州馬頭山魏明帝三召不出乃就山送供至是魏孝武召之不出於尚書谷為立禪室集徒供養本傳癸丑五二二月二十六日帝幸同泰寺講金剛經設道俗無遮大會自皇太子王侯已下百官六百九十八人義學僧等一千人晝則同心聽受夜則更述制義其餘僧尼道士女冠居士五衆及外國使人三十一萬九千六百四十二人又武衛宿直復數萬人先是志公於天監初自持一麈尾扇及鐵錫杖奉上上亦未喻其意至是三十餘年乃鳴錫升堂執扇講説者抑有冥符是講也東儲啓請止許七日諸僧鑽仰欲罷不能更延二七而請益之衆喁喁不已乃終于三七解講之辰正殿大像忽放光明左右菩薩續復放光帝躬虔禮大衆咸矚帝捨施錢銀絹物直一千九十六萬皇太子奉寶經函又施僧錢絹直三百四十三萬六宮所捨二百七十萬時朝臣至于民庶並各隨喜又錢一千一百一十四萬上躬自菲薄器同土簋寒暑被襲莫非大布所居便殿不能方丈傍無侍衛顧無玩物左右唯經書卷軸所對但香爐錫杖昧旦坐朝日旴乃息夜尋法寶明發不寐所利唯人所約唯己誠起居之常事禁中之實録弘明集蕭子顯撰序甲寅六西魏孝武永熙三帝西奔長安依宇文泰是冬崩東魏孝靜天平元十月高歡立帝遷都于鄴傅大士遣弟子傅暀詣闕奉書有詔赴闕以閏十二月到闕帝聞大士神異預鎖諸門大士已知預作大木槌一雙先扣一門諸門悉啓直入善言殿唱拜不從徑登西國所貢寶榻此榻唯昭明太子智者法師洎大士得坐耳帝問大士師事從誰答曰從無所從師無所師事無所事設食竟遂還鍾山定林寺詔令資給大士録乙卯大同元文帝寶炬大統元二三月上幸同泰寺遂停寺省講三慧經詔特為傅大士別設一榻四月解講大赦改元是夜同泰寺浮圖災上曰此魔也遂再起十二層倍增往日智者慧約國師壽八十四夏六十三飯餌松木三十餘年布艾為衣過七十載鳴謙立操擅望當時是年九月六日示疾神識怡愈了無痛惱至十六日敕遣舍人徐儼參疾答云今夜當去五鼓異香滿室左右肅然乃曰夫生有死自然常數勤修念慧忽起亂想言畢合掌便入涅槃帝素服臨喪哭之悲慟輟朝二十一日其月二十九日詔葬於獨龍山志公墓左又從約受戒者數萬人皆服緦麻哭送至塔又臨終夜所乘青牛忽然鳴吼淚下交流至葬日敕使牽之部從發寺至山吼淚不息又建塔之始白鶴一雙繞墳鳴唳聲甚哀婉葬後三日欻然永逝本傳西魏文帝寶炬是年造般若寺帝每運慈悲常行信捨拯溺孤老供給病僧口誦法華身持淨戒起七覺殿為四禪室供養無輟檀忍不窮卞正東魏菩提流支至是譯經三十九部共一百二十七卷釋教録丙辰二二四月甘露降秋谷不熟民飢死者半三劉協博通經論凡寺塔名僧碣皆出其手纍官通事舍人表求出家先燔鬚自誓帝嘉之賜法名惠地南史敕改約法師所居竹山里為智者里西魏丞相宇文泰興隆釋典崇重大乘雖攝萬機常闡三寶第內常供百法師尋討經論講摩訶衍命釋曇顯撰衆經要二十二卷及一百二十法門丁巳三三四釋植相習苦行一食常坐正心佛理時有法愛衒道術現神來怖於相相不動而愛求懺悔又寄宿道館道徒不延而群虎奔吼道士乃從受菩薩戒又見人垂釣勸止不從即唾水中大蛇忽出釣者即投相出家僧傳定州孫敬德事觀音甚虔後為賊橫引不堪拷楚遂妄承罪明日將決夜夢僧教誦救苦觀音經千遍免苦德方誦及半有司執縛向市且行且誦臨刑斫之刀折三段皮肉不傷凡三換刀刀折如初監司問之具以狀聞丞相高歡歡為表請免死德還家像項有三刀痕今世謂高王經出此也齊書戊午四四元象元慧集法師凡人有疾求療師曰但一心念我即愈所救不可勝紀正月二十一日燒兩臂救人其夜入滅本傳七月梁詔曰上虞縣民李胤掘地得一牙像方二寸一邊佛像十二軀一邊十五軀巧刻妙絶中有真形舍利六焉昔經奏上未以為意而胤銜愆縲紲東冶真形舍利降在中署光明顯發大悲救苦良有以乎宜承佛力弘茲寬大凡天下罪無輕重皆赦除之弘明八月月犯五車老人星見改造長千寺育王塔出佛舍利髮爪乘輿幸長千寺設無礙法喜食下詔以真形舍利復現於世今設無礙會幽顯歸心因時布德允叶人靈凡天下罪無輕重皆赦除之同上隱士陶弘景飲飛丹辟穀為兩朝師模時稱山中宰相居華陽洞天景夢佛授記名勝力菩薩乃詣鄮縣育王塔自誓受五大戒是年無疾尸解一云二年遺令加冠巾法服以大袈裟覆體明器有僧居左道士居右弟子遵而行之隱子三武論天竺月婆首那此云高空於東魏譯經己未五五興和元傅大士重入都三月帝於壽光殿共論真諦大士曰息而不滅帝又請講金剛經大士揮案一拍而起常不喻再請講大士乃索柏板升座唱四十九頌頌終便去東魏佛陀扇多至是譯經論一十部釋道臻博通經義魏文帝尊為師傅於京立大中興寺尊為魏國大統臻乃大立科條佛法由是載興後大乘陟岵相次而立又於昆池置中興寺莊池之內外稻田百頃並以給之及卒帝哀之廢朝喪事所資並歸天府庚申六六二河南王遣使貢方物求佛像并經論十四條敕盡與之外賜御製涅槃等經講疏一百卷傅大士辭帝東歸後數月復至都歸而置寺躬寫經律千餘卷大士三至京師所度道俗不可勝計釋僧林德能動物潼州豆山神化大蠎來林為授三歸因不興災化迹非一本傳詔以鄴城舊宮為天平寺辛酉七七三于闐國獻玉佛像一身高麗等八國貢方物求涅槃等疏論三月十二日帝於華林園之重雲殿講金字般若三慧經太子王侯宗室外戚百辟卿士外域雜使義學千僧外國僧衆莫不肅容觀聽凡講二十三日自開講迄於解座日設遍供普施京師文武侍衛並加班賚上躬務儉約體安非素外絶三驅之體內屏千鍾之宴膳夫所掌歲撤萬金掖庭之費年減巨億故能無損國度財法兼施是講也宮中佛像悉放光明夜必澍雨朝則晴霽天地震動異香滿觸十種靈異具如陸雲之序弘明集魏連歲大稔穀一斛九錢東魏毗目智仙本烏萇王種於鄴城譯經壬戌八八四魏釋曇鸞志欲延壽而後修佛法聞江南陶隱居有仙術大通中達梁到其山所陶欣然以仙方十卷授之及還魏境欲往名山依方修鍊至洛下逢西竺菩提流支乃問佛法中頗有長生不死法勝此土仙經者乎支唾地曰是何言歟此土何曾有長生法縱得長生少時不死終更輪回三有耳即授以觀無量壽經曰此大仙方依而修之永出生死鸞乃焚其仙經恐誤後來精修淨土流化弘廣魏主重之號為神變是年感香花幡樂來迎奄然而逝鸞有論集流行仍自號為元簡大士云本傳東魏天竺瞿曇般若流支此云智希自元象初至是譯經論十八部九十二卷釋教録癸亥九九武定元釋尚圓以呪術救物梁武陵王紀宮中鬼怪為魅王令射者射之鬼接而返擲請圓入宮諸鬼競前作諸怪變圓安坐告曰汝等小鬼敢入王宮能變我身則可自變萬種且住聽我一言諸鬼合掌住立圓始發云南無佛陀鬼皆失所自爾安靜武帝聞而召之大蒙賞遇本傳甲子十十二傅大士以屋宇田地資生什物悉皆捐捨營立精舍設大法會普為衆生懺滅罪苦速得解脫傾捨既盡創立草庵妙光亦自立庵草衣木食晝夜勤苦乙丑十一十一三西魏宇文泰於長安立追遠陟屺大乘魏國安定中興等六寺度一千僧又造天保寺供養瑋法師及弟子七十餘人於安州造壽山梵雲二寺又造大福田寺供養實國師又於實師墓所造福田寺又為大可汗大伊尼造突厥寺辨正丙寅中大同元十二四帝自天監中事釋氏法長齋斷酒肉不聽音樂雖居暗室常理衣冠小坐暑月未嘗褰袒造光宅同泰等五寺常供千僧製諸疏論帝嘗作淨業賦其序有云朕不噉魚肉不與嬪侍同處四十餘年矣既不食衆生無復殺害障既不御內無復欲惡障除此二障意識稍明乃作淨業賦其賦略云觀人生之天性抱妙氣而清靜感外物以動欲心攀緣而成眚遇常發於外塵纍必由於前境懷貪心而不厭縱內意而自騁耳流連於𮈔竹眼轉移於五色香氣馞起觸鼻發識舌之受味甘口噉食身之受觸以自安怡細腰纖手弱骨豐肌附身芳潔觸體如脂狂心迷惑倒想自欺如是六塵同障善道方紫奪朱如風靡草抱惑而生與之偕老隨逐無明莫非煩惱由是外清眼境內淨心塵與德相隨與道為鄰見淨業之可愛以不殺而為因離欲惡而自修故無障於精神患纍已除障癡亦淨如久澄水如新磨鏡外照多像內見衆病既除客塵反還自性心清若氷志潔如雪結縛既除憂畏亦滅與恩愛而長違顧生死而永別弘明集三月乙巳上幸同泰寺捨身四月丙子群臣納帛奉贖還宮月婆首那入梁見帝帝留譯經丁卯太清元十三五上幸同泰寺捨身通鑑杜弼仕高歡甚見敬使西魏魏帝知弼深於佛理問佛性法性寬狹之旨弼曰非寬非狹帝稱善本傳釋僧妙西域獻佛舍利帝送妙妙頂奉忽夜放光照天地合城贊歎聲聞數十里戊辰二十四六天竺僧賫石影像來形高一尺徑六寸八楞紫色內外映徹會侯景之亂乃置江州廬山西林寺像頂上後開皇中煬帝虔奉以漆函盛之及登儲貮乃送曲池日嚴寺其中變現光相非一正觀六年敕入內供養出感通等録八月西域拘那羅陀亦云波羅末陀此云真諦亦云親依至京帝面申頂禮於寶雲殿竭誠供養仍請譯經己巳三四月帝崩太宗簡文帝即位十五七四月逆賊侯景陷臺城徵來無已帝憤之遂寢疾然齋戒不衰念佛不輟五月大漸不能進膳久而口苦索蜜未至而曰荷荷遂崩於淨居殿年八十六太宗簡文帝綱即位隱子論曰或謂梁因佛而亡蓋亦未之思耶請以漢武校之兩漢南北之君享國年深唯漢梁二武其恢崇庠序養育人材一也漢學仙梁學佛所好亦一也而漢武在位五十四年尊寵方士壅曠萬機窮兵黷武帑廩罄然民有離心而不敗者何也漢未嘗一日去兵也梁末年漸疏將佐去兵此其所以先敗也嵩公廣原教曰教不可泥道不可罔過與不及其為患一也夫事有宜理有至從其宜而宜之所以為聖人之教也即其至而至之所以為聖人之道也梁之武帝齊之文宣反其宜而事教不亦泥乎魏周二君泯其至而預道不亦罔乎此釋子之不苟時君泥佛也如此以是驗梁泥教不為不失蓋學佛自有中道也梁雖泥教為失然不由是而致敗其弊在乎弛武而疏賢也要之隆污有定數不可以苟延之也自古君臣父子篡弒狂盜內侮何可勝紀今曲言侯景之叛而誣於佛何耶彼共工之於伏羲蚩尤之於黃帝羿促之於夏楚昭王不反申之於周弒幽勝廣之於秦賈充成濟之於魏劉石之於晉爾朱之於元魏祿山朱泚黃巢之於唐何代而無侯景也且以子之弒父如景之狂何憚而不為哉景雖陷臺城不加逆於武帝何可加訾乎出隱子梁後論湘東王以高祖崩捨宮造天宮寺邀法聰禪師居之聰初至襄陽傘蓋山白馬泉谷築室棲禪梁晉安王來部襄雍承風至山騎從無故而退王慙而返夜感惡夢及再往馬退如故王乃潔齋方得進見初至寺側但覩一谷猛火洞然良久佇望忽變為水經停傾仰水滅堂現以事相詢乃知時入水火定也堂內繩床邊有二虎聰按伏其頭閉其目召王令前方得展禮因告境多虎災聰即入定須臾有十七虎至便與受歸戒敕令勿犯百姓遂乃無害其日將王臨白馬泉見白龜聰曰此雄龍也又臨靈泉有五色鯉聰云此雌龍也王因表奏下敕為造禪居寺又就所住造靈泉寺其寺周改靜林隋改景空唐仍隋號至是居天宮尋還故里後以大定五年九月無疾而化壽九十二師之靈瑞非一本傳庚午簡文帝大寶元十六年齊文宣帝天保元年五月魏靜遜位簡文帝委心妙法遍覽玄章撰法集記二百卷法寶聯璧四百餘篇造資敬報恩二寺刺血書般若十部然天姿高明而德性柔懦為侯景所制不能自立亦時數使然也辨正論等五月齊顯祖文宣帝高洋受魏靜帝禪即帝位帝佛慧早修聖智罕測既臨大寶盛興佛教焉罽賓沙門那連提耶舍此云尊稱自魏孝靜之世至鄴都譯經辛未二十七年三月帝崩廢帝欽立二從開闢至此年凡二百八十三代七十六萬一千四百一十五年辨正論世尊示滅至此一千五百年齊顯祖詔曰仰惟慈明緝寧四海欲報之德正覺是憑諸鷙鳥傷生之類宜放之山林為太皇太后建立寶塔廢鷹師曹為報德寺辨正梁三藏真諦值梁不寧乃往富春傳譯沙門寶瓊等二十餘人番十七地論是年為侯景請還供養本傳七月景逼簡文禪位于昭明太子孫棟十一月景篡位改元大始隱子論曰觀梁之興有以異於魏晉銓梁之治有以盛於宋齊史褒以斯文德有此武功始自湯武之師終濟唐虞之業此其實録也梁豈有慚德哉武帝受命之後數十年間禮樂文物為南朝冠此梁之治獨出於江左五朝南北八代之右也宋景文新史曰梁蕭氏興江左實有功在民終無大惡以寖微而亡故餘祉及其后裔唐興得八葉宰相未聞貶梁以好佛而致亡者也文中子知之故著中説曰齋戒修而梁國亡非釋迦之罪也蓋疾史臣不知梁所以亡爭以近迹而引咎於佛矣武帝不求賢才擢用庸侫春秋既高留神俎豆泥情釋教而在廷無諍臣矣知子莫若父況三蠹並殲獨全養嗣正德不即大戮使陰召逆雛咫尺玉墀鞠為茂草故侯景得以稱兵犯順知梁有名將棄而勿用士不知戰有可乘之機故也何謂名將王神念羊僧辨侯瑱徐世譜陸法和數子之才梁不任之杜僧明周文育侯僧都麥鐵杖等皆有將材梁既不用之反以資篡臣湘東無御將之道侯景未梟而陳氏問鼎矣梁室速傾其患在此而議者以為仁義禮樂戒律定慧不幸而亡梁非也仁義禮樂堯舜三代皆資而大治不聞始治而末亂也所以亂者其後嗣失德而已戒律定慧漢明帝求其人與教傳世二百唐太宗大興之不害其為正觀之治而傳世二百我宋太祖太宗大興佛教而聖子神孫皆賢於商之三宗宜其傳世而無窮也以是明之則佛不為王化之蠹反所以資於治也夫言佛法亡梁者殆非正論引子梁室論壬申世祖元帝繹承聖元廢帝欽元三三相湘東王繹大敗景軍景走尋為侯瑱殺之十一月繹即位於江陵是為世祖元帝帝體聖多能入微靈悟造天居天宮二寺每講法華經解成實論辨正是年三藏真諦於金陵正觀寺譯光明等經齊天保二年詔僧稠禪師至京帝躬舉大駕出郊迎之稠年過七十神宇清曠帝扶接入內為説正理帝拜受禪道自後彌承清誨篤敬殷重因從受菩薩戒法於是斷酒禁肉放捨鷹去官畋漁成仁國又斷天下屠殺牛三月大勸民齋戒官園私菜葷辛悉除稠留禁中四十餘日因辭還山是年敕於鄴城建雲門寺以居之兼為石窟大寺主一日帝駕幸謁稠稠床坐不迎有讒於帝帝將入寺按其不敬稠知之預出二十里外候帝及帝至怪問其故稠曰恐身血不淨穢污伽藍在此候耳帝拜伏愧悔無已乃躬負稠身往寺稠不受帝曰弟子負師行遍天下未足謝𠍴因問弟子前身曾作何等答曰作羅剎王是以今猶好殺即呪盆水令帝自觀其形果然帝大驚自是坐禪行道倍鋭於前仍敕諸州別置禪肆令達定慧者就而教授因以國儲分為三分一以供國一以自用一供三寶自是徹情歸向通古無倫大起寺塔僧尼滿於諸州佛法東流此焉盛矣僧史法師法上戒山崇峻慧海幽深德可軌人威能肅物故魏齊之世歷為統都所部僧尼將二百萬而上綱紀將四十年常文宣時盛弘釋典上總擔荷並得緝諧內外闡揚黑白咸允癸酉二二四荊山居士陸法和初為元帝所重爵以間散每服勤沙門執弟子禮至是帝以和為郢州刺史南史齊沙門嵩公至白虎山因失道聞鐘聲登一寺於堂久坐忽見五六十僧飛空而下自相借問或言長安成都嶺南蒯北動即千萬里嵩起欲參話奄然失地獨坐磐石之上因問上統法師師曰此寺昔圖澄所造賢聖居之或現或隱遷徙無定感通甲戌三恭帝元五南嶽慧思大禪師初夢異僧勉令出俗乃辭親入道常習坐日唯一食誦法華三十餘遍感瓶水不竭天童侍奉時慧聞禪師初閲中論觀悟旨遂遙禮龍樹為師師乃往授法晝夜攝心脅不至席坐夏三七日得宿命通倍加勇猛尋有障起四支緩弱不能行步即自念曰病從業生業由心起心源無起外境何狀病業與心都如雲影如是觀已輕安如故夏滿猶無所得放身倚壁背未至間豁悟法華三昧研練逾久前觀轉增名行既播學侶日臻以時多艱欲往一方安然行道忽空中告曰若欲化物可詣武當若修禪定須往南嶽至是領徒南邁值梁之亂權止大蘇山釋慧善善智度論著散華論八卷以如衆華繽紛散也是年止長安崇華寺柱國家宰奉供演法本傳僧實禪師生有奇相魏太統中詔曰師目麗重瞳偏同虞舜背隆傴僂分似周公德宇純懿軌量難模可昭玄三藏言為世寶云云至後元年復以師才深德大請為國三藏自是陶化京華久而逾盛初粱武造金銀像二軀於重雲殿禮事五十許年至是江左未定利害相雄王僧辨乃遣杜龕典衛宮闕龕性凶頑欲毀二像為鋌先令數人上三休閣令鑱佛項槌鑿始舉二像一時回顧所遣諸人臂皆不舉失瘖如醉杜龕亦然仍見金剛競來擊之舉形洪爛穿皮露骨而卒感通乙亥敬帝紹泰元後梁中宗蕭察大定元魏恭帝二齊顯祖六陸法和以元帝敗乃歸齊齊帝封太尉賜甲第法和乞為寺身居偏室日行道燒香禮佛凝坐預期死日時至坐去而多留異迹北史嵩頭陀法師續至金華置龍盤寺又龍丘界立龍丘寺又入萬善山置離六塵寺又西至孟度山置三藏寺始師發迹置香山寺及此凡七所得山川形勝黑白供養久而猶盛本傳道士陸修靜等初為梁武所棄遂奔入魏至是其徒頗盛而齊帝事佛靜等嫉之詣闕請與釋子角法九月下敕召僧道十人較法至期大集公卿修靜等以術呪僧衣鉢及殿梁柱皆飛動諸僧無以對之靜等矜誇又言沙門現一我即現二今以小術誘之耳帝謂上統曰佛門豈無人第求之未至耳他日別對未幾求獲法師曇顯即抗表請與道流定奪真偽十月乙卯會于正殿百僚臨證顯曰承言沙門現一我即現二果否靜曰然顯翹一足曰我正現一請卿現二道士默然無對顯斥曰爾曾間者未遇勍敵敢以小術自肆即以稠禪師袈裟置地使呪之道流併力作法不能動帝敕左右取衣益十輩不能舉顯即自取置梁間又使呪之梁柱亦不能動其徒慚縮修靜更欲以頰舌勝之即曰佛家自標為內教內則小也以我道家為外教外則大也顯曰天子居九重之內亦應小於百官靜無對帝及群臣欣躍而罷丙辰帝詔曰法門不二真宗在一求之正路寂泊為本祭酒道者中世假托俗人未悟仍有祇崇麴是味喪昧虗宗既乖仁祀之源復違祭典之式宜從禁止無或遵風應道士自謂得仙者可飛騰遠舉不能爾者並宜改迷歸正詣昭玄上統剃度出家詔旨既下道士皆剃髮為沙門有不從者斬四人於是齊境無道士焉宣公論衡及北史齊帝嘗在晉陽使人騎馲駝向寺取經函使問所在帝曰任駝出城及出奄如夢至一山山半有寺衆僧遙曰高洋馲駝來便引見一僧曰高洋作天子何如曰聖明曰爾來何為曰取經函僧曰洋在寺懶讀經令北行東頭與之使者乃反命焉論衡丙子太平元陳先為相國封陳王二三七僧達禪師虎頭長耳雙齒過寸形器異倫見者驚奉梁武嘗從受戒誓為弟子後辭還魏國餌苓斷粒齊文宣帝特加殊禮前後六度歸崇十善帝為達於林慮山立洪谷寺又捨神武舊廟造定寇寺兩以居之山神禮奉每現靈迹初志公嘗曰達禪師大福德人也是年六月端坐而逝壽八十二宣帝奔赴舉聲大哭六軍周號山林為動乃葬于谷真玉法師生而無目母携聽講精究詞旨至是文宣盛弘講席海內髦彥咸聚天平玉獨標稱首道俗崇仰本傳十二月魏恭帝禪位于宇文覺是為北周孝閔帝魏十六主凡一百七十二年譯師十九人所譯經律論四百十九部一千九百餘卷僧至二百萬國家大寺四十七所三公等寺八百四十所百姓所造寺院三萬餘所自古佛事圖塔之盛無出於此丁丑二九月梁敬帝禪位于陳高祖梁四主五十六年中譯師四十二人所出經論七百八十卷寺二千八百四十六所僧尼八萬三千人頴濵先生蘇轍子由論曰易曰形而上者謂之道形而下者謂之器自五帝三王以形器治天下導之以禮樂齊之以政刑道行於其間而民莫知也老子體道而不嬰於物孔子至以龍比之東漢以來佛法始入中國其道與老子相出入皆易所謂形而上者而漢之士大夫不能明也魏晉以後略知之矣好之篤者則欲施之於世疾之深者則欲絶之於世二者皆非也佛老之道與吾道同而欲絶之佛老之教與吾教異而欲行之皆失之矣姚秦興區區一隅招延緇素譯經談妙至者數千人而姚氏之亡曾不旋踵梁武帝江南佛事前世所未嘗見至捨身為奴𨽻父子皆陷於侯景議者觀秦梁之敗則以佛法為不足賴矣後魏太武深信崔浩浩不信佛勸帝斥去僧徒毀經壞寺既滅佛法而浩亦以非罪赤族唐武宗求長生徇道士之私夷佛滅僧不期年而以丹毒遽崩議者觀魏唐之禍則以佛法為不可忤矣二者皆見其一偏耳佛老之道非一人私説也自有天地而有是道矣古之君子以之治氣養心其高不可嬰其潔不可溷天地神人皆將望而敬之聖人所以不疾而速不行而至者用此道也道之於物無所不在而尚可非乎誠以形器治天下導之以禮樂齊之以政刑道行於其間而民不知萬物並育而不相害道並行而不相悖泯然不見其際而天下化不亦周孔之遺意也哉見通鑑議
