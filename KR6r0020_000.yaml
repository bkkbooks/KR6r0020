  text: 釋氏通鑑序吾佛世尊五時演教末上拈華儻非迦葉破顏阿難結集則五千四十八卷正法眼藏涅槃妙心皆成湮沒俾歷劫衆生墮在顛崖苦海中無由出離自佛法流通之後如大海水隨其限量無不沾足後世於經論之外則有法苑珠林高僧傳五燈録弘明集正宗記僧寶傳林間録宗門統要大惠武庫此皆果位中人出來發揮黃面老子骨髓使大根大器之人一聞千悟立地成佛至則至矣括山一菴覺首座自小披緇氣骨不俗窮探經論深造禪觀而有自得之妙針劄古人不到處憫諸經史傳録編年前後不相聯貫不便觀覽與夫歷代神異隱而不顯者旁求廣索繼焚膏集成一部目曰釋氏通鑑又復捐資鋟梓以曉後來若非宿有靈骨豈能如此用心哉同志君子欲觀古今諸聖諸賢諸祖諸師出處事跡須先閲此集如登須彌山頂四天下暸然在目方知此集立志頗勤為益不小老僧覽畢自甘退身三步著數語涴於編末云時咸淳六年菊節薦福用錯師異書釋氏通鑑序大凡入道之士其信根欲固其願力欲弘此欵啓之士最難與入道也蓋道有宗主有羽翼宗主則如來以一人任之而有餘若夫羽翼則今古聖賢以千百人為之而猶恐不足故夫應迹西天示形東土自三十三祖而外種種化現或實或權不思不議不可得而條悉縷紀者皆如來之嗣孫正教之軌躅也即枚舉一二人猶令人聞風興起而一菴覺上人作釋氏通鑑倣儒書編年之例起周昭王甲寅止後周恭帝庚申上下凡一千九百三十年諸祖諸師備載罔佚其搜羅甚富其採集甚勤此三雍四庫所未收大酉琅嬛所未見也嗟夫瓶盤叉釧無非真金圭璧琮璜無非寶玉根條幹節無非栴檀緇素玄黃無非調御余友藍翰卿曩獲宋本於荊楚以為異書甚是祕吝會翰卿即世家君為之經紀其事諸孤遠將遺書見畀恍若優曇鉢羅華再見第其書間有豕渡之訛兼歷年既久紙渝墨落不無脫漏適余養痾山中却掃多暇日檢經藏更為較讐冗者芟之遺者補之訛者正之疑者闕之又參之傳記詢諸善知識始稱完帙敢為帳中之祕當圖名山之藏敬付剞劂願與同懷之士咸成得道之因云耳天啓丙寅佛出世日羼提居士畢熙志敬書釋氏通鑑序史家者流不出編年列傳二體左丘公穀因經為傳編年成書龍門以下歷代之史皆從列傳司馬文正公著通鑑一編取法左氏上下數千載前後數十朝禪代廢興存亡賢否得失一開卷得其大都讀史者善之慨自紀載興而編年易事詞勝而道法衰吾不能為史諱矣然史不獨可為儒家之用也大藏五千餘函其書三乘浮于惠子五車騰法東來名流結集又復日滋惟是出世之旨劫初之音未易窺藩而金萹浩博瑤函稠疊幾為海若之觀初機之人信根未固有望崕而返耳有宋括山覺禪師裒集釋典演以儒文用司馬法著釋氏通鑑自西周迄于五季聖諦神踪網羅無佚非經非疏別為一體古德機鋒相觸所謂要妙言無義語錯見其間蓋理魔事障既已雙遣而淵旨靈文兩臻其奧洵釋門之良史才而竺墳之大寶筏也兒子熙志年來臥痾澡心學佛日檢大藏手不釋局偶得此宋板遺編於閩人藍翰卿寶為曇華共謀纂棗使諸慕道者得覩歷代聖賢標靈顯異知其用心總為宗主羽翼共明此一大事因緣普度有情咸登正覺因而植決定信發廣大願荷擔如來無上菩提即是諸祖諸師出現于世矣昔王荊公以誤解三昧字為釋門所譏而王弇州不得頻婆末利花果二字義久之於翻譯名義集考出自謂若獲真珠船者信乎史鑑之不可已也矧釋氏十方調御三乘汲引其言竑大而可驚厥軌清邈而難蹈若非大書特書猶如反鑑索照然則是書也固前修超凡證聖之譜亦前代善敗得失之林也殆足傳燈延光弘明而超乘珠林寶訓諸帙矣大明天啓歲在丙寅重九日新都畢抵康孟矦撰歷代編年釋氏通鑑採托經傳録佛書五燈録佛運統紀梵王問佛經釋迦談祖琇通論涅槃前後分育王傳義楚六帖開皇三寶紀高僧傳法苑珠林三寶感通録僧寶傳翻譯名義宗炳明佛論弘明集大藏一覽舍利感應記延光集釋迦方志華嚴證集會宗集佛道論衡金剛感應集葦江集隱子論髓淨土感應集通明集禪苑聯芳觀音感應集寒山集龍湖行狀慈恩法師傳辨正論冷齊夜話佛法大明録壇經記禪林寶訓呂夏卿金剛序定光記雲臥紀談慈雲行業記譯經記叢林盛事傳法正宗記北山録宗門統要泗洲顯化傳雪峰録大慧武軍釋門自鏡録林間録大慧年譜道澄評謗書羅湖録龐居士録張無盡語録諸語録傅大士録儒書通鑑周書異記胡氏詠史詩列子太平盛典通鑑長編漢書方輿勝覽柳子厚文集晉書事文類聚聖宋文海魏書玉壺清話王荊公文集南北史雲齊新說歐公歸田録舊唐史明皇雜録楊文公談苑文中子韓子外傳蘇東坡詩注本草序皇朝通鑑東坡大全集長樂集皇朝備要蘇欒城文集廬山記皇朝類苑石林避暑録括葉編湘山野録能改齊謾録括蒼記揮麈談録沈存中筆談夷堅志劉斧托遺李泰伯文集樂善録歐陽外傳道書神仙傳梓潼化書平叔悟真篇歷代編年釋氏通鑑目録卷之一周昭王甲寅止赧王乙巳共七百七十二年世尊西天初祖二祖育王塔三祖四祖五祖文殊化雪山仙六祖梓潼聞法老子七祖孔子八祖九祖列子議聖無著天親十祖十一祖十二祖十三祖秦昭襄王丙午止二世甲午共四十九年室利防十四祖西漢高祖乙未止更始甲申共二百三十年十五祖十六祖化難提霍去病獲金人張騫知有佛教黑灰問胡道人十六祖付法十七祖劉向見有佛經十八祖景憲得佛經十九祖後漢光武乙酉止丁巳共三十三年卷之二後漢明帝戊午止獻帝己亥共一百六十二年梓潼遇佛帝夢金人騰蘭至道士以火試經二十祖鳳瑞二十一祖安世高鑄金像二十二祖竺佛朔帝飯僧營供安玄佛支讖支曜康巨牟子千歲掌猛詳大力曇果二十三祖三國魏高祖庚子止元帝甲申共四十五年支謙維祇難竺律炎曹子建僧會闞澤二十四祖曇柯迦羅僧鎧曇無德曇諦支疆梁樓朱士衡竺律炎西晉世祖乙酉止愍帝丙子共五十二年孫皓竺法護揵陀勒述谷寺闕公則明州塔抵世常放光經無叉羅耆域訶羅竭支孝龍白法祖法欽法炬安慧則佛圖澄庚午甲戌聶承遠道真松江像卷之三東晉元帝丁丑止恭帝庚申共一百四年元帝丁丑止壬午竺潛丁丑止甲戌僧敷尸梨密多明帝癸未佛圖澄辛巳止戊申法乘二十五祖太寧像高悝像己丑止壬申僧淵陽度董吉于法蘭于道邃康法邃支道根竺法雅滕竝王導道寶庾氷議拜尼淨檢何準法慧單道開乙巳丁未己未何充竺佛調荊州金像僧朗辛亥己巳庚子支遁壬子丙寅竺法崇帛法橋道安乙卯癸酉己卯壬午乙酉竺法汰丁巳辛未丁亥孫綽帛僧光于法開辛酉乙丑僧度慧受曇摩持道猷丁卯癸未壬辰慧常王珣桓溫簡文帝辛未壬申鳩摩佛提許詢竺法曠辛未丙子壬寅支施崙孝武帝癸酉止丙申竺法義支曇籥竺法念又佛念慧永丁丑甲寅竺道一法遇涉公曇摩蜱曇無蘭遠法師甲申止乙卯魏太祖丙戌止戊申曇摩難提郤超二十六祖僧富僧伽提婆己丑辛卯丁酉道敬辛卯庚申迦留陀伽聖堅謝靈運癸巳又宋癸酉僧伽跋澄慧嵬僧導乙未庚申曇微法果丙申乙卯己未康道和安帝丁酉止戊午桓元丁酉壬寅癸卯甲辰開達曇摩耶舍己亥甲寅法顯己亥甲寅乙卯己未慧持己亥壬子鳩摩羅什辛丑止癸丑曇霍柸度辛丑丙寅道龔等壬寅又宋庚申曇雍智猛甲辰己巳弗若多羅僧遷斂斌睿融肇乙巳又癸丑甲寅王謐師子玉像佛䭾跋陀丙午戊午庚申己巳陶潛丁未庚戌宋丁卯佛陀耶舍丁未庚戌癸丑甲寅卑摩羅叉魏太宗己酉止癸亥劉程之曇諦慧虔曇無讖壬子止宋癸酉八事法進僧慧郭宣法安道恆道標僧群僧洪曇常張野慧義法力難提曇蘭卷之四宋高祖庚申止順帝己未共六十年宋高祖庚申止壬戌曇無竭庚申甲申法和道生公壬戌壬申周續之張詮崔浩癸亥丙戌庚寅孫道德佛馱什宋文帝甲子止癸巳魏太武甲子止壬辰曇順夏勃勃劉式之惠琳謝晦智嚴元高丁卯甲申曇始丁卯辛卯慧觀丁卯丙子曇良耶舍道冏戌辰己卯涼蒙遜晉壬子止宋癸酉僧苞求那跋摩庚午辛未癸未蒲坂寺像尼智通僧弼僧伽跋摩甲戌壬午僧羅多哆法綱慧靜沮渠京聲慧睿道昺曇摩密多求那陀羅乙亥止戊申共七事孫彥曾張定妹僧亮法盛道泰浮陀跋摩羅順靈徹慧光法喜曇詵伊葉波羅僧伽達多曇摩密多慧嚴曇覺惠基丁亥丙子宗炳雷次宗法朗法瑗戊子戊申寶雲王元謨慧紹魏高宗壬辰止乙巳宋武帝甲午止甲辰普明道猷丙子乙未寶亮乙未戊辰僧瑜元暢丙申庚子己未甲子乙丑二十七祖惠簡僧詮曇宗道汪僧慶道溫功德直僧鏡慧通僧遠壬寅甲子法瑤曇曜慧益僧璩阿那摩低慧果慧亮宋太宗乙巳止壬子魏顯祖丙午止辛亥僧瑾寶志丙午己巳癸酉壬辰癸未乙酉丙戌丁亥戊子甲午道猛智林周顒丁未丁卯弘充超進趙泰何敬叔魏文常辛亥止己卯吉迦夜邵碩曇斌顧歡齊太祖己未止和帝壬午共二十四年齊太祖己未止壬戌彭城像王琰僧慧庚申丙寅番禺像僧顯僧淵道慧閹官生鬚曇摩伽耶舍行遠武常壬戌止癸酉太子捨身竟陵王癸亥庚午僧鍾癸亥己巳法獻法度江石像僧岫慧敝弘明交珠像淨度曇度道盛普恆僧跋陀羅僧逞瑞石法匱達摩摩提法道慧次慧隆應統求那毗地何點壬申梁甲申超辨曇超慧紀僧辨僧柔慧約甲戌梁壬午壬辰己亥癸卯壬子乙卯丙辰何胤乙亥梁癸卯慧安道登劉虬僧宗明帝甲戌止戊寅傅大士丁丑壬辰庚子戊申甲寅庚申甲子辛巳己丑僧景法雲丁丑癸未戊子乙巳己丑佛陀法安法願僧印慧通魏世宗己卯止乙未法紹法度僧侯僧惠東昏侯慧球智稱卷之五梁武帝壬午止敬帝丁丑共五十六年梁武帝壬午止己巳慧超壬午丙午求那毗地智藥雲光曼陀羅郗氏捨老子之道僧盛道歡帝鑄像建水陸齊江泌女僧融曇摩流支乙酉丁亥僧旻丙戌丁亥戊子己亥丁未僧養丙戌壬寅香闍梨智順惠韶法寵戊子甲辰勒那摩提戊子癸巳菩提流支戊子癸巳乙卯寶亮法悅鑄像寶唱庚寅丙申丁酉戊戌志湛法通僧紹魏明常乙未止戊申何規惠集智藏乙未辛丑壬寅明達隱嶽石像魏太后丙申己亥壬寅曇斐僧祐嵩頭陀戊戌己亥戊子慧彌惠皎道琳慧達道仙魏劾化胡之妄達磨庚子乙巳己酉明徽明徹阮孝緒僧副二祖甲辰庚辰癸丑明琛佛陀扇多乙巳己未昭明太子丙午辛亥慧超道穆魏莊帝戊申止辛亥庾詵僧照魏武帝壬子止甲寅僧稠壬子壬申庚辰魏文帝乙卯止辛未劉協宇文泰丙辰乙丑植相高王觀音經惠集陶隱居月婆首那戊午丙寅乙酉道臻僧林毗目智仙曇鸞般若流支尚圓杜弼僧妙石影像真諦戊辰辛未壬申戊寅己丑梁簡文帝己巳止辛未法聰齊文宣帝庚午止己卯那連耶舍庚午丁丑梁元帝壬申止申戌陸法和癸酉乙亥白虎山聖思大禪師申戌丁亥丁西慧善僧實申戌癸未重雲殿像甲戌己卯梁敬帝乙亥止丁丑齊無道士僧達真玉卷之六周愍帝丁丑止靜帝庚子共二十六年周愍帝周明帝丁丑止己卯陳武常丁丑止己卯攘那陀羅周武帝庚辰止丁酉洪偃庚辰甲申齊肅宗庚辰辛巳御谷石像齊世祖壬午止乙酉陳文帝庚辰丙戌闍那耶舍甲申壬辰耶舍崛多甲申壬辰闍那崛多甲申壬辰己酉壬戌法常萬天懿慧勇甲辰癸卯警韶寶瓊乙酉甲辰僧璨丙戌壬申亡名慧命陳宣帝己丑止壬寅道安己丑甲午三祖己丑丙寅嚴湖寺達磨流支曇延庚寅壬寅甲辰