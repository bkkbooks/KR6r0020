body:
  text: 宋括山一菴釋本覺編集明無還居士藍重起較訂唐高宗庚戌永徽元二月釋明濬暴死蘇云見二青衣童子引至冥王問一生何業濬答但誦金剛經王曰善哉若誦滿十萬遍明年必生淨土弟子不見師也乃放還濬自此精進逾勤至二年三月卒寺衆咸聞異香本傳法師元奘辭還大慈恩寺譯經制可司馬喬卿為大理司直丁母憂哀毀骨立刺血寫金剛經一卷才畢忽廬上生芝草三莖長一尺八寸緑莖朱蓋取而復生金剛感應集辛亥二閏九月四日四祖道信大師自紹祖位攝心無寐脅不至席者六十年至是忽垂誡門人曰一切諸法悉皆解脫汝等各自護念流化未來言訖安坐而逝壽七十二塔于本山明年四月塔戶自開儀相如生後門人不敢復閉代宗諡大醫禪師塔曰慈雲壬子三法師元奘於慈恩寺將建大塔奉安所獲經論梵本以表聞奏勑中書舍人李義府報曰所欲營塔今已處分大內及東宮掖庭等七宮亡人衣物助師營辦於是法師授以西域制度未幾而成其高二百尺牛頭懶融法席大盛徒衆乏糧而往丹陽緣化去山八十里負米一石八斗朝往暮還是年邑宰請於建初寺講般若至滅諍品地為之震動五燈癸丑永徽四帝召感業寺尼武氏入宮正月釋法顯趺坐而逝師住梅梁五十餘年足不出戶六月禪師慧寬端坐而逝寬初生楊氏父奉道號三洞先生姊信相生而知道終日禪寂寬五六歲日與信相談論俱非世事家世奉道寬獨不喜父詬罵使拜天尊寬不得已跪之鐵像蹶然崩壞舉族驚異因録每與信相所論言句先是龍懷寺禪師曇相臨終語弟子會曰吾報緣當生廣漢綿竹峰頂王氏家后七年汝來見吾言訖而逝其後會頗忘之一日夢相責以負約會驚寤遂造峰頂而扣其扉寬曰扣扉者誰會遽曰弟子會也寬笑曰何以知吾而稱弟子會曰得師聲猶昔日聲也遂見其父出所録與信相談論者示之蓋大莊嚴等論會即奉寬再歸龍懷寺落髮由是神異日顯俗呼聖和尚其姊信相亦隨出家因入水觀一室湛然唯水不見其形衆歎以為得果時亦號聖尼父母乃棄道歸佛捨宅為寺四遠聞見並捨邪歸正寬十世為大僧今十生記存焉纍朝賜諡不一釋智通持律通經於總持門特所留意正觀中譯千眼經是年譯觀音呪經三卷天竺阿地多此云無極高初建陀羅尼普集會壇屢降靈異是年出陀羅尼集經十二卷時又有阿難律木叉及迦葉譯功德天法甲寅五二月智巖禪師遷寂師初武略過人棄官入道有異僧曰卿已八十一生出家宜加精進自此入山修禪有刺史嚴撰張綽李詢等聞巖出家入山尋之謂巖曰郎將顛邪何為住此答曰我顛欲醒君顛正發中天竺國摩訶菩提寺遣僧置奘法師書并獻方物其辭略曰摩訶菩提寺上座慧天致書摩訶支那國木叉阿遮利耶敬問少病少惱我慧天苾芻等今寄白氍一雙示不空心路遠莫怪其少奘亦答其書是歲特旨度沙彌窺基為大僧入大慈恩寺參譯經正義基尉遲敬德猶子也初奘公就基父求基出家基曰聽我茹葷即從奘愛其俊而許之遂從入道每覽疏記過目成誦義亦頓解善大小乘既參譯經從奘受瑜珈唯識宗旨著論凡百部時號百本論師然性豪侈每出必治三車亦號三車法師本傳釋解脫四十餘年隱居五臺山入滅數年後靈軀尚在山窟中乙卯六則天武氏立為皇后五月釋弘智卒智弘誘博愛每以護法為心本傳五月奘法師譯因明論沙門神泰等各造義疏釋之法師栖玄以其論示呂才才作因明注解七月法師慧立致書左僕射于志寧斥其謬辭略曰聞佛之教也文言奧遠旨義深幽居十地而尚迷處無生而猶昧呪縈纏入邪之網沉淪四倒之流而欲窺究宗因辨彰其理者無乃惑哉切見慈恩法師所番聖教中有小論題曰因明雖未為玄門之要妙亦非造次之所知近尚藥呂奉御以常人之資切衆師之說造因明圖釋宗因義不能精悟妄為穿鑿然奉御於俗事少間遂謂真宗可了何異鼷鼠見釜竈之堪陟乃言崑閬之不難蛛螫覩棘林之易羅遂謂扶桑之可網不量涯分無以異斯立致書其事稍息十月太常博士柳宣以其事寢作歸敬書并偈檄譯經大德求畢其說於是法師明濬答還述頌并書極陳大教尊嚴而訓呂才妄舉柳宣得書即劾呂才列奏其事有旨集公卿領才詣慈恩寺見法師受辭悔謝而退慈恩傳十一月釋慧仙卒仙以華嚴涅槃二部為業時屢有灾疾求救者仙但令念佛無往不濟丙辰顯慶元正月丙寅立皇太子弘是日於慈恩寺齊僧五千員奘法師因請譯經監閲詳緝之官及慈恩寺侍郎薛元超奏其語制可是月壬申朝會中書崔敦禮宣敕曰大慈恩寺法師玄奘新翻經論文義須精宜令左僕射于志寧尚書來濟許敬宗侍郎薛元超李義府杜正倫時為看閲潤色朝罷遣給事王君德報法師承須友人助翻經已為處分其慈恩朕望自作不知師意如何奘奉旨即率衆詣闕抗表陳請未幾高宗親製文成遍示公卿辭略曰道光塵劫化洽生靈福已罪之群生興將滅之人代絲流法雨清火宅以辭炎輪升慧日皎重冥而歸晝朕逖覽緗史詳觀道義福永劫者其唯釋教歟文德皇太后乾精掩月坤維絶紐故載懷興緝創斯金地朕之虔心八正肅志雙林冀延景福式資冥助敬刻貞石式旌真境云三月庚申百僚奉表美揚聖製別詔禮部尚書許敬宗送文示奘法師甲子奘率徒詣闕奉表謝略曰陛下始悲奩鏡即創招提俄樹勝幢乃敷文律使祇園遺迹託寶思而彌高奈苑餘芳假瓊章而不朽奘以其文宜得聖筆自寫再表始許四月奘備幡輦梵儀扣芳林門迎御製勑太常九部樂并雜戲及王侯公卿送之帝御安福門樓觀奘導從以天竺法儀其徒甚盛帝望之大悅五月勑天下僧尼有犯國法者以僧律治之不得與民同科十一月天后難月命奘法師入宮祈福及分難神光滿宮自庭燭天因號佛光王即中宗也初帝嘗謂奘曰若生男子即聽出家至是奘奉表請許佛光王出家紹隆三寶制可十二月五日為佛光王度七人仍請奘法師為王剃髮丁巳二閏正月牛頭法融禪師終于建初寺壽六十四師頭顱巨大五嶽隆起眉目長廣顙頰濃張龜行鶴視聲氣深遠性能安忍罵辱不動寒不加絮暑絶追凉慈悲為懷道俗歸敬云高僧傳千歲寶掌和尚晚居浦江寶巖與朗禪師友善師以白犬馳書朗以青猿回使是年正旦自塑像竟即澡衣趺坐說偈而化師自稱住世已一千七十二年自魏晉間抵此土計之亦歷四百餘載五燈會元二月駕幸洛陽宮奘法師陪從四月駕幸明德宮奘亦陪從五月勑奘還積翠宮番譯九月表請入嵩山少林寺譯經手詔不允戊午三二月奘隨駕還京四月帝召僧道入內論義法師會隱立五蘊義法師神泰立九斷知義道士李榮黃壽不知名義茫然雖事往返而牢落無歸遂勑道士立義李榮立道生萬物義法師慧立以此道為是有知為是無知問之榮曰人法地地法天天法道既為天地之法豈曰無知立曰必若有知則合唯生於善何故亦生於惡既善惡升沉叢雜混生則是無知矣據佛窮理盡性之教則萬物是業衆生以業力故所感不同吾子不識妄言道生道實不生一何可憫榮無對赧然下座次道士黃壽登席立老子名義法師會隱奏曰壽不知諱忌豈可對陛下而公談祖諱壽亦慚汗而止於是慧立對帝廣宣因緣諸義帝悅而罷少選敕內給事王君德語道士何不學佛經於是榮等羞縮為之氣塞論衡六月十二日上創西明寺成十三日帝出繡像長幡送往安奉尋即下勑召僧道七人入帝幸百福殿內官引僧東道西俱時上殿帝曰佛道二教同歸一善然則梵境虗宗為於無為玄門深奧德於不德師等學照古今業光空有可共談名理以相啓沃復各賜坐又勑云法師可一人登座開題時道士張惠元奏云周之宗盟異姓為後今日立義道士不得不先又夷夏不同客主位別望請道士於先上座帝沉默久之慧立奏曰我佛德高衆聖道冠人天為三千大千之獨尊作百億四洲之慈父引迷拯溺唯佛一人此地未出娑婆即是釋迦之兆域惠元何得濫言客主妄定華夷陛下屈初地之尊光臨贍部受佛付囑顯揚聖化書云皇天無親唯德是輔惠元邪說未可為依勑云好可更遞上仍僧為先時會隱升座立無畏義道士七人各陳論難無足敘之次道士李榮開六洞義擬佛之六通立升論席曰夫洞者豈不於物通達無擁義邪答云是難曰若使於物無擁未委老君得洞否答云老君上聖何得非洞立曰若老君於物通洞者何故云天下大患為吾有身使吾無身吾何患也據此則老君於身尚礙何能洞於萬物榮無對乃云榮在蜀日久聞師名共師俱是出家人莫苦事非駮立曰先生此語似索孤息在外則可敘暄涼此席則須定邪正所云同是出家然檢形討事焉可同耶先生𩯭髮不剪褌袴未除手把桃符腰懸赤袋巡門猒鬼歷巷摩兒本不異於淫祀邪巫豈得同我清虗釋子榮怒云汝若以剪髮為好何不剔眉一種是毛也立曰一種是毛剔髮亦當剔眉卿何為角髮而不角髭耶榮無以對帝大笑諸僧辭退勑云好遂散還寺觀慧立自永徽元年參譯頻登闥贊潔齊行道所以導達功業光輝論道咸立之力也立本幽州僧故帝頻告奘云幽州僧大好至七日內勑鴻臚卿韋慶儉補充西明寺都維那七月詔迎奘法師入居西明寺十一月上以冬雪未降召僧道祈之因勑僧道入內於別中殿講道道士李榮立本際義法師義褒難之辭屈榮乃忸怩下席勑令褒登座褒乃立摩訶般若波羅蜜義道士張惠元辨難又辭屈復有姚道士覆難數番亦吞聲無難李榮復進褒俱挫之帝大悅論衡己未顯慶四年撫州刺史祖氏以亢旱率官庶香花步往二十里於東山迎行像其像本潭州失之尋其行路現二跡長三尺相去五百里其情虔篤三人捧之飄然應接返還州寺雨下沾足珠林是年曇逞津師示寂逞每好放生忽有多人著赤衣多鬚來云是綿竹所放生者自此廣化立放生池諸州凡造一百餘所又益州甘亭神威力嚴惡經祭難紀忽下巫語欲逞受戒乃將佛像在神下座于時神影自移本處向佛下座逞為受戒自爾祀日齊食而已又往劉備先主朝受戒所以蜀川神所逞行至者皆為受戒由此道俗歸依又於綿竹𮠁縣造三百尺大像祈求甚靈本傳十月制以玉華宮為寺追崇先帝詔奘法師居之庚申五禪師善伏一名等照生即白首出家聽講深於觀行多為鬼神授戒竝斷肉祭由是人神敬仰屠漁改業市無行肆是年坐逝三月西明寺靜之禪師遷逝嘗鼻患肉塞百方無驗有僧令誦般若心經萬遍恰至五千肉鈴便落本傳奘法師於玉華譯般若經駕幸東都勑召僧義褒慧立等赴洛遂至合璧宮見帝敘論稱旨勑停東都淨土寺褒即於彼講大品三論光價逾隆八月勑召僧靜泰道士李榮在洛宮中帝問僧老子化胡經之由泰奏云據晉代雜録及裴子野高僧傳皆云道士王浮與沙門帛祖對論每屈浮遂取漢書西域傳擬為化胡經又搜神記幽明録等亦云王浮造僞之過復與李榮辨難數番榮屢辭屈榮又云大道老君皇帝所尚汝何起自西戎而亂東夏泰云如來出現彼處為天中我皇御宇此間為地正佛法有囑委以皇王有感必通何論彼此後屢徵難以夜深乃散明日帝令給事王君德責李榮之論義無答由是失厝令榮還梓州道士之望唯指於榮既其對論失言舉宗落彩時泰以才辨見知復以賦詩稱賞上即勑所司敬愛寺可以泰居之及泰入寺頻登榮觀云論衡釋法冲正觀初年勑有私度者處以極刑冲誓亡身便即剃落時嶧陽山多有逃僧避難冲乃分僧兩處各置米倉十斛一所徒衆四十餘人純學大乘并修禪業經年食米如本不減一所五六十人才經兩日食米便盡由不修禪兼作外學冲曰不足怪也能行道者白毫之惠耳時逃難轉多無處投止山有虎穴冲詣告曰今窮客相投可見容否虎乃相擕而去及難解冲乃隨處弘法冲雖廣宣經術專以楞伽命家中書杜正倫每咨稟之時三藏元奘不許講舊所番經冲曰君依舊經出家若不許弘舊經者君可還俗更依新番經出家方許君此意奘聞遂止斯亦命代弘經護法強禦之士不可及也僕射于志寧曰此法師乃法界頭陀僧也不可名實拘之冲後旋東夏云本傳勑僧智琮迎岐山舍利乃感放光現瑞辛酉龍朔元京師普光寺僧明解性聰敏琴詩書𦘕時無與競然殢酒荒情顯慶間帝造西明寺令靈潤法師擇一人居之時有僚宷數人俱來潤所共薦明解潤曰公等宜求戒定慧學增長福田何乃舉酒客𦘕師以當洪寄官等愧退明解致憾俄而上徵四科不間道俗解應詔自舉射䇿升第喜不自勝未幾染疾自見數十人執猛炬迎解解大怖言未終而卒是年八月也後託夢於僧惠整曰明解為昔不遵內教今大受罪求惠一餐整覺乃設食夜夢解來謝之至二年秋間又托夢於𦘕工我以耽好外書今大受苦為我寫二三卷經復賦詩言別𦘕工乃為寫經後夢致謝云自鏡録九月帝幸高祖舊第天宮寺設齊度僧帝周覽悽愴久之統紀釋彥悰撰大唐京寺録傳十卷鋪述三寶靈迹壬戌龍朔二年四月幽州漁陽縣戍城火灾人家竝為煨燼唯二寺及但十佛像獨不延燎珠林帝下制僧尼道士冠官致拜君親四月大莊嚴寺僧威秀等上不合拜俗表略云僧等荷國重恩開以方外之禮得弘出俗之心自古帝王舉遵其度敬其變俗之儀全其抗禮之迹云云右相許敬宗等宣勑云勑令詳議拜否未定可待後集於是僧道宣等敘佛教隆替事簡諸宰輔五月十五日大集文武官僚總坐都堂議事時衆議紛紜議請拜者三百五十四人議請不拜者五百三十九人六月八日宣韶略云朕商確群議沉研幽𧷤然箕頴之風高尚其事遐想前代固亦有之自今後即不宜跪拜主者施行弘明集帝及后初幸并州童子寺大像高十七丈是年七月遣使送袈裟其像放大光明合城遷善珠林十二月八日於蓬萊宮召靈辨法師開淨名經題因令僧道辨難至十四日道士方惠長開老子經題靈辨難其道生萬物之義惠長屢無答辨乃奏曰靈辨忝預宗門實懷慈忍雖逢死不願重彈上大笑稱善靈辨自徽永中遊東都聲馳天闕尋勑住大慈恩寺屢入內論義上每優獎之論衡時釋慧明冬夏一服行止蕭然所去無戀常誦思益經時善導和尚入京廣化人念彌陀修淨業時在光明寺說法有告曰今念佛名定生淨土否導曰定生定生乃口誦阿彌陀佛聲聲相續每一聲則有一佛出其口中因出寺門上柳樹表合掌向西投身於地而逝本傳癸亥龍朔三泗州大士僧伽初自碎葉國遊于西涼復顯化洛陽本傳六月少常崔義起不信佛妻父蕭鏗善誦法華起妻以五月亡為修三七齊有婢素玉作夫人語云我受地獄苦由汝誦經然燈放暫歸至二十日又來將素玉去見夫人受火鑊之苦見蕭鏗坐花臺告素玉我女多嗔不信善惡今受此苦汝歸可語其夫兒為其修功德又僧教素玉誦金剛藥師法華經婢死三日方蘇後於麟德二年薛將軍宅齊僧請素玉誦冥授之經合衆訝為希有薛遂口奏天子歎曰冥道若此何得不信時朝貴聞者咸生大信云感通録十一月奘法師番大般若經成凡六百卷本傳天竺三藏那提此云福生永徽六年賫梵甲千五百部至京勑安置慈恩寺顯慶初勑提往崑崙諸國採藥是年還京擬廣宣譯所賫梵經竝為奘將北去惟譯三經而已尋即為真臘國請還然提乃龍樹門人深達實相所著大乘義論將事譯之被遣遂闕夫抱麟之嘆代有斯蹤知人難哉提挾道遠至投俾北冥既無所待乃三被毒載充南役崎嶇數萬不遂本志嗚呼惜哉僧傳甲子麟德元二月奘法師命弟子大乘光録所譯經論凡七十五部一千三百三十五卷總召門人造像設齊與衆辭訣令左右為念彌勒如來初五中夜右脅安臥而逝壽六十五帝輟朝三日宰僚悲咽有異僧奉香塗師體四月勑準世尊故事斂以金棺銀槨塔于東原弟子神泰元會隱慧立明濬義褒大乘光等皆法門龍象焉本傳乙丑二益州法聚寺有張僧繇𦘕地藏菩薩像是年七月寺僧圖得一本放光展轉圖者類皆放光僧慧昱圖寫荊州長沙等瑞像至京在都堂放光聞見發心各𦘕供養珠林二月皇太子為二聖於西明寺造銅鐘一口可一萬斤丙寅乾封元丁卯二二月西明寺道宣律師在淨業寺一天神至致敬問其姓字稱姓王名璠是吳之蘭臺臣為南方天王韋將軍下使者復有天來姓羅是蜀人廣說律相次又一天姓費禮敬如前云韋將軍有三十二將最存弘護因問律中隱義無不決滯復問此國名山聖迹皆答之又有天人姓陸名元暢來謁師因問穆王時化人事及五臺山諸像因緣一一備答法苑八月宣律師示寂有詔傷悼勑天下寺並圖形塑像以為標範宣姓錢氏初母孕之夢僧謂孕祐律師也及出家性與道合所至必感神物翊衛供奉天饌嘗中夜行道臨砌蹶且仆有少年介胄擁持之因問是誰曰弟子博叉天王子張瓊也以師戒德高妙故來給衛耳宣遂廣問佛法之事瓊一一言之及別授宣佛牙并寶掌二物表信而隱師撰內典録三寶感通録佛道論衡釋迦譜四分羯磨續高僧傳廣弘明集八部八十一卷見行于世戊辰總章元召僧道會于百福殿定奪化胡經真僞百官臨證議論紛紜僧法明曰老子化胡成佛之際為作華言化之為作胡語誘之耶若作華言則胡人未善若作胡語則既傳此土須假番譯未審化胡經譯於何代筆授證義當復為誰於是舉衆愕然無能應者公卿列辟咸服其切當欣躍而罷勑搜天下化胡經焚棄不在道經之數既而道士柏彥道等奉表乞留詔曰三聖重光玄元統敘豈忘老教偏意釋宗朕志欵還淳情存去僞理乖事舛者雖在親而亦除義符名當者雖有冤而必録自今道經諸部有記及化胡事者竝皆削除有司條為罪制隱子論曰初魏道士姜斌等撰太上開天經盛言化胡事及與曇謨最對辨斌服其妄而名臣甄鸞者乃著笑道論三十六篇掊擊化胡成佛之謬今載藏中至隋僕射揚素曰老子安用化胡為佛何不化胡為道此言尤足揭其謬又言老子初化胡胡不從乃令尹喜作佛語化之胡乃從此則先已有佛而老子不能化胡佛能化胡也己巳二年釋通達住京師律藏寺一裾一帔布納重縫所著麻鞋經三十載繒帛雜飾未曾冠體冬夏一服不弊氷炎僕射房元齡以父師事之正觀以來稍顯神異往至人家歡笑則吉愁慘必凶或索財物即須依送若違其語後失過前將軍薛萬鈞迎之供養百餘日後欲入內宿薛打之達曰身血不淨可作湯洗乃脫衣入沸鑊中狀如冷水遂合宅驚奉時逢米貴欲設大齊命寺家多令疏請至旦赴者數千而供度閴然忽有食膳連車而來食訖人車不見本傳庚午咸亨元辛未二年西京法海寺英禪師有異人來謁曰弟子知有水陸齊可以利益幽明自梁武歿後因循不行今大覺寺有具僧義濟藏此儀文願師往求以來月十五於山北寺如法修設苟釋狴牢敢不知報英公尋詣義濟得儀文以歸即以所期日於山北寺修設次日曛暮向者異人與十數輩來謝曰弟子即秦莊襄王也又指其徒曰此范睢穰侯白起王剪張儀陳軫皆秦臣也咸坐本罪幽囚陰府大夜冥冥無能救護昔梁武帝於金山寺設此齊時前代紂王之臣皆免所苦弟子爾時亦暫息苦然以獄情未決不得出離今蒙吾師設齊弟子與此徒輩并列國諸侯衆等皆乘善力將生人間慮世異國殊故此來謝言訖遂滅自是儀文布行天下作大利益賾禪師葦江集義淨法師年三十七往西域求經壬申三年五祖弘忍大師開化於蘄州黃梅破頭山時六祖乃嶺南盧居士名慧能年三十二來參祖曰來求作佛祖曰嶺南人無佛性曰人有南北佛性豈然祖異之曰著槽廠去能入碓方服勞經八個月師告衆各述一偈語意冥符則衣法皆付神秀上座書偈云身是菩提樹心如明鏡臺時時勤拂拭莫遣惹塵埃師見曰依此修行亦得道果能聞之亦令人於秀偈側書曰菩提本無樹明鏡亦非臺本來無一物何處有塵埃師見之故曰此誰作亦未見性即於是夕潛呼能至告曰諸佛出世為一大事因緣隨機小大而引化之遂有三乘等法然以微妙祕密正法眼藏付于迦葉展轉傳授以至於吾吾今授汝聽吾偈曰有情來下種因地果還生無情既無種無性亦無生能跪受畢又曰衣止汝身勿復傳也且當遠引俟時行化逢懷且止遇會即藏能禮辭通夕南邁師由是三日不上堂衆疑問之師曰吾道行矣又曰衣法誰傳師曰能者傳之衆知盧居士也尋已不在相率追之趕至大庾嶺頭能置衣鉢於石慧明上座先至舉之莫能動即曰我來求法不求其衣六祖乃曰不思善不思惡正當恁麼時還我明上座本來面目明大悟曰密語外還更有意旨否六祖曰我今與汝說者即非密也汝若返照密却在汝邊六祖令向北接人六祖後至曹溪又被惡人尋逐乃晦迹於四會懷集之間四年隱於獵人中常為獵人說法獵人悟者甚衆癸酉四神僧萬回法師初幼時能三千里致兄書朝往暮歸因號萬回帝乃度為沙門甲戌上元元乙亥二五祖弘忍大師忽告衆曰吾今事畢時可行矣即入室安坐示寂壽七十四塔于東山代宗諡大滿禪師據五燈録及正宗記謂師武德甲申七歲遇四祖至此年示寂壽七十四必訛誤也若謂此年壽七十四則甲申年二十三矣若甲申年七歲則此年止壽五十八非前誤則後誤丙子儀鳳元正月六祖到廣州法性寺值印宗法師講涅槃經時有風吹幡動一僧云幡動一云風動祖乃云非幡動非風動仁者心動二人言下大悟印宗詢之即執弟子禮乃為六祖落髮請智光律師授以大戒丁丑二六祖徙居韶州雙峯曹溪寶林寺刺史韋據請於大梵寺說法座下僧尼道俗一千餘人刺史官寮等三十餘人是日廣說頓教門人法海抄録流行今壇經是也戊寅三涅槃經茶毗後二卷乃南海波陵國若那跋陀羅此云智賢為沙門會寧於波陵國也麟鳳年自南海寄歸達交州後附經入京是年沙門靈會方於東宮啓請施行釋教録己卯調露元正月信士杜行顗譯出佛頂勝呪經一卷顗京兆人儀鳳中行鴻臚寺典客署令顗妙通梵語因罽賓僧佛陀波利獻尊勝經帝乃詔令譯之今在藏庚辰永隆元辛巳開耀元南天竺有菩提流志為西域宗師帝聞風而悅之因使西域有詔敦請太子文學權無二述釋典稽疑十條以問興善復禮法師禮乃撰十門辨惑論二卷以釋之衆疑頓遣此雖一時之酬答實為萬代之龜鏡也見行于世壬午永淳元五月日照再譯最勝陀羅尼經此本多誤慈恩法師窺基卒壽五十一有詔傷悼御製𦘕像贊勑葬樊川北渠近奘公之塋基貌碩心慈嘗造玉文殊像及金寫大般若經皆獲瑞應初宣律師以弘律感天厨供饌每薄基三車之玩不甚為禮基嘗訪宣其日過午而天饌不至及基辭去天神乃降宣責以後時天曰適見大乘菩薩在此翊衛嚴甚故無自而入宣聞之大驚於是遐邇增敬焉先是奘公親授西域戒賢瑜伽師地唯識宗而基盡領其妙天下目為三乘法相顯理宗謂之慈恩教隱士孫思邈卒善莊老陰陽醫藥之術尤重釋典世稱孫真人焉癸未洪道元十二月高宗崩中宗即位初北印土罽賓國沙門佛陀波利此云覺護儀鳳元年至五臺清涼山逢一叟問曰爾來何為曰欲禮文殊曰曾持佛頂尊勝呪來否曰未也曰此土衆生犯四棄者多能回取呪以流此土作大利益弟子當示師文殊所在叟忽不見波利乃返本國取呪至於長安有旨命杜行顗及日照三藏番譯譯訖賜利䞋絹三十匹至是利又將梵本訪西明寺僧順貞奏共譯出名尊勝陀羅尼乃第三出也與杜令譯者大同小異比諸衆譯此最弘布波利即入五臺後不知終法師元暉卒暉字道世撰法苑珠林一百卷今在藏則天皇后甲申光宅元年二月廢中宗為廬陵王則天臨朝稱制乙酉埀拱元年幽中宗于房州懷義修白馬寺丙戌二年泉州黃守恭宅園中桑樹忽生白蓮花因捨宅為寺今開元寺是也方輿勝覽丁亥三年天竺地婆訶羅此云日照自天皇儀鳳初至京譯密嚴等經至是年共譯十八部三十四卷天后親製序今在藏戊子四年后延神僧萬回入宮賜錦衣令宮女給侍己丑永昌元年于闐沙門提雲般若此云天智是年至京謁帝于洛勑於東寺番經庚寅天授元年九月改國號周沙門法明等十人詣闕上大雲經盛稱則天當代唐主閻浮提則天大悅賜十沙門紫方袍銀龜袋頒經于天下諸州各建大雲寺辛卯二年勑升釋氏在道教之上天智至是共出經論六部壬辰長壽元年仁儉禪師師至見乃仰視帝良久云會麼帝曰不會師云老僧持不語戒言訖而去一云天冊萬歲乙未年翌日進短歌十九首后覽而嘉之厚加賜賚今唯了元歌一首盛行于世師即騰騰和尚也癸巳二年天竺達摩流支此云法希天后改為菩提流志此云覺愛初天皇遣使邀之是年至京即於佛授記寺譯經一十九部二十卷沙門釋慧智父乃印土人故諳兩土言音三藏地婆訶羅提雲般若寶思惟等所有番譯皆召智為證兼令度語是年自譯讚觀音頌一卷釋教録甲午延載元乙未太后加號慈氏改元證聖又加天冊金輪大聖皇帝改元天冊萬歲勑釋明佺等刊定經目撰録十五卷今見在后聞于闐國有梵本華嚴大經即遣使往求之并請善梵學者一人隨來於是于闐國主以實叉難陀此云學喜妙善華嚴宗旨遣赴命則天見之大悅是年三月詔入大遍空寺同菩提流志復禮等番譯後移於佛授記寺譯經則天時幸其寺親受筆削時施供饌焉五月義淨法師還自西域所遊三十餘國往來二十五年得經論四百部舍利三百粒天后親迎于上東門外幡樂導引安置佛授記寺勑令番譯初共實叉難陀譯華嚴經久視已後方自番譯丙申萬歲通天元詔沙彌康法藏於太原寺開示新華嚴宗旨方緒經題感白光自口而出成蓋停空萬衆歎異有旨命京城十大德為藏授滿分戒賜號賢首詔入大遍空寺參譯經本傳詔嵩嶽惠安禪師與神秀禪師至都肩輿入殿親加跪禮奉于宮禁朝夕問道尊為國師勑當陽山創度門寺以旌其德時王公已下及京城士庶聞風爭來謁見望塵拜伏日以萬數舊史詔有番僧樂住者所在配住時泗州大師不欲異凡乃於楚州龍興寺隸名適議建佛殿大師忽言吾助五百貫問在何間答言非遠乃到江畔見數船至師招住後船責云無心濟物已是愚迷何故劫人更加傷害若不捨施汝必遭刑舟人遂捨五百貫哀求救護尋遭楊子縣擒捕囚在囹扉欵問已實甘心待死惟想江邊大師疑是觀音聖者乃志心想念師忽現雲中慰曰但知專念不必它憂罪欵既圓於案中恩赦忽流於天下實為寒灰發焰朽骨生肌矣本傳丁酉神功元年泗州大師或宴坐於深房或振鍚於長路水灑石師之口盡療于母牙疼瓶擲裴公之房頓瘳辛氏疢疾施扇則畢令風濤無害慈幼則趙母病苦自痊不施駿馬則孫令墜馬而亡不施鈔鑼則裴氏浣鑼而沒後與門人慧儼誓願遊方離山陽而道俗攀依到淮陰則舟航稽首莫不停帆獻供息棹焚香請降臨而不來無邀迎而忽至本傳戊戌聖曆元年召廬陵王還己亥二年十月譯新華嚴經成八十卷則天親製序御太極殿宣示百官本經庚子久視元年詔斂天下僧錢日一文聚作大像於白馬阪狄仁傑等上疏切諫則天不納舊史八月婆羅門李無諂譯出不空罥索經一卷乃祕教總持之要辛丑長安元年則天將建大像御史張廷圭上疏切諫則天召見賜以金帛而慰喻之唐史詔賢首法師法藏於東都佛授記寺講新華嚴經至華藏世界品感大地震動即日召對長生殿問帝網十重六相之義藏敷宣有緒又就指殿隅金師子為曉則天豁然領解由是集其語目為金師子章初儼尊者傳杜順華嚴宗旨藏侍儼盡傳其教及儼去世藏以巾幘說法於是耆德抗表乞度為僧凡藏落髮受具皆則天特旨藏沒清凉國師澄觀傳其教學者宗之目為一念圓融具德宗謂之賢首教壬寅二年萬回公所至顯化玄宗在蕃嘗私謁回回撫其背曰五十年太平天子可自愛睿宗為相王每將出回必告市人曰天子來少頃而相王至其神異類如此癸卯三年義淨法師以久視元年至是年譯光明等經二十部百十五卷天后製新番聖教序則天鑄像之費將具李憍疏諫后不納是冬像成率百僚禮祀舊唐史甲辰四年正月實叉譯入楞伽經七卷功畢今在藏此比諸本尤為詳明實叉至此總譯經論一十九部一百七卷實叉難陀辭還于闐詔遣御史霍嗣光送還覩貨邏國沙門彌陀山此云寂友初共實叉難陀譯經是年譯無垢淨光經一卷乃辭帝還帝厚遣之中宗乙巳神龍元正月大臣等請太后傳位太子中宗即位太后徙居上陽宮帝帥百官上太后尊號曰則天大聖皇帝復國號曰唐流宰相房融于高州四月中宗降御札召曹溪六祖入京其辭曰朕請安秀二師宮中供養萬機之暇每究一乘二師並推讓云南方能禪師密授忍大師衣法可就彼問今遣內侍薛簡馳詔迎請願師慈念速赴上京師以表辭疾願終林麓薛簡曰京城禪德皆云欲得會道當旨禪定未審師所說法如何祖曰道由心悟豈在坐耶簡曰弟子回朝主上必問願師指示心要令得明道祖曰道無明暗簡曰明喻智慧暗況煩惱倘不以智慧照破煩惱生死憑何出離祖曰若以智慧照煩惱者此是二乘小機簡曰何謂大乘見解祖曰明與無明其性無二無二之性即是實性實性者在凡不減在聖不增住煩惱而不亂居禪定而不寂性相如如名之曰道簡曰師說不生不滅何異外道祖曰外道將滅止生以生顯滅滅猶不滅生說無生我說本自不生今亦無滅所以不同外道汝欲知心要但一切善惡都莫思量自然得入清淨心體湛然常住妙用恆沙簡禮辭歸闕表上祖語帝咨美久之尋遣使賜袈裟瓶鉢等諭天子嚮慕之意天竺般剌密帝此云極量於廣州制止道場居止五月二十三日於灌頂部中誦出一品名楞嚴經彌伽爍佉此云雲峰譯成一部十卷宰相房融筆受沙門懷迪證譯傳經事畢密帝乃泛舶西歸出譯經圖記一云融遇密帝賫楞嚴梵夾至乃請之宣譯譯畢密帝復携梵本歸于天竺義淨法師至是又出孔等經四部六卷帝製序號大唐龍興三藏聖教序十一月則天崩年八十二十二月勑改韶州古寶林為中興寺丙午二年賜神僧萬回號法雲公僧慧範等加五品階二月大通禪師神秀示寂勑葬龍門葬日給羽儀鹵簿帝送龕至便橋中書令張說製略曰師謁忍禪師服勤六年乃居於玉泉寺東之山學者如市久視中詔請而來敷坐覲君肩輿上殿屈萬乘而稽首灑九重而宴居傳聖道者不北面有盛德者無臣禮遂推兩京法主三帝國師仰佛日之再中慶優曇之一現然處都邑每帝王分座后妃臨席鴛鷺四匝龍象三繞聖敬日崇朝恩代積當陽初會之所置寺曰度門尉氏先人之宅置寺曰報恩師生於隋末百有餘歲僧臘八十云云時岐王範及徵君盧鴻一皆勒製碣舊唐史有傳賜僧諡號自是始也法師義淨隨駕歸京勑於大薦福寺別置番經院處之又菩提流志隨駕歸京勑於西崇福寺安置譯寶積等經創發題日於大內佛光殿帝親御法筵筆受經旨妃后同觀百僚侍坐求之古人無以加也賜慧安國師紫衣仍延入禁中供養是年帝及皇后公主多營佛寺八月詔天下試童行經義挑通無滯者度為僧試經為僧自此而始寶思惟至是年譯罥索等經共七部九卷自是更不譯經唯專禮誦丁未景龍元詔改中興寺觀為龍興勑韶州刺史重飾寶林中興賜額曰法泉寺六祖新州舊居為國恩寺帝召義淨法師入內并同番經沙門九旬坐夏帝以昔居房部幽厄無歸祈念藥師遂蒙降祉因於大佛光殿勑淨等譯藥師經二卷帝御法筵手自筆受釋智嚴于闐國王之子幼至大唐早居榮祿授大將軍封郡公神龍二年五月請捨宅為寺勑允其請又固請出家十二月二十四日墨制云人之情也莫不貪惜祿位卿之願也乃欲棄俗出家忽省來奏嗟賞兼懷特遂所祈式成高志是年十一月五日帝生辰剃落仍請住終南山至相寺虗心修道自是多預番譯釋教戊申二年遣使詔于闐實叉難陀再至京師帝降蹕迎勞備法儀迓之載以青象安置薦福寺詔泗州僧伽大士入宮帝稱弟子三台聞法百辟歸心復館于薦福寺在京數月忽大旱帝請大士至內殿求賜甘雨師曰無須別物只要御瓶才傾瀉於瓊津便大雱於甘雨矣帝為度慧儼慧岸木叉三人為侍者帝親書所居寺額曰普光王先送歸淮本傳嵩嶽元圭禪師居嶽之龐塢一日嶽帝詣師稽首乞戒師乃授以五戒復示無心則無戒無佛無衆生之旨神復請願效所能師曰吾觀身無物觀法無常了然更有何欲神曰師必命我為世間事展我神功使已發心未發心信心不信心等人目我神蹤知有佛有神有自然非自然者師曰東巖寺之障莽然無樹北岫有之汝能移北樹於東嶺乎神曰既聞命矣恐昏夜必有喧動願師無駭即作禮辭去師門送之見儀衛雍雍陵空隱沒是夕風雷震蕩拂旦和霽則北山之松盡移東嶺森然行植焉傳燈録己酉三年二月帝賜慧安國師摩衲師辭歸嵩嶽三月師誡其徒曰吾歿後將尸置寒林中恣野火焚之至八日合戶偃身而寂壽一百二十八其徒奉命舁尸林中果野火至闍維之得舍利八十粒五粒最巨而紅光奪目詔入留禁中禪師法儀琅邪王之子也上求琅邪之後扶風太守獲之館于後堂奏名于朝大守夫人欲妻以女儀堅拒不許至於浴室自斷其陰婢子遽呼救之守高其操執事之及赴京引見帝命襲琅邪王爵儀具以本志懇辭帝嘉之聽從便召律師道岸入宮為妃主授歸戒因留禁中別日帝至諸師咸避席岸獨逡巡長揖而已帝高其量圖形林光宮御製八句贊之通論睿宗庚戌景雲元六月改泗州大士三月示寂神采如生勑就薦福寺塑身建塔忽穢氣滿城帝祝之許送歸淮即異香郁然傾都歎異遂奉全身歸泗州普光王寺建塔帝嘗問萬回曰僧伽何如人回曰觀音大士化身耳大士壽八十三初三十年在於本國五十三年在於此方前後化緣二十七處神迹非一具見行狀六月中宗崩明皇誅韋后等奉睿宗即位時義淨法師於大薦福寺譯浴像等經論至是又出二十部八十八卷李嶠張說等潤色僕射韋巨源蘇等監譯菩提流志正譯寶積至是帝復於北苑白蓮華亭及大內甘露等殿別開會首帝亦親筆受王瑨賀知章等潤色中書陸象先魏知古等監譯帝外總萬方內崇三寶御筆製序標於經首八月高祖舊第興聖寺有柿樹久枯至是忽重榮因大赦天下賜百官封爵普度僧道數萬十月實叉難陀示寂闍維舌根不壞詔送歸于闐建塔辛亥二年三月詔嵩山僧一行赴闕行辭疾不赴遁入荊州當陽山行初究太玄經義次傳天台僧算術次入嵩山參普寂禪師宗旨及遁當陽又從律師惠悟學毗尼凡經籍一覽畢世不忘舊唐史四月下詔曰釋典玄宗理均迹異拯人化俗教別功齊自今聚集僧道宜齊行並集初太宗以老子為皇宗升於釋氏之上至則天朝復在釋氏之下今此已往遂為永式令僧左道右齊班竝集云舊唐史十月詔神僧萬回入宮館于集賢院給二美人奉事十二月忽求閿鄉河水左右莫得又曰穴堂前地可得也得之回飲水畢湛然而逝贈司徒虢國公圖形集賢院法師義淨是年又出佛功德等經論二十一卷太常卿薛崇胤監護壬子先天元年七月傳位于太子玄宗永嘉真覺大師名玄覺博貫三藏參曹溪六祖一見語合祖即印可師遽告歸祖少留一宿故號為一宿覺焉及回永嘉學徒奔萃因著證道歌一篇以警未悟師復預期冥感即時定中觀見字字化作金色滿虗空界是年師示寂一云先天二年葬于松臺山今淨光也李雍為作神道後憲宗元和中杜守賁一云柳守賁愛其證道歌輒發地視軀完如生因為營塔僖宗時郡守朱褒狀表其事賜諡無相大師塔號淨光師有妹曰玄機亦參六祖今淨居祖師也師之證道歌梵僧傳歸天竺翻譯彼皆欽仰目為東土大乘經師又著禪宗悟修圓旨十篇及觀心十門見傳于世皇朝太平興國中有進其遺集者唐太宗悅之剃其進者賜銀百兩使歸植衆并給賜茶山許自置田贍僧衆祥符中賜御書山水圖𦘕一百餘軸見永嘉編及諸録
