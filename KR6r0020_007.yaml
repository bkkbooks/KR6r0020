body:
  text: 宋括山一菴釋本覺編集明羼提居士畢熙志較訂唐姓李都長安傳二十一主凡二百九十年禪于後梁高祖神堯太武皇帝淵戊寅武德元隋越王侗魏李密夏竇建德梁蕭銑凉李軌秦薛舉定揚劉武周吳李子通楚林士弘五月高祖即位乃於朱門南衢之上普建道場設無遮大會六月命僧道各六十九人於太極殿七日行道散席之日設千僧齊辨正論皇運之始天步猶艱薛舉直指於豳岐王充擁甲於河洛自餘偏裨蜂飛蝟峙國家守本鋭意誅除然於佛教崇敬彌篤雖末年順傅奕之請下沙汰之詔實志在護持及建成之變而即停其詔初何傷焉內典録己卯武德二鄭王世充殺侗僭位夏梁凉唐滅之梁王梁師都定揚吳楚四祖道信大師說法于螺川統紀鄭御史鄭頲弃官為僧世充怒而斬之臨終詩曰幻生還幻滅大幻莫過身安心自有處求人無有人僧傳庚辰武德三鄭夏梁梁王滅定揚吳楚帝初造靈仙寺庶子李百藥製又造會昌寺勝業寺慈悲寺證果寺集仙尼寺造像書經備修淨福又捨舊第為興聖寺并州造義興寺竝堂宇輪奐像設嚴華又為太祖元皇帝元貞太后造旃檀等身像三軀於慈悲寺供養辨正論帝制十大德統舉僧尼辛巳武德四滅鄭滅夏滅梁梁王吳楚六月有太史令傅奕先是黃巾深忌佛法上廢佛法事十有一條云釋經誕妄言妖事隱損國破家未聞益世請胡佛邪教退還天竺凡是沙門放歸桑梓則還淳返朴李孔之化行焉疏奏帝雖信佛而無果斷乃下詔問曰棄父母之鬚髮去君臣之章服有何利益幸請釋之有釋法琳即陳對曰琳聞至道絶言豈九流能辨法身無像非十翼所詮但四趣茫茫漂淪欲海三界蠢蠢顛墜邪山諸子迷以自焚凡夫溺而不出大聖為之興世至人所以降靈遂開解脫之門示以安隱之路中天王種辭恩愛以出家東夏貴遊厭榮華而入道於是毀形以成其志故弃鬚髮美容變俗以會其道故去君臣華服雖形闕奉親而內懷其孝禮乖事主而心戢其恩澤被冤親以成大順祐沾幽顯豈拘小違上智之人依佛語故為益下凡之類背聖教故為損此其大略也傅氏所奏有司不行奕乃多寫表狀流布遠近琳乃著破邪論二卷用擬傅詞盡析其謬朝野咸誦之琳又上啓儲后諸王及公卿侯伯等故奕奏狀因之遂寢釋教録壬午武德五滅梁滅楚漢東劉黑闥吳釋法運常修禪觀誦七佛呪救護皆應社廟鬼神悉參歸戒至是化往本傳李大安被殺死夢佛像摩其刀瘡即獲復生珠林癸未武德六漢高道吳杜伏威時釋慧琳言事多驗常供養塑像忽生鬚三十六曾為人呪病得差病者令女賫裙以施女留衣而送直琳遙見曰但將裙來我不要錢女驚其聖僧傳甲申武德七滅漢滅吳天下一統四祖遷住淮西破頭山攝五祖弘忍出家初有道者在蘄州西山栽松四祖曰吾欲傳法汝已年邁汝若再來吾尚遲汝道者遂諾乃往黃梅縣周家女子托生女子初在溪畔浣衣道者告欲寄寓女有許諾之意歸而有孕父母惡而逐之女無所歸傭紡里中已而生一子以為不祥因拋於水中明日見之泝流而上遂舉養之隨母乞食至七歲四祖出逢之喜而問曰子何姓曰姓即有不是常姓曰是何姓曰是佛性曰汝無姓邪曰性空故祖知其不昧乃求於其母携歸出家五燈禪師僧定卒師初感風癘禪坐數年所苦忽消身首圓淨眉長數寸乃成奇相本傳乙酉武德八二月帝釋奠於國學堂置三座擬敘三宗召三教學者雲集釋慧乘登座高張義網王臣悅服又道士言道能生佛佛由道成乘曰佛出周初聃生周末相去三十許王所經三百餘載豈有昭王時佛而退求敬王時道哉道士曰靈寶經有太上大道先天地生勃洞虗之中煒燁玉清之上是佛之師也乘曰五帝之前未聞天尊之道三王之季始有老聃之名漢景已還方興道學窮今討古道者為誰案周易一陰一陽之謂道此理數之道何能生佛豈有頭戴金冠身披黃褐𩯭垂紫髮手執玉璋別號天尊居大羅之上獨名大道治玉京之中山海之所未詳經史之所不載大羅既烏有之說玉京本亡是之談謬之甚矣言畢下座舉朝屬目道士一衆默然而退舊史及僧傳丙戌武德九傅氏毀佛不愜其情重施密譖搆扇黃巾用為黨類道士李仲卿上十異九迷論道士劉進喜上顯正論皆貶量佛聖眩惑君心至是奕前後七上疏請除釋氏帝春秋高而優柔無斷四月帝以其疏付群臣雜議大臣皆言佛法興自纍朝弘善遏惡冥助國家理無廢弃獨太僕卿張道源附奕稱其奏合理宰相蕭瑀庭斥奕曰佛聖人也奕為此議非聖人者無法請置嚴刑奕曰禮本於事親佛逾城出家逃背其父瑀非出於空桑而返尊無父之教臣聞非孝者無親瑀之謂矣瑀合掌曰地獄正為此人設也唐史帝復以奕疏頒示諸僧時釋明槩乃作決破傅奕謗佛毀僧事八條釋法琳又著十喻九針破李仲卿十異九迷之謬門下典儀李師政著內德論三篇皆陳佛化之益時傅奕云云未決及諸僧著論合李黃門內德論同進于朝帝由是悟奕等譽道毀佛為協私大臣不獲已遂兼汰二教之濫者而見施行焉五月辛巳詔曰釋迦闡教清淨為先遠離塵垢除去貪欲所以弘宣勝業修植善根開導愚迷津梁庶品是以敷演經教撿括學徒調伏身心捨諸染著自大覺遷謝道法流行末代陵遲漸以虧濫乃有猥賤之侶規自尊高游墮之民苟避徭役妄為剃落託號出家嗜欲無厭營求不已事同編戶迹等齊人進違戒律之文退無禮典之訓每罹憲網自蹈重刑瀆玷真如虧損妙法譬夫稂莠有穢嘉苗類若淤泥泥乎清水又伽藍之地本曰淨居近代以來多立寺舍不求間曠之地唯趨喧雜之方徒長輕薄之心有虧崇敬之義且老氏垂化本貴冲虗養志無為遺情物外全真守一是謂玄門驅馳世務尤乖宗旨朕膺期御宇興隆教法志思利益情在護持欲使玉石區分薰蕕有辨長存妙道永固福田正本澄源宜從沙汰諸僧尼道士女冠有精勤練行守戒律者竝令就大寺觀居止供給衣食不令乏短其不能精進無行業弗堪供養者悉令罷道各還桑梓所司明為條式務依教法違制之坐悉宜停斷京城留寺三所觀二所其餘天下諸州各留一所餘悉毀之六月四日庚申秦王世民以府兵平內難高祖乃以秦王為皇太子付以軍國政事癸亥大赦天下停前沙汰二教詔八月甲子高祖遜于位稱太上皇太子即位是為太宗舊唐史僧祖琇論曰傅奕毀黷釋氏之疏當時正議大臣皆鄙其說獨內官張道源稱其合理高祖雖曰聽之及觀其詔始終皆推美吾道特汰去僞濫有虧大教者耳令下閲月而太宗升儲位即停其詔天意人事良有以夫其李師政著內德論并序略曰若夫十力調御運法舟於苦海三乘汲引坦夷途於火宅勸善進德之廣六經所不逮戒惡防患之深九流莫之比但窮神知化其言宏大而可驚去惑絶塵厥軌清邈而難蹈華夷士庶朝野文儒各附所安鮮味斯道自非研精以考真妄沉思而察苦空無以立匪石之信根去若亡之疑蓋或謂三王無佛而年永二石有僧而政虐損化由於奉佛益國在於廢僧苟明偏見未申通理博考興亡足證浮僞何則亡秦者胡亥時無佛而土崩興佛者漢明世有僧而國治周除佛寺而天元之祚未永隋弘釋教而開皇之令無虞盛衰由布政治亂在庶官歸咎佛僧實非通論且佛惟弘善不長惡於臣民戒本防非何損治于家國若人人守善家家奉戒刑罰何得而廣禍亂無由而作騏驥雖駿不乘無以致遠藥石徒豐未餌焉能愈疾符堅喪師非道安之無智石氏興虐豈浮圖之不仁但為違之而暴亂未有遵之而凶虐由此觀之亦足明矣但信隨聞起疑因解滅凡百輕毀而弗欽皆為討論之未究若探賾索隱必皆深信篤敬矣謹著論三篇辨惑第一明邪正之通蔽通命第二辨殃慶之倚伏空有第三破斷常之執見辨惑一篇略曰有辨聰書生謂忠正君子曰釋迦生於天竺修多出自西胡名號無儔於周孔功德靡稱於典謨實遠夷之尊敬非中夏之師儒建摩騰之入漢及僧會之遊吳顯舍利於南國起招提於東都自茲厥後乃尚浮圖沙門盛洙泗之衆精舍麗王侯之居既營之于塽塏又資之以膏腴王公大人助之以金帛農商富族施之以田廬其福利之焉在何遵崇之有餘未若銷像而絶鐫鑄貨泉可以無費毀經以禁繕寫筆紙不為之貴廢僧以從編戶益黍稷之餘稅壞塔以補不足廣賑恤之仁惠欲詣闕而效愚忠上書而獻斯計切謂可以益國利民矣吾子以為何如乎忠正君子曰是何言之過歟余昔篤志儒林措心文苑頗同君之言論由聞法之遲晚賴指南以去惑幸失途之未遠子若博考而深計亦將悔迷而知返切聞有太史令傅君者又甚余曩日之惑焉請辨傅君之惑言以釋吾子之邪執傅謂佛法本出西胡不應奉於中國余昔同此惑焉今悟其不然矣夫由余出自西戎輔秦穆以開羈業日磾生於北狄侍漢武而除危害臣既有之師亦宜爾何必取其同俗而捨於異方乎師以道大為尊無論於彼此法以善高為勝不計於邇遐若夫尚仁為美去欲稱高戒積惡之餘殃勸為善以邀福百家之所同九經無以易但褊淺而未深至齷齪而不周廣其恕己及物孰與佛之弘乎其覩末知本孰與佛之遠乎其勸善懲惡孰與佛之廣乎其明空析有孰與佛之深乎由此觀之其道妙矣聖人之德無以加焉豈得生於異域而賤其道出於遠方而弃其寶夫絶羣之駿非唯中邑之産曠世之珍不必諸華之物漢求西域之名馬魏收南海之明珠物生遠域尚於此而為珍道出遐方獨奈何而可弃若藥物出於戎夷禁呪起於胡越苟可以蠲邪而去疾豈以遠來而不用之哉夫滅三毒以證無為其蠲邪也大矣除八苦而致常樂其去疾也深矣何得拘夷夏而計親疏乎況三千界內中在彼域不在此方矣傅計詩書所未言以為修多不足尚余昔同此惑焉今又悟其不然矣夫天文曆象之祕奧地理山川之卓詭經脉孔穴之診候針藥符呪之方術詩書有所不載周孔未之明言然考之吉凶有時而徵矣察其行用而多效矣且又周孔未言之物蠢蠢無窮詩書不載之法茫茫何限信乎書不盡言言不盡意何得拘六經之局教而背三乘之通旨哉夫能事未興於上古聖人開務於後世故棟宇易橧巢之居文字代結繩之制飲血茹毛之饌則先用而未珍火化粒食之功雖後作而非弊彼用捨之先後非理教之通蔽豈得以詩書早播而得隆修多晚至而當替人有幼噉藜藿長餘粱肉少為布衣老遇侯服豈得以藜藿先獲謂勝粱肉之味侯服晚遇不如布衣之貴乎傅譽老子而毀釋迦讚道書而非佛教余昔同此惑焉今又悟其不然也夫釋老之為體一而不二矣同蠲有欲之纍俱顯無為之宗老氏明而未融釋曲言臻其極道若果是佛固同是而無非佛若果非道亦可非而無是理非矛盾之異人懷向背之殊既同衆狙之喜怒又似葉公之愛畏抑又死生無窮之緣報應不朽之旨釋氏之所創明黃老未之言及不知今之道書何因類於佛典論三世以勸戒出九流之軌躅若目覩而言之則同佛而等其照若耳聞而放之則師佛而遵其說同照則同不當非相師則師不可毀譽道而非佛何謬之甚哉傅謂佛是妖神寺為淫祀此其未思之甚也妖唯作孽豈弘十善之化魅必憑邪寧興八正之道妖猶畏狗魅亦懼猫何以降天帝之高心摧天魔之神力自昔東漢至我大唐代代欽崇賢賢敬奉至于宰輔冠蓋人倫羽儀王導庾亮之徒戴逵許詢之輩置情天人之際抗迹煙霞之表竝稟教而皈依皆厝心以崇信豈容尊妖奉魅以自屈乎良由覩妙知真使之然耳夫大士高僧觀於理也深矣明主賢臣謀於國也至矣而歷代寶之以為大訓何哉知其窮理盡性道莫之加故也傅氏觀不深於名僧思未精於前哲獨師心而背法輕絶福而興咎乎且大覺窮神而知化深觀過患而豫防惟百齡之易盡嗟五福之難常命川流而電逝業地久而天長三途極迍而杳杳四流無際而茫茫憑法舟而利濟藉信翮以翱翔宜轉咎而為福何罔念而作狂也傅引孝經之不毀傷以譏沙門之去鬚髮謂其反先王之道失忠孝之義余昔同此惑焉今悟其不然矣若夫事君親而盡節雖殺身而稱仁虧忠孝而偷存徒全膚而非義割股納肝傷則甚矣剔鬚落髮損乃微焉立忠不顧其命論者莫之咎求道不愛其毛何獨以為過夫聖人之教有殊途而同歸君子之道或反經而合義則泰伯其人也廢在家之就養托採藥而不歸棄中國之服章依剪髮以為飾反經悖禮莫甚於斯而仲尼稱為至德何也雖迹背君親而心忠於國家形虧百越而德全乎三讓故泰伯弃衣冠之制而無損於至德則沙門捨搢紳之容亦何傷乎妙道雖易服改貌違臣子之常儀而信道歸心願君親之多福苦其身意修出家之衆善遺其君父延歷劫之深慶其為忠孝不亦多乎傅云趙時梁時亦有僧反況今僧尼無律者衆此又不思之言也若以昔有反僧而廢今之法衆豈得以古有叛臣亂民而棄今之士夫黎庶乎夫青襟有罪非關尼父之失皂服為非豈是世尊之咎但以人稟頑嚚之性而不遷於善非是經開逆亂之源而令染於惡何因怒惡而及善咎人而棄法人有可誅之罪法無可廢之過但應禁非以弘法不可以人而賤道切篤信于妙法不苟黨於沙門至於耘稊稗以殖嘉苗肅奸回以清大教所深願矣傅云未有佛法之前人皆淳和世無篡逆此又未思之言也夫九黎亂德豈非無佛之年三苗逆命非當有法之後夏殷之季何有淳和春秋之時寧無篡逆而一毫之盜佛猶戒之豈長篡逆之亂乎一言之競佛亦防之何敗淳和之道乎惟佛之為教也勸臣以忠勸子以孝勸國以治勸家以和弘善示天堂之樂懲非顯地獄之苦不唯一字以為褒豈止五刑而作戒乃謂傷和而長亂不亦誣謗之甚哉亦何傷於佛日乎但自淪於苦海矣輕而不避良可悲夫於是書生心服而色愧避席而謝曰僕以習俗生常違道自佚忽於所未究玩其所先述背正法而異論受邪言以同失今聞佛智之玄遠乃知釋教之忠質豁然神悟而理攄足以蕩迷而祛疾雖從邪於昔歲請歸正於今日矣其通命一篇以佛之所云業也儒之所謂命也命係於業業起於人人稟命以窮通命隨業而厚薄原始要終合而通之尤為警絶空有一篇廣明頓漸遍析色空洞徹精微辭多未能具載弘明集太宗丁亥正觀元年帝自即位欽奉慈門廣興利益開四等之日遍燭堯雲揚六度之風橫流舜雨意欲永空囹圄長息烽煙蠢蠢羣生同歸仁壽茫茫率土共奉真如是春命京城僧尼竝於當寺七日行道齊供所須有司准給散齊之日總就大興善寺辨正論帝嘗謂傅奕曰佛道微妙聖迹可師且報應顯然屢行徵驗卿獨不悟其理何也奕曰佛是西方桀黠誑耀彼土及入中國邪僻之人取莊老玄談飾其妖幻之語無益於民有害於國帝惡其言不答自是終身不齒舊唐史帝捨終南山太和舊宮為高祖置龍田寺後為翠微寺帝以釋明贍善識治方詔入內殿升御床齊食訖對詔廣列帝王制御之術兼陳釋門大極以慈救為宗帝大悅因即下敕年三月六普斷屠殺後於行陳之所皆置佛寺云本傳十一月天竺波羅頗迦羅密多羅此云作明知識一曰波頗此云光智至京初帝聞其名遣高平王往可汗葉護國請來至是勑住興善寺道俗咨詢上召見問法對揚無爽賜宮禁新納并綵段等自是供給慰問勞接殊倫釋教録釋智晞初受智者禪旨居佛隴修禪創造伽藍欲搆經臺感香爐山神獻木是年十二月十八日加坐而逝臨終誡徒巳云吾習禪已來四十九年背不著床本傳戊子正觀二年三月帝因追念初平天下時年誅千餘人恐滯幽扄即以御服施諸寺僧禮懺薦擢乃發詔曰自隋末創義志存拯溺北征東伐所向平殄凡所傷殪難可勝紀手所誅剪將近一千切以如來聖教深尚仁慈禁戒之科殺害為重爰命有司京城諸寺為建齊行道七日七夜竭誠禮懺所有衣服竝用檀捨冀三途之難因斯解脫萬劫之苦藉此弘濟唐史法師智滿隋初弘法白黑多從受菩薩戒又往鴈門川依瓚禪師修禪法大唐建義乃率侶入城高祖勑止許公宅中武德元年詔以滿所居為義興寺三年勑住京室受業數百人是年六月卒師之清德高潔具見本傳九月帝下詔曰神道設教慈惠為先玄化潛通亭育滋始朕恭膺大寶撫愛黎元矜憫之心觸類而長是用傍求冥貺幽贊明靈所冀九功惟序五福斯應比嚴霜早降秋實不登靜言寡薄無忘慙愓今百谷資茂萬寶將成猶恐風雨失時子養無寄敢藉聰明外慈多祉宜為溥天億兆仰祈加祐可於京城及天下諸州寺觀僧尼道士等七日七夜轉經行道每年正月七月例皆准此帝心既感聖力冥扶雖一年旱二年蝗三年以往坐致太平矣辨正論等釋明贍隱居太一山智炬寺冬十月知命將盡入京就興善寺設齊辭訣即返智炬精勤想觀告侍者曰阿彌陀佛來也怡然而逝焚身既訖骸骨圓全都無縫道當其頂上紫色曄然遂塔于巖法師元琬道行純備慧學該洽是年帝詔入宮為妃嬪及皇太子諸王等授菩薩戒本傳己丑正觀二年正月降勑京城僧尼於當寺每月二七日行道轉仁王大雲等經以為常式辨正三月帝以諸有非樂物我皆空眷言真要無過釋典因波頗止京乃下詔所司搜揚碩德兼間三藏備舉十科者一十九人於大興善寺創開傳譯沙門玄謨等譯語崛多律師證譯法琳惠明等執筆承旨慧乘等證義又勑僕射房元齡給事杜正倫尚書李孝等參助詮定光祿大夫太府卿蕭璟總知監護百司供給四事豐足釋經録六月召密州明淨禪師入京祈雨大通有旨度僧三百人統紀詔以通義宮皇家舊宅宜捨為尼寺仍以興聖為名庶神道無方微神凱風之思弘明十一月勝光寺主僧珍奉勑就宮迎釋迦繡像一格并菩薩聖僧金剛等像於勝光寺供養辨正釋元奘天性早慧經論造微每慨已布之典雖蘊𮌎襟未至之經當求具覿遂厲志往西域焉是冬詣闕陳表帝制不許奘即私遁自原州出玉關抵高昌葉護可汗等國而去閏十二月癸丑詔曰有隋失道九服沸騰朕親總元戎致茲明罰其有桀犬嬰此湯羅銜鬚義憤終乎握節各狥所奉咸有可嘉切恐九泉之下尚淪鼎鑊八難之間永纏氷炭愀然疚懷無忘興寢所以樹立福田濟其營魄可於建義以來交兵之處為義士凶徒殞身戎陳者各建寺剎招延勝侶望法鼓所振變炎火於青蓮清梵所聞易苦海於甘露所司量定處所并立寺宇具為事條以聞稱朕矜哀之意舊史庚寅正觀四年天下大治米斗三文帝於正月有旨於勝光寺命諸寺大德四十九人經三七日行道慶諸繡像日滿設千僧會王公竝來行香辨正四月波頗譯寶星經十卷訖法琳製序謂此經乃如來初證覺道度目連身子及降伏魔王護持國土說此經也是年四方壁壘咸置伽藍如破薛舉立昭仁寺豳州破王世充立昭覺寺洛州破劉武周立弘濟寺汾州破宋金剛立慈雲寺晉州破霍老生立普濟寺呂州破竇建德立等慈寺鄭州破劉黑闥立昭福寺洛州竝官給供度佛事弘敞勑虞世南李伯藥褚遂良顏師古岑文本許敬宗等分撰新寺志內典録四祖道信大師遊牛頭山時懶融居其中祖見之問曰在此何為曰觀心祖曰觀者何人心是何物融無對因再拜請示心法祖曰百千法門同歸方守河沙妙德盡在心源定慧神通悉自具足無三界可出無菩提可求汝但任心自在莫作觀行亦莫息心觸目遇緣皆是佛之妙用融曰既不作觀行於境起時如何祖曰境緣無好醜好醜起於心心若不強名妄情何由起妄情既不起真心任遍知祖授法已歸于雙峰五燈十月慧乘法師示寂乘釋蒙據道護法為心身歷三朝政移六帝頻升中殿面對天顏英德推崇公卿歸敬冬法師道遜一云道遜因人請講涅槃及發題已告四衆曰云何偈後請寄來生遂依文敘釋至偈而逝一云止師子品至品果終送柩于山忽有異花繞尸而生長一二尺可五百莖本傳釋法嚮止江北海陵寺能預知灾福嘗有虎搏人嚮喚住令放虎即放之為諸虎說法皆相隨而遠去嚮是冬示寂辛卯正觀五年帝為穆太后於慶善宮造慈德寺又於昭陵立瑤臺寺敕法師元琬於苑內德業寺為皇后寫藏經又於延興寺更造藏經竝委琬監護經部詳正自琬始也梁州安養寺慧光弟子母貧以子故袈裟製其內衣忽雷震而死題其背曰由用法衣不如法也僧傳遂州趙文信暴死復蘇云至閻羅所問何業對曰不讀佛書唯好庾信文集王曰識之否信曰不識王令引庾信至乃見大龜一身多頭作人語云我生時好作文誹謗佛法故受斯報信寤具述其事遂州人多好獵因此共相勸戒改業持經法苑壬辰正觀六年帝詔以太原舊第為天宮寺追奉穆太后於臺城西真女城內為穆太后又造弘福寺辨正五月五日萬回法雲公生於虢州閿鄉張氏釋灌頂自大業中止天台山定慧兩修語默雙化是年八月七日終於國清壽七十二初頂化流囂俗神用弘方有村人染患將絶頂為焚香轉法華經疾者聞香入鼻即愈嘗於章安攝靜寺方講涅槃經有群海賊至寺忽見持弓執戟人皆丈餘賊即驚退靈應非一且智者詞旨能持能領者唯頂一人本傳十月波頗譯般若燈論十五卷訖法琳作序有曰是論乃佛滅七百年後分別明菩薩之所作也以如幻之心鑒非有之物了物非物則物物性空知心無心則心心體寂窮無生理究實相源云法師元琬戒德馳聲僧尼受具戒者三千餘人王公僚佐百姓受歸戒者二十餘萬有巫者見授戒之際常有鬼神承受是年造普光寺召琬居之杜如晦尊琬之道常詢法要及臨終召琬願為其世世之師僧史癸巳正觀七年春波頗譯莊嚴論十三卷訖敕庶子李伯藥為序又敕各寫十部散流海內仍賜頗等束帛百段帝既踵輪王十善化世國內諸市悉斷屠行普禁民間不許宰殺江南之地立寨取魚三十餘州及其破堰取魚恆沙億數又降敕旨悉廢除之又屬歲阜時和普度僧尼三千人因太子染患衆治無效敕延波頗入內一百餘日帝每詢法要太子疾愈頗辭出本寺賜綾帛六十段等辨正四月波頗示疾因分散衣資造諸淨業端坐而逝三藏玄奘自離唐抵罽賓大林以至麴闍國與胡商八十人渡殑伽河彼俗以人祀天奘與諸商被執將戮奘以祭俄大風作塵沙漲天晝日晦瞑彼衆震懼以奘為聖人遂釋之至中天竺遇大乘居士為開瑜伽師地入王舍城止那蘭陀寺寺七寶所成僧以萬數奘從上方戒賢論師窮探大乘祕奧日益智證釋道昂嘗於夜講無燈昂舉掌發光明照堂宇故其勝道難測常願生安養是年八月見西方法樂來迎趺坐而逝詳見本傳釋法曠卓然正色三衣一鉢外一無受畜人有與語唯言離著以末代根機隨塵生染故也是年捨身而逝本傳甲午正觀八年釋法琳志存護法因道士劉李等竝作庸文謗毀正法琳乃著辨正論十二篇一三教治道二十代奉佛三佛道先後四釋李師資五十喻六九針七氣為道本八信毀交報九品藻衆書十出道僞謬十一歷世相承十二歸心有地窮釋老之教源極品藻之名理東宮學士陳子良注之并製序云論在藏明字函律師惠璉深明機要貞觀初任雲華寺上座又下令徵入普光綱理僧倫是冬遷寂本傳十月智琰法師遷寂琰行業精進感瑞非一宵爐未爇自起煙芬夕罐才空潛加溢水又修彌陀十六觀蜀川綿竹釋寶瓊其邑奉道不奉佛瓊欲化之值其衆會不禮而坐彼曰不禮天尊何也瓊曰邪正道殊所奉各異天尚禮我我何禮老君乎衆議紛紜瓊曰吾若下禮必貽辱也一拜而道像動搖二拜而連座倒地衆遂禮瓊一時回信是年瓊卒乙未九春帝下詔斷殺起於三月盡於五月法師元以仁育兼濟乃上啓更延帝又特聽盡于歲暮四月律師智首卒首深於律部自律法東闡六百許年傳度歸戒多迷體相五部莫分二見交雜首乃著五部區分鈔二十一卷自隋文以來獨步京輦其知名唐世者皆首之汲引正觀八年召為弘福上座至是遷寂皇上哀悼勑令百司供給喪事自隋至唐僧無國葬創開模楷時共重之僕射房元齡詹事杜正倫并諸公卿竝親盡哀訴崇戒範也官給地十畒於京城西原墳之種松千株許敬宗為云十月律師法礪卒礪生而牙齒全具迄于終老中無齓毀堅白逾常講律四十餘遍製四分疏等本傳十一月詔曰三乘統轍濟度為先八正歸依慈悲為主流智慧之海膏澤羣生剪煩惱之林津梁品物事符積善理叶至仁朕欽若金輪恭膺寶命大聖之規無幽不察至德之訓無遠不思欲使人免蓋纏家臻仁壽比緣喪亂僧徒減少華臺寶塔窺戶無人紺髮青蓮櫛風沐雨眷言凋毀良用憮然其天下諸州有寺之處宜度僧尼數以三千為限其州有大小當處所度多少有司詳定務取德業精明其往因減省還俗及私度白衣之徒若行業可稱通在取限云云舊唐史丙申十皇太子問張士衡曰事佛營福其應如何對曰事佛在清淨仁恕如貪𢛓驕虐雖傾財事之無益且善惡必報若影赴形為臣忠為子孝則福祚永反是則禍至矣時太子有逆志故士衡因對以針之八月詔相州律師惠休赴京講法休辭疾不赴休嘗曰吾見盛名宗匠未有不奉法而循道者能無希驥乎由是六時行業彌勵一鞋三十年不棄每曰解心易起塵境難消卒年九十八釋道英開皇中初入太行山寺修止觀次住京師勝光寺入定稍呈異迹嘗任直歲與俗爭地忽倒仆而死俗誓不敢諍尋即起坐又入水宴坐六宿方出又值氷厚雪壯乃曰此平淨處何得不眠仰臥三宿方起晚住蒲州普濟寺一日講起信論至真如門奄然氣絶知者曰此入滅盡想耳纍日方起是年九月令誦華嚴至臨終勸念善處乃逝壽八十靈異非一法師元琬致書於皇太子以要務四條力勸遵行初行慈二減殺三順氣育生四奉齊太子答以所示妙法四科用深銘佩至十二月琬示寂遺表陳聖帝明王賞罰三寶不濫痛憫沙門犯法不應與民同科乞付所屬以僧律治之并上安養論三德論一卷帝嘉納有詔傷悼遣太子臨吊卿相重臣致哀厚賻闍維之際從者如雲四十里間皂素充道七衆彌山一心悲結仍於焚所建佛塔一區李伯藥製本傳丁酉十一勑召法恭法師赴洛對揚法要特詔留住京師四事資給雍州牧魏王遙加欽請以為戒師朝野歸敬詔老子國家先宗號位宜居釋氏之先法師智實等詣闕申理以為道士宗三張符水醮籙之事非出於老子不宜居僧之上帝雖然其言而以尊祖而止戊戌十二正月釋智實於總持寺辭衆而逝實眉間白毫數寸光映頦顙三衣瓶鉢常不離身不入市廛不執錢寶中間以護法忤時還俗兩載貞觀初勑再為僧志行嚴肅道俗依附終後三原信士方三十餘里皆為立靈廟本傳二月八日子時六祖惠能大師示生八月皇太子集諸宮臣及三教學士於弘文殿闡法有令召法師慧淨開法華經又遣道士蔡晃與師抗論晃問經稱序品第一未審序第何分淨曰如來放光現瑞此其序也第者為居一者為始晃曰第者弟也為弟則不得稱一言一則不得稱第兩字矛盾何以會通淨曰向不云乎第者為居一者為始先生既不領前宗謬陳後難便是自難何成難人晃乃請為重釋淨謂其愚迷不領銼折數番晃蒙慚而止皇儲怡然大笑合座歡躍令曰不圖法樂以至於斯淨頻入宮闈抗論無礙尋下令曰慧淨法師名行著聞請為普光寺主道俗歸敬僕射房元齡太常褚亮尤所敬重論衡釋文德姓徐預言未來事如對目年有凶癘者必先勸民禮佛設齊用其言者皆禳灾禍有不信者莫不殃終或遇旱言某日當雨則必雨既鑒符明鏡故多所獎勸是年示寂百姓為起塔焉己亥十三初尚書虞世南卒是年帝夢世南進𧩡言有如平生因下詔曰故禮部尚書文懿公虞世南德行純備志存忠益奄從物化忽移時序昨因夜夢倐覩斯人兼進𧩡言有若平生之日追懷遺美良用悲悼宜資冥福由朕思舊之情可即其家齊五百僧造佛像一軀舊史本紀釋曇榮自當法主春夏講教秋冬坐禪因刺史送舍利三粒乃誓衆請求總獲舍利四百餘粒遠近欽服貞觀七年行方等悔法寺僧僧定見光明中有七佛現皆云證其罪滅後一佛云我是釋迦為汝身器清淨故來授記曇榮於賢劫中名普寧佛汝當作佛名為普明斯瑞應也榮於是冬卒本傳冬有黃巾𥘿世英挾方術以邀榮遂程器於儲二素嫉釋種陰上法琳辨正之論謂謗皇宗帝勃然追訪琳身據法推勘琳乃自詣公廷輕生狥理乃縶以縲紲下詔問曰周之宗盟異姓為後尊祖重親實由先古何為追逐其短首鼠兩端廣引形似之言備陳不遜之喻犯毀我祖禰謗黷我先人如此要名罪有不恕琳曰皇天無親唯德是輔古人黨理而不黨親雖親有罪必罰雖疏有功必賞老子道德加於百姓謙光形于四海嘗云吾師名佛佛者覺一切人也乾竺古皇西升逝矣討尋老教始末可追今劉李所述謗滅老子之師故著茲論竝陳史籍前言實非謗毀家國自後辨對二十餘列竝據琳詞具狀聞奏勑云據所著論有念觀音者臨刃不傷且赦七日令爾自念試及刑期能無傷否琳至限滿忽有勇見敕至問云赦期已滿當至臨刑有何所念念有靈否琳曰隋季失德四海沸騰自皇王弔伐載清海陸斯即觀音救難之力也琳自七日已來不念觀音唯念陛下帝又遣問琳有詔令念觀音何因不念乃云惟念陛下琳答伏承觀音至聖垂形六道上天下地皆為師範然大唐光宅四海陛下子育恆品如經即是觀音既其靈鑒相符所以唯念陛下且琳所著正論爰與書史符同一句參差任從斧鉞陛下若順忠順正琳則不損一毛陛下若刑濫無辜琳則有伏尸之痛以狀奏聞遂不加罪有勑徙于益部僧寺琳所著記論詩章合三十餘卷故其遺文往行可為萬代宗轄後卒于關寺壽六十九道俗營葬勒銘云實録時御史韋悰審秦英飾詐乃奏彈之勑逮入大理竟以狂慝被誅公私怪其死晚論衡釋洪滿初在俗患雙足攣躄常念觀音經三年忽有僧來問從何來僧曰檀越常喚所以來滿因問弟子往何罪今受此攣躄僧曰汝前身拘縛物命餘殃致爾汝閉目吾為療之滿乃瞑目但覺兩膝上如拔六七寸丁去開目將欲謝之失僧所在起行如故乃悟是觀音也自是誓不娶妻精修禪觀或經七日開皇初為僧是年卒壽八十三本傳釋智苑以石寫經藏諸石室欲造佛堂以山無木忽暴雨漂木千株至焉是年苑卒僧傳庚子正觀十四庚下勑曰佛道形像事極尊嚴伎巧之家多有造鑄供養之人競來買贖品藻工拙揣量輕重買者不計因果止求賤得賣者本希利潤唯在價高罪纍特深福報俱盡違犯經教竝宜禁約自今已後工匠皆不得預造佛像賣鬻其見成之像各令分送寺觀從衆酬其價直舊史杜順法師少為隋文帝所重給月俸供之或人有病順對之危坐少頃即愈或聾者順與之言耳即聰或啞者順與之語即能言或狂而㒹者順向之禪坐彼即拜謝而去又嘗臨溪隨侍者懼不可濟順率同涉水即斷流其神跡類如此而順隤然初不以介意九邃華嚴宗旨太宗素敬重之常引入宮禁導迎善氣妃主戚里諸貴奉之有如生佛嘗集華嚴法界觀弟子智儼尊者傳其教是年五月示寂一云十五年八月卒相國蕭瑀梁明帝子也自武帝以來家世奉佛清修瑀及其孫勉精嚴尤甚太宗即位屢入相嘗乞度為僧尋以不能而止凡事兩朝五入相位年七十四薨唐史稱之曰梁蕭氏興江左實有功在民厥終無大惡以寢微而亡故餘祉及其後裔自瑀逮遘八葉宰相名德相望與唐盛衰世家之盛古未有也本傳釋慧稜能講法忽夢人曰閻王莊嚴道場請師講法至十月半遂示微疾其夜有人告曰法師早起燒香使人即到曰何人曰閻王使迎稜即起燒香禮佛還房奄爾而逝僧傳一云正觀二十年有青衣報天帝請講經即示寂遠近聞空中鼓樂迎從聲釋慧瑜初入玉泉山寺側有泉旁作草菴宴坐二十三年泉神供奉時或見聞有黑蛇長二丈隱顯現身如守護相羣賊雖來無敢近者有十賊至蛇張目出光賊徒皆倒兩日後瑜知而往救七人已死蛇隨瑜行為誦大品大明呪訖三人方活後道俗請出升覺寺講法是年七月合寺同見羣星入井不測其故八月講大品至往生文未訖手執如意於座而逝釋靜琳自武德間皂白歸依尚書杜正倫等名臣竝誓為弟子是年十月遷寂焚之唯舌不壞師一生節儉衣壞則以紙補之飲食不言於美惡涕唾莫顯於口鼻敬謹之極兼以行位難測蚤蝨不歷於身逮至名高福重䞋錫日增竝委侍人口無再問斯實據道為務情無世涉可書末代足為師鏡本傳辛丑正觀十五年正月釋慧震嘗造石像高十三丈感象口放大白光是年設會寺中地下樹上皆生蓮花二月戊辰帝幸宏福寺召大德道懿五人賜坐喻以創寺為專一追崇穆太皇后言發涕零逡巡自製疏施綰二百匹自稱皇帝菩薩戒弟子令回向罷顧謂懿等曰頃以老子是朕先宗故令名位在前卿等應恨恨也懿曰陛下尊祖宗降成式懿等荷蒙國恩安間行道詔旨行下咸皆歡悅詎敢有恨帝曰佛道大小朕已久知釋老尊卑通人自鑑豈以一時在上即為勝也朕以尊祖重民有生之大本故先老子以別親疏之序非不留心於佛也自有國以來未嘗創立道觀凡有功德竝歸僧舍雖往日操戈臨陳亦未始縱威濫殺今所在戰場皆立佛寺至於太原舊第亦以奉佛朕存心如此卿等想未諭也懿等遽起趨謝帝曰少坐此是朕意不述則人不知天時向熱寺宇未備今所施物可別造經寮令衆僧寬展行道餘言多不載千歲寶掌和尚遍游江浙至是年返飛來石竇有行盡支那四百州此中偏稱道人游之句壬寅正觀十六律師慧滿專弘律訓不徇時情僧尼有過屢行顯擯常有鄰火延燒將及講室滿索水噀之即滅是年四月遷逝焚之唯舌不灰五月帝為太穆皇后追福手疏願文致弘福寺曰聖哲之所尚者孝也仁人之所愛者親也朕幼荷鞠育之恩長蒙族養之訓蓼莪之念何日云忘罔極之情昊天匪報昔子路歎千鐘之無養虞丘嗟二親之不待興言永慕但切深哀欲報靡因唯憑冥助敬以絹二百匹奉慈悲大道倘至誠有感冀消過往之愆為善有因庶獲後緣之慶弘明帝有旨為穆太后寫大藏經敕選法師十人博來善本校正是年奘法師發王舍城回入祇羅國國主郊迎之仍以象馬助奘䭾經而還釋慧持身長七尺色相光偉執持威容不妄回盻時目曰象王持隋末住越州弘道寺不出寺門將三十載加坐不臥講法不倦是年八月告衆曰吾欲往他方教化可急作食食已還房加坐而逝弟子謂言入定數日聞有異香方知久化本傳癸卯十七詔四祖道信大師赴闕使者三反祖堅臥不起第四度命使者曰如果不起即取首來使至山論旨師乃引頸就刃神色怡然使異之回以狀聞帝彌加歎慕就賜珍繒以遂其志釋慈藏新羅國人嘗有忉利天神受以五戒每以此法利益衆生正觀十二年至京敕止勝光別院供財繁積有盜者至將取物而心自驚返來露過師即授其戒有患盲者詣藏陳懺後還得眼由斯祥應從受戒者日有千計又入終南山架室居之人神歸集者又衆往還三夏將事東歸乃入京蒙敕慰問賜二百匹又賜衲一領雜綵五百段東宮賜二百段又藏以其國經像未全遂得藏經一部并諸妙象幡花蓋具堪為福利者賫還本國既達鄉壤傾國來迎一代佛法於斯興顯時豐干禪師寒山拾得相次垂迹於國清寺豐干先泊於大藏西北隅菴居因游松徑見一子可年十歲問之無家無姓師引歸寺庫收養號為拾得後有一貧士從寒巖而來遂號為寒山子三人相得歡甚豐干出雲游適閭丘胤出守台州欲之官俄病頭風召名醫莫瘥豐干偶至其家自謂善療此疾閭丘聞而見之師持淨水噀之須臾祛殄因是大加敬焉問所從來曰天台國清曰彼有賢達否曰寒山文殊拾得普賢當就見之閭丘至任三日後親到寺訪豐干遺迹謁二大士寺僧引至厨間丘拜之二士起走曰豐干饒舌彌陀不識禮我何為遽返寒巖次日閭丘送衣藥供養寒山見使至喝曰賊賊退入巖穴云報汝諸人各各努力與拾得入穴而其穴自合寒拾有詩散題山林間寺僧乃集之成集見傳于世本傳八月四日源州松昌鴻池谷忽有五石皆青質白文成字曰高皇海出多子李元王八十年太平天子李世民千年太子李治書燕山人士樂大國主仁邁千古五六七王七佛八菩薩及上果佛田天子等乃至為善原州奏了朝羣公擬字粲然明著十一月辛卯有事于南郊詔遣使以玉帛詣其谷祭之祖琇論曰瑞石文發於自然昭靈祚之永也舊史列于本紀而歐陽文忠刪入五行志以謂則天稱慈氏中宗號佛光王即佛菩薩之驗也夫唐有天下傳世二十唯武宗正信微薄餘皆佛法地位中人故七佛八菩薩及上果佛作世界主隨宜示現游戲生死耳奚止則天中宗而已哉見佛教通論甲辰十八四祖道信大師以法付弟子弘忍大師偈曰華種有生性因地華生生大緣與信合當生生不生遂以學徒委之五燈帝施行遺教經敕曰如來滅度以末代澆浮付囑國王大臣護持佛法然僧尼出家戒行須備若縱情放逸觸塗煩惱關涉人間動違經律既失如來玄妙之旨又虧國王受付之義遺教經是佛涅槃所說戒勒弟子甚為詳要末俗緇素竝不崇奉大道將隱微言且絶永懷聖教用思弘闡宜令所司差書手十人多寫經本務盡施行其京官五品已上及諸州刺史各付一卷若見僧尼業行與經文不同宜公私勸勉必使遵行文館辭林冬奘法師歸自西域師往還一十七周遊覽百有餘國乙巳十九正月丙子奘法師賫經像歸于京師留守房玄齡館于弘福寺以表聞帝壬辰奘如東都二月己亥見于儀鸞殿帝曰師去何不相報對曰當去時表三上以誠願微淺不蒙諒許無任至道之至乃輒私行專擅之罪惟深愧懼帝曰師出家與俗殊隔能委命求法惠利蒼生朕甚嘉焉固不煩為愧但念山川阻遠方俗異心怪師能達也帝因廣問雪嶺以西印度之境玉燭和氣物産風俗八王故迹七佛遺蹤竝博望之所不傳班馬無得而載者奘既親游其地記憶無違隨問而對皆有條理帝大悅曰師所經一百餘國可盡輟其山川風俗撰西域記以遺後來不亦美乎奘奉詔將罷帝謂侍臣曰昔符堅稱道安為神器舉國尊敬朕觀法師詞吐溫雅風節貞峻非徒不愧古人實過之遠甚司徒長孫無忌曰誠如明詔道安雖高行博識然弘法之功固不如法師躬趨聖域討論衆妙究探宗極矣時車駕將問罪高麗聞法師之還期暫引見及對談論不覺日暮帝曰匆匆言不盡懷欲共法師東行省方觀俗指揮之暇別更談敘可乎對曰玄奘遠歸兼有疹疾不堪陪駕帝曰師向能孤游絶域今此行如跬步耳尚何辭對曰陛下東征六軍奉衛伐亂誅奸必有牧野之功昆陽之捷元奘亡所助虗負道路之費且兵刃交戰佛制沙門不得觀視惟陛下矜察帝嘉納而止奘因奏西域所獲梵本經論六百五十七部乞就嵩山少林寺為國宣譯帝曰朕頃為穆太后創弘福寺竝為虗靜可就彼番譯所須竝與元齡平章奘因乞監門官以防釁隙帝曰師可謂保身之計當為處分及罷即勑留中房元齡專知監護資備所須一從天府是月帝自將兵征高麗五月奘入弘福寺譯經釋法聰在杭蘇開導是年嘉興縣高王神降其祝曰為我請聰法師受菩薩戒依言為授又降祝曰自今以往酒肉五辛一切悉斷後若祈福可請衆僧在廟設齊行道僧傳丙午二十正月大廟丞李思一暴死經日乃蘇言見冥官云年十九時嘗害生命一曰時在安州旻法師會下聽涅槃何緣於彼相害官追旻師有答旻生金粟界不可追且放還家既蘇有僧元通為一懺悔并勸誦金剛經五千遍至晚又死明日還蘇云冥官喜曰還家大作福德矣又旻師遣僧來說一於是時不曾殺害即放還云感通傳三月帝還至長安七月辛卯奘法師表上新譯菩薩藏經佛地經六門陀羅尼經顯揚聖教論大乘雜集論凡五部五十八卷請帝為聖教序丙申降手勑謙讓不許丁酉法師重抗表伸請制許之七月二十八日法師智凱執如意登座默然而逝師為時宗匠脅不親席不受供施州宰為起塔云時釋智則止辨才寺雖同僧住而房室蕭然衆號為狂者則笑曰道它狂者不知自狂出家離俗只貪衣食行住遮障鎖門鎖匱種種聚斂役役不安此而非狂更無狂者乃撫掌大笑又能分身兩處赴人之供竟夜唯端坐云僧傳丁未二十一帝得祕讖云唐三世而後女主代有天下遂召李淳風訪其事對曰臣據術推之其兆已成今在陛下宮中矣逾三十年當有天下海鹽縣鄱陽府君神因常祭降祝曰為我請法聰法師講涅槃經衆乃迎師就講神又降祝曰神道業障多有苦惱自聽法來身鱗甲內細蟲噉苦已得輕息願為我請師更講大品師乃復為講之高僧傳戊申二十二六月帝在玉華宮召奘法師見於玉華殿帝以法師德業冲博欲令罷道共康庶政對曰玄奘伏惟陛下經緯八紘之略崇闡雍熙之業天之所授無假於人一也崇儒尚德薄賦輕刑九州四海咸遂安逸此又聖心自化無假於人二也深仁遠洽四夷貢獻此又天威所感無假於人三也獫狁為患帝王莫制陛下御圖一征傾巢倒穴故知有道斯得無假於人四也高麗小蕃煬帝喪軍而返陛下提兵振旅俘馘數萬故知由主無假於人五也天地交泰祥瑞皆應德而至無假於人六也陛下縱復須才今亦伊呂多矣玄奘庸陋何足以預之至於守戒緇門闡揚遺法此其誠願伏乞天慈終而不奪帝曰師既欲敷揚妙道亦不固違高志帝因問比譯何經對曰瑜伽師地論帝曰明何等義對曰明彌勒十七地義及陳列大義帝深愛焉遣使取論入宮凡一百卷帝覩詞義宏奧謂侍臣曰朕觀法師新論猶瞻天瞰海莫極高深顧儒道九流猶汀瀅之方溟渤耳因勑有司揀祕書手寫新譯經論各九部令宣賜九道總管展轉流布冀率土之內同稟未聞之法司徒長孫無忌中書令褚遂良奏曰佛教冲玄天人莫測陛下至道照明建立三寶致法師陟險求經歸國番譯若菴摩之始說猶金口之新開皆陛下聖德所感臣等愚瞽預此見聞苦海波瀾舟航有寄況天慈廣遠使布之九州蠢蠢黔黎俱餐妙法臣等億劫欣逢不勝感幸帝撰大唐三藏聖教序成御慶福殿宣法師玄奘升殿賜坐勑弘文館學士上官儀對羣臣宣讀其辭略曰二儀有像顯覆載以含生四時無形潛寒暑以化物是以窺天鑑地庸愚皆識其端明陰洞陽賢哲罕窮其數然而天地包乎陰陽而易識者以其有像也陰陽處乎天地而難窮者以其無形也故知像顯可證雖愚不惑形潛莫覩在智猶迷況乎佛道冲虗乘幽控寂宏濟萬品典御十方舉威靈而無上抑神力而無下歷萬劫而不古運百福而長今妙道凝玄遵之莫知其際法流湛寂挹之莫測其源固知蠢蠢凡愚區區庸鄙投其旨趣能無疑惑者哉玄奘法師翹心淨土杖䇿孤征積雪晨飛途間失地驚沙夕起空外迷天窮歷異詢求正教引慈雲於西極注法雨於東陲聖教闕而復全蒼生罪而還福譬夫桂生高嶺零露方得泫其華蓮出緑波飛塵不能污其葉非蓮性自潔而桂質本貞良由所附者高則微物不能纍所憑者淨則濁類不能沾夫以卉木無知猶資善而成善況乎人倫有識不緣慶而成慶方冀茲經流施將日月而無窮斯福遐敷與乾坤而永大於是御筆親書綴于新經之首法師奉表致謝帝手勑答曰朕才謝圭璋言慚博達至於內典尤所未間昨製序文深慚鄙拙穢翰墨於金簡標瓦礫於珠林忽得來書謬承褒讚循躬省慮彌益厚顏善不足稱虗勞置謝時皇太子覩聖序遂撰述聖記法師進啓奉謝帝復覽新菩薩藏經愛其辭旨微妙因詔皇太子撰菩薩藏經後序其辭略曰蓋聞羲皇至精粹止於龜文軒后幽通雅奧窮於鳥篆考丹書而索隱殊昧實際之源徵録錯以研幾蓋非常樂之道猶且事光圖史振薰風於八埏德洽生靈激堯波於萬代伏惟陛下轉輪垂拱而化漸雞園勝殿凝旒而神交鷲嶺總調御於徽號匪文思之所窺極般若於綸言豈象繫之能擬猶是教覃溟表咸傳八解之音訓浹寰中皆踐四禪之軌遂使三千世界盡懷生而可封百億須彌入提封而作鎮校美前王焉可同年而語矣菩薩藏經者大覺義宗之要旨也法師玄奘番譯畢功余以問安之暇澄心妙法之寶奉述天旨微表讚揚式命有司綴于卷末帝自是情信日篤平章法義不輟於口與法師相得之深無時暫間衣服臥具頻詔換易如家人焉八月賜奘百金磨衲并寶剃刀奘奉表謝略曰忍辱之服彩合流霞智慧之刀銛逾切玉謹當衣以降煩惱之魔佩以斷塵勞之網帝自伐遼而還氣力不逮平昔有憂生之慮既遇法師留神大教稍遂平復因問欲植法門有益何者宣先奘曰衆生寢惑非慧莫啓慧芽抽植法為之資弘法須人即度僧為最帝悅九月詔曰隋季失御天下分崩朕屬當戡亂親履兵鋒亟犯風霜宿于馬上頃加疾餌猶未痊除數日以來方遂平復豈以福善之致耶京城及天下諸州寺各度一千人十月車駕還京師勑有司於北闕紫微殿西南創弘法院留奘居禁中晝則陪御談論夜分就院譯經十月吉州有事天尊者行三皇齊法表奏其經敕令百官議定咸斥其非勑以其經竝收取焚之其經改三皇為三洞惑誤昏俗故勦其妄云佛道實録十二月皇太子為文德皇后創大慈恩寺成請奘師主之制不許有旨別選五十大德是月太子備寶車五十乘迎諸大德綵亭寶剎城諸寺花幡導引入寺太子百官護送帝御安福門樓執爐致敬經像過盡始罷皇情大悅本傳己酉正觀二十三年四月幸翠微宮法師玄奘陪駕每談敘淵奧帝必攘袂曰與法師相值恨晚耳未盡弘法之意五月帝壽五十三高宗即位
