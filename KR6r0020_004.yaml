body:
  text: 宋括山一庵釋本覺編集明羼提居士畢熈志較訂南北朝宋劉氏都建康八主六十年國入于齊魏拓跋氏改姓元都雲中迁平城及洛陽十二君百四十九年分而為東西魏庚申宋高祖永初元西秦熾盤建弘元夏赫連勃勃二北凉蒙遜九西凉李恂北燕馮跋十二魏明元帝五六月宋高祖受晉禪即帝位殷憂稍移天步猶阻二年塗鯁四戰兵勞百虜暢於胷中萬機總於襟內不倦檀那之業常持護法之心手寫戒經口誦梵本造靈根法王等四寺供佛招賢帝甞收後秦尊奉僧導為之於金陵壽春立東山寺又迎佛䭾䟦陀羅於道場寺譯華嚴經是月羅譯華嚴六十卷畢是年曇無竭此云法勇法上招二十五人遊西域求經廬山道敬法師示寂壽五十一北凉釋僧龔及法眾僧伽陀譯經釋法和精通數論宋祖敕為僧主僧傳辛酉二二真興三元始十西凉為北凉滅太平十三大常六十月北凉曇無讖譯涅槃經四十卷方竟首尾八年追求三度譯圓四袠所闕尚多聞法何其艱哉讖頗善呪術所向皆驗甞告蒙遜云有鬼入境必多災疫遜不信欲躬見為驗讖即以呪加遜遜見而駭怖讖曰宜潔誠齋戒神呪驅之乃誦呪三日謂遜曰鬼已北去矣時境首有見鬼者云見數百疫鬼奔驟而逝既而北境之外疫死者眾境內獲安讖之力也遜益敬讖矣本傳壬戌三八月帝崩三四十一十四七竺道生初從什公受業關中僧眾咸謂神悟時涅槃後品未至生曰闡提皆當成佛此經來未盡耳於是文字之師誣生為邪說擯而遣之生白眾誓曰若我所說不合經義請於現身即見惡報若實契佛心願捨壽時據師子座竟拂衣入吳之虎丘山竪石為徒講涅槃經至闡提有佛性處曰如我所說義契佛心否群石皆首肯之後居廬山銷影巖岫聞讖譯涅槃後品至南京果言闡提皆有佛性生大慰喜尋即講說癸亥營陽王義符景平元四五十二十五八廬山周續之卒壽六十七又張詮卒壽六十五魏光祿卿崔浩被讒太武命浩以公歸第因脩服食養生之術初道士宼謙之奉真經二十卷獻于魏王朝野未之信浩獨師受其術太武由是迎謙之起天師道場道徒由此而盛孫道德常奉道而年過五十未有子息有僧謂曰必願有兒當志心誦觀音經德遂不事道而專歸誠觀音忽有夢應婦即有孕遂產男焉珠林甲子宋文帝義隆元嘉元五六十三十六魏世祖太武帝燾始光元佛䭾什此云覺壽於揚州譯五分律三十四卷魏太武初即位亦遵太祖太宗崇信之業每引高德沙門與共談論輿奉佛像散華致敬魏書凉曇無讖譯金光明經四卷乙丑二六夏昌承光元十四十七二廬山曇順法師示寂壽七十九夏赫連勃勃尊高己德昧乎聖人之道曰勃者佛也吾為佛也陳聖像於後坐令沙門朝集為己致拜天罰有罪是年為雷震而死國亦尋滅北山錄劉式之造文殊金像俄失之夙夜祈請經五年忽見佛座光發式之因拂拭牀帳乃見失像儼然具存感通傳丙寅三七二十五十八三沙門慧琳善談論帝與議朝廷大事遂參權要賓客輻湊琳遇賓客填咽喧涼而已孔顗慨然曰遂有黑衣宰相通鑑謝晦為領軍將軍鎮荊州患沙門僧昌於城內立塔湫隘雉堞躬役介夫令肆其武勇撞擊陊壞龕像摧殞欻有暴風連天雲霧作昏驍烈為之膽寒晦蒙被塵土以手拭去膚隨指落潰灡瘡痍體無完肌竟坐反狀召檀道濟討之兵潰擒送鄴都斬於都市夷其九族北山錄凉曇無讖譯經總十九部百二十一卷是年絕筆神僧杯度初出冀州神力卓越或扣氷而浴或著屐上山或徒行入市惟荷一蘆圌子有試舉者十餘人不能舉或見有四小兒者即四天王廣陵李家奉之頗久忽索袈裟李辨未至度云暫出至夜不歸及覔之在北巖下鋪敗袈裟於地臥之而死頭前脚後皆生蓮華邑共葬之後數日有從北來云見度負蘆圌行向彭城乃共開棺惟見鞾履既至彭城有黃欣者深信佛法見度拜請還家家至貧但麥飯而已度甘之怡然止得半年忽語欣云可覔蘆圌三十六枚欣辦至列之庭中度密封之因語欣令開錢帛皆滿欣受之皆為功德一年度辭去後東遊吳郡見釣魚者乞一乾魚手弄反覆投水即活又見網師更從乞魚綱師不與度拾兩小石投水中俄有兩牛鬪其網綱既碎敗不復見牛度遊止無定每分身應人之供吳郡民朱靈期自高麗還為風飄舶至一洲見一寶寺寺僧設食乃拜其僧乞速還鄉僧云去都二十萬餘里但能志心不憂不速乃問期云識杯度道人否答曰識因指壁有一囊掛錫杖及鉢云此杯度者今寄君鉢與之并作書著凾中復授青竹杖令置舫前閉船靜坐必令速至期迴舫如所示經三日至石頭淮而住期入淮至朱乃見杯度度開書大笑曰使我還那取鉢擲空還接之云我不見此鉢四千年矣其時南州陳氏奉度至虔是日早出至晚不還遂絕迹矣唯都下杯度猶去來山邑值人之病呪之即愈是年九月示寂人葬之建康覆舟山度闡化四十餘年後有人時見之如故本傳一本作朱齡石丁卯四八三十六十九四釋智嚴初請䟦陀入關橫為秦僧所擯嚴乃憩山東精舍義熈十三年宋武及王延請還都乃於東郊起枳園寺以居之嚴前還於西域所得梵經未譯至是乃共寶雲譯普曜等經十部三十一卷嚴清素寡欲納衣蔬食道化所被幽顯咸服本傳陶淵明卒壽六十三陶甞作搜神錄多載佛之靈驗禪師元高初居麥積山與曇弘友善得曇無毗之道河南王世子曼禮以為師後遊凉蒙遜禮遇尤勤魏太武遣使請高入于平城益加誠敬命入東宮令太子晃師事之魏書沙門曇始一曰惠始初師羅什東晉孝武末三輔人多宗之宋武滅秦留子義真鎮長安夏赫連屈勾追敗之道俗被坑戮而惠始接刃無傷屈勾大怒召始於前以佩劍自擊之又不能害乃懼而謝罪百姓免其酷毒始之力也至是魏大武平赫連昌始乃歸魏多所化導自初習禪至於沒世五十餘年未甞寢臥跣行泥水初不污足色踰鮮白世號白足阿練高允作傳釋慧觀初師廬山遠公後入關師什公觀思入玄微時曰通情則生融上首精難則觀肇第一宋武甚重之召止道場寺至是文帝時召講法戊辰五西秦暮末永弘元夏定勝光元承玄元二十神傳帝造禪靈寺常供千僧曇良耶舍此云時稱自元嘉至京常入禪或七日不起初止鍾山道林沙門寶誌崇其禪法舍譯藥王藥上觀無量壽二經以二經是轉障祕術淨土洪因也釋道冏作普賢齋有二僧來禮佛出門飛空而去己巳六二二二二十一二十月朔晝昏星現竟日天竺佛䭾䟦陀羅示寂于建鄴壽七十一一云十二年卒者非師譯經十三部百二十五卷凉釋智猛遊自西域往返二十年同伴十五人唯猛與靈纂二人達耳猛譯泥洹經二十卷曇無讖神異既多魏主聞名思一瞻禮遣使來迎凉王不許魏主再遣高平公李順䇿拜𫎇遜凉王加九錫諭之曰曇無讖道德廣大朕思一見可馳驛送至遜曰臣事朝廷無所負此臣師也有死則已欲往則不可也順曰朝廷欽王忠義故顯加殊禮今乃以一道人虧損大功不忍一朝之忿吐所不當言失朝廷待遇之意切為大王不取也遜曰如公之言誠美第恐情不副此耳遜竟不遣讖於是魏主衘之凉主蒙遜初於凉州南百里琢石崖設佛像或石或塑千變萬化遜又為母造丈六石像在于山寺是年因子世興攻罕而亡乃謂事佛無靈毀寺逐僧時將士入寺禮拜此像涕淚交流士驚還說之遜親往視像淚下若泉即稽首禮謝敬僧設會倍更精虔感通錄釋僧苞建普賢齋感祥瑞行業彌厲庚午七三二十二三天竺求那䟦摩此云功德鎧初遜國出家屬國諸王皆授其歸戒遊闍婆國其王欲出家事之群臣固請不可乃令國中曰若率土奉和尚歸戒即從爾請於是其國臣民稽首遵命元嘉初文帝聞名遣使航海往闍婆邀之附舶抵廣州詔聽乘驛詣闕師至始興留朞年於寺壁𦘕定光布髮等像夜輙有光師常在定累日不出或致雨不沾或履泥不濕或值虎以杖弄而去靈異無方道俗歸敬本傳闍婆國王遣使奉表曰宋國大主吉祥天子教化種智安隱眾生我雖在遠亦沾靈潤統紀辛未八西秦為夏滅夏為魏滅義和元昭成帝弘太興元四求那䟦摩帝有旨促之赴京正月至金陵引對帝迓勞殊勤時召之問道一日問曰寡人常欲持齋不殺以身應物不獲所願師幸教之摩曰道在心不在事法由己不由人且帝王所脩與匹夫異匹夫倘不克己苦節何以為用帝王以四海為家萬民為子出一嘉言則士庶咸悅布一善政則人臣以和形不夭命役不勞力則風雨時若百谷滋繁以此持齋齋亦大矣以此不殺利亦多矣安在輟半日之喰全一禽之命然後為弘濟耶帝撫几歎曰俗迷遠理僧滯近教如師之言可論天人之際矣帝自是尊之為師命居祇洹寺供給隆厚繼而於寺講法華經并十地品帝率公卿日集座下法席之盛前此未聞也摩即於寺譯菩薩善戒經等十八卷河東蒲坂城中火災民居蕩盡唯寺塔不焚而民家經像亦不燒一城敬信冥符記西秦四主四十七年譯經一百餘卷釋教錄壬申九北凉二北燕二魏延和元竺道生還都止青園寺宋文帝深加欽重因幸大莊嚴寺設大會帝親同眾御于地筵下食良久眾疑日昃帝曰日始午耳生即曰白日麗天天言始中何得非中舉鉢便食一眾從之帝大悅詔留生都下一時巨公王弘范泰顏延之竝挹敬風猷從之問道至甲戌十一年十一月於廬山精舍升于法座神色開明德音俊發論議數番窮理盡妙觀聽之眾莫不悟悅必見麈尾紛然而墜端坐正容隱几而化壽八十生有疏論世皆寶焉本傳尼智通嫁為梁氏妻擣練素經衣其兒遍體爛瘡出虫而死法苑癸酉十四月蒙遜卒子牧犍立永和元三二初孟顗事佛情懇每為謝靈運所輕運謂顗曰生天須在靈運前成佛必在靈運後顗衘之至是靈運降為臨川內史徙廣州而卒年四十九臨終有詩云萋萋後霜栢納納衘風菌邂逅竟既時脩短非所愍恨我君子志不得巖上泯送心正覺前斯痛久已忍云云弘明集等三月曇無讖知凉將滅固辭西歸凉主遜怒其去已密遣刺客中路害之初讖出關日謂送者曰業期至矣雖上聖不能逃也未幾遜心愧悔白日見鬼以劍刺之四月遜卒國亦尋滅僧傳釋僧弼甞從羅什參譯乃隨處闡化及居楚郢訓誘經戒大化江表凉王蒙遜甞遣使遺䞋通敬後下都止彭城寺文皇器重每延講說是年示寂甲戌十一二四三僧伽䟦摩此云眾鎧譯毗曇等論二十四卷竝文義詳允梵宋不差僧伽羅多哆此云眾濟自景平中至京宴坐林下翩然往來世莫親疎至是卜居鍾山剪棘開榛造立精舍即宋熈是也釋教錄十一月法綱法師卒弘明集釋慧琳有誄釋慧靜遊化徐兗貌黑而識遠時洛有道經與靜齊名而耳長大時曰洛下大長耳河東黑如墨有問無不酬有酬無不塞詳見傳北凉安陽侯沮渠京聲蒙遜弟也有清慧譯戒本等經二十二卷釋教錄乙亥十二三五太延元釋慧叡初遊西域還憩廬山師遠公俄入關從什公言稟後適宋京止烏衣寺講說眾經皆思徹言表彭城王義康請以為師祇奉戒法是年示寂壽八十五釋道昺示寂壽七十一京尹蕭謨之上言佛化被于中國已歷四代形像塔寺所在千數請自今欲造塔寺者皆當預報乃得為之帝不允宋史帝問侍中何尚之吏部羊元保曰朕無暇讀經因果之事昧然未究以卿輩時彥率皆信敬范泰謝靈運皆言六經法度本任濟世必求妙道當以佛經為指南比見顏延之析達性論宗炳難白黑論其說大明至理若使率土之民皆淳此化則朕坐致太平矣昨蕭謨之請制即以相示委卿增損必有以戒遏浮淫無傷弘獎者乃當著耳尚之對曰悠悠之徒間不敬信以臣庸陋實有愚勤然前代群英則不負明詔矣渡江以來王導周顗庾亮王蒙謝安郄超王坦王恭謝尚戴逵郭文孫綽等或宰輔冠冕或人倫羽儀或致情天人之際或抗迹雲霞之表靡不歸依慧遠云釋迦之化無所不可適道固自教源濟俗亦為要務切味此言有契至理何則百家之鄉十人持五戒則十人淳謹千室之邑百人脩十善則百人和睦傳此風教以周寰區編戶千億則仁人百萬夫能行一善則去一惡去一惡則息一刑一刑息於家萬刑息於國此明詔所謂坐致太平者是也故圖澄適趙二石減暴靈塔放光符健損虐神道助化昭然可觀謨之請制不謂全非但傷蠧道俗本在無行僧尼然而情偽難分去取未易耳至土木之工雖若靡費且植福報恩不可頓絕臣比斟酌進退未安今日面奉德音實用欣抃元保曰此談蓋天人之學非臣愚陋所宜與聞切恐秦楚論強兵之術孫吳盡吞併之計無取於此尚之曰夫禮隱逸則戰士息貴仁德則兵氣消倘以孫吳為志動期吞并則將無取於堯舜之道豈特釋教而已哉帝悅謂尚之曰釋門之有卿猶孔門之有季路也自是帝益重玄化蕭謨之之議遂寢及顏延之著離識論敕慧嚴論辨帝曰卿等不愧支許矣宋史曇摩密多於鍾山營建上寺道化大行僧傳天竺求那䟦陀羅此云功德賢至金陵文帝遣使郊迎及見帝大悅命居祇洹寺屢延入內供養僕射何尚之及諸王公竝師事之本傳丙子十三四六二三月上巳駕幸曲水公卿畢集帝命賦詩沙門慧觀先成奏之帝悅以示百官皆服其才初觀與慧嚴謝靈運等詳定涅槃經頗增損其辭夢神呵曰敢妄以凡情輕瀆聖典觀等懼而止一云三年上巳求那跋陀羅譯勝鬘經釋慧觀製勝鬘序文帝甞問慧觀頓悟之理孰精觀以生之弟子道猷對有旨召入內盛集名流猷敷宣有序法義粲殆聞者開悟有攻難者猷必挫以釋之帝拊髀稱善丁丑十四五三孫彥曾家世奉佛妾王惠稱信向精篤誦法華經輙見浦中有雜色光使人掘深二尺得金像連光趺高二尺一寸感通江陵張僧定妹幼而奉法志欲出家常供養小金像而父母密許適邴氏女不知也及羔鴈既至女悲呼不就燒香伏地取死像遂放金光彌竟一村父兄驚其通感止不嫁之張邴二門因大敬信感通錄求那跋陀羅譙王義宣請講華嚴羅以未通華言乞觀音為增智力夜夢神易其頭遂遍曉華言即為眾講之時稱妙大乘旨旨因號摩訶衍本傳釋僧亮欲造丈六金像聞湘州伍子胥廟多有銅器亮告刺史張劭借健人一百大船七隻劭曰廟既靈驗犯者必死且有蠻人守護詎可得耶亮曰若果福德則與檀越共如其有咎躬自當之劭即給人船三日至廟廟前有兩鑊容百餘斛中有巨蛇長十餘丈出遮行路亮乃執錫呪之蛇即隱俄見一人秉笏出云聞師道業非凡營福事重今特相隨喜於是令人輦取廟銅既多十取一而舫已滿及歸遇風水甚利群蠻相報追不及矣還都鑄像既成唯𦦨光未備文帝為造金薄圓光安置彭城寺至太始中明帝移像湘宮寺焉僧傳戊寅十五六北燕為魏滅四凉釋法盛譯投身餓虎經釋道泰譯大乘論等浮陀跋摩此云覺鎧譯毗婆沙論成一百卷凉土崩亂失四十今唯六十卷羅順為平西府將戍在上明放鷹野澤鷹雉俱落時火燒野平唯有三丈許叢草不然遂披而覔鷹乃得金菩薩像時定襄令謂盜所藏乃下符界內無失像者遂收而奉之感通錄己卯十六北凉為魏滅魏太延五釋道冏入山穴採鍾乳炬滅冏懼矣乃念觀音有頃見一光如螢引之而出甞夜乘氷渡河中道氷破乃念觀音忽有一物承脚乃得到岸本傳法師靈徹一云僧徹示寂徹初師遠公精通經論文學有名甞問遠曰律禁管絃戒絕歌舞一吟一咏可得為乎遠曰觸物興想亂情妨道弗足為也徹由是絕棄筆硯講授大法學徒宗之本傳一云二十九年卒北凉自永安辛丑至是年二主三十九年緇素九人出經律論三百餘卷庚辰十七魏太平真君元沙門慧光師佛陀俊異朗悟時呼聖沙彌造疏注經甚多門學如林入室九人僧道暉儒生馮衮等鍾山沙門法喜以所居無泉竭誠禮懺求西天阿耨池八功德水經七日掘地果獲之廬山曇詵法師示寂壽七十九伊葉波羅此云自在於彭城譯毗曇心論辛巳十八二天竺僧伽達多至宋都在山禪寂群鳥獻果是年康王請居廣陵曇摩密多此云法秀生而連眉善呪術常有善神潛護在京譯出禪經十二卷釋教錄壬午十九三西域獻文帝火浣布袈裟帝時自衣之統紀七月曇摩密多示寂于鍾山上寺壽八十七天竺僧伽䟦摩還西域癸未二十四九月三藏求那跋摩於祇洹寺奄然而化自說證第二果預作遺文偈百餘句備言悟身妄幻脩進得果臨終時眾見一物如龍自床直上空中是年釋慧嚴示寂壽八十一帝詔曰嚴法師學道之匝奄爾遷神可給錢五萬布五十疋本傳求那跋陀羅譯楞伽經四卷後達磨指此土唯此經義契禪宗之直指也甲申二十一五曇無竭二十五人遊西域二十餘年自餘竝死唯竭獨還得觀音受記經揚都番譯魏太子晃被崔𭁵所讒太武疑之晃求哀沙門元高高為作金光明懺太武夢其先祖讓之曰不當以讒疑太子既寤以語群臣臣皆稱太子無過待之如初崔浩懼太子將不利於己白太武曰太子前實有謀結高以術致先帝恐陛下耳若不早除必為大害太武怒是年九月收高及慧崇縊之高弟子元暢遠奔至泣高高忽開眸曰盛衰在迹理常湛然善自脩心言訖長往又法達見高於空中進曰和尚崇公生何所高曰我往惡處救眾生崇歸安養矣出僧傳時崇乃尚書韓萬德門師德次於高亦被疑也乙酉二十二六魏釋曇覺一云惠覺有才解譯賢愚經十五卷備載善惡之喻丙戌二十三七魏主與崔浩皆信𭁵謙之而奉其道浩每言於魏主以佛法虗誕宜除之及魏主討蓋吳至長安入佛寺沙門飲從官酒官入其室見有兵器白魏主主怒曰此非沙門所用必與蓋吳同謀亂耳命有司按誅合寺沙門浩因說帝將誅天下沙門毀諸經像帝從之宼謙之切諫以為不可浩不從先誅長安沙門焚其經像唯留臺下四寺勅下四方一依長安法太子晃素好佛屢諫不聽乃緩宣詔書使遠近預聞得各為計沙門多逃匿獲免或收藏經像唯塔廟在魏境者無復孑遺魏史丁亥二十四八魏雖滅教而宋猶彌盛詔童子惠基入內帝高之於祇洹寺設大會車駕臨幸集公卿為基落髮基能通經廬山宗炳卒壽六十九炳甞著明佛論今在弘明集釋法朗多異迹朗師法進亦有高行朗能戶籥中出入魏武滅法西適龜茲國王待以聖禮及卒後焚骸兩肩湧泉直上于天本傳戊子二十五九釋法瑗有講業刺史庾登之甞請講法文帝訪覔述生公頓悟義者乃勑下都召對瑗伸辨詳明何尚之歎曰意謂生公之歿微言永絕今復聞象外之談可謂天未喪斯文也勑為南平穆王鑠五戒師後天保寺成詔瑗主之王景文值其講歎曰所舉皆所未聞所指皆出意表真法中龍也本傳廬山雷次宗卒壽八十己丑二十六十釋寶雲示寂雲歷遊西域後還長安隨佛陀跋陀脩禪及陀為秦擯雲歸揚都乃共智嚴同譯諸經庚寅二十七十一魏來攻宋文帝遣蕭斌禦之先鋒王元謨不閑撫馭士卒畏縮未戰輙遁斌怒將誅謨謨夢人告曰誦觀音千遍則免及覺誦之千遍將就刃會王慶之諫曰魏虜武震天下豈謨能當未陣而斬副將以自弱非䇿也斌悟即貸其死謨仍將兵如故南史魏滅佛法初宼謙之爭而崔浩不從宼曰卿今促年壽滅門戶矣至是浩刊所撰國史于郊壇書魏先世事朝野乃言於帝以為暴揚國惡帝怒誅浩三族及僚屬童吏百三十八人仍令溲浩口以小便初浩燒毀經像路見棄像必溺之及族誅屍無收者人亦溺其屍至棄潰乃止魏書辛卯二十八正平元沙門惠始一云曇始值魏滅法始乃隱至是知大法將亨朝元會振錫至宮門吏白太武武曰趣斬之刃下無傷而始臨殿陛矣武怒抽佩劍自斬之亦不能傷劍微有痕比其時北園養虎于檻武令以始餧之虎皆佈伏不敢瞬左右請以天師試之虎即吼太武大驚延始上殿再拜太武許之復教出北山錄魏太子晃卒釋惠紹自積薪誦藥王品燒身而滅臨終曰吾燒身處當生梧桐後三日果生焉壬辰二十九高宗興安元魏武毀佛之後自正平初乃遘厲疾兩年遍身發瘡膿血交流於是佛禁稍弛民間往往有私習者是年為侍中宗愛所弑而崩高宗文成皇帝濬晃之子也十月即位群臣勸請興復釋氏乃下詔曰夫為帝王必祇奉明靈顯彰仁道其能惠著生民濟益群品者雖在往古猶序其風烈是以春秋嘉崇明之禮祭典載功施之族況釋迦如來功濟大千惠流塵境尋生死者歎其達觀覽文義者貴其妙門助王政之禁律益仁智之善性排撥群邪開演正覺故前代已來莫不崇尚亦我國家常所尊事世祖太武皇帝開廣邊荒德澤遐被沙門道士善行純誠如惠始之流無遠不至風義相感往往如林夫山海之深怪物多有姧淫之儔得容假託講寺之中致有㐫黨是以先朝因其瑕釁戮其有罪有司失旨一切禁斷景穆皇帝每為慨然值軍國多事未遑脩復朕承鴻緒君臨萬思述先志以隆斯道今制諸州縣眾居之所各聽建佛圖一區其有好樂道法欲為沙門性行素篤鄉里所明者聽出家足以化惡就善播揚道教也於是天下承風朝不及名往時圖寺竝還脩復經像皆出時罽賓王種沙門師賢值罷教權假醫術守道不改於復教日即為沙門同輩五人帝親為下髮賢為僧統魏史癸巳三十二月帝崩二魏敕有司於五級大寺為太祖已下五帝鑄釋迦像五尊各長丈六用金二十五萬斤沙門曇曜帝禮為師魏書甲午世祖孝武帝駿孝建元興光元譙王義宣陰謀逆節求那䟦陀羅諫之不從及梁山之敗孝武敕軍中得陀羅者驛馳至俄得之送金陵引見帝顧問委曲敕住後堂供施衣物一日問曰尚念譙王乎對曰古人不忘一飯王飯我十年敢遽忘耶念當從陛下求為王長脩冥福帝悽然改容及中興寺成有旨命住持帝宴東府公卿畢集召䟦陀至應對機辨帝大悅釋普明蔬食布衣專誦法華維摩每至勸發品輙見普賢乘象立其前而誦維摩亦聞空中樂聲又善神呪所救皆愈一人妻病請明來呪明入門婦便悶絕見一狸從狗穴出因此而愈又甞入一神祠神皆奔走本傳乙未二太安元孝武詔沙門道猷為新安鎮寺法主初文帝深敬之至是為天下法主甚允時望元徽中卒壽七十一釋寶亮年十二禮青州道明出家學業既精後因遊京師居中興寺中書袁粲見而異之以書抵其師道明略曰比見亮公非常人也日聞所未聞不覺歲之將暮然珠生合浦魏人取以照乘玉在邯鄲秦王請以華國天下之寶不可自專當與同之也自是亮名益重釋僧瑜常謂結累三塗情形故也情既盡矣形亦宜捐是年六月於廬山集薪為龕發火已入中端坐誦藥王品火焰交至猶合掌不散道俗咸見紫氣騰空後十四日其房生雙桐聳成奇樹丙申三二釋元暢初事元高因魏滅法乃至楊州深明經律禪要初華嚴文旨浩博未有疏釋暢乃提章批句傳講迄今暢其始也又善於三論為學者之宗文帝深重之請為太子師再三辭遜及太初事故方知先覺自是遷憩荊州山長沙寺講法丁酉大明元三二十七祖般若多羅以法付菩提達磨偈曰心地含諸種因心復生理果滿菩提圓華開世界起即於座立舒左右手放光二十七道踊身虗空化火自焚空中舍利如雨正宗乃甲午年化釋惠簡譯五天使者等經十部戊戌二四時釋僧詮精練三藏化洽江南性好檀施周贍貧乏居無縑幣屢造金像禪禮無輟孟顗張暢張敷戴顒戴勃竝師事之僧傳上詔法師曇宗懺罪上因曰朕何罪而勞卿為懺宗曰舜稱予違爾弼禹曰萬方有罪在予一人陛下履道思冲寧得獨異帝大悅統紀己亥三五釋道汪初師遠公究經律甞行梁州道為羗賊所圍汪念觀音有頃覺如雲霧者覆汪身盜尋不見於是獲免後止成都化行巴蜀孝武帝聞汪德行迎為中興寺主二月釋僧慶於淨名像前焚身眾見一物如龍從𧂐升天僧傳庚子四廣州獻三角牛河南獻舞馬和平元十月八日路昭皇太后造普賢像成於中興禪房設齋所請二百僧已集忽有異僧預座氣貌秀發舉眾驚嗟齋主問往何寺曰天安言對之間倐然不見眾乃悟其神僧也時釋道溫敕為都邑僧主京兆尹孔靈符以事表聞詔仍改禪房為天安寺溫後開講數感神異帝悅之賜錢五十萬溫傳西域功德直至荊州釋元暢請出念佛三昧等經暢刊正文義辭旨婉切暢能舒手出香掌中流水莫之測也辛丑五二釋僧鏡初止京講法徐湛之重之請為門師後化洽三吳聲馳上國世祖欽風敕止定林頻建法聚釋慧通麈尾一振軒蓋盈衢孝武厚加寵秩敕與海陵建平二王為友壬寅六三釋僧遠初於青州講法道俗悅服瑯瑘王僧達延止眾造寺遠周貧濟乏身無留財斂死撫生恩加骨肉孝敬王子鸞造新安寺詔遠居之九月右司諫言臣聞佛以謙卑自牧以忠順為道不輕比丘逢人必拜目連大士遇長即禮寧有屈膝四輩而間禮二親稽顙耆臘而直骸萬乘者耶臣等參議以為沙門接見皆當盡禮敬之容則朝徽有序帝雖頗信法而尤自驕縱奏上之日詔即可焉遠歎曰我本出家求道何關帝王即日謝病拂衣隱定林山理有可行則萬古不易理不可行則一朝難通制旨雖下眾竟不遵逾年制還復舊矣釋法瑤講法有聲是年敕吳興郡禮致上京與道猷同止新安寺使頓漸二悟義各有宗至便就講鑾輿降蹕百辟陪筵本傳魏釋曇曜欣三寶再興於北臺寺譯付法藏傳等經初魏帝於恒安西北三十里武周山北面鐫石崖立靈巖寺龕之大者高二十餘丈可受三千人鐫諸聖像相連三十餘里東頭僧寺常供千人太武雖毀敗而此龕不毀也癸卯七四天下大旱帝請求那䟦陀祈雨陀即燒香祈請不復飲食默誦經呪明日晡時風震雲合連日降雨敕見慰勞䞋施相續釋慧益數年却粒唯食香油誓欲燒身是年四月八日於鐘山置鑊辨油自至雲龍門辭帝帝躬出門益以佛法憑囑而辭帝亦續至道俗滿山益入鑊以吉貝自纏上加一帽以油灌之手自執燭以然帽誦藥王品火及眼乃聲絕時聞空中笳管異香芬苾帝夜夢益振錫至更囑以佛法帝明日為設會度人燒身之處謂藥王寺也本傳釋僧璩譯十誦羯磨甲辰八五月帝崩太子子業立五制沙門復舊免致敬人主通鑑天竺阿那摩仾此云寶意至京常轉側數百貝子立知凶吉善能神呪以香塗掌亦見人往事世祖施其銅唾壺忽人竊之仾以席一領空卷之呪上數遍經于三夕唾壺還在席中道俗敬異焉本傳乙巳景和元十一月大臣廢君乃奉太宗明帝或即位改泰始元六五月高宗崩顯宗即位楊州瓦官寺釋慧果常誦法華一日於廁見鬼禮云昔為僧作維那小不如法墮地獄出生噉糞鬼中願師拔濟昔有錢三千埋在柿樹下願取為福果因告眾掘錢為造法華設會後夢見鬼云已得改生勝處感通錄釋慧亮講席有聲顏延歎曰安汰吐珠玉於前斌亮振金聲於後清言妙緒將絕復興至是於莊嚴寺學徒盛集敕亮與斌遞為法主本傳魏高宗文成帝五月崩帝度僧尼三萬餘人廣興佛教脩復諸寺丙午太始二魏顯祖憲文帝共天安元釋僧瑾初宋孝武敕為湘東王師王即太宗王從請五戒甚加優禮至是即位乃敕瑾為天下僧主給隊仗車輿月俸三萬瑾性不蓄金皆充福業起靈根靈基二寺元徽中卒寶誌大士往來皖山劍水之下髮而徒跣著錦袍面方而瑩徹如鏡手足皆鳥爪初金陵東陽民朱氏之婦聞兒啼鷹巢中梯樹得之舉以為子七歲依鍾山僧儉出家專脩禪觀至是顯迹以剪尺拂子掛杖頭負之而行經聚落兒童譁逐之或微索酒或累日不食甞遇食鱠者從而求之食者分㗖之而有輕薄心誌即吐水中皆成活魚時時題詩初若不可解後皆有驗本傳丁未三皇興元釋道猛學造淵微初止京寺太宗時為湘東王深相崇薦及登祚倍加禮接帝創寺于建陽門外敕猛為綱領帝曰人能弘道道藉人弘今法師非直道益蒼生亦乃有光世望可目寺為興皇敕猛於寺開講成實序題之日帝親臨幸公卿皆集帝久之詔曰猛法師風道多濟朕素所賓友可月給錢三萬使史車轝等猛隨有所得皆施貧造寺元徽三年卒釋智林宋明敕下京寺講說申明二諦義有三宗不同時周顒又作三宗論與林意符林乃致書於顒謂此義無人得者幸已建明斯義便宜廣宣故三宗之旨傳述至今周顒字伯倫累遷直侍殿省明帝慘酷顒不敢顯諫輙誦經中罪福因緣之事帝為少沮顒於鍾山西別立精舍休沐則歸之終年蔬食雖有妻子而遠居山舍宰相王儉問曰卿山中何所食曰赤米白鹽綠葵紫蓼蕭子顯戲問菜食何味最佳顒曰春初早韭秋末晚崧其標致如此掛冠盛時居山以壽終本傳魏於常安北臺起永寧寺七級浮圖高三百餘尺又於天宮寺作大像高四十三尺用銅十萬斤黃金六百斤通鑑戊申四二正月天竺求那䟦陀羅朝辭天子公卿言將示滅帝親臨決別陀談笑而逝壽七十五陀蔬食終身香爐未甞離手每食輒分食飛鳥鳥皆集手取食祈譯經論五十二部一百三十四卷帝造湘宮寺新成大開講肆妙選英僧敕請法瑗為法主帝降蹕法筵公卿會坐一時之盛觀者榮之僧傳己酉五三釋弘充思入玄微口辨天逸王臣皆重之明帝起湘宮寺請充為綱領時湘宮又有法鮮聰哲有力與充齊名釋超進詔徵至都講法鼓經後還會稽元徽中卒壽九十四七月趙泰死十日復甦云有二人弘入黑門見絳衣人次第呌名問生時行業主者言常遣使者在人間記人善惡以相檢校人死有三惡道殺生禱祀最重持佛善戒則死在福舍又到地獄案行見泰父母弟在泥犂獄又見受獄報已更受變報者又見供佛脩福得脫生者又入開光門見佛度諸地獄地獄即空泰乃問天道地獄道門相去幾何曰天道地獄道門相對又間人死何者為樂曰唯奉佛持戒者樂耳又問未奉佛時造罪今奉佛其過除否曰皆除主者乃召都錄問泰何死令取籍看有餘筭三十年橫為鬼所取令放還由是一家發心奉佛為祖父母弟製幡蓋作福會也庚戌六四東海何敬叔少奉法因得栴檀製以為像而無圓光屢求不獲因夢沙門杖錫來曰檀非可得縣後何家桐盾可求之次早因求買之何曰曾未示人君何得知敬叔以事告之何氏驚喜奉以製光後為湘府直省又夢像現感通辛亥七魏孝文帝延興元魏顯祖即位六年聰睿夙成剛毅有斷而深信釋氏之學每引朝士及沙門共談玄理雅薄富貴常有遺世之心六月乃禪位於太子宏是為高祖孝文皇帝宏時年五歲乃尊顯祖為太上皇帝上皇徙居崇光宮宮在北苑中又建鹿野寺於苑之西山與僧居之時談禪理北史壬子泰豫元二四月太宗崩在位八年至治克昌造丈八金像旦食常齋日誦般若爰感舍利造弘普寺六帖魏西域吉迦夜此云言可番譯寶藏等經二十四卷癸丑蒼梧王元徽元三沙門邵碩康居國人與誌公最善出入經行不問夜日意欲求之則去遊益州以滑稽言事能發人懽笑因勸以善家家喜之至人家眠地者家必有死能分身於數處刺史劉孟明挹事之忽著布帽詣明少時明卒先是孟明長史沈仲玉改鞭杖之格嚴重常科碩謂玉曰天地嗷嗷從此起若除鞭格得刺史玉除之及明卒仲玉果行州事是年九月將亡謂沙門法進曰願露骸松下然脚須著屐進諾之已而化舁其屍露之明日往視失所在俄有自郫縣來者曰昨見碩公著一履行市中曰為我語進公小兒見欺止為我隻履進驚問沙彌答曰舁屍時一履墮行急不及繫也甲寅二四乙卯三東莞人徐垣妻懷身兒在腹中啼五釋曇斌講法有聲孝建初敕王謨資發出京止新安寺講頓漸之旨時皆悅服至是示寂本傳丙辰四承明元太上皇崩魏造建明寺自後建福度僧立寺非一北臺有百餘寺僧尼二千人四方諸寺六千餘所僧尼七萬七千餘人北史丁巳五七月蒼梧王遇弑順帝准立改昇明元太和元時逸士顧懽尚黃老以佛道二教學者互相非毀乃著夷夏論略曰道則佛也佛則道也其聖則符其迹則返或和光以明近或耀靈以示遠道濟天下故無方而不入智周萬物故無物而不為其入不同其為必異各成其性不易其事是以端委搢紳中華之容剪髮曠衣西域之服全形守禮繼善之風毀貌易形絕惡之學無盡世界聖人代興或昭五典或布三乘教華而華言化夷而夷語尋夫聖道雖同而法有左右泥洹仙化各是一術佛號正真道稱正一一歸無死真會無生在名則返在實則合但無生之教賖無死之化切切法可以進謙弱賒法可以退夸強佛教文而愽道教質而精精則精人獨能愽則粗人廣化佛言華而引道言實而抑佛經繁而顯道經簡而幽幽則妙門難見顯則正路易遵此二法之辨也聖匠無方方圓有體器既殊用教亦異施佛是破惡之方道是興善之術興善則自然為高破惡則勇猛為貴佛迹光大宜以化物道迹密微宜用為己優劣之分大略在茲懽雖同二法而意黨道教司徒袁粲為文駁之略曰孔老教俗為本釋氏出俗為宗發軫既殊其歸亦異又仙化以變形為尚泥洹以陶神為先變形者白首窮玄而未能無死陶神者塵惑日損而湛然常住泥洹之道無死之地陶神若此何謂其同時何常侍鎮之覩懽和同二教大不平之以書抵懽劇言道教不足以擬釋氏又重與書略曰太極剖判形識謬彰識以流染因結形以愛滯緣生及其沉欲淪波觸涯思濟思濟則祈善祈善則聖應聖者何感而遂通者也夫通不自通感不自感感常在此通每自彼自彼而言懸鏡高堂自此而言萬像斯歸故知天竺既中土於大千斯感通於至聖聖應既彼聲被則此雲行法教雨施華夏道者一也形者二也道者真也形者俗也盡二得一宜一其法滅俗歸真必其違俗是以孔以全形守祀恩接六親老以攝生養性自我外物乃為盡善不為盡美蓋是有涯之制未鞭其後也何得擬道菩提比聖牟尼哉時復有朱常侍昭之作難夷夏論朱廣之作諮夷夏論竝章分句解以破顧懽之蔽於淺也汝南周顒高僧慧通竝著駁夷夏論懽之作遂不勝其謬矣復有法師紹正著二教論略曰佛明其宗道全其生守生者蔽明宗者通云云南史戊午二二昇明三年四月順帝禪位于齊王蕭道成宋六十年中寺一千九百十三所僧尼三萬六千人譯師二十三人所譯經律論四百九十卷釋教隆盛篤信倍多方志齊蕭姓都建康七主二十四年禪于梁魏己未太祖高道成建元元太和三四月齊太祖即帝位欽崇三寶愽濟群生用心以仁垂化以儉六帖彭城宋王寺有丈八金像北境兵起像輙流汗是年像忽流汗冬魏宼淮時兗州驅迫沙門助其戰守魏軍誣以助亂須及斬決像大汗流地魏徐州刺史梁王奉法王使數人以帛拭隨出不已王乃拜曰眾僧無罪誓自營護必不加罪若幽誠有感當隨拭即止言已自拭應手而燥王具表聞下詔皆見原宥云感通錄王琰久奉觀音金像初寄揚都南㵎寺琰忽夢像立于座隅即馳迎還其夕南㵎失像十餘為盜毀鑄錢也宋大明七年放光三尺合家同覩後以此像寄多寶寺琰適荊楚十載不知像處及還揚都夢在殿東詰旦造寺如夢便獲是年七月十日也琰冥祥記釋元暢自宋末適成都是年至民嶺齊后山有終焉之志四月二十三日建剎立寺名曰齊興正齊祖受命之辰天時人事萬里懸合時傅琰鎮成都欽暢風軌待以師敬琰因以暢迹表聞敕蠲百戶以充俸給本傳庚申二四釋僧慧講法為西學所師至是敕為荊州僧主年衰常乘輿赴講觀者號為禿頭官家與元暢同時人謂黑衣二傑時番禺毗耶精舍有扶南大石像七八十人擡之方起此寺遇火近矣尼三四人試捧之飄然而起像既移矣屋亦焚焉每有神光遇有𭁵則淚汗後廣州送出都安蔣州寺中感通魏詔以僧顯為沙門都統辛酉三五魏釋僧淵風姿宏偉腰帶十圍慧解有聲劉因之捨所住山給為精舍有弟子慧記道登竝為文帝所重是年淵卒本傳又釋道慧有慧學是年卒代京閹䆠自慨刑餘奏乞入山服道敕許之乃賷華嚴晝夜讀誦禮懺不息忽生髭鬚得丈夫相以狀聞帝大驚異之一國敬華嚴矣感通齊天竺曇摩伽陀耶舍此云法生出無量義經壬戌四六正月高帝幸莊嚴寺聽法師行遠講維摩經公卿畢集帝坐稍遠不聞法音中書張緒勸遠遷坐近帝遠不從俄頃帝自遷坐近之三月高帝崩在位四年常誦般若寫法華四月八日常鑄金像七月十五普寺送盆供僧三百造陟屺正觀二寺帝每曰使我治天下十年當使黃金與土同價惜乎享年不永壽五十六方志等世祖武帝維即位四月十五日皇太子集大乘僧於玄圃安居九旬講法至七月十五解講乃捨身及輿冕自纓已降凡九十九物願以此力普被幽明淪苦海者得隨理悟癸亥世祖武帝永明元七二月八日齊竟陵王置講席於上邸之法雲精廬廣集僧眾演法六宵弘明釋僧鍾善三論有才辨止中興寺是年魏使李道固來朝帝召鍾為館伴與道固語日差中鐘不食固曰何以不食鐘曰先佛遺法過中不食固曰無乃為聲聞耶鐘曰應以聲聞得度者即現聲聞為說法時以為名對爾後盤桓講說稟聽成群文惠太子及竟陵王數請南面七年卒文惠太子及竟陵文宣王子良竝精佛理而子良尤深焉每招致名僧講論佛法道俗之盛江左未有或親為眾僧賦食行水世頗以為失宰相體而子良之信愈篤南史甲子二八釋僧遠自隱定林山遊心法苑緬想人外時之名士何點周顒吳苞張融等皆投身接足咨其戒範齊太祖將升位入山尋遠遠固辭老疾足不垂床太祖躬自降禮咨訪委悉及登禪復鑾駕臨幸將詣遠房而房狹不容輿蓋太祖欲見遠遠持操不動乃遣使勞問轉蹕而去遠曾不屑焉至于𥨊疾文惠文宣伏膺師禮數往參候時貴卿士往還不絕遠蔬食五十餘年㵎飲二十餘載是年正月卒帝致書於法獻曰承遠上無常弟子夜中已自知之遠上此去甚得好處遲見法師可敘瑞夢也今正為作功德所須可具數來竟陵文宣王又書曰遠法師一代名德四海飡風弟子闇昧謬蒙師範方欲仰稟仁化用洗煩慮不謂奄成異世悲痛曷忍師既業行希有不應雜處僧墓當別小地樹剎表奇刻石銘德也即營墳於山南王儉製本傳十一月釋元暢因武帝可徒文宣王文惠太子皆遣徵迎於是汎舟東下本傳云至京少時而卒壽六十九又於法獻傳中載暢以建武初亡壽七十五然僧傳同出惠皎之手而二說不同如此還只一暢耶或有二暢耶人正通之乙丑三九敕沙門法獻元暢同為僧主分任南北兩岸獻公律行精純德為物範初西遊于闐獲佛牙舍利經像而還暢公亦律禁清白文惠太子舉為戒師獻後被敕三吳使妙簡二眾暢亦東行重伸受戒之法暢以建武初亡壽七十五獻以建武末卒年與暢同僧傳釋法度宋末至京高士明僧紹隱居瑯瑘𭗵山捨所居為棲霞精舍請度居之先有道士欲以寺地為館住者輙死後為寺自度居之群妖皆息一日神來通名曰靳尚弟子王有此山七百餘年法師道德所歸謹捨以奉并願授五戒度曰檀越血食世祀此最戒所禁也尚曰若備門徒輙先去殺乃辭去閱日又來送錢設供同眾禮拜度為受戒而去𭗵山廟巫夢神告曰吾已受度法師戒祀我勿得殺戮由是廟祭止菜脯而已度後有疾神又奉藥水而度疾瘥云丙寅四十三月有大石從海浮入江取以獻鑿為像坐高三尺餘三寶紀釋僧慧卒壽七十九自佛圖澄至道安安至慧遠遠至曇順順至僧慧凡五世價重帝王風動四方事標史冊北山錄慧有弟子僧岫亦以學顯名有慧敞亦志業純正代慧為僧主僧史會稽釋弘明卒壽八十四明誦法華習禪禮懺為業每旦水瓶自滿天童為其給使虎甞入室伏其床前久之乃去又山精來惱明以腰繩繫之鬼謝乃放丁卯五十一正月交州獻一珠高二寸中含佛像几臺座眉目皆具三寶紀吳興道士孟景翼造正一論略曰佛以一乘為法老以抱一為式在佛為實相在道為玄牝道之大象即佛之法身司徒中郎張融作門律略曰道之與佛逗極無二以示汝南周顒顒難之曰虗無法性其寂雖同位寂之方其旨則別云云南史釋淨度辟穀餌松肪能講誦禪律甞誦寶積經及半而疾命侍者代之閱遍而化人見空中有寶馬負棺而去戊辰六十二冀州送九尾狐大赦釋曇度精通論學獨步當時魏孝文遣使請至平城大開講席帝致敬下筵親詢理味學徒由是而盛是年卒釋道盛善講論初宋明帝及謝超宗皆師敬之齊帝敕代曇度為僧主法師寶亮齊竟陵文宣王聞其名躬身至房請為法匠後移止靈味寺講經鋒辨天逸講涅槃凡八十四遍勝鬘四十二遍維摩成實大品小品法華十地楞嚴無量壽等各近十遍黑白弟子三千餘人諮稟門徒不可勝數本傳釋普恒常習禪與蜀韜公友善甞入火光三昧見先身業報等事後坐脫而化僧伽䟦陀羅此云僧賢出善見毗婆沙律十八卷六月東陽獻六眼龜腹下有文字又禪靈寺剎上放光三寶紀魏徐州僧統僧逞卒帝詔徐州施帛三百疋又設五千人齊以供追福己巳七十三帝怒大士寶誌惑眾收逮建康獄是日人見大士遊行市井而檢校仍在獄中其夕語吏曰門外有兩輿食金鉢盛飯汝可取之果文惠太子竟陵王送供至建康令呂文顯以聞帝悔謝迎至禁中俄帝宴後宮誌乃暫出已而猶見行道于顯陽殿帝驚遣吏至問吏白誌久出在省中帝益神敬之後誌假神力於武帝見高帝於地下受錐刀之苦帝自是永廢錐刀誌之神異化人非一本傳有瑞石浮海來入吳境朱法讓獲之獻于朝帝方建禪靈寺乃以石造佛像高六尺餘而嚴奉焉珠林是年釋僧鍾卒鐘初見武帝於乾和殿稱貧道時暢獻見帝每稱名而不坐帝因問尚書王儉先輩沙門見帝王何所稱及預坐否儉答東晉時諸國僧皆稱貧道而預坐中代庾氷桓元欲使僧盡敬朝議紛紜事皆休𥨊自宋至今多預坐而稱貧道帝曰暢獻二僧道業如此尚自稱名況復餘者挹拜則太甚稱名亦無嫌自是僧稱名於帝王自獻暢始也僧傳釋法匱出家於枳園寺誦經守素一日還其舊居又至定林復還枳園後三處考之皆見匱來中食實是一時而三處焉是晚奄然而卒屍甚香軟眾咸悟其得果遂聞於帝帝親臨幸為設僧供文惠文宣皆來頂禮為營理殮葬䞋施雲集仍以其錢起枳園寺塔僧傳庚午八十四西域達摩提此云法意於齊譯提婆達多等經二卷釋法道甞入定登內院見彌勒自臍輪放光照三塗苦道由此勵精常坐不臥及終而貌黑反白釋慧次論學馳譽沙門智藏僧旻法雲等竝就次請業文慧文宣悉敬以師禮是年講百論至破塵品忽然奄化釋慧隆善講論宋明帝請於湘宮開講成實其後王侯貴勝屢招講說凡舊義磐滯隆皆顯發昭然可了周顒目之曰隆蕭散森疎若霜下之松竹是年卒本傳竟陵王蕭子良自立淨住淨行法門淨住者即布薩之翻名謂淨身口意如戒而住也淨行法門者以諸業淨則化行於世了諸法門故有性相差別也文有兩袠唐終南山釋氏統乃略成一卷是以啟初心之𧿉步標後銳之前蹤敬而信者是稱淨行之人信而行之不亡淨住之目一皇覺辨德門以佛道最勝常志大乘也二開物歸信門以洗除心垢方覩法身也三滌除三業門以滅苦之要莫過懺悔也四脩理六根門以莊嚴法體須淨六根也五生老病死門以四相大苦當生厭心也六克責身心門以檢察三業無善不歸也七檢覆三業門以常撿己身幾善樂惡也八呵詰四大門以四大無耻令我嬰苦也九出家順善門以知過出家功德清勝也十在家從惡門以在家愛欲苦惱無邊也十一沉冥地獄門以受三塗報唯在三毒也十二出家懷道門以常須遮制妙行必成也十三在家懷善門以既知其患當順佛教也十四三界內苦門以世相皆苦無可樂者也十五出三界外樂門以脩證法身得大自在也十六斷絕疑惑門以有智則去惑也十七十種慚愧門以我無道業深可愧耻也十八極大慚愧門內外省察極大慚愧也十九善友勸獎門以常相警戒也二十戒法攝生門以戒生善德也二十一畢故止新門以種種自慶也二十二大忍惡對門以忍力大也二十三緣境無礙門以當行解脫法也二十四一志努力門以勇猛進脩也二十五禮舍利塔二十六敬重正法二十七奉養僧田以常敬三寶也二十八勸請增進門二十九隨喜萬善門三十迴向佛道門三十一發願莊嚴門皆成就淨行也諸門皆廣有其辭詳見弘明集魏沙門應統詔歲施帛三百疋辛未九十五西域求那毗地此云安進內外書學莫不窮究於齊譯經壬申十十六帝以中書侍郎徵隱士何點點不赴點門世事佛甚精與張融孔雉圭為方外交招携勝侶清言賦詩優遊自得宰相王儉豫章王嶷往造之皆不得見後點在法輪寺竟陵王子良就見之點角巾登席子良對之忻然無已點少時甞病渴積歲不止後在吳中石佛寺講維摩於講堂晝寢夢異僧授丸一掬夢中服之即愈時以為純德所感魏下詔每年四月八日七月十五日聽大州一百人為僧尼中州五十下州二十人著令以為常淮釋超辨止京定林寺日誦法華一遍有餘力禮千佛一百五十餘萬拜足不出門三十餘載是年示寂釋曇超禪道弘化因止錢唐靈苑山入定累日忽見一人來禮曰弟子居在七里以富陽縣人鑿麓山下侵壞龍室群龍其忿誓三百日不雨今已百日田池枯涸欲屈道德前行必能感致潤澤蒼生功有歸也超許之神乃去超南行五日至赤亭山為龍呪願至夜群龍化作人來禮拜超更說法因歸乞三歸自稱是龍超請其降雨乃相看無言其夜與超夢云本因忿立誓師既導之以善不敢違命明日晡當降雨至期沾足歲以獲收是年師卒本傳魏徐州法師慧紀卒敕敕州施帛三百疋并設五百人齋以崇追益癸酉十一七月帝崩林王昭業立十七七月武帝崩帝在位十二年大崇法教造招賢遊玄二寺方志初寶誌大士在華林園忽重著三頂布帽未幾帝崩而文惠太子豫章王相繼而殂果如其讖王仲熊問仕何所至不答解杖頭左索與之熊後果至尚書左丞徐陵兒時父携之謁誌誌摩其頂曰此兒天上石麒麟也陵後果顯于世釋僧卞善梵音甞讀經有群鶴下集階前經終則去是年卒甲戌正月林王改隆昌元七月遇弑海陵王昭文立改元興元十月高宗明帝立改建武元十八遷都洛陽釋僧柔少登講席入剡山靈鷲之夢僧緒夜神人旗紳滿山迎之齊太祖皆建寺集僧以柔耆素有聞故徵書歲及文宣諸王再三招請乃出京止定林寺躬為元匠四遠欽服文惠文宣竝服膺入室常誓生安養是年體無餘患西向虔禮奄然而逝釋慧約少有風德齊太宰文簡公褚淵太尉王儉皆請講法淵遇疾夢神云菩薩當至俄約來而淵病即愈給事中婁幼瑜約族祖也每見輒起為禮或問此乃君族下頒何乃恭耶瑜曰菩薩出世方師於天下豈老夫致敬而已至是沈約外任携行在郡惟禪誦為樂異香入室猛獸馴階有道士下德靜於館暴亡傳云山精所弊長山令徐伯超請約居之神魅弭息後見二青衣女子從㵎水出禮云夙障深重墮此水精晝夜煩惱約即為授戒自是災怪永絕本傳乙亥建武二十九中書何胤點弟也愽學有重名甞入鍾山定林寺聽內典其業皆通至是拜中書令尋拜表解職胤以會稽多靈異往游之居若耶山雲門寺既與兄偕隱時號點曰大山胤曰小山尋徙居𥘿望山起講堂即林成院高風傾天下沙門慧安年十八為沙彌止江陵寺當眾坐時輙起行水常執空瓶自上及下水用不竭眾訝之及受具靈異益著甞與沙門惠濟上堂布薩堂戶未開安自壁出入無碍濟駭之後附商入湘中路示寂將死謂商曰我死即露屍岸上不須設棺商如其旨以屍投岸夜有焰從其身出商大怖及舟至湘中則安已先至欲就語又失所在魏文帝幸徐州白塔寺寺有道登法師雅有義業帝眷賞之常侍講於禁內及卒帝下詔傷悼施帛千疋設一切僧齋京城七日行道魏書荊州隱士劉虬宋太始中為當陽令又為南郡丞始事拂衣時年三十二年遂辟穀却粒餌木衣麻布衣草屩茅室上帳禮誦長齋六時不闕世諦書藝一切屏絕惟研精佛理注講諸經舉世莫不高尚其風齊建元初詔徵通直散騎侍郎不就建武初微為國子博士是年冬移止江州白雲徘徊似入櫩戶及有異香空中鍾梵之音因卒年六十粱大通中諡文範先生弘明集丙子三二十釋惠基甞兩被宋帝之詔稱疾不行乃於會邑龜山立寶林精舍周顒張融竝申師禮又為文宣王著法華義疏基既德被三吳聲馳四海乃敕為僧主掌任十城四遠從風五眾歸伏基性烈而能溫氣清而且穆故預在門人莫不矜戰是年十一月卒壽八十五釋僧宗善講經而任性放蕩得意便行不以為礙文惠太子將擯之而通夢有感乃改意歸焉魏文帝遙挹風德屢致書請開講齊世祖不許外出乃止宗以信施造太昌寺是年卒本傳丁丑四二十一天竺佛陀禪師此云覺者初至魏北臺恒安孝文別加資供後隨帝南遷定都伊洛復設靜院處之而志愛嵩岳敕就少室山為之造寺今之少林是也度弟子慧光及僧稠皆深定業有一善神常隨影護後報欲終自𦘕神像于壁本傳五月八日傅大士生於婺州義烏縣名翕字玄風八月廬山僧景法師示寂師久斷粒食甞有兩神立侍弘明法雲法師年三十講經之妙獨步當時本傳戊寅永泰元七月帝崩東昏侯寶卷立二十二七日明帝崩帝在位五年常持六齋務脩十善誦法華般若等經寫一切經建歸依寺造千金像方志釋法安少有慧聲立年即當法匠文宣何胤一時名士竝稟服文義是年卒釋法願善唱導又能占相王侯士庶竝師受戒法時寺側遭燒火必及寺弟子欲輿願出寺願曰佛若被燒我何用活即苦心歸念於是三面被焚唯寺不燼本傳己卯東昏侯永元元二十三釋僧印學涉眾典而偏以法華著名宋大明中何點請印為法匠聽者駢集文宣徐孝嗣皆敬其風是年卒釋慧通自宋元嘉中言未然之事皆驗是年忽就人求酒云欲遠行為謝諸相識竝宜精勤脩善為先酒畢至墻邊臥地就看已死後復有人時見之本傳四月魏高祖孝文帝崩帝在位二十九年甞於鄴造安養寺手不釋卷暇則自講六宮侍女皆持六齋其精進誦經慕道者放令出家供施諸僧每加豐厚所度僧尼萬四千人辨正論等是月世宗宣武皇帝恪即位下詔曰緇素既殊法律亦異故道教彰於幽顯禁勸各有所宜其僧犯殺人已上罪者依俗格斷餘犯悉付昭玄以內律僧制判之魏書庚辰二宣武帝景明元釋法度法紹時號北山二聖紹業行清苦譽齊於度而學解優之竝為竟陵王子良等師敬度甞為琅琊山神受戒又常願生安養故偏講無量壽經是年遷逝傳史釋僧侯宋孝建初至京誦法華維摩光明常二日一遍如此六十餘年一生食素過中不食是年合掌而化壽八十九釋僧惠初南陽劉虬立陟𡵆寺請以居之惠常欲渡江津吏以舟小未及過之惠已在彼岸又至病人家惠嗔者必死喜者必差又能分身赴人之供是年示寂神異甚多本傳東昏侯於瓦官寺解王像琢釵釧賜嬖姬以為盛飾東昏之毀玉像也初截其二臂琢釵及其亡也御刀黃泰平夜以刀傷其膝仆地遂遇害其報速哉辛巳和帝寶融三月改中興元十二月東昏侯遇弑而卒二敕釋慧球為荊州僧主訓勗之功有譽當世天監三年卒智稱律師說法四十餘年道俗欽慕是年卒弘明壬午二三月和帝遜位于梁王蕭衍齊七主二十四年中譯師二十人所出經律論錄七十二部三百五十卷寺二千十五所僧尼三萬二千餘人
