body:
  text: 宋括山一菴釋本覺編集明六觀居士畢延玠較訂唐元宗癸丑開元元年菩提流志譯寶積經并舊譯合成一部百二十卷至是功畢流志自是更不譯經唯專持誦時修禪觀七月義淨法師示寂壽七十九勑給葬事淨譯經論五十六部凡二百三十卷又別撰儀傳等九卷淨雖遍番三藏而偏攻律部教授學徒七月六祖辭徒衆歸新州故宅國恩寺其徒泣曰師歸當復來否祖曰葉落歸根來時無口又問師之法眼何人傳受祖曰有道者得無心者通至國恩寺以八月三日示衆曰吾受忍大師衣法今為汝等説法不付其衣汝等信根已熟堪任大事偈曰心地含諸種普雨悉皆萌頓悟花情已菩提果自成即跏趺而逝壽七十六廣州都督韋據率新韶二郡官吏迎奉全身歸曹溪寶林寺建塔真身今尚存焉甲寅二帝宣問左街僧録神光法師曰佛於衆生有何恩德致捨君親妻子而師事之説若有理朕當建立説若無理朕當削除奏曰佛於衆生恩過天地明踰日月德重父母義越君臣帝曰天地日月具造化之功父母君臣具生成之德何以言佛並過此乎光曰天能蓋不能載地能載不能蓋日則照晝不照夜月則照夜不照晝父只能生不能養母只能養不能生君有道則臣忠君無道則臣侫以此而推德則不全佛於衆生恩則不爾言蓋則四生普覆論載則六道俱承論明則照耀十方論明則光輝三有論慈則提拔苦海論悲則度脫幽冥論聖則衆聖中王論神則六通自在所以存亡普救貴賤皆携唯願陛下回心敬仰帝悅曰佛恩如此非師莫宣朕願回心生生敬仰乙卯三八月帝遣禮部郎中張洽賫詔詣當陽山起沙門一行赴闕有旨安置光泰殿帝數訪以安國撫民之要或謂一行優於憶誦帝一日命出宮籍示之行閲畢令內侍執本對帝復之不差一字帝驚異顧謂左右曰聖人也自是頻召咨質佛心之要行雍容敬沃聖眷日隆天下以帝從之問道呼為天師舊唐史丙辰四天竺三藏法師輪波迦羅此云善無畏至京帝初夢梵僧風度異因追畫工授以形段圖于殿壁及畏至入對帝熟視乃夢中所見僧也悚然異之館于西明寺寧薛諸王皆降禮欽重舊唐史嵩嶽元圭禪師示寂師得法于安國師壽七十一宋璟為廣州節度入曹溪禮祖塔誓曰弟子願畢世外護大法祈一祥瑞表信言訖微香襲人甘雨傾注璟欣躍賦詩而去未幾召入與姚崇相繼執政世稱姚宋為中興賢相云通論丁巳五善無畏譯求聞持法八月律師道岸卒帝制圖形林光宮房琯宰桐廬縣與道士刑和璞出遊過夏口村入佛寺坐古松下璞使人鑿地得甕中所藏婁師德與永禪師書笑謂琯曰頗憶此耶琯因悵然悟前生為永禪師也戊午六天竺沙門勒佉緬承廬山東林鴈門風範乃涉遠而至一入山首末六年常坐不臥手引禽食其北嶺佛馱舍利塔院置四百餘載前後居僧皆患水遠師至止一年乃精誠幽感遂致靈泉泌涌色白輕美冬夏無竭廬山記己未七庚申八天竺三藏跋日羅菩提此云金剛智至京有旨迎入大慈恩寺廣弘祕教建曼荼羅依法作成皆感靈瑞一行禪師每咨稟之五月值旱詔智禱雨智結壇圖七俱胝像約以像開眸即雨至三日像果開眸有物自壇布雲彌空斯須而雨帝降詔褒美辛酉九釋智嚴譯修行等經六卷天竺寶思惟遷寂壽百餘歲四月朝廷以麟德曆不驗詔禪師一行改撰新曆行推大衍數立術以應之道士刑和璞謂太史令尹愔曰一行其聖人乎昔洛下閎造太初曆嘗記曰八百年後當差一日必有聖人紏正之今年期差滿而一行推數以紏數家之繆閎言不誣矣愔亦以為然壬戌十七月旱帝遣使詔三藏無畏請雨畏持滿鉢水以小刀攪之誦呪數番即有物如蚪龍從鉢矯首水面畏呪遣之白氣自鉢騰涌語詔使曰速歸雨即至矣詔使馳出頃刻風雷震電詔使趨入奏御衣巾已透濕霖雨彌日而息又嘗霖霪逾時詔畏止之畏揑泥媼五軀向之作梵語若斥罵者即刻而霽其神驗類如此帝敬之若神癸亥十一金剛智譯瑜伽念誦法及七俱胝陀羅尼今在藏十月禪師一行製黃道儀成帝自為之銘詔安武成殿以示百官其儀準圓天之像具列宿赤道度數注水激輪令其自轉一晝夜而天運周外絡二輪綴以日月令得運行每天東行一周日西行一度月行十三度以木匱為地平令儀半在地下晦明朔望有準立木人二於地平其一前置鼓以候刻至一刻則自擊之其一前置鍾以候辰至辰則自撞之皆略施輪軸交錯相持稱其為神功並舊唐史甲子十二菩提流志隨駕入洛勑安置長壽寺善無畏隨駕入洛於大福先寺譯毗盧遮那蘇息地羯羅等經三部十三卷並總持妙門禪師一行三藏寶月等參預其事畏好禪觀每勸學者習之沙門牛雲不慧詣五臺山禮文殊殊現老人身為钁𮌎中淤肉自是卞悟為時導師通論溫州淨居寺尼玄機景雲中得度常習定於平陽大日山石窟中或者云嘗與兄宿覺同參六祖因著圓明歌與證道歌相表裏後倒立而化法屬以生死顛倒語呵之應聲而仆將葬之夕風雷陰黯若有神物移之越二日有自大日來者云是夕空中有蕭罄聲機之柩已厝是峯上其徒迎舍利歸葬于寺建浮屠號圓明塔趙清獻公立載其事永寧編乙丑十三嵩嶽破竈墮和尚隱居嵩山山有廟甚靈廟唯安一竈祭無虗日師入廟以杖擊竈云此泥瓦合成聖從何來靈從何起又擊三下竈乃傾破墮落須臾一青衣人設拜師前曰我本此竈神久受業報蒙師説無生法得脫此生天特來禮謝神再拜而去少頃徒衆問師竈神得何徑旨便得生天師曰我只向伊道是泥瓦合成別無道理為伊衆無語師良久云會麼衆云不會師曰本有之性為什麼不會衆僧乃禮拜師曰破也墮也於是其衆皆悟玄旨丙寅十四日本國沙門榮睿等至楊州奉僧伽梨十領其上綴以山川異物之狀蓋其國主附之以施中國沙門時律師鑒真受其衣歎外國人有佛種性欲往化之會睿等勸請遂附舶而東至日本彼王枉駕迎勞館于毗盧殿未幾請真授歸戒夫人羣臣皆以次稟授日本自是始有律教丁卯十五十一月三藏菩提流志示寂春秋一百五十六前後總譯五十三部合一百一十卷自天后長壽中至京三十餘年華嚴寶積等經皆出其手帝及公卿敬之如生佛葬日特給鹵簿羽儀塔于龍門西原追贈鴻臚大卿諡賜曰開元一切遍知三藏名德之盛古未有焉十一月禪師一行沐浴端坐而逝春秋四十五帝哭之哀甚輟朝三日停龕三七日行容貌如生帝親製書之于石出內庫五十萬建塔銅人原諡曰大慧禪師帝嘗問國祚幾何有留難否行曰鑾輿有萬里之行社稷終吉帝驚問其故不答退以小金合進之曰至萬里即開帝一日發合視之蓋當歸少許及祿山亂駕幸成都至萬里橋忽悟末幾果歸昭宗初封吉王而唐以昭宗而滅故云終吉有里媼素供行而媼子坐罪將之刑媼悲泣請救行憐之令弟子捕生物得雉豕七行日藏其一於甕中為梵語呪之七日北斗盡沒朝廷震驚太史奏將有變請禳之帝以問行對曰此無他蓋妖魔也凡嗔心壞一切善慈心降一切魔若肆赦天下則妖不能為帝然之遂大赦媼子由是得免行日出一豕則一星現至七日而斗復如故其祕術多此類舊唐史戊辰十六詔張説等編次一行大衍曆施用三月駕幸溫湯道由一行塔所帝為駐蹕徘徊令品官詣塔告以出豫之意賜帛五十匹令蒔塔前松柏其為聖眷如此本傳己巳十七燕國公張説薨説為唐宗臣為文精壯尤善釋典著般若心經序曰萬行起於心心者人之主三乘歸於一一者法之宗知心無所得是真得見一無不通是玄通云云又製法池院法堂贊曰是佛虗空相是法微妙光定慧不相離是僧和合義人空法亦空二空亦復空住心三空寶是名三歸處見若不染色知若不取識是名真實見亦名解脫知佛觀離生滅諸法等如是庚午十八金剛智又出曼殊五字心及觀音瑜伽要唐朝傳譯緇素至是已有三十七人所出經律論及傳録等總三百一部二千一百七十卷沙門智升撰開元釋教録二十卷銓次大藏經律論凡五千四十八卷自天地玄黃字號止笙字函后數十函係傳録及唐宋新譯經升又撰續內典録一卷續譯經圖紀一卷又續佛道論衡一卷帝御花萼樓召二教偉匠論義法師道氤與道士尹謙對辨四十往反謙義負有旨編所論入藏題曰開元佛道論衡辛未十九御注金剛經頒行天下壬申二十八月金剛智法師跏趺而逝賜諡灌頂國師救中書杜鴻漸撰紀德俾智初從龍智阿闍梨傳密教及來東土弟子不空傳其教智授以瑜伽五部及毗盧遮那經蘇息軌範通論是歲禪師義福示寂福得法於神秀帝欽重之在京城傳教二十年人皆宗仰有旨賜號大智禪師癸酉二十一方士張果有長年祕術自言數百歲矣帝召至闕變化不測後懇辭還山下制賜銀青光祿大夫號通玄先生果入常山後不知所終甲戌二十二長者李通玄在神福山造華嚴論初開元七年至太原孟縣高仙奴館之齋中三年遷馬氏古佛堂側閲十年負經書而去行二十里偶一虎當塗長者撫之曰吾將著華嚴論能為擇棲止處否即以經囊負其背隨至神福山原下土龕之前蹲駐長者乃於龕著論每夕口出白光以代燈燭有二女子日長為者汲泉炷香奉紙墨每食時輒具淨饌置長者前齋畢撒器而去如是五載至長者著論畢遂滅迹不見本傳乙亥二十三三藏無畏示寂春秋九十九詔鴻臚丞李現監護喪事全身塔于龍門西山廣化寺畏本讓國出家道德名稱為天竺之冠所至講法必有異相嘗過龍河一托駝負經沒水畏懼失經遽隨之入水於是龍王邀之入宮講法為留三宿而出所載梵夾不濕一字其神異多此類丙子二十四三藏不空遊西域博求師匠增廣其學於師子國從普賢闍梨求金剛灌頂及大悲胎藏建壇之法其王有群象奔逸不空遽於路坐象至跪伏由是舉國神敬之本傳丁丑二十五藥王姓韋名古字老師疏勒國人身衣毳袍腰懸數百葫蘆頂戴紗巾手持藜杖常以一黑犬同行時人疾患稍多疼因師遂發願普施藥餌無不痊平覩之者便愈后乃圖形供養皇帝敬禮為藥王菩薩自昔曾五度化身來救貧病其犬化為黑龍背之沖天而去出本草序又神仙傳丞相宋璟薨璟素奉佛法每師曇一法師求詢法要戊寅二十六詔天下州郡各建一大寺以紀年為號曰開元寺己卯二十七沙門法秀夢異僧勸置袈裟五百入終南山施回向寺僧遂造之至山遍訪無所謂回向寺者忽道逢一僧曰吾導汝入回向寺秀隨之入山二日至深絶處唯見雲掩巖洞乃鑽燧出火焚香拜之忽雲開見崖半有朱門高聳秀與之而入見諸僧皆奇偉出袈裟遍寺施之其寺僧擕秀入一空房曰此唐天子舊居也向在此好聲樂故降為人主久當復歸乃授以玉簫并袈裟一條囑曰持歸獻唐天子秀還詣闕表上所寄袈裟玉簫帝覽之因取玉簫調弄宛如夙御焉通論庚辰二十八三月華嚴李長者坐化于神福山龕中先一日出山辭里人里人至已示寂矣壽九十五著華嚴論四十卷及決疑論會釋十門玄義緣生解迷十明等論十玄六相百門義海偈贊等並傳於世本傳十二月青原行思禪師示寂師初見六祖問當何所務即不落階級祖曰汝曾作什麼曰聖諦亦不為祖曰落何階級曰聖諦尚不為何階級之有祖深器之及居青原弟子頗衆得法深者石頭遷傳燈是歲京都普寂禪師示寂寂事秀禪師秀薦於則天得度為沙門秀歿天下奉釋氏者咸師事之中宗聞其高行制令代秀統其法衆開元中有旨移寂於都城居止王公士庶爭來禮謁及卒凡士庶曾謁見者皆制弟子之服敕賜號大照禪師葬日河南尹裴寬及妻子並衰麻列于門徒之次士庶傾城哭送市易幾廢舊唐史是年法師道氤卒帝降詔傷悼本紀辛巳二十九壬午天寶元九月太子詹事嚴挺之卒挺之自預為墓志有曰以某月日葬于大照和尚塔次之西禮也初挺之師事大照禪師慧義深明釋典及遺命葬大照塔次示不忘其德舊唐史癸未天寶二帝遣中使楊庭光入司空山採常春藤光因詣無相寺問本淨禪師佛道之義師云若欲求佛即心是佛若欲會道無心是道光回闕以師聞奏即敕光賫詔起師是冬赴京甲申三載正月上元日召二街名僧赴內道場共司空本淨禪師闡揚佛理有遠禪師問以何為道師曰無心是道遠曰道因心有何得言無心是道師曰道本無名因心名道心名若有道不虗然窮心既無道憑何立二俱虗妄總是假名遠曰禪師見有身心是道否曰山僧身心本來是道遠曰適言無心是道今言身心本是豈不相違曰無心是道心泯道無心道一如故言無心是道身心本來是道道亦本是身心身心本既是空道亦窮原無有如遠者又七人往復論道師詞辨傾注帝及四衆莫不稱善而罷五燈制天下開元寺觀鑄金銅御容冠道冠衣僧衣躡儒履帝自為贊統紀南嶽讓禪師示寂師自曹溪得法初棲武當次來南嶽居觀音道場因號觀音大師參徒雲集得法上首馬祖也元和中張正甫制五燈徑山國一法欽禪師初開元十年依鶴林素禪師出家因有省自此日用妙密超放無拘辦道既久請遊南方素曰乘流而行遇徑即止師禮辭之至是南至餘杭東北徑山默省素語乃登岡阜尋駐錫之地西過危峰之北石巖之隈趺坐石床有老人前致敬曰願捨此居之地為師駐錫之所即請師南進登山絶頂入五峰之間有一大湫指謂師曰吾家若去此湫當漲留一穴之水幸勿堙之我時來相助言訖乃隱於是雲霧晦冥風雨驟作連夜不息及逗曉雨霽湫水盡涸漲沙遂平惟一穴尚存謂之龍井北峰之陽復有草庵可居師遂安禪於此四方雲衲欽慕高道撥草瞻風營巢聚枝未逾數載庵居遍於巖谷名走叢林道滿天下今庵基見在諸草不生本傳乙酉四載召道士吳筠見大同殿帝問道要甚重之而高力士素事佛因短筠於帝筠乃辭還居茅山及為文章深詆釋氏議者譏其背向時浙西觀察陳少遊惡筠所為因命法師神雍著論折之雍著翻迷論以訂其妄筠論遂廢給事中竇紹見雍論歎曰雍可謂塵外摩尼論中師子舊史荷澤神會禪師至京獨斷祖道為南北宗述頓漸門著書曰顯宗論大鑒所傳自是遂尊於天下正宗記丙戌五載不空三藏自西域還五月制天下度僧尼並令祠部給牒今謂之祠部者自是而始丁亥六載詔不空三藏入內結壇為帝灌頂賜號智藏國師時方士羅思遠以術得幸有旨令與不空驗優劣他日會于便殿思遠持如意向之言論次不空就取如意投諸地命遠舉之遠饒力不能動帝擬自取不空笑曰三郎彼如意影耳即舉手中如意示之思遠欽服而罷不空凡祈禱必張繡座手持木神誦呪擲之神自立于座四衆環視必見其神目吻瞬動所禱雖造化之功可奪也朝野奉之如佛戊子七載大將軍高力士於西京作寶壽寺寺鐘成力士作齋以慶之舉朝畢集擊鐘一杵施錢百緡有樂施者至二十杵少者不減十杵唐史己丑八載福州南澗天王寺上有巨石是年五月忽大雷雨頂劈輪囷斬焉中闢南委地以柿落北干霄而碣樹亭亭厥心隱出真像列侍環衛品覺有序莊嚴供養文物咸秩異矣哉蓋諸佛因其不朽之物憑乎不動之基形既長存法可隨永云歐陽詹記庚寅九載給事王維字摩詰奉佛持戒喪妻不娶孤居三十年母喪表請以輞川第施為佛祠唐史洛陽有巨蛇出芒山下長百餘丈人觸氣即死有詔命不空三藏呪之不空驚曰是將混洛陽為瀦者也呪之三日而斃舊唐史五行志辛卯十載石頭希遷禪師參青原得法自天寶初來衡山南寺寺東有石如臺乃結庵其上時號石頭和尚南嶽鬼神多顯迹聽法而師皆與受戒五燈西域犍那至壬辰十一載潤州鶴林寺徑山大師元素示寂左補闕李華製略曰師菩提位中六十一夏父母之生八十五年赴哀位者可思量否至有浮江而奠望寺而哭十里花雨四天香雲幡幢蓋網光蔽日月奉全身建塔于黃鶴山西原州伯邑宰執喪師之禮故齊翰張均梁升徐嶠等皆菩薩戒弟子道流人望莫盛於此弟子嘗聞道於徑山猶樂正子春之於夫子也癸巳十二載西蕃寇圍涼州帝命三藏不空祈陰兵救之空誦仁王密語數番有神介胄而至帝親見之問曰此何神也空曰北方毗沙門天王長子也空誦密語遣之數日涼州捷報有神兵至威武雄盛賊畏懼卷甲而去帝大悅詔天下軍壘皆立毗沙門天王祠甲午十三載左溪元朗禪師示寂初南嶽惠聞悟法華宗旨以授惠思思授智者智者授灌頂頂傳縉雲威威傳東陽威朗事東陽盡傳其道獨處巖穴三十年晏坐左溪因以為號春秋八十二弟子神雍玄淨法燈清辨湛然等數十人傳其教補闕李華志其陰有曰師一多羅四十餘載一尼師壇終身不易遠近學者擁室填門云本傳元德秀卒秀字紫芝少事母孝母亡廬墓側刺血寫佛經絶筆感異香芬馥彌日而息初兄子襁褓喪母無資得乳媼秀自乳之數日涌流能食乃止及為魯山令卓然廉潔房琯每曰見紫芝眉宇使人名利之心都盡及卒家唯枕履簟瓢而已族弟元結哭之曰大夫生六十年未嘗識女色未嘗有十畝之地十尺之舍十歲之童未嘗完布帛而衣具五味而餐吾哀之以誡荒淫貪侫綺紈梁肉之徒耳舊唐史乙未十四載十一月祿山反陷東京肅宗丙申至德元載六月祿山陷長安明皇幸蜀時有守臣與祿山偕反者曾為閬守有畫像在路次明皇以劒斬像首其人在陝西其首忽墮于地明皇嘗問一行國祚何難行進金合祝至萬里即開常曾發視乃當歸少許及是車駕至成都渡萬里橋忽悟當歸之讖於是洗然忘憂云七月肅宗即位靈武旬日諸鎮兵至乃以房琯為相兼元帥時寇難方剡或言宜憑福祐帝納之引沙門百餘入行宮結道場朝夕諷唄帝一夕夢沙門身金色誦寶勝如來名以問左右或對賀闌谷有僧名無漏常誦此佛頗有神異帝召無漏固辭不赴尋救郭子儀諭旨無漏乃見于行在帝悅曰真夢中所見僧也而三藏不空亦見于行宮帝併留之託以祈讓通論溫州龍泉山無著大師居山南一日卜遷忽電電晦冥有龍見山下張白家無著因請捨田建寺而白欲輸其直逮夜天雨錢二十萬以市之遂建院郡上其事賜名龍泉院永寧編丁酉二載正月祿山子慶緒弒祿山自立九月破慶緒復京師十月帝歸京師十二月太上皇至自西蜀是歲華嚴疏主澄觀法師得度具戒即以十事自勵曰體不捐沙門之表心不違如來之制坐不背法界之經性不染情礙之境足不履尼寺之塵脅不觸居士之榻目不析非儀之綵舌不味過午之肴手不釋圓明之珠宿不離衣鉢之側從牛頭忠禪師徑山欽禪師問西來宗旨授華嚴圓教於詵禪師戊戌乾元元年僧無漏立化于禁中足去地尺許左右以聞帝驚異降蹕臨視得遺表歸葬臼谷有旨護迭臼居建塔至懷遠縣輒舉不泥塑全身留之下院帝於禁中立內道場講誦贊唄甚嚴宰相張鎬諫曰願陛下以無為為心不以小乘擾聖慮帝不納尋敕五嶽各建寺選高行沙門主之聽白衣能誦經五百紙者度為僧或納錢百緡請牒剃度亦賜明經出身及兩京平又於關輔諸州納錢度僧道萬餘人進納自此而始己亥二年三月詔天下諸州各置放生池十月升州刺史顏真卿撰有唐天下放生池銘其序有云我皇舉天下以為池罄域中而蒙福乘陀羅尼加持之力竭煩惱海生死之津揆之前古曾何倣佛云云本傳庚子上元元年上遣使詣曹溪迎六祖衣鉢入內供養一云乾元元年荷澤神會禪師示寂敕建塔院賜號真宗般若辛丑二年正月帝不豫皇后張氏刺血寫佛經百僚於諸寺齋僧唐史詔南陽慧忠禪師赴闕詔書略云朕聞調御上乘久安中土大雄付囑實在朕躬思與道安弘宣祕典廣資福潤以及大千傳罔象之玄珠拔沉迷之毒箭良緣斯在勿以為勞杖錫而來京師非遠齋心已久速副朕懷春寒師得安否遣此旨不多及初忠自受曹溪心印居南陽四十年不下山門及是赴詔初安置千福寺帝每召入禁中問道帝一日齋沐致十問於師一曰見性後用布施作福否忠對無相而施合見性二曰作何行業合此道忠答無功而合此道三曰或有病難將何修行抵擬忠對了業本空得不動轉四曰臨終時何得自在忠以努力自信道為對五曰煩惱起時將何止息忠以本心湛然煩惱回歸妙用為對六曰見性後用念佛求生淨土否忠對性即是佛性即淨土七曰捨此陰了當生何處忠以無捨無生自在生為對八曰臨終時有花臺寶座來迎可赴否忠以不取相為對九曰作麼生得神通似佛國忠以見性如貧得寶如民得王為對十曰只依此本性修定得作佛否忠對定得作佛佛亦無相無得乃為真得此十對皆廣有其辭今約科目為對耳帝由是凝心玄旨帝有問十身調御及無諍三昧等緣見五燈壬寅寶應元年四月楚州龍興寺尼真如恍若有人接之升天見天帝授以十三寶謂真如曰中國有災宜以第二寶鎮之楚州刺史崔侁奉表獻于朝一曰玄黃天符二玉雞三穀璧四王母環五碧色寶六如意珠七紅靺鞨八琅玕珠九玉玦十玉印十一桑鈎十二雷斧十三失名帝覽之大悅名曰定國寶帝以獻自楚州即太子所封之國又聞中原宜以第二寶鎮之遂詔太子攝政事大赦改元舊史五月太上皇崩帝衷慟致疾相距十四日而崩代宗即位代宗癸卯廣德元年十一月吐蕃陷京師帝奔陝郭子儀兵至敗吐蕃復京師帝在華陰五臺文殊菩薩見帝納以祕語十二月帝歸京詔修五臺文殊殿鑄銅為瓦塗以黃金費億萬計甲辰二年詔內道場選三百僧百人為番出入乘馬常講誦仁王般若經帝迎忠國師住光宅精藍乙巳永泰元始上好祠祀未甚重佛元載王縉杜鴻漸為相三人皆好佛縉尤甚不食葷血與鴻漸造寺無窮上嘗問以佛言報應果為有無王縉奏曰國家運祚靈長非宿植福業何以致之福業已定雖時有小災終不能為害所以祿山思明毒流方煽而皆有子禍僕固懷恩稱兵內侮出門病死回紇吐蕃大舉深入不戰而退此皆非人力所及豈得言無報應也上由是深信之載等每侍上從容多談佛事由是宮中祀佛梵唄齋熏無少懈群臣承風旨四方之民皆相化矣詔天下官司無得箠辱僧尼禁中講誦仁王經詔命不空三藏重譯仁王經舊本五月帝夢六祖請衣鉢歸曹溪遣中使送還九月鑄金銅佛像於光順門率百僚拜祀十月吐蕃寇逼京師內出仁王經二輦送西明諸寺講之寇平十一月詔法師良賁造新仁王經疏疏成賁以表進呈帝稱善丙午大曆元七月壬午作盂蘭盆會于禁中設高祖太宗已下七聖位建巨幡各以帝號標其上自大廟迎入內道場鐃吹鼓舞旌幢燭天是日立仗百僚於光順門迎拜導從自是歲以為常癸未太廟二室生靈芝帝賦詩美之百僚皆和丁未二年七月魚朝恩奏以先所賜莊為章敬寺以資章敬太后冥福窮壯極麗費逾萬億進士高郢兩上書皆寢不報是月宰相杜鴻漸出撫巴蜀至益州遣使詣白崖山請無住禪師入城問法曰弟子聞金和尚説無憶無念莫妄三句法門未審是一是三無住曰無憶名戒無念名定莫妄名慧然一心不生則具戒定慧非一非三也時聞鴉鳴公問師聞否師曰聞與不聞非關聞性有聲之時是聲塵自生無聲之時是聲塵自滅而此聞性不隨聲生不隨聲滅悟此聞性則免聲塵流轉乃至色香味觸亦復如之公與僚屬喜躍稱善公又問何謂識心見性答曰一切人隨念流浪蓋為不識真心不見本性真心者念生亦不順生念滅亦不依寂不定不亂平常自在觸目皆如無非見性也鴻漸由是棲心禪悅五燈戊申三年詔不空三藏於興善寺立道場命近侍大臣及諸鎮將帥悉授灌頂帝親為不空敘官特進鴻臚卿帝召忠國師入內引太白山人見之帝曰此人頗有見解請師驗之忠曰汝蘊何能山人曰忝識山識地識字善算曰山人所居之山是雄山雌山山人茫然不能對忠指殿上地問此是何地曰容弟子算方知忠於地上畫一畫云此甚字曰一字忠云土上一畫是王字何謂一字耶忠又云算三七是多少曰國師玩弟子三七豈非二十一忠云却是山人弄貧道三七是十何謂二十一復問更有何能曰弟子縱有能亦不敢向國師開口忠曰縱汝有能亦俱未是忠乃謂帝曰問山不識山問地不識地問字不識字問算不解算陛下何處得此幪漢來帝謂山人曰朕有國位不足為寶師乃國寶也山人曰陛下真識寶者矣是歲詔徑山道欽禪師詔書云朕聞江左有蘊道禪人德性氷霜淨行林野朕虗心瞻企渴仰懸懸有感必通國亦大慶願和尚遠降中天盡朕歸向不違願力應物現形今特詔迎速副朕懷春寒師得安否遣此旨不多及師赴詔至闕帝親加瞻禮慰問從容因曰朕聞徑山神龍獻湫為寶坊非師道德莫能如此師一日在內庭見帝起立帝曰師何必見朕起身師曰陛下何得向四威儀中見貧道帝悅賜號國一禪師本録己酉四年帝嘗在便殿指魚朝恩謂忠國師曰朝恩亦解些子佛法朝恩即問國師曰何是無明無明從何起師曰佛法衰相今現帝曰何也師曰奴也解問佛法豈非衰相現朝恩色怒師曰即此是無明無明從此起朝恩復曰有人言師今是佛得否師曰有人言汝是天子果否恩伏地曰死罪朝恩實非天子師曰我不是佛恩曰師應長作凡夫無成佛時耶師曰我向後必當作佛我若作佛不名慧忠汝向後若作天子改却姓莫不姓魚否朝恩仍伏地曰死罪朝恩此去實不敢向師論佛法忠謂帝曰幾怕殺此奴通論徑山欽禪師力請歸山江西道一禪師説法于豫章開元寺時號馬祖牛頭慧忠禪師示寂師平生一衲不易器用唯一鐺嘗有供僧穀二廩盜者窺伺虎為守之縣令張遜入山頂謁問師有何徒弟曰有三五人師敲床三下有三虎哮吼而出遜驚怖而退及移居莊嚴寺將建法堂築墓有二神人定其四角潛資夜役不日而成由是學徒雲集至是將終石室前挂鐺樹挂衣藤無故枯死師集衆布薩訖淨髮浴身怡然坐化五燈庚戌五年西域大耳三藏至京自云得他心通帝請忠國師試驗忠曰汝道老僧今在甚處耳云和尚是國師何得往天津橋看弄猢猻忠又問今在甚處耳云國師何得去西川看競渡忠又問今在何處耳良久罔知去處忠叱云這野狐精他心通在什麼處三藏不空示疾以表辭帝詔遣內使勞問就加開府儀同三司蕭國公空辭讓數四帝不允六月癸未沐浴更衣吉祥安臥而寂帝輟朝三日贈司空追諡大辨正廣智三藏和尚荼毗日詔遣中謁者賫祝文祖祭睿詞深切禮冠群倫此出傳而通鑑載師卒於九年辛亥六年淮南節度使張廷賞狀舒州三祖僧粲大師行實請諡于朝四月賜諡鏡智禪師塔曰覺寂九月詔以不空三藏舍利起塔于舊居寺御史嚴郢撰紀德略曰和尚西域人也玄宗肅宗代宗三朝皆為灌頂國師僧夏五十享年七十譯經一百三十六卷自金剛薩埵於毗盧佛前受瑜伽上乘義傳於龍猛猛傳於龍智闍黎智傳金剛智闍黎金剛智東來傳於不空凡六葉矣不空傳於惠朗等天下謂之密教十二月越州律師曇一示滅師慧辨該博大弘律教陸象先李雍等名士皆為莫逆之友壬子七年顏魯公真卿撰撫州寶應寺律藏院戒壇記略曰州有謝靈運番經臺尚書魏公奏為寶應寺請惠欽律師登壇董木鐸焉遠近駿奔道場側塞像法於變皆欽化道之力焉癸丑八年西域沙門純陀至京時年六百餘歲帝召見問以養生之術甚蒙咨挹杜鴻漸以疾辭宰相釋位三日而薨臨終儼朝服加僧伽梨剃鬚髮而逝遺命依沙門法葬舊史甲寅九年道士史華以術得幸因請立刃梯與沙門角法有旨兩街選僧克日較勝負沙門崇惠常誦楞嚴呪表請挫之帝率百僚臨觀史華履刃梯而上命惠登之惠躡刃而升往復無傷惠乘勝命聚薪於庭舉烈焰惠入火聚呼華入華慚汗不敢正視帝大悅而罷賜崇惠號護國三藏佛道論衡沙門圓澤與隱士李源厚善相率遊峨嵋澤欲由長安往源欲自荊州往遂自荊州舟次南浦見錦襠婦汲水澤泣曰所不欲由此者為是源驚問故澤曰婦人孕三稔矣遲吾為之子不逢則已今逢無可逃者我生三日願公臨顧以一笑為信後十三年於杭州天竺寺外當與公相見吾以三生為比丘居湘西之嶽麓寺有巨石林間當習禪為上澤亡婦乳三日源往視之兒果笑後如期至吳赴約於葛洪井畔聞牧童歌曰三生石上舊精魂賞月吟風莫要論慚愧情人遠相訪此身雖異性常存源曰澤公健否答曰李君真信士然世緣未盡且勿相近惟勤修不惰乃復相見又歌曰身前身後事茫茫欲話因緣恐斷腸吳越江山尋已遍却回煙棹上瞿塘遂隱不見乙卯十年忠國師將去世入辭代宗帝曰師滅度後弟子將何所記忠曰告檀越造取一所無縫塔帝曰請師塔樣忠良久曰會麼帝曰不會忠曰吾有侍者應真真后住耽源也却知此事以十二月九日右脅而寂弟子奉全身建塔賜諡大證禪師帝尋召應真入內舉前語問之真良久曰聖上會麼帝曰不會真述偈曰湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識丙辰十一年衛州別駕周伯玉常持金剛經忽見梵僧玉問是誰曰我是須菩提為汝誦經數年不斷肉食汝若志心求佛必須斷肉伯玉自此斷肉蔬食轉加誦持證驗賦丁巳十二年華嚴疏主澄觀字大休初大曆三年詔入內與三藏不空譯經為潤文大德既而辭入五臺山大華嚴寺覃思華嚴博覽異學戊午十三年詔兩京律師詳定新舊律條列持犯頒行天下時禪化大行江西主大寂湖南主石頭往來憧憧並湊二大士之門己未十四年天柱山崇慧禪師初得法初牛頭威僧問達磨未來此土有佛法否曰未來且置即今事作麼生又曰他家來大似賣卜漢相似見汝不會為汝錐破卦文才生吉凶在汝分上一切自看是年示寂肉身不壞數百年猶在五月帝崩德宗即位德宗庚申建中元鄧隱峰禪師因燒浴燒殺一僧一日揭天窗呼曰還我命來師云爾生耶死耶僧曰死也師云爾既死已覔命者誰僧謝曰我已得無生忍乃不見辛酉二年大梅常禪師自見馬祖後直入大梅山住二十年祖聞令一僧去問見馬師得何道理便住此山師曰馬師道即心是佛便向這裏住僧云馬師近日佛法又別又道非心非佛師云這老漢惑人未有了日任爾非心非佛我只即心是佛僧回舉似祖祖云梅子熟也壬戌三年德宗遣使召懶瓚瓚方撥牛糞火尋煨芋食之寒涕垂膺未嘗答使者且勸拭涕瓚曰我豈有工夫為俗人拭涕耶竟不能致而去自咏云深夜一爐火渾家團欒坐煨得芋頭熟天子不如我又題其像曰糞火但知黃美銀鈎那識紫泥新尚無心緒收寒涕豈有工夫問俗人癸亥四年十月朱泚兵反僭國號秦帝幸奉天澄觀法師著華嚴疏以信解行證分華嚴為四大科凡歷四年而文成甲子興元元五月復京師七月帝還京南嶽明瓚禪師初隱居上封宰相李泌乾元中入衡嶽謁之瓚誦經泌曰將非避隱者有雲霄意乎瓚唾之曰莫相賊泌色不為動瓚久之見泌立候不懈乃曰飯未泌曰未也瓚撥火出芋食泌與語久之辭去瓚撫其背曰好做十年宰相至是泌用事為帝言其高行有詔徵之使者至石窟宣麻命曰尊者起謝恩瓚閉目盤足凝坐略不以介意使者不之迫回奏其事帝咨美之數四不已瓚嘗著歌略曰世事悠悠不如山丘臥藤蘿下塊石枕頭生死無慮更復何憂五燈荊溪湛然禪師示寂翰林梁肅題其陰曰聖人不興必有命世者出焉自智者以法付灌頂再世而至左溪明道若昧待公而發乘此寶乘煥然中興其受業身通者三十有九人而縉紳先生高位崇名屈體受教者數十師嚴道尊遐邇歸仁自非命世亞聖曷以臻此乙丑正元元居士龐蘊字道玄世習儒業父為衡陽刺史卒于任遂家焉居士自幼敏悟節槩高潔每混俗和光嘗以船載家珍數萬沉于洞庭之淵人問居士何不布施不造寺士曰自無始來由為因果相牽不得解脫自是生涯淡如也有男名耕穫女名靈照日鬻笊籬於市以自活居士是年始謁石頭和尚忘言妙契一日石頭問日用事作麼生士呈頌曰日用事無別唯吾自偶諧頭頭非取捨處處沒張乖朱紫誰為號溪山絶點埃神通兼妙用運水與搬柴石頭然之後之江西參馬祖問不與萬法為侶者是什麼人祖曰待汝一口吸盡西江水即向汝道居士大悟自是機辨諸方莫能禦矣丙寅二年五月詔律師道澄入宮為妃嬪內侍授戒賜號大圓律師制諸寺宣講復作蘭盆會翰林梁肅修天台止觀論成著止觀統例略曰止觀者導萬化之理而復於實際者也物之不能復者昏與動也照昏謂之明駐動謂之靜明靜止觀之體也在因謂之止觀在果謂之智定使其動而能靜靜而能明因相待以成法即絶待以照本也噫止觀其救世明道之書乎非聖智超絶其孰能知乎若凡夫生滅心行三惑浩然於言説之中推上妙之理是猶醯雞而説大鵬夏蟲之議層氷其不可見明矣丁卯三年法師澄觀華嚴疏成初為衆講之感景雲凝停講堂前之空中又為僧睿等著隨疏演義四十卷隨文手鏡百卷戊辰四年京師地震三十六番詔迎岐州無憂王寺佛指骨入禁中供養三月江西馬祖道一大師示寂臨終偈曰心地隨時説菩提亦只寧事理俱無礙當生即不生門弟子奉靈骨舍利建道場于石門相國權德輿為之宣宗賜諡大寂禪師得法弟子百三十九人各為一方宗主轉化無窮禪宗至此大盛于世己巳五年十月遣中使賫詔迎澄觀法師赴闕徑山國一欽禪師居龍興寺是年帝遣中使勞問五泄靈默禪師初參石頭遷出門還曰從生至老只是這個師大悟棲止久之自貞元初入天台住白沙道場復居五泄庚午六年十二月石頭希遷禪師示寂壽九十一諡無際大師師初閲肇論云會萬物為己者其唯聖人乎遂豁然曰聖人無己靡所不己因著參同契其辭略曰竺土大仙心東西密相付事存函蓋合理應箭鋒拄承言須會宗勿自立規矩觸目不會道運足焉知路進步非遠近迷隔山河固謹白參玄人光陰莫虗度五燈惟惲禪師初參馬祖得心要至是行化於吳越辛未七年六月帝幸章敬寺觀譯經帝賦詩太子群臣皆和處州西堂藏禪師參馬祖得法祖有藏頭白之語至是衆請開堂壬申八年十二月徑山國一欽禪師示寂賜諡大覺禪師壽九十二憲宗元和十年敕賜石行狀比部崔元翰撰惟惲禪師至鄱陽山神求受八戒癸酉九年龐居士自見馬祖諸師之後放曠自如遊止襄漢山林城市不定所居女靈照常隨之士有偈曰心如境亦如無實亦無虗有亦不管無亦不拘不是聖賢了事凡夫甲戌十年釋皎然名晝一作字有逸才為顏魯公于頔吳季德諸公所敬陸羽至則清談終日天下士夫服其標致然恥以文章名世嘗嘆曰使有宣尼之博識胥臣之多聞終日目前矜道修義適足以擾真性豈若松巖雲月禪坐相偶無言而道合至靜而性同吾將入杼山矣於是裒所著詩文火之後中丞李洪刺湖州枉駕訪晝請及詩文曰貧道役筆硯二十餘年一無所得冥搜物纍徒起我人今棄之久矣洪搜之民間僅得十卷晝沒相國于頔序之進于朝德宗詔藏祕閣乙亥十一年律師靈徹字源澄居越州雲門寺一時公卿負才望若劉長卿嚴維皇甫曾皆投刺結友徹詩與皎然僧標齊名著律宗行源二十一卷初徹遊京師名聞輦轂緇流嫉其盛造飛語浸誣得罪徒汀州入會稽遂終老於吳越相國權德輿曾作序餞之有觀其容鑒其詞知其心不待境靜而靜之語陸德輿又與玄禪師厚善玄歸天竺德輿以序餞之略曰桑門患為外見所雜既得之患為內見所縛今玄公翛然二見之間不外不內冥夫至妙且以勾吳山水之絶境天竺又經行之淨界振錫而往其心浩然蓋隨緣生興觸物成化而不為外塵所引也丙子十二年西嶺吳中士夫雅與之遊如李吉甫韓皇孟簡輩皆與結西外交吳人語曰杭之標摩雲霄越之徹洞氷雪霅川書記清秀景陵陸羽見標稱之曰日月雲霞吾知為天標山川草木吾知為地標推能歸美吾知為德標間居趣寂得非名實在公乎杭人尊之而不名呼西嶺和尚時天皇道悟禪師初居荊州當陽柴紫山學徒依附駕肩接迹都人士女嚮風而至連師迎入城郡遂居天皇時江陵尹僕射裴公問法勤至師素不迎送客無貴賤皆坐而揖之裴公愈加歸向由是石頭法道盛于此席
