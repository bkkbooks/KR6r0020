body:
  text: 宋括山一庵釋本覺編集明善慶童子畢之鉉較訂五代後梁朱氏都汴遷洛二主共十七年丁卯梁太祖開元唐李克用天佑四秦李茂貞吳越武肅王錢鏐楚武穆王馬殷荊南南平高季興吳景帝楊渥閩太祖王審知蜀王建南漢劉隱梁太祖本名溫僖宗賜名全忠至是受唐禪即位更名晃閩太祖請雪峯玄沙入內求示心法二師喚云大王志心聽取幻化空身是大王法身知見了總是大王本源自性天真佛大王心心如木石去如虗空去觀心無心從妄想起我心自空即悟實相百千三昧智慧俱在大王心大王今既已知本性一時放下不得別生絲髮許也此名無功之功功不虗棄此是佛祖玄旨願大王發大弘願保持取作佛去莫受輪迴不可容易王禮二師曰百生慶幸得逢指示二師向王言但念念常空寂日用有大果因但布施廣作利益竝為助道之門不拘有無之見一切自在但日日脩無功用道王拜謝捨金二十鋌二師各不受王又問玄沙此一真心本無生滅今此一身從何而有師曰此本源真性自徧周法界為妄想故有一點識性從父母妄緣而生便即傳命受千般苦身有輪迴佛者覺也大王既知覺了不落惡趣但請大王頻省妄念歸真合道大王作禮信受奉行雪峰錄戊辰開平二唐李克用病篤莊宗存勗立五蜀武成元三月雪峯存禪師示疾閩王命醫診視師曰吾非疾也竟不服藥五月二日遊藍田歸澡身中夜入滅壽八十七臘五十九師住山四十餘年法席之盛卓冠天下學者冬夏千五百人閩王雅隆其道為之增宇設像鑄鍾以嚴其山優施以充其眾時迎館于府請求法論見十一月玄沙師備禪師示寂僧寶傳云十二月師初住梅溪後居玄沙一時天下叢林海眾皆望風欽服閩帥王公待以師禮學徒垂千人室戶不閉師應機接物垂三十年所演法要有大小錄行于世壽七十五臘四十四閩帥賜號宗一禪師五燈己巳三唐莊宗六吳隆演二雲盖志安禪師一本曰志元非一日衡山道正表奏湖南馬王乞與師論義王遂請師至具云茶罷師就大王借一口劒乃握劒問道正云爾本教云恍恍惚惚其中有物是什麼物杳杳冥冥其中有精是甚麼精道得即不斬道不得即斬道正無語拜求悔過安為王曰識此人否王曰識安曰誰王曰道正安曰不是其道若正合對得臣僧只是無主孤魂王大悅因斯道門不復紛紜五燈庚午四七三南嶽惟勁頭陀集光化以來宗師機緣為續寶林傳四卷欽山文䆳禪師初巖頭雪峰率師遊方二大士各承德山印記師雖屢激揚而終然凝滯後於洞山言下發解年二十七乃住欽山師一日與道士論義士立義曰麤言及細語皆歸第一義師曰道士是佛家奴士曰大麤生師曰第一義何在道士無語五燈辛未乾化元八蜀永平元南漢劉岩重雲暉禪師深入圭峰石壁間見磨衲數珠忽憶前身道具因就建寺方薙草有祥雲出眾峰間遂名曰重雲虎豹皆自引去又塞龍潭龍亦移他處後唐明宗賜額曰長興初暉居洛京中灘日以施水給藥為事有癩比丘求師洗摩師為之無難色俄有神光異香忽失所在五燈壬申二九南漢湖州道場山如訥禪師自翠微受訣乃止道場山薙草卓庵學徒四至遂成禪苑癸酉均王乾化三唐滅燕三杭州瑞應幼璋禪師請吳越錢王每年於天台山建金光明道場諸郡黑白大會逾月而散光明大會始於師也五燈甲戌四十一四四月六日投子大同禪師示寂一云乙亥壽九十六詔諡慈濟大師乙亥真明元十二五石門蘊禪師自得旨於青林虔初住黃嶽蘭若未幾遷夾山道由潭州時楚王馬氏出城延接便問如何是祖師西來大道師曰好大哥御駕六龍千古秀玉街排仗出金門王大喜延入天冊府供養師應機多云好大哥時稱大哥和尚丙子二十三蜀正元明州奉化縣布袋和尚常以杖荷一布囊并破席凡供身之具盡貯囊中日市見物則乞或醯鹽魚𦵔才接入口分少許投囊中時號長汀子師臥雪不沾而每示吉凶必應常在街立僧問和尚在這裏作麼曰等箇人曰來也師曰汝不是這箇人師曰乞我一文錢是年一云三年丁丑三月師將示滅於岳林寺廊下端坐磐石而說偈曰彌勒真彌勒分身千百億時時示時人時人自不識乃安然而化其後復現於他州亦負布袋而行四眾競圖其像師有歌偈行于世丁丑三十四蜀天漢元漢乾享元戊寅四十五光天元二龍湖普門禪師一日集徒曰吾將他適院事付聰教二門人乃說偈曰我逃世難來出家宗師指示箇歇處住山聚眾三十年對人不欲輕分付今日分明說似君我斂目時齊聽取寺眾凄然堅請且為佛法住世師曰汝等豈不知達磨隻履西歸普化全身脫去之旨耶何以去來生滅視吾也既而跨虎凌晨抵信州應供到彼齋僧方集供罷就長者更覔一分與行者長者謂師獨行不諾所請遂覔水一盂撰拄杖為虎高馭而去至開元寺而龍湖寺僧至彼追之乃祝之曰吾不復歸山中已有聰禪師矣故龍湖無開山祖師之塔惟有跨虎庵基為古今之證又有禪師照水自寫真像至今存焉勑諡圓覺禪師凡有祈禱其應如響而院前有師所坐之杉至今間生異華別本謂示寂者非也己卯貞明五十六吳武義元蜀順正公衍乾德年三正月鄂州青平山令遵禪師歸寂諡法喜禪師庚辰六十七二二四漳州羅漢琛禪師初參玄沙與慧球齊名號二大士琛能秘重大法痛自韜晦漳州牧王公請住城西石山地藏十餘年接法眼及善脩洪進山主三人後遷止羅漢破垣敗簀人不堪其憂非忘身為法者不至辛巳龍德元十八吳睿湟傳順義元三五九峰虔禪師先是馬祖歿於豫章開元寺百丈等塟舍利於海昏石門百丈廬塔十餘年乃㳂馮川上車輪峰逢司馬頭陀勸百丈留止因不復還石門虔自九峰往游焉遂成法席為泐潭第一世繼百丈遺蹤也是年安坐而化諡大覺塔曰圓寂壬午二十九二四六杭州龍冊寺順德怤大師自雪峰得旨初住越州鏡清學者奔湊副使皮光業謂人曰怤師高論人莫窺其極也次錢王欲廣府中禪會命居天龍寺始見師乃曰真道人也致禮勤厚由是吳越盛於玄學其後又創龍冊寺延請居焉五燈癸未三唐同光元三五七九月十三日龍牙遁禪師趺坐而化壽八十九夏六十九師有偈頌行于世二月唐莊宗李存勗即位于晉陽十月滅梁梁二主十七年國除後唐李氏都鄴遷洛四主十四年甲申唐莊宗同光二秦吳越楚南平吳四閩蜀六漢八京兆蜆子和尚事迹頗異居無定所自印心於洞山混俗閩川不畜道具不循律儀冬夏一衲逐日㳂江岸採掇鰕蜆以充其腹暮即宿東山白馬廟紙錢中居民目為蜆子和尚華嚴靜禪師聞之欲決真假先潛入紙錢中深夜師歸嚴把住曰如何是祖師西來意師遽答曰神前酒臺盤嚴放手曰不虗與我同根生嚴後赴莊宗詔入長安師亦先至每日歌唱自拍或乃徉狂泥雪去來俱無蹤迹厥後不知所終五燈莊宗詔興化獎禪師入內帝執弟子禮扣問宗旨頗有契會帝一日曰朕收復中原得一顆明珠未有人酬價師曰請陛下珠看帝以手舒開幞頭脚師曰君王之寶誰敢酬價乙酉三秦王從曮京兆華嚴休靜禪師自東山得旨初住福州東山華嚴未幾莊宗徵入輦下大闡玄風一日莊宗請入內齋見眾僧看經唯師與徒眾不看帝問師為甚不看經師曰道泰不傳天子令時清休唱太平歌帝曰師一人即得徒眾為甚也不看師曰師子窟中無異獸象王行處絕孤蹤帝曰眾僧為甚麼總看經師曰水母元無眼求食須賴蝦帝曰既是後生為甚麼却稱長老師曰三歲國家龍鳳子百年殿下老朝臣師後於平陽示滅諡寶智禪師五燈西蜀禪月大師貫休示寂興化獎禪師示滅丙戌明宗亶天成元吳越寶正元六閩惠宗蜀知祥二二四月莊宗殂明帝即位東京普淨院常覺禪師初訪歸宗章聞法省悟因遊上都於麗景門外獨居二載間有北隣信士張生請師供養張有悟入乃設榻留宿至夜與妻竊窺見師體遍一榻頭足俱出及令婢僕視之即如常倍加欽慕曰弟子夫婦垂老今願割前堂以裨丈室師欣然受之至天成三年遂成大院賜額曰普淨五燈丁亥二吳乾貞元三四月瑞龍璋禪師從錢王乞墳王笑曰師便爾乎遣陸仁璋於西關建塔塔畢璋往辭錢王囑以護法恤民還而坐化壽八十七坐七十夏戊子天成三三二漢大有元閩王延鈞度民二萬為僧由是閩中多僧通鑑秋羅漢琛禪師沐浴安坐而化壽六十二扣水澡光古佛初參雪峰峰曰子異日必為王者師後自鵝湖歸溫嶺結庵今永豐寺繼居將軍岩二虎侍側神人獻地為瑞岩院學者爭集嘗謂眾曰古聖脩行須憑苦節吾今夏則衣楮冬則扣氷而浴故世人號為扣氷古佛後住靈曜至是年應閩主之召延居內堂敬拜曰謝師遠降賜茶次師提起槖子曰大王會麼曰不會曰人王法王各自照了留十日以疾辭至十二月二日沐浴升堂告眾而逝王與道俗備香薪茶毗祥耀滿山舍利五色塔於瑞岩正寢諡妙應法威慈濟禪師自是至今遠近禱祈靈異非一己丑四四南平從誨吳大和元東京普淨院常覺禪師以時機淺昧難任極旨乃曰我寧不務開法由是每月三八施浴僧道萬計師嘗謂諸徒曰但得慧門無壅則福何滯哉五燈閩永福縣高蓋院有山若寶蓋初有徐仙弟妹七人上升齊建元有陳慧炬禪師謝智著侍者絕粒坐禪後俱坐化今二真身俱在至是閩王封山曰西岳焉長樂集庚寅長興元秦吳越五楚二三雲門文偃禪師初參睦州州見來便閉門師三扣門州云作什麼師曰己事未明乞師指示州才開門師拶入州擒住云道道師驚不暇答州推出曰秦時𨍏轢鑽隨掩其扉損師右足師從此悟入州即指師見雪峰到雪峰決擇久之遍訪諸方晚遊廣中靈樹敏請為第一座先是敏不請首座有勸請者敏曰吾首座已出家久之又請敏曰吾首座已行脚悟道久之又請敏曰吾首座已度嶺矣及師至敏迎笑曰奉遲甚久何來暮耶即命之偃不辭而就職俄廣主劉王將興兵就敏決可否敏前知之手封奩子語侍者曰王來出以似之乃怡然坐化王果至聞敏已化大驚問和尚何時得疾而遽亡耶對曰師不曾有疾適封一奩子令候王至呈之王開奩得一帖子書云人天眼目堂中上座王於是請偃繼其法席又迎至府開法久之遷住韶陽雲門山學者望風而至辛卯長興二吳越寶正六楚王希聲南平吳睿王大和三四汝州風穴沼禪師初游方參鏡清怤不契北遊襄寓止華嚴遇南院侍者守廓默悟南院宗旨廓使更見南院院一見喜之於是從容承稟日聞智證院曰汝乘願力來荷大法非偶然也穴依止六年辭去是年至汝州見草屋數椽依山問於田父父曰古風穴寺歲飢眾弃去餘佛像鼓鍾耳穴入留止日乞村落單丁者七年檀信為新之成叢林壬辰三楚王希範四五五月十七日長慶稜禪師歸寂師兩處開法徒眾一千五百化行閩越二十七載壽七十九傳燈八月六日吳奉化軍陸元浩撰廬山仙居洞永安禪院記略曰堯舜為君仁化唯該於域內周孔設教軌儀但備於寰中尚乃千古從風百王稟敬而況釋氏興世妙用難思慈悲遍洽於含生行願廣弘於沙劫永安院唐僧如義卜焉至是眾請惠從長老來住興舊院云廬山記癸巳四吳越穆文王元瓘五閩龍啟元六十一月明帝殂閔帝從厚即位契如庵主初於玄沙得旨乃隱於小界山刳大杇杉若小庵但容身而已一日清豁冲照二長老訪師頗味高論不覺及夜覩豺虎奔至庵前自然馴遶二公尋於大章山創庵請師居之兩處孤坐垂五十二載而卒甲午唐潞王清泰元六二蜀明德元七四月潞王從珂兵至閔帝出奔潞王即位天台國清靜上座初於玄沙言下悟入後居天台三十餘載嘗有問心念紛飛未明攝伏師答却將紛飛之心以究紛飛之處究之無處則紛飛之念何存返究究心則能究之心安在云云師因覩教中幻義述偈曰若道法皆如幻有造諸過惡應無咎云何所作業不忘而藉佛慈興接誘有小靜上座答曰幻人興幻幻輪圍幻業能招幻所治不了幻生諸幻苦覺知如幻幻無為今國清遺蹤在焉乙未二吳天祚元閩永和元蜀楚恭孝王昶明德二八法眼文益禪師初遇羅漢琛琛問山河大地與自己是同是別師曰同琛竪兩指曰兩箇師有省乃求決擇頓明大事久之卓庵而居次歷江外至臨川州牧請住崇壽有僧子方參因舉萬象之中獨露身方乃大悟自是諸方存知解者翕然而至始則行行如也師微以激發皆漸而服膺海參之眾常不下千計未幾道化聞於江表金陵國主重師之道迎居報恩號淨慧禪師次遷清涼五燈丙申清泰三二閩康宗昶通文元三九十月石敬塘兵至而帝自焚死十一月敬塘即位改元天福唐國除時胤孫罷歸田里初學韓文多斥釋氏後學佛有悟乃撰法喜集佛國記行於世時人曰侫清泰不徹乃來侫佛本傳後晉石氏都沐二主十一年丁酉晉高祖天福二唐烈祖李升受吳禪改昇元元二四十正月風穴沼禪師州牧聞其風盡禮致之上元日開法嗣南院八月杭州龍寺順德大師道怤示寂黑白哀號制服者甚眾壽七十四師三處開法有語錄五燈戊戌三二三蜀廣政元十一夏石亭光湧禪師無疾而化壽八十九坐七十夏一云丁酉年溫州馬大卿夢五百僧抵其家假館翌日有五百羅漢像迎過其門馬君感異以屋借之時出光異遂捨宅為寺號羅漢寺皇朝祥符賜崇信寺額俗猶呼羅漢巷是坊本名清政易為從善亦因寺名也見永寧編己亥四三閩景宗曦永隆元二十二圓通緣德禪師初參襄州清溪進久之江南李氏有國日德混跡南昌上藍宋公齊丘至游經堂僧眾趍迎師閱經自若公旁立睨之師不甚顧答公問上座看甚經師舉示之公異焉力請住舍利幽谷雙嶺諸剎師無所事去留所至頹然默坐而已而學徒自成規矩平生著一衲裙以繩貫其褶處夜伸其裙以當被僧寶上天竺僧道翊一夕見山間光明往視之得奇香木乃命良工刻成觀音像白光煥發夜亡列燭之光晝掩太陽之景聖像既成靈感尤盛乾祐戊申歲有僧從勳見曰吾遊洛得古佛舍利一顆寶之久矣今願置菩薩毫相中可以助其神翊師從之至今舍利或現頂冠肉髻間觀音文庚子五四二三十三閩王曦度民為僧萬一千人通鑑廬州佛手岩行因禪師自鹿門真得法尋抵廬山佛手岩下有石窟可三丈餘師宴處其中江南李主三召不起堅請就棲賢開堂不逾月潛歸岩室後示微疾謂侍僧曰日午吾去矣及期下床行數步屹然立化李主備香薪茶毗建塔五燈辛丑六吳越文穆王元瓘薨五三四十四閩王於城南西阜建石塔七層功未半而光發如蓋者三夕既成而光耀際天者又三夕王慰幸遂額曰淨光而於其下建僧宇焉長樂集壬寅七吳越忠獻王弘佐六五漢殤帝玢光天元天台韶國師初參龍牙遁禪師疎山矮師叔見知識五十四人刮磨搜剝窮極隱秘不知端倪心志俱疲至曹山但隨眾而已有僧問法眼曰十二時中如何得頓息萬緣去眼曰空與汝為緣耶色與汝為緣耶言空為緣則空本無緣言色為緣則色心不二日用果何物為汝緣乎韶聞悚然異之又有問如何是曹溪一滴水眼曰是曹溪一滴水韶聞乃大悟平生疑滯渙若氷釋感涕沾衣眼曰汝當大宏吾宗行矣無自滯於是游天台觀智者遺蹤如故居睠然有終焉之心癸卯晉齊王重貴八唐元宗景保大元閩福恭懿王延政天德元漢中宗成乾和元法眼禪師因江南李主請入內庭見牡丹花主索師詩師乃頌云擁毳對芳叢由來逈不同髮從今日白花是去年紅艶異隨朝露馨香逐晚風何須待零落然後始知空王頓悟其意甲辰開運元二二七二江南上元縣一民暴死三日復甦云至一殿庭忽見先主樏械甚嚴民驚問曰主何至此曰吾為宋齊丘所誤殺和州降者千餘人冤訴囚此汝既得還仗汝歸語嗣君凡寺觀鳴鍾當延之吾受苦唯聞鍾則暫休或能為造一鍾尤善吾在位嘗與于闐國交聘遺吾一玉天王像吾甞置於髻後藏於瓦棺寺佛左膝人無知者汝以此事為驗民既還家遂乞見主具白之主親詣瓦棺剖佛膝得之感泣遂立造一鍾於清涼寺鐫其上云薦烈祖孝高皇帝脫幽出厄以玉像建塔塟於蔣山出法苑劉煦授司空平章事撰舊唐史佛祖異迹並載之至本朝歐陽公撰唐書始皆刪去乙巳二三閩天德三為唐滅八三興聖國師神晏示寂師自閩王請住山三十餘年學徒雲集閩王禮重常詢法要壽七十三京兆永安善靜禪師初參樂晉安禪師尋歸鄉節帥創永安禪苑以居之徒眾五百明年囑累訖右脇而化壽八十九諡淨悟大師丙午三四九四吉州禾山無殷禪師初參九峰䖍虔沒游廬陵止禾山大智院學者雲集南唐後主聞其名詔至金陵問法久之命居楊州祥光院懇辭歸山以翠岩院乃江西勝槩逐詔居之時上藍院復虗其室命師來往闡化賜號澄源禪師五燈明年正月晉出帝為契丹所執國亡後漢劉氏都汴初即位太原後都大梁二主共四年丁未漢高祖天福十二吳越忠献王佐卒楚文昭王希範南平文獻王唐元宗保大五蜀楚恭孝王廣政漢中宗乾和五三月漢高祖即位帝初名知遠更名暠七月清化全怤禪師安然坐逝壽六十六一云丙午年示寂溈仰宗至此不嗣吳越忠懿王留心釋教嗣位之初凡兩浙諸郡名山聖迹之處皆賜金帛創建伽藍香火福州支提山乃天冠菩薩道場王施七寶鑄天冠像一千身仍創寺宇宏麗甲於七閩五燈戊申乾祐元吳越忠懿王俶楚王希廣六十一六正月漢高祖崩隱帝承祐立雲門大師法道大行往來學徒不下千人廣主屢請入內問法待以師禮一日王問云何是禪門云大王有問山僧對一日王齋眾僧次問師曰靈樹果子熟也未師云甚麼年得信道生王曰熟也師曰切莫忘却王大悅賜號匡真禪師是年七月王迎師至內問道九月師辭還山洞山初禪師初參雲門門問近離甚處曰查渡又問夏在甚處曰湖南報慈又問幾時離彼曰八月二十五曰放爾三頓棒初惘然良久又問適來祇對無過何蒙賜棒門呵曰飯袋子江西湖南便恁麼去初默悟其旨曰他日正當於無人煙處不畜一粒米供養十方僧即日辭去北抵襄漢至是眾請住洞山易律為禪學徒奔湊己酉隱帝乾祐二楚保融七十二七四月十日雲門偃禪師以表辭廣主垂戒學徒端坐而逝法嗣六十一人風穴沼禪師值宼依郢州牧宼平汝州宋太師施第為寶坊號新寺迎師居之法席冠天下學者自遠而至偽周廣順元年賜寺名廣慧韶國師初寓止白沙時吳越忠懿王以國子刺台州雅聞韶名遣使迎之申弟子之禮日夕問道韶曰他日當為覇主無忘佛恩至是王嗣國位剏寺遣使迎師至尊事之以為國師師所說法簡而要掃去枝葉故人皆易悟庚戌三年帝遇弑漢國除楚恭孝王希蕚八十三八吳越錢王命杭州報恩寺慧明大師入府問法命住資崇院開堂說法時有天龍禪師等問道師應機垂答詞旨的切王大悅密契其道命師居之即賜圓通普照大師聯芳廬山化城寺昔正覺大師宴處有悟海大師來革前基架雲梯險剪石飛泉一紀而成功焉盧山記後周郭氏都汴三主十年辛亥周太祖廣順元北漢劉旻乾祐四吳越楚王希崇楚唐保大九蜀十四南漢九正月周太祖即位吳越錢王命永明道潛禪師入府授菩薩戒賜號定慧慈化禪師一日潛欲請塔下羅漢銅像過新寺供養王曰善矣昨夜夢十六尊者乞隨師入寺何昭應之若是於師號加應真二字留潛於府問道兩月還山壬子二五劉言十十五十南院慧顒禪師示寂智覺延壽禪師初為華亭鎮將因見漁船萬尾戢戢惻然以錢易之放于江乃棄家投師剃髮自受具衣不繒纊食無重味持頭陀行嘗習定天台天柱峰之下有烏巢衣襵中時韶國師眼目世間北面而師事之韶曰汝與元師有緣他日大作佛事惜吾不及見耳師既得旨初說法於雪竇山癸丑三六玉逵十一十六十一韶國師因吳越僧義寂曰智者之教年祀寖遠必多散失唯新羅國有善本願藉禪師慈力致之使再開東土人天眼目於是師以聞忠懿王王乃遣使航海傳寫以還迨今聖教具備者皆忠懿王與韶國師之力而韶適與智者同入疑其後身也甲寅顯德元太祖崩世宗立七十二十七十二正月南唐節度憑延巳撰開先院略曰皇上詔以廬山書堂舊基為寺延巳肆覲于京上於便殿語事次因曰廬山書堂已為寺矣朕聞古先哲王握圖御宇唯德是務與善同歸久於其道天下化成恒沙如來出世濟俗依空說性性外無空信則脩崇悟則解脫使人趍清淨之域息貪兢之心民用以淳理又何遠是則菩提之教與政通焉朕今興建伽藍以居禪眾示人至理亦助化之端也延巳奏以寺已成功足使迷者得于陸之漸達者登不二之門非聖人用心其孰能與於此乎云云廬山記杭州龍興宗靖禪師初參雪峰得旨錢王命居龍興有眾千餘王屢延入府署六通大師是年十二月示滅壽八十四乙卯周世宗顯德二北漢孝和乾祐八十三十八十三二月世宗詔併省天下無額寺院凡三千餘所九月敕立監鑄錢非縣官法物軍器及寺觀鍾磬鈴鐸之類聽留外自餘民間銅器佛像悉令輸官給其直上謂侍臣曰卿輩勿以毀佛為疑且佛以身世為妄而以利人為急使其真身尚在苟利於世尚欲割截布施況此銅像若朕身可以濟民亦非所惜也由是羣臣不敢言通鑑時鎮州大悲觀音銅像極靈州之士民願以錢代制不許方毀其背羣力皆墮腕而死遂停其半後未四年世宗發疽于背而崩我宋太祖太宗皇帝目擊其實迹由是益堅欽信故受命之初復興天下佛寺歐陽外傳時有沙門法敏苦諫不納乃為之著顯驗論北山錄詔郡國歲造僧帳凡死亡還俗者以時闕落之僧帳自此而始統紀丙辰三九周行逢十四十九十四重雲暉禪師住山四十餘年節度使王彥超微時甞從暉游欲為沙門暉曰汝世緣深當為我家垣墻彥超後果鎮永興申弟子之禮是年夏詣永興與彥超別囑以護法超泣曰公遂忍棄弟子乎暉笑曰借千年亦一別耳七月二十四日書偈曰我有一間舍父母為脩蓋往來八十年近來覺損壞早擬移別處事涉有憎愛待他摧毀時彼此無妨礙乃跏趺而化壽八十四丁巳四北漢天會元十五二十十五清涼法眼文益禪師自住清涼朝夕開法諸方叢林咸仰風化致異域有慕其法者涉遠而至師調機順物斥滯磨昏應病與藥隨根悟入者不可勝紀是年僧寶傳云五年戊午七月示寂江南李主駕至慰問甚勤閏月望沐浴辭眾趺坐而逝停龕三七顏貌如生壽七十四臘五十四公卿李建勳而下素服奉全身建塔諡大法眼禪師後重諡大智藏大導師戊午五二唐交泰元二十一南漢鋹天寶元金陵報恩院清護禪師初於鼓山國師言下發明尋金陵國主命居長慶顯德初退歸建州卓庵節度陳誨創報恩禪苑堅請住持開寶三年十一月二十日坐化師操行孤標二十年不服綿絹唯衣紙布辭藻札翰並皆冠眾己未六二二十二二世宗北伐六月病背癰糜潰而殂于道壽三十九恭帝宗訓即位時年七歲庚申顯德七正月恭帝禪位于我宋太祖皇帝改元建隆
