body:
  text: 宋括山一菴釋本覺編集明安雅居士劉朝卿較訂東晉司馬氏都建康十二主凡一百四年丁丑元帝睿建武元漢劉聰麟嘉二後趙石勒成太宗玉衡七涼西平元公寔建興五燕高祖代平文帝鬱律元沙門竺潛字法深有才解自永嘉初避亂過江至是元帝及丞相王茂弘太尉庾元規竝欽其風德友而敬之本傳戊寅文興元前趙劉曜光初元六二竺潛常著屐至殿內時人歎其道德高風初不省有市朝己卯二二後趙元七三元帝造瓦官龍興二寺集丹陽建業千僧六帖庚辰三三二八四揚都瓦官寺竺僧敷因時咸謂心神有形但妙於萬物耳敷乃著神無形論闢之略云有形便有數有數則有盡神既無盡故知無形見者欽服辛巳四四三成烈公茂九惠帝賀傳元時佛圖澄吾石勒曰王者德布化洽則四靈表瑞政獘道消則慧孛呈妖常蒙著見休咎隨行古今之常證也勒甚悅之被誅者免十有八本傳壬午永昌元五四二天竺尸梨密多羅此云吉友昔讓王位出家自永嘉中到此土復過江遊建康止建初寺善說法王導庾亮周顗桓皆造門結友時呼為高座法師又善呪術能梵咀至是廣譯諸經癸未明帝紹大寧元六五明帝聰明有機斷晉代有君德者帝一人而已每崇齋興福造皇興道場二寺六帖甲申二七六竺法乘神悟超絕玄鑒過人師於法護護甚嘉之後到燉煌立寺延其學侶豺狼革心戎狄知禮大化西行乘之力也乙酉三八七忠成公駿十三煬帝紇那元天竺二十五祖婆舍斯多尊者以法付不如密多偈曰聖人說知見當境無非是我今悟真性無道亦無理遂示寂丙戊成帝衍咸和元九八襄國城塹水源在城西五里忽暴竭石勒請圖澄致水澄至源上久已龜折澄燒香呪之三日水忽微流小龍隨出有頃水大至惶塹皆滿丁亥二十九十一月蘇峻作亂帝奔于石頭宮城悉為煨燼獨太寧殿有明帝手畵佛像于壁屹然不壞當時嗟美以為神異戊子三十一為後趙滅太和元滅漢趙據中原石勒欲戰劉曜因以訪佛圖澄澄相鈴音知必捉曜又取油合臙脂塗掌中舉示童子童曰有軍馬一人白晢以朱絲縛肘澄曰此即曜也勒乃出戰果生擒劉曜晉書己丑四後趙二烈帝翳槐元七月丹陽尹高悝獲金佛像于張侯橋側之浦中此像自晉宋齊梁陳隋唐七代皆入內供養現光瑞庚寅五趙石勒建平元三月臨海人張系於海獲金銅蓮華趺以安高悝金佛之足遂儼然符會是夕靈像有光屬天梵奏泠然再夕而止統紀是歲石勒稱大趙天王行皇帝事奉佛圖澄彌加篤敬每舉事必咨而後行號曰大和尚本傳辛卯六二石勒愛子斌病死將殯勒歎曰朕聞虢太子死扁鵲能生之今可得效乎乃令告圖澄澄取楊枝沾水呪而洒之就執斌手曰可起矣因此遂甦自是勒諸子多在澄寺中養之壬辰七三沙門康僧淵康法暢支敏度等俱過江淵通內外典暢兼善義論度聰哲有譽著譯經錄淵雖德逾暢度而以清約自處瑯瑘王茂弘以鼻高眼深戲之淵曰鼻者面之山眼者面之淵山不高則不靈淵不深則不清時以為名答癸巳八四趙四月天靜無風而塔上一鈴獨鳴澄謂眾曰鈴音云國有大喪不出今年七月勒死子弘立董吉常誦楞嚴經救人何晃得病請之山水暴漲吉以救人之急囊經戴頭徑涉水而水止著膝及上岸失經至晃家禮懺忽得經於座由是一村奉法珠林甲午九趙海陽王弘建熈元二十四李雄死子期立燕太祖皝沙門于法蘭道振三河後過江居剡山甞有虎入房虎自馴伏山神常來受法蘭有弟子于道䆳學業高明護公甞稱其有古人之風乙未咸康元趙石虎字李龍建武元成玉恒元代煬帝後元九月趙石虎遷都于鄴尤傾心事圖澄衣以綾錦乘以雕輦朝會引見常侍御史悉助舉輿升殿太子公卿扶翼而前主者唱大和尚坐者皆起由是國人化之率多事佛爭造寺廟削髮出家著作王度上言宜禁國人出家虎詔曰朕忝君諸夏百姓樂事佛者特聽之圖澄有法常法佐二弟子遠在千里外所有語話澄皆知之於是國人每相戒曰莫起惡心大和尚知汝凡澄之所在國人無敢向其方涕唾便利者其道化感物如此自大教東來至澄而盛丙申二二康法䆳撰譬喻經十卷類集眾經要事也今在藏支道根譯經七卷丁酉三三代烈帝後元竺法雅久事圖澄才思俊贍甞與康法朗等撰經中格義以訓門徒法朗初誓遊西域路見一僧患痢朗乃停留看之至七日滿房皆香始悟其異於是遍遊諸國精究經論後於中山開講門徒數百有弟子令韶常入定數日不起戊戌四四漢中宗李壽殺期改漢興元什翼揵建國元時南陽滕竝家門信敬每設僧會一日飯飜于地罔然無計一僧曰貧道鉢飯充足一眾齋畢擲鉢空中而去即刻木事之每報其家灾福云感通傳己亥五五是年王導卒導通達佛理簡素寡欲輔相三世倉無儲粟衣不重帛晉書導有弟道寶辭榮為僧以學行顯焉僧傳庚子六六成帝幼冲庾氷以元舅輔政奏沙門應盡禮王者尚書令何充等議不應拜下禮官評議博士議與充合而門下承氷風旨為駁充僕射褚翌等奏不變其脩善之法所以通天下之志遵承先帝故事於義為長氷固謂應盡敬下制謂假服飾以凌度抗殊俗以傲禮吾弗取也充等重抗表曰一令其拜遂壞其法脩善之俗廢於聖世且世經三代人更明聖今不為之制無虧王度氷猶以為不可復下制曰尊卑不陳王教不一二之則亂充等三上章執奏曰直以漢魏逮晉不聞異議今沙門曷敢慢禮敬哉每燒香祝願必先國家禮儀之簡蓋是專一守法是以先聖因而弗革不令致拜於法無虧因其所利而惠之則上有天覆地載之恩下有守一脩善之人氷議遂寢弘明集辛丑七七竹林寺尼淨檢見天女持五色花自空來迎遂騰空直上所行之路有如虹蜺直屬于天統紀壬寅八八五月成帝崩帝造中興鹿野二寺集番經義學千僧六帖癸卯康帝岳建安元九時何準字幼道高尚寡欲州府交辟不就兄充居宰輔之重權傾一時而準散帶衡門不及人事唯誦佛經而已晉書甲辰九月帝崩穆帝孝宗聃立十歸義侯勢太和元十一竺法慧至襄陽能隱身能知人吉凶之事僧傳乙巳穆帝聃永和元十一燉煌沙門單道開常衣麤褐不畏寒暑晝夜不臥絕穀餌栢實松脂小石好山居而山鬼現形試之初無懼色阜陵太守遣馬迎之開自步行從西平一日行七百里至秦州丙午二十二嘉寧元正月何充卒充字次道初阮裕甞戲之曰卿志大宇宙勇邁前古充審其故裕曰我圖數千戶郡尚未能卿圖作佛不亦大乎其後門世事佛甚精厥孫尚之及點胤等竝建大義闡明佛法云本傳丁未三十三漢二為晉滅敬烈公重華三十五趙太史奏虎云有仙人星現當有高士入境虎𢽟州郡有異人令啟聞十一月秦州刺史上奏送單道開到鄴敕止法林寺供給甚厚開能治眼疾時石韜求治之而即效虎令圖澄與語終日澄曰此道人觀國興衰若去者當有大亂己酉年開南渡許昌尋而鄴中大亂本傳戊申四十四十五十二月佛圖澄知石氏將滅謂弟子法祚曰石氏當滅吾及其未亂先從化矣乃遣人辭趙主季龍龍驚曰大和尚遽棄我國有難乎即自至寺而慰澄澄曰出生入死道之常也脩短分定無由增損國家存心佛法當蒙福社而布政猛虐刑罰交濫特違聖典終無福祐能敷仁政祚或可延季龍悲慟知其必逝即為鑿壙營墳至八日安坐而逝澄身長八尺風姿詳雅妙解深經傍通世論德化㐫虐慈洽蒼生春秋一百七十入道一百九年酒不踰齒過中不食非戒不履立寺八百九十三所受業門徒數千萬人後有僧自雍州來見澄西入關以聞季龍龍命發塚唯塊石存焉龍焉之曰石者朕也大和尚塟我而去吾將死矣因而遇疾明年季龍死國遂大亂而石氏果滅晉書僧傳云初虎殮澄以鉢錫杖內棺中後冉閔篡位開棺唯鉢杖存焉田融趙記云澄未亡時自營冢壙澄既知塚必開又屍假而去何容豫作必融之悞己酉五趙石虎死國大亂冉閔自立涼三十七燕雋元十二竺佛調久師圖澄住常山寺積年或分身他處者或入山經歲齎乾飯數斗歸常有餘有隨山行值雪調入虎窟中宿虎還共臥後自克亡日遠近皆至調曰人身無常能專心真淨形數雖乖而必同契端坐而逝後弟子入山見調在岩上眾禮曰和尚尚在耶調曰吾常在耳乃不見眾共開棺唯衣履存焉本傅庚戌六冉閔改國號魏石祗自立於襄秦符洪據長安三十八二二月有金像現于荊州司馬桓溫迎之不動時江陵滕畯捨宅為寺命曇翼主之翼率眾拜請捧之飄然輕舉遂安本寺自後靈異非一感通錄其說甚詳高僧傳謂太元甲午年得像恐非辛亥七石祗為劉顯弑秦洪死健立改皇始元竺僧朗初關中講法忽告同輩曰寺中衣物似有竊者如言即反果有盜焉由其相語故得無失朗是年移居太山壬子八劉顯為冉閔滅冉閔為燕滅二元璽元時支遁字道林壯歲出家業精般若甞與師共論物類謂雞卵生用未足為殺師不能屈師尋亡忽現形投卵於地殻破雛行頃之俱滅遁乃感悟由是蔬食終身謝安王羲之王洽劉殷浩許訽郗超孫綽桓彥表王敬仁何充等竝一代名流皆與結方外交及投迹剡山於沃洲小嶺立寺行道僧眾稟學時有惰者遁著銘以勗之有曰勤之勤之至道非彌茫茫三界渺渺長覊謹守明禁抗志無為云云晚移石城山立栖光寺木食㵎飲浪志無生後出山陰講維摩經許詢為都講難義數反聽者欽服本傳癸丑九秦三涼四十一祚立時沙門竺法崇篤志經記尤長法華湘州麓山神詣崇請戒乃捨山為寺崇後化洽湘土甲寅十四和平元祚卒帛法橋誦經乏聲乃終粒懺悔七日七夜稽首觀音以祈現報至七日喉內豁然自是晝夜諷詠聲徹里許哀婉通神至年九十聲猶不變僧傳乙卯十一壽光元健卒生立四十三敬悼公玄靚釋道安初事圖澄才辯無敵性聰而貌醜時語曰漆道人驚四隣及澄亡遂率徒眾潛于護澤山又入王屋山復度河依陸渾山木食㵎飲丙辰十三二丁巳孝宗升平元秦世祖堅永興元燕光壽元遷都于鄴竺法汰少與道安同學雖才辯不及而姿貌過之甞謁桓溫溫不俟履屨而前迎至是與弟子於荊土講法戊午二二時孫綽字興公與許詢俱有高尚之志初隱稽山放情山水支道林問綽曰君何如許答曰高情遠志弟子早已服膺然一詠一吟許將北面綽於佛教多有論撰具見弘明等集年五十八卒己未三甘露元單道開至京師後入羅浮山獨處茅茨蕭然物外年百餘歲卒勑弟子以屍置石室中後興寧初袁宏為南海太守登山見道開形骸如生香火瓦器猶存宏曰法師行業殊羣正當如蟬蛻耳乃為贊云本傳庚申四二幽帝暐建熈元帛僧光自永和初止剡之石城山山神作虵虎形以怖光光安禪而不恐神乃自言移往章安推室以奉後道俗宗事漸成寺舍光每入定七日不起處山五十三載壽一百一十歲晉太元末安坐而逝辛酉五三秦升平年號沙門于法開蘭公弟子也善放光法華尤精毉法甞值婦人在草危急開曰此易治耳主人宰羊欲為淫祀開令取肉為羮進竟因氣針之須臾羊膜裹兒而出是年孝宗有疾開視脉知不起乃不醫而帝果崩或問法師高明剛簡何以毉術經懷答曰明六度以除四魔之病調九候以療風寒之疾自利利人不亦可乎壬戌哀帝丕隆和元四竺潛隱迹剡山優游講席三十餘載投身北面者莫不內外兼洽至是哀帝好重佛法遣使徵請潛至即於御筵開講般若上及朝士竝稱善焉癸亥興寧元五涼綽公張天錫弑玄覯自立沙門竺僧度少時母為聘楊氏女字苕華有才貌偶苕父母併終度母亦卒忽悟無常即捨俗出家苕服畢乃與度書謂髮膚不可毀傷宗祀不可頓廢令其顧世教改遠志曜翹爍之姿於盛明之世遠休祖考之靈近慰人情之願并贈詩五首有云人生一世間飄若風過牖清音可娛耳滋味可適口羅紈可飾軀華冠可燿首安事自剪削躭空以害有不道妾區區但令君恤後度答書曰事君以治一國未若弘道以濟萬事親以成一家未若弘道以濟三界髮膚不毀俗中之近言耳立身行道達者知焉且披袈裟振錫杖飲清流詠般若雖王公之服八珍之饍鏗鏘之聲煒燁之色不與易也若能懸契則同期於泥洹矣且人心各異有若面焉卿之不樂道猶我之不慕俗矣楊氏長別離矣萬世因緣於今絕矣歲聿云暮時不我與學道者當以日損為志處世者當以及時為務卿年德竝茂宜速有所慕莫以道人經心而坐失盛年也又報詩五篇有云機運無停住倐忽歲時過良由去不息故令川上嗟不聞榮啟期皓首發清歌布衣可暖身誰論飾綺羅今世雖云樂當奈後生何度既志懷匪石不可迴轉苕華惑悟亦向道焉度至是精毗曇著旨歸云甲子二六時簡文作相以竺潛是道俗標領尊敬兼常迄乎龍飛虔禮彌篤潛甞於簡文處遇劉曰道人何以遊朱門潛曰君自觀其朱門貧道見為蓬戶十月潛辭還剡山帝復詔法師支遁出都止東安寺講道行般若時講法于禁中乙丑三建元元于法開道行既著哀帝累詔乃出京講放光經凡舊學抱疑莫不披釋及辭還帝厚䞋錢物謝安王文度皆友善年六十卒開有弟子法威清悟有樞辨自蘭至開開至威凡三世負盛譽僧傳釋慧受化王坦之等捨園宅為安樂寺丙寅海西公奕太和元二遁法師三載在京講法朝野悅服郗超甞問謝安曰遁談何如嵆中散安曰嵆努力才得半耳又曰何如殷浩安曰亹亹論辯恐當抗衡超拔淵源殷有慚德超後與親舊書曰林公神理所通玄拔獨悟數百年來紹隆大法令真理不絕一人而已是年遁抗表辭還山有詔資給敦遣公卿祖餞于征虜亭是日都市為廢既而收迹剡山畢命林澤壽五十三甞有遺遁馬者遁受之或有譏者遁曰愛其神駿聊復畜耳後有餉鶴者遁曰鶴冲天之物寧為耳目翫乎遂放之本傳秦西域曇摩持此云法海譯十誦戒本三部丁卯二三竺曇猷初止剡之石城山又移始豐赤城山石室坐禪有羣虎蹲於前猷因誦經一虎獨睡猷以如意扣其頭云何不聽經經畢而虎皆去尋有大虵十圍競來環遶舉頭向猷半日復去一日神見形曰弟子夏帝之子居山二千餘年今往寒石山輒推室以相奉鳴吹角陵雲而去禪學者皆造焉本傳戊辰三四釋慧常譯尼戒一卷司徒王珣及弟珉捨宅為寺今平江虎丘也己巳四五竺僧朗於太山金輿谷崑崙山別立精舍學者聞風而至秦主符堅欽其德遣使䞋遺此谷舊多虎及朗居之猛獸皆遁至今人呼為朗公谷庚午五六滅燕而有中原燕土為秦滅晉司馬桓溫末年奉法有尼造之溫敬而不倦每浴必移溫訝而私視見尼揮刀自割截支分臠有頃尼出溫以情問尼曰君志若遂形當如之時溫方謀問鼎聞此悵然便止尼遂辭不測所之感通傳辛未太宗簡文帝昱咸安元七涼代三十四竺法汰止瓦官寺簡文深相敬重請講放光經帝親臨幸公卿畢集黑白欽敬鳩摩羅佛提此云童覺共竺佛念佛護譯阿含抄許詢字玄度澡心學佛甚為江左公卿仰慕簡文高其風每月夜思清言妙理必造焉至其亹亹帝不覺前席達旦忘倦帝每曰玄度才情固未易有本傳是年彗星現帝詔竺法曠禳之曠答有曰陛下當勤脩德政以塞天譴貧道固當盡情上答乃與弟子齋懺有頃灾滅壬申二八七月帝崩帝性仁恕造佛建齋度僧立寺於長干寺起浮圖塔壯麗殊偉六帖是歲合浦人董宗之漁海中護佛圓光獻于高悝所獲金佛之背脗然契合四十餘年靈像方足自晉及隋六代王臣莫不歸敬靈異非一見感通錄前涼月支優婆塞支施崙譯須賴等經癸酉孝武帝曜寧康元九道安法師自達襄陽廣宣經法經義克明自安始也立檀溪寺建浮圖鑄銅像能起自行光明燭天傾都拜贍歡呼動山谷秦主符堅送外國金像彌勒安每講設以作證一夕像光照室視之頂有舍利焉習鑿齒襄陽高士先以書通好因詣安自稱曰四海習鑿齒安曰彌天釋道安相得歡甚齒即以書抵謝東山稱安蓋非常勝士恨公不一見耳孝武帝欽師道德遣使通問并有詔曰安法師以道德照臨人天使大法流行為蒼生依賴宜日食王公祿所司以時資給安固辭不受後秦主符堅攻克襄陽得道安而喜謂左右曰朕以十萬師取襄陽得一人半耳左右問為誰堅曰安公一人習鑿齒半人也甲戌二十法師竺潛示寂壽八十九武帝下詔曰潛法師理悟虗遠風鑑清高棄宰輔之榮襲染衣之素方賴宣道以濟蒼生奄從遷謝用痛于懷可賻錢十萬助建塋塔勑塟沙門自潛而始潛有弟子法友法蘊法識法濟皆有才譽又康听尤善草隷孫綽各為之贊僧傳乙亥三十一竺法義深公弟子也王導孔敷竝承風敬友咸安三年忽感氣疾常念觀音夢人破腹洗腸覺即病愈是年帝遣使徵請出都講說帝每從之聽講太元五年卒賜錢十萬營塔塟于新亭崗後立寺焉今天安是也支曇籥善梵唄傳響至今丙子太元元十二涼為秦滅代為秦滅竺法念譯瓔珞經十二卷前涼張氏八主七十六年共譯經四部六卷竺法曠初止潛青山謝安郗超皆往致敬興寧中東遊若耶止昌原寺時多疫疾曠善神呪百姓疾者祈之皆效有人見曠之行住常有鬼神數十衛其前後孝武帝欽其風請出京止長干寺事以師禮丁丑二秦十三至是九州之地秦有其八晉唯有東南一隅耳釋慧永初與遠公同依安公至是永先至尋陽刺史陶範留之憩廬山捨宅棲止乃瓶西林寺永真素自然言常含笑善於講說門徒稍盛又別立一室於嶺上時坐禪焉所居有香氣因號香谷常有一虎馴伏于屋永甞至一橋營主騎馬當道阻之永以杖指馬驚人仆明晨來寺悔過白黑聞知歸心者眾戊寅三十四竺法念出毗奈耶律十卷竺道壹初從汰公受學思徹淵深簡文帝深重之後東止虎丘又適耶溪頃之郡守王薈起嘉祥寺請居僧首僧尼諮稟時號九州都維那隆安中卒孫綽有讚僧傳己卯四十五秦道安法師既住長安大弘法化初魏晉沙門依師為姓故姓各不同安曰師莫尊於釋迦也應沙門宜以釋為氏今稱釋氏自安始也安多聞廣識雖古器篆文安皆識之秦主勑三舘學士內外有疑皆咨問於安國人語曰學不師安義不禁難然安臂上有一肉釧𪭺可上下而不出腕時人謂之印手菩薩羅什之在龜茲亦遙禮焉安常注諸經恐不合理因誓曰若所說合理願見瑞相乃夢胡僧頭白眉長語安云君所注經殊合道理我不入泥洹當助流通可時設我食後十誦律至遠公乃知和上所夢賓頭盧也於是立座飯之處處成則同上安有弟子法遇江陵講經受業者眾一僧飲酒廢夕講遇罰而不遣安聞以荊寄之遇即曰此由飲酒也我訓領不勤遠貽憂賜即集眾自伏地命維那行杖三十垂淚自責時道俗因之厲業者眾庚辰五十六高僧涉公蜀人豫言事多驗不食五穀日行五百里能呪龍降雨建元十一年至長安秦每遇旱常詔師祈雨師誦呪致龍于鉢命堅與羣臣觀之乃遣升空而雨王臣士庶悉皆敬奉自是無復炎旱之憂是年十二月無疾而化卒後七日堅以其異試開棺視之唯殮被存焉明年大旱堅曰涉公若在豈使朕燋心於雲漢哉辛巳六十七六十二國入貢正月帝初奉佛法立精舍於殿內引諸沙門居之通鑑帝造皇太寺捨本第立本起寺方志壬午七十八秦曇摩蜱此云愛法譯般若鈔五卷秦主出同苑命安法師升輦同載秦主以將伐晉告安安力諫而堅不納明年果有淮南之敗僧傳癸未八十九西域竺曇無蘭此云法正自太元辛巳於揚都譯經六十一部竺曇猷即帛道猷聞天台山有精舍得道者居之猷至以石梁高危未敢直度且西礙大石攀登路絕因還止石室彌年禪觀後試造橋乃見梁道平正橫石洞開度橋少許見寶寺神僧果如所說猷乃陳住意僧曰却後十年自當至此何勞早住相送度梁橫石已塞至太元末年終於山室舉體綠色端坐如生今有往者雲迷其道也僧傳又感通錄云太元元年化者非也甲甲晉太元九秦建元二十後秦姚萇日雀元西秦乞伏國亡後燕世祖慕容垂元年慧遠法師少為儒生博極羣書甞與僧慧持造安法師席下聞出世間法而悅之歎曰儒道九流特粃糠耳遂出家安門徒數千遠居第一座安甞歎曰使道流東國其在遠乎至是以秦亂來遊于晉乙酉十秦符堅遇弑符丕即位秦後二西建義秦元後燕二正月二十七日道安法師見有異僧出入隙安以生處問之僧曰當生兜率即以手虗撥天西北即雲開備見兜率天宮之妙又曰當浴聖僧方果所願具示浴法後安設浴見有數十小兒入寺須臾但聞浴室用水聲久之不見開室而巾濕水減果是聖應也二月八日忽告眾曰吾當去矣無疾加趺而逝門弟子數十人知名于世師著僧尼軌範及法門清式二十四條僧傳丙戌十一秦丕遇弑符登即位徿東太初元建初元長入長安即位西秦二後涼呂光太安元後燕建康元魏太祖現登國元慧遠法師抵潯陽見廬山愛之乃止龍泉精舍次寓西林復於山東建東林寺經綸之際山神降靈願加資助信宿後乃風雷夜作雲雨晦冥明發就觀則有良木殊材駢羅委積時晉將軍桓伊初臨此牧驚其神異奏立寺焉是年寺成初太尉陶侃鎮廣州有漁于海得文殊像送寒溪寺甞經火而像無恙後侃鎮武昌使人迎之致舟舟沒而失其像及遠瓶寺心祈之於是其像冷然自至本傳魏太祖道武皇帝即位帝生知奉佛初平中山經郡國見沙門皆致敬禁軍旅無有所犯北史丁亥十二二二三二二二秦曇摩難提此云法喜自建元末至長安四年譯法益經一卷竺法汰是年示寂壽六十八孝武詔曰汰法師道播八方奄爾喪逝可賻錢十萬喪事有司悉辦郗超與汰厚善甞約先沒者當先報冥事至是汰卒超夢之曰向與君約報應之事今皆不虗願君無忘脩德超由是循道彌篤僧傳又辨正搜神記乃竺法度與王坦之相約云戊子十三三三高祖乾歸太初元三三三天竺二十六祖不如密多以法付般若多羅偈曰真性心地藏無頭亦無尾應緣而化物方便呼為智遂示寂己丑十四四四二麟嘉元四四道安法師有弟子僧富因還魏郡有一劫人劫一小兒欲取心肝以解神願富見乃曰大人五藏可用否劫戲言亦好富自取劫刀畫胸至臍羣劫奔走即送小兒還元家時路人見富因問其故還家取針縫其腹皮塗以藥轝還寺將息少時而差罽賓瞿曇僧伽提婆此云眾天於長安出揵度等論四十六卷孝武帝精心奉法志念冥符師子國王欽其懷道遣沙門曇摩撮遠送玉像以表丹情辨正論庚寅十五五五三二五五時晉室微而天下奇才多隱居不仕聞廬山遠法師之道皆來從之師因謂劉程之等曰諸君倘有心淨土之遊當加勉勵遂同發志於無量壽佛之前設齋立誓期生淨土其誓文略云審二報之相催知六道之難拔誓同茲人俱游絕域臨三途而緬謝傲天宮而云云由是僧俗凡一百二十三人竝慕道辭榮棲心物外續有千餘人同結白蓮社矣廬山記竺佛念自安高支謙之後傳譯明匠莫踰於念符姚二代為譯人之宗念自譯經七十四卷辛卯十六六六四三六六僧伽提婆至尋陽初曇摩難提出毗曇心言多疑滯至是遠公請入廬山重譯毗曇等論七卷曇摩難提共譯經一百一十四卷釋道敬方入廬山出家奉持般若等經壬辰十七七七五四七七八月彗現詔天下有德沙門禳之竺曇猷禱之七日彗沒有青衣童子來悔過乃隱不現西域迦留陀伽此云時水譯十二遊經西秦釋聖堅譯摩伽等經二十四卷癸巳十八八八萇死高祖興立六五八八時謝靈運恃其才高骯髒傲物與世少諧初入廬山一見遠公肅然心服師問於遠求入淨社遠以心雜止之今東西二池乃靈運所鑿也常有紅白蓮花光華殊特其白花西方有之自此而始廬山記秦僧伽䟦澄此云眾現譯婆沙等經論二十七卷澄戒德整峻眾皆則之甲午十九秦為後秦滅後秦高祖皇初元七六九九釋慧嵬多在山禪定有一無頭鬼現形嵬曰汝無頭痛之患一何快哉鬼便隱復作無腹鬼現嵬曰汝無腹藏之憂一何樂哉須臾復作異形鬼皆隨點化而隱時大雪有一女子來求寄宿姿容婉媚衣服鮮麗女白嵬曰以上人有德天遣我來以相慰喻談說欲言勸動其意嵬執志貞確一心無擾乃謂女曰吾心若死灰無以革囊見試女遂凌雲而逝顧歎曰海水可竭須彌可傾彼上人者秉志堅貞嵬以隆安三年與法顯遊西域焉本傳符秦五主四十四年沙門六人出經律論一百九十七卷乙未二十後秦二八七十十釋僧道秦主欽其德業友而愛之入寺造敬同輦還宮及什公譯經師亦參議焉釋曇微安公弟子講法精敏是年無疾而化丙申太元二十一九月安帝即位三西秦太初九後涼龍飛元後燕寶永康元魏皇始元魏趙郡沙門法果戒行精至開演法籍詔徵以為僧統弘明沙門康道和戒德有儀軌範羣物譯益意經丁酉安帝德宗隆安元皇初四太初十龍飛二南涼禿髮鳥孤元北涼業神璽元西涼李暠燕二魏二桓元勸帝沙汰僧尼詔曰沙門有通經律行可宣寄大化者聽依所習否者悉令罷道唯廬山道德所居不在搜簡及遠法師以書抵元遂停其詔僧伽提婆來遊建康晉朝王公名士莫不造席乃譯阿含經一百一十卷戊戌二五十一三二二西涼後燕慕容魏太祖下詔曰佛法之興其來神蹤遺法信可依憑令信向之徒有所中達唯誦觀音經明日將噉之嚙柵成闕達乃穿柵得脫僧傳己亥三弘始元十二後涼纂咸寧元三天璽元長樂元二二曇摩耶舍此云法稱明悟出羣常有聖僧執錫自空詣稱談話又夢博叉天王勸以遊方觀道不當自善由是行化至于此土是年譯差摩經一卷釋法顯與同學五人往西域求未至經釋慧持廬山遠公弟也形長八尺風神雋爽是年辭遠入蜀止龍淵寺白黑歸敬升持堂者皆號登龍門庚子四二十三二利鹿孤建和元二元二建平元三三月曇摩蜱出雜問律事二卷明三寶物須善防護太山竺僧朗有先知之異晉魏燕秦六天子降詔問所供聘皆奇寶南燕主欽其德給二縣租稅仍為立神通寺曾經三度毀之而不得犯者朗輙見身以錫杖揮之立四百年而佛像如新本傳及北山錄辛丑五三呂降神鼎元二沮渠蒙遜永安元二熈光始元二四初建元十三年符秦盛時德星屢現太史奏外國當有智人入輔及秦主攻襄陽得道安以為應安讓不敢當勸秦主迎龜茲國鳩摩羅什此云童壽秦主從之太元七年即遣呂光伐龜茲以迎什遂獲什光見什年少妻以龜茲王女什苦辭光飲以醇閉室中光還而符堅已敗因僭國及姚萇安八年風化是年三月有木連理生于廟廷園葱變為茝以為美瑞五月遣將伐涼九月隆隆乃迎什十二月至長安秦主禮待以國師於西內逍遙園命什譯經秦主卑萬乘之心尊三寶之教機政之暇躬與什對譯南涼釋曇霍專以神力化物行疾如風力者追之不及言人死生貴賤毫𨤲無爽人或藏其錫杖霍閉目少時立知其處因之事佛者甚眾鹿孤有弟耨檀多虗害霍謂曰當脩善道為後世橋梁檀曰公能七日不食僕當奉佛乃幽七日而霍無饑色檀因此改信節殺興慈國人既蒙其祐咸稱曰大師本傳杯度比丘常乘木杯度水神化莫測時在彭城羅什聞之歎曰一作度聞什入關歎曰吾與此子戲別三百年矣相見杳然未期遲於來世耳感通傳壬寅元興元四傉檀弘昌元二三二三五秦什法師是年出彌陀彌勒思益等經廬山遠法師聞什入關遣書通好秦主聞遠師之風遙相欽敬送旃檀像塔請作大智度論度致書殷勤什亦送雙口澡瓶及遺書曰佛記東南有護法菩薩勗哉仁者善弘其事并遺偈一章略曰既已捨染樂心得善攝否若得不馳散深入實相否畢竟空相中其心無所樂云云遠復答以偈略曰本端竟何從起滅有一微涉動境頹山勢惑想更相乘觸理自生滯云云國未常住之說但云壽命長劫遠曰佛是至極至極則無變無變之理豈有窮哉乃著法性論有曰至極以不變為性得性以體極為宗云羅什見論歎曰遠未及見經暗與理會豈不妙哉桓元重申庚氷之議欲沙門盡敬王者朝廷承風旨多與元合因以問遠曰此一代大事不可使朝廷失體也得八座書今以似君君其件件詳論不敬之意以釋其疑便當行之遠公慨然懼大法之將淪乃答其書并著沙門不敬王者論五篇劇陳所以不拜之意其論五篇一曰在家謂在家奉法則是順化之民情未變俗迹同方內故有天屬之愛奉主之禮禮敬有本遂因之以成教二曰出家謂出家則是方外之賓能遁世以求其志變俗以達其道變俗則不得與世典同禮遁世則宜高尚其迹故能拯溺俗於沉流拔幽根於重劫遠通三乘之津近開人天之路如令一夫全德則道洽六親澤流天下雖不處王侯之位固已恊契皇極在宥生民矣是故內乖天屬之重而不違其孝外闕奉主之恭而不失其敬也三曰求宗不順化謂反本求宗者不以生累其神超落塵封者不以情累其生不以情累其生則其生可滅不以生累其神則其神可冥冥神絕境故謂之泥洹故沙門雖抗禮萬乘高尚其事不爵王侯而沾其惠者也四曰體極不兼應謂如來之與周孔發致雖殊潛相影響出處或異終期必同故雖曰道殊所謂歸一也不兼應者物不能兼受也五曰形盡神不滅謂識神馳騖隨行東西也弘明集元始意堅及得遠論即緩其事竺法曠志行淵深每以法華為會三之旨彌陀為淨土之因常詠二部有眾則講獨處則誦甞造彌陀大殿伐木遇旱曠呪令出水是年示寂顧愷之作讚傳本傳北涼釋道龔譯寶梁等經十二卷釋法眾譯陀羅尼經又僧伽陀譯善權經魏太祖於虞地造十五級塔又造開泰定國二寺寫一切經造千金像每日法集三百名僧方志癸卯二五後涼為後秦滅二三四三四六冬桓元篡位封帝為平固王乃下書曰佛法弘大所不能測推奉主之情欲興其敬今事既在己宜體謙冲應諸道人勿復致禮也秦什出金剛仁王等經釋曇邕初仕符秦為衛將軍形長八尺雄武過人符堅南敗因從安公出家次事廬山遠公內外綜涉志尚弘法為遠人關致書羅什凡為使命十有餘年鼓擊風流搖動峯岫強捍果敢專對不辱後於山西營立茅宇與弟子曇果沉思禪門果夢山神求受五戒果曰家師在此可往咨受後邕見一人風姿端雅從者二十人請受五戒邕知是山神乃為說戒說法神䞋以外國七節禮拜辭別倐忽不見僧傳甲辰三六西秦南涼三四五四五魏天賜元春劉裕討桓元元敗挾帝走江陵元為人所殺釋智猛招十五人往西域求經四月秦什師譯大品般若經四十卷又百論二卷什尋覽舊經多所紕繆皆𨤲正之沙門僧叡僧肇等八百餘人傳受其旨天竺弗若多羅此云功德大至長安義學沙門數百人從之於中寺誦十誦梵本什公番譯三分獲二而十月弗若示寂會曇摩流支至亦善毗尼廬山遠公走書關中勸流支足成之秦王亦加敦請流支乃與什公續之至來秋而終焉律儀大備自此而始乙巳義熈元七五建初元五慕容超太上元二桓振挾帝屯江津劉毅等擊之振走何無忌奉帝還京師帝次潯陽詔遠法師見于行在輔國何無忌勸遠一出遠固辭以疾帝再詔問勞敕九江太守歲時送米資奉本傳正月秦王興以鳩摩羅什為國師奉之如神親帥群臣聽什講經大營塔寺沙門坐禪者常以千數公卿以下皆奉佛由是州郡化之事佛者十室而九北史是年什出佛藏經菩薩藏經譬喻經及智度論一百卷法師僧奉律精苦為秦主所重自什入關僧尼以萬數頗多愆濫遂以為國僧正統攝僧事給車輿吏士秩視侍中僧正自此而始又以僧遷禪慧為悅眾以法欽慧斌為僧錄班秩有差尋加親信仗身白從各三十人法師僧叡從什受業妙悟絕倫秦王嘗指之曰四海僧望也叡講成實論什歎曰子真精識傳譯有甞音吾何恨焉法師僧肇自為沙門名震三輔什公在姑臧肇走依之什與語驚曰法中龍象也及歸關中助什詳定經論因出大品之後著般若無知論什覽奇之傳其論至廬山遠公歎為未甞有也復著物不遷寶藏等論皆妙盡精微并注維摩竝傳於世時師子國有婆羅門號聰明為異道之宗聞什在關中䭾其書至乞與僧辨論什謂道融曰子可當之融密使人錄其書目一覧即誦克日論議秦王與公卿大集婆羅門以博觀為誇融乃歷數其書并秦地經史三倍之什嘲曰卿乃未聞大秦有博學者乎敢輕遠來婆羅門愧拜而去僧傳晉司徒王謐於東掖門見五色光穿其地得金像高四尺因奉入宮宋祖加敬躬禮事焉感通傳丙午二八六二六二三師子國沙門曇摩獻玉像高四尺二寸帝賜瓦官寺統紀天竺佛䭾跋陀羅此云覺賢遊罽賓積歲常於宴坐屢見神通已得不還果時有秦沙門智嚴等西往罽賓請來長安講讚大乘咸覿玄奧什公倒屣迎之議論多發藥奉太子泓甞延至東宮對什論法時秦崇尚玄化沙門出入宮闕者數千唯跋陀守靜隤然而已偶謂弟子曰昨見天竺五舶俱發應合至矣又其徒自言得那含果僧正道曰佛不許言自所得法五舶之論何所窮詰弟子輕言誑惑於律有違義不同處䟦陀遂渡江入廬山見遠公遠高之遣書關中雪其枉遠乃請出禪數諸經未幾而五舶俱至共伏其靈通陀即持佛舍利五粒建塔於東林寺北上方廬山記夏什出法華經七卷又維摩經三卷華手經十三卷又於草堂寺出梵網經二卷融影等三百人一時共受菩薩十戒丁未三九西秦北涼七三高雲元三四時淵明陶潛字元亮居柴桑與廬山相近時訪遠公遠愛其曠達招之入社陶性嗜酒謂許飲即來遠許之陶入山久之以山無酒攢眉而去什法師甞講經草堂等秦王及朝臣沙門數千眾肅容觀聽王曰法師才辨海內無雙可使法種不嗣哉遂以宮女十輩逼令受之什自是不住僧房別立廨舍諸僧有効之者什聚針盈鉢謂曰若相效能食此者乃可畜室耳舉匕進針如常饍諸僧愧止初什甞與母謁月支國北山尊者山謂其母曰善護此沙彌年三十五毗尼無缺度人如毱多不爾正俊法師耳天竺佛陀耶舍至姑臧聞什受秦宮女歎曰什如好綿其可使入棘刺乎什聞耶舍來勸秦王迎之耶舍至王郊迎別剏精舍處之供設如王者耶舍一無所受時至分衛一食而已善毗婆沙論而髭赤時號赤髭毗婆沙通論時什師於大石寺出諸經禪師於瓦官寺教習禪道三藏法師於中寺出律部毗婆沙法師於石羊寺出毗曇可謂一時盛化肇傳戊申四十二景王嘉平元八四後燕北燕滅之四五晉安帝於育王塔立大石寺方志秦什出小品般若經十卷又出十二門論一卷卑摩羅叉此云無垢眼至秦數年後出遊關左盛闡毗尼講什所譯斗誦戒本律藏大弘叉之力也其所制內禁輕重二卷今行於世叉為人眼青時號青眼律師本傳己酉五十一更始元三二九五北燕馮太平元五太宗永興元什出中論四卷什甞曰吾若著筆作大乘阿毗曇非迦旃子比也今深識者寡將何所論唯與秦王著實相論二卷并注維摩經魏太宗明元帝嗣既踐位京邑四方建立圖像仍令沙門敷導民俗魏史庚戌六十二二四三十六二南燕為晉二劉程之初入廬山依遠公而桓玄劉裕竝欲薦之程之力辭裕等以其志不可屈議以遺民之號旌焉程之自脩淨土日專坐禪始涉半歲即於定中見佛光照天地既出定已愈加怡悅居山十五年又於念佛中見彌陀放光慰接摩頂翌日念佛又見身入寶池有菩薩指池謂程之曰八功德水汝可飲之遂掬飲之甘美非常及寤猶覺異香發於毛孔歎曰此吾淨士之緣至矣至是乃集眾敘別西向端坐斂手而逝壽五十九異香郁然七日而息遠公撰紀德時遠法師每送客不過虎溪道士陸脩靜同淵明入山見師師送之執手共話不覺過虎溪三人相顧大笑今人𦘕之為廬山三笑圖秦佛陀耶舍此云覺明譯四分律六十卷辛亥七十三三五四十一西涼七北燕三魏三釋曇諦初母夢一僧寄麈尾并鐵書鎮二枚眠覺見兩物具存因而有孕生諦諦年五歲母以麈尾示之諦曰秦王餉也年十歲出家悟自天發後因喚僧名諦又以麈尾示之悟其乃弘覺先師也諦善講經書後閑居吳興崐山二十載時望英豪欽風問道釋慧虔初止廬山次投山陰嘉祥寺克己導物苦身率眾忽得小疾自知必盡屬想安養祈誠觀音北寺有尼夢見觀音入西郭門幢幡華蓋光映日月尼作禮曰大士何之答云往嘉祥寺迎虔公因爾無常遠近咸聞異香僧傳壬子八十四西秦六五元姑元遷都姑臧八四四西域曇無讖至姑臧涼王素奉大法奉讖為師廬山遠法師因西域沙門敘西土石室佛影光相是年五月乃圖𦘕萬佛影立臺以奉之弘明集釋慧持垂遺戒示寂於蜀龍淵寺壽七十六秦九月什出成實論二十卷癸丑九十五二鳳翔元六二九五五四月秦羅什法師覺四大不愈乃口出三番神呪令弟子誦之以自救未及致力轉覺危殆於是集眾告別曰因法相逢殊未盡心方復後世惻愴可言所譯經論若義契佛心焚身之日舌不焦壞言訖而逝闍維之日舌果不壞師壽七十所譯經論三百八十餘卷釋教錄云什公卒時諸記不定高僧傳云弘始十一年八月二十日卒此不然也准成實論後記云弘始十四年九月十五日出訖准此十四年末什仍未卒又准僧肇上秦主涅槃無名論表云肇在什公門下十有餘載若什四年出經十一年卒始經八載未滿十年云何乃言十有余載而釋教錄亦不定其年月因看弘明集云有僧肇誄什法師以癸丑年四月十三日薨于大寺故今以此為準什之弟子生肇融叡謂之什門四聖又加曇影慧嚴慧觀僧道常道標謂之什門十哲又有僧導僧因皆當世名匠也洪覺範曰羅什至關而奇才畢集於是大法勃興觀其總領庶務有道精義入神有僧肇道生以智禦侮有道融以辭飾經有僧叡至於機辨驚群如曇影抗志不回如道標道恒者尚多有焉僧傳僧叡善攝威儀弘讚經法常迴此諸善願生安養後自知期至集僧告別酒浴燒香禮拜還座向西方合掌而逝是日同寺咸見五色香煙從叡房出壽六十七佛陀耶舍出阿含經二十二卷凉土大飢釋法進自割肉啖飢民民取其肉盡而卒本傳釋僧慧於京師破塢村起草屋中夜兩燈自行前數十步即就其處立崇明寺僧傳甲寅十十六三二南涼為西秦滅三十六魏廬山釋慧永厲行精苦願生西方是年示微疾忽斂衣合掌求屣欲起如有所見眾咸驚問答云佛來言終而卒壽八十三咸聞異香七日乃歇本傳佛陀耶舍南遊廬山遠公深敬之舍乃躬自負鐵於紫霄峯頂鑄塔以如來真身舍利藏其中今存焉廬山記釋法顯還自西域初顯得經律留三年學梵字以經像附商至師子國又二年達于青州大守李嶷躬迎之護送入于京師凡往返十五年本傳秦曇摩耶舍此云法名自弘始九年譯毗婆沙論至是三十卷方訖耶舍常交接神明而俯同凡俗時謂已階聖果北凉三藏曇無讖是年譯涅槃經初分十卷次廣出地持光明諸經以涅槃品數未足躬往西域訪求後還凉宣譯又遣弟子求後品至續復譯之其地持經即今菩薩戒之所出也釋僧肇是年卒於長安年三十一僧傳乙卯十一十七四夏三北涼四西涼十一七二八月初六日慧遠法師合掌面西而逝僧傳云十二年終又弘明集謝靈運誄文謂十三年終三說未知孰是壽八十四謝靈運製有廬山集三十卷行於世師居廬山三十年影不出山迹不入俗弟慧持亦有高行社眾數千持居第一座其社眾名跡尤彰彰者一十八人俗士則有劉遺民雷次宗周續之宗炳張野張詮法師則有慧永慧持道敬罽賓則有佛䭾䟦陀羅尊者他如慧獻曇順曇常道昺曇詵類以童穉出家同脩淨社最後有竺道生及罽賓佛䭾耶舍尊者以義熈七八年方入山則剏社二十六七年矣猶得在十八賢傳列至今清風襲人又陶淵明以山無酒而去謝靈運以心雜不得入社陸脩靖甞從遠公問道今世傳有二十一人焉遠之門德行則又有道祖僧遷道流竝才義英烈有慧要者患山中無刻漏乃於水上立十二葉芙蕖因波轉以定十二時景無差餘皆有名于世廬山集太原郭宣與蜀郡處筏共梁州刺史揚牧敬為友敬以害人被禁事連宣筏二人念觀音許錢各十萬與西明寺作功德夜夢菩薩垂救俱得脫免宣依願還錢而筏不還後遇戎查蒲被流矢所中自悔曰我有大罪語訖而死僧史釋法顯初遊西天至一寺忽遇疾因思鄉飯其寺主遣沙彌為來取之倐忽往還脚有瘡血云往彭城吳蒼鷹家求食為犬所嚙顯恠其瞬息間而遊數萬里外方悟寺僧竝非常人也及隨舶還故往彭城訪鷹具知由委其犬嚙餘血塗門之處猶在顯曰此羅漢聖人血也鷹即捨宅為寺自至揚廣求經像未獲忽林間見僧持像行云與吳鷹供養僧傳魏鷹將像還每放異光後元魏高齊皆迎供養僧傳魏僧統法果太宗深敬之前後授以輔國宣城子忠信侯安城公之號皆固辭魏書丙辰十二後秦泓永和元五四五十二八泰常元釋法安一名慈欽遠公弟子也習禪講經善能開化時新陽縣虎災縣有社樹下築神廟安遊其村民以畏虎早閉門閭安至樹下坐禪向曉虎負人至投之樹北跳伏安前安為說法授戒虎有頃而去村人追虎至樹下見安大驚謂是神人一縣宗奉虎灾遂息因改神廟留安立寺左右田園皆捨為業後夢人指床下掘得銅鐘二口僧傳丁巳十三後秦為晉滅六五六西涼歆加興元九二秦釋道恒羅什愛其才與道標齊名初秦王以二人有經國之業必欲二人罷道輔政恒標答書有曰昔光武尚能縱嚴陵之心魏文管寧寫之操願鑒元元之情垂曠通物之理秦主又致書於什二師願睡以諭之什等答略曰古之明王審違性之難御悟任物之多因故堯放許由於箕山陵讓放杖於魏國高祖縱四皓於終南叔度辭蒲輪於漢岳蓋以適賢之性為得賢也後舉眾懇乞方得寢免恒乃歎曰古人云益我貨者損我神生我名者殺我身於是入瑯瑘山終世不出是年示寂于山本傳姚秦三主共三十四年沙門五人出經律論六百二十四卷釋僧羣居羅江霍山山有泉羣飲之能不饑因絕五穀大守劉夔欲造其山乞水天甚清霽方渡海忽風雨晦冥數日竟不得往歎曰正為山靈勒回俗駕耳羣庵側有略彴每渡以汲泉一日有折翅鴨舒翼橫略彴就唼羣欲舉杖撥去恐傷鴨因不飲數日而沒壽百四十餘臨終曰我少時甞戲折一鴨翅此殆現報也僧傳戊午十四西秦七夏昌武元北凉七二十三西竺佛䭾䟦陀羅因適江陵士庶皆事之宋王劉裕請歸京都止道場寺三月吳郡內史孟顗等乃請師於寺譯華嚴經感二青衣童子每旦自庭沼中出炷香添瓶不離座右暮則潛入沼中日以為常至譯經畢遂絕迹不見華嚴記僧洪鑄丈六像未及開模會銅禁甚嚴劉裕時為相國洪坐繫丞相府誦觀音經夢像摩其頂問怖否洪曰自念必死安得不怖覩像胸前銅色燋沸殆臨刑會監官牛奔車壞更克日有令從相府來原洪之罪比開模像胸如所夢焉北山錄涼無讖出海龍王經四卷有道進者從讖求受菩薩戒讖曰當自悔七日乃來既而詣讖曰宿障尚重遂精脩三年夢中感佛為授戒法於是復詣讖讖見喜曰善哉已感戒矣今為汝作證次第於佛像者為說戒相當進感戒之夕沙門道朗亦通此夢於是從進受戒者千有餘人傳授此法迄至于今廬山曇常卒壽七十二張野卒壽六十九己未恭帝德文元熈元八真興元八三十一釋慧義備通經義因言嵩高神云江東有劉將軍應受天命吾以三十二璧鎮金以缾為信遂聞宋王王謂義曰非常之瑞非法師自行無以獲也義乃往嵩山行道七日夢老人將義往璧處指云是此石下明日義行果見石壇下得璧三十二枚黃金一缾此瑞詳之宋史義還京師宋武加接尤重迄乎踐祚禮遇彌深元加二十一年終僧傳魏僧統法果太宗甞親幸其居以門巷狹小不容輿輦更廣大之果年八十餘卒帝三臨其喪追贈老壽將軍趙胡靈公魏書釋道祖初事遠公英姿易悟後隱吳之臺寺者十數年是年卒壽七十三釋法顯至是譯泥洹經等共六部二十四卷竺法力譯無量壽經一卷庚申元熈二居士竺難提此云喜譯觀音消伏毒害經等禪師曇蘭居始豐赤城山初變恠百出蘭宴坐自若神乃拜曰我詣韋鄉山殊欺王以此山奉上人遂不見後三年殊欺王同夫人男女二十三人至求授歸戒蘭為授五戒以萬錢密兩器為施而去是年蘭卒僧傳六月恭帝禪位于宋王劉兩晉凡十五君一百五十六年國除東晉一百四年中譯師二十七人所譯經律論垂六百卷而弘法之務至是特盛焉合寺一千七百六十八所僧尼二萬四千人方志
