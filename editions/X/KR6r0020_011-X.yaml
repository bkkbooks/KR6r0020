body:
  text: 宋括山一庵釋本覺編集明真如居士畢廷瓚較訂唐武宗庚申開成五年正月六日終南山圭峯宗密禪師趺坐示寂荼毗得舍利明白潤大壽六十二持服四眾哀泣喧野宣宗追諡定慧禪師初於圓覺經有所悟為遂州道圓禪師法嗣尋至上都見華嚴疏主澄觀大師執弟子之禮觀曰毗盧華藏能隨我游者其汝乎北遊清涼山迴住鄠縣草堂寺未幾復入寺南圭峯蘭若大和中徵入內賜紫衣帝累問法要朝士歸慕惟相國裴休深入堂奧受教為外護師著禪源諸詮集一百卷都序兩卷又著圓覺華嚴涅槃金剛唯識起信法界觀等經疏鈔裴相國為撰傳法略曰師皇皇於濟拔汲汲於開誘故親師之法者貪則施暴則斂昏則開惰則奮憧憧而來忻忻而去所在不可勝紀吾不識其境界之廣狹議者又烏知大道之所趣哉此據裴休國傳法所紀也傳燈謂師會昌元年示寂此是月文宗崩武宗即位九月召道士趙歸真等入禁中脩金籙道場十月帝昇玄壇親受法籙左拾遺王哲諫云王業之初不宜崇信太過帝不納辛酉會昌元年六月以道士劉玄靜為光祿大夫十月雲巖晟禪師示疾二十六日喚主事僧令備齋來日有上座發去至二十七夜師乃歸寂荼毗得舍利千餘粒諡無住大師塔曰淨勝得法上首洞山价禪師也壬戌二裴休廉于洪州自黃蘗山迎希運禪師至州憩龍興寺旦夕問道贈詩曰自從大士傳心印額有圓珠七尺身挂錫十年棲蜀水浮盃今日渡章濵一千龍象隨高步萬里香華結勝因擬欲事師為弟子不知將法付何人癸亥三九座山正覺大師諱智廣興化軍仙遊人元和二年示生初參鹽官安國師及鄂州無等禪師有省遂南旋止泉州常持鐵鉢并一百犬自隨至是值武宗將廢教乃遁岩谷宣宗復教復出南山王與甲子四三月以道士趙歸真為左右街道門教授先生時帝銳意求仙歸真乘寵每對必排釋氏宜盡除去帝深然之歸真復請與釋氏辨論有旨追僧道於麟德殿談論法師知玄登論座辨捷精壯道流不能屈玄因奏王者本禮樂一憲度吐納服食蓋山林匹夫獨擅之事願陛下不足留神帝色不平侍臣諷玄賦詩以自釋玄立進五篇有鶴背傾危龍背滑君王且住一千年之句帝知其刺特放還桑梓傳燈乙丑五趙歸真為諫官數論遂舉鄧元超及召至與歸真劉玄靖等愈排釋氏五月敕併省天下佛寺上都各留四寺寺僧三十人上州各留一寺下州寺竝廢上寺留僧二十人中寺留十人下寺五人餘僧及尼皆令歸俗毀寺院凡四萬餘區歸俗僧尼二十六萬餘人唐史時福州龜山智真禪師有二偈明月分形處處新白衣寧墜解空人誰言在俗妨脩道金粟曾為長者身忍仙林下坐禪時曾被歌王割截肢況我聖朝無此事只令休道亦何悲傳燈宣宗丙寅會昌六年三月武宗不豫因服金丹發背遍體惡瘡以至躁悶失常心生狂亂旬日不能言而崩年三十三舊史贊曰昭肅削浮圖之法懲桑門之流志欲矯步丹梯求珠赤水徒見蕭衍姚興之旁學不悟秦皇漢武之妄求蓋受惑左道之言故偏斥異方之教況西來之法將及千年之民習已成俗畏其教甚於國法樂其徒不異登仙一朝隳殘金像燔棄胡書結怨於膜拜之流犯怒於匹夫之口帝稱為明斷然聽斯蔽矣唐史其月宣宗即位帝憲宗第十三子初武宗忌之沈之宮廁宦者𬽦公武潛施拯護俾髠髮為僧乃周游天下甞居鹽官安禪師會中遇黃蘗禮拜次帝問曰不著佛求不著法求不著眾求用禮何為蘗云常禮如是事帝曰用禮何為蘗便打帝曰大麁生蘗又打後雪竇有頌云凜凜威風不自誇端居寰海定龍蛇大中天子曾輕觸三度親遭弄爪牙初帝至鹽官時安禪師一日預戒知事曰當有異人至此明日行脚僧數人參禮安默識之遂令維那高位安置禮殊他等安每接談話益加貴氣乃曰寺眾患齋不供就求一供疏帝為製之安覽之驚悚知供僧賷去所獲豐厚乃語帝曰時至矣無滯泥蟠囑以佛法後事而去洎鹽官示寂帝詩悼云像季何教禍所鍾釋門光彩喪驪龍香階懶踏初生草抵掌悲看異日容玉柄永離三教座金鳴長鎮萬年蹤知師下界因緣盡應上諸天第幾重後出授江陵少尹武宗崩左神策軍中尉楊公諷宰臣百官迎立之及帝即位接對羣僚處决庶務中外翕然方見其隱德焉祖庭事苑五月敕道士趙歸真劉玄靖鄧元超等十二人以蠱惑先朝排毀釋氏竝賜朝堂决杖配嶺表敕上都東都各復大寺八所并賜新額帝居藩邸甞異夢如漢明事始龍躍之年悉復名寺云丁卯大中元年閏三月詔曰會昌季年併省寺宇雖云異方之教有資為理之源中國之人久行其道𨤲革過當事體乖謬其靈山聖境應會昌五年所發寺宇諸宿舊僧可仍舊脩復住持唐史龜洋慧忠禪師聞重興之詔乃曰仙去者未必受籙成佛者未必須僧遂過中不食不宇禪迹不出山者三十年有三偈曰雪後始知松栢操雲收方見濟淮分不因世主令還俗那辨雞羣與鶴羣多年塵土自騰騰雖著伽梨未是僧今日歸來酬本志不妨留髮候傳燈形容雖變道常存混俗心源亦不昏試讀善才巡禮偈當年豈例是沙門傳燈七月詔列李德裕罪惡流潮崖而卒是年尚書白居易卒年七十五歷尚書左僕射初居易被遇憲宗為當路所忌遂遭擯斥所蘊不得施乃放意文酒能順適所遇託佛死生之說若忘形骸者後與弟行簡敏中友愛所居履道里疏沼種樹架石樓香山鑿八節灘號醉吟先生晚節好佛尤甚至經月不食葷與香山僧如滿結香火社每肩輿往來白衣鳩杖自稱香山居士與胡景等九人宴集皆高年不仕者人慕之繪為九老圖居易既卒以其所居第施為佛寺居易甞畵彌陀佛像而禮事之自為之記略曰我本師釋迦如來說言西方有世界號極樂以無八苦四惡道故也其國號淨土以無三毒五濁業故也其佛號阿彌陀以壽無量願無量功德相好光明無量故也諦觀此娑婆世界眾生無賢愚無貴賤無幼艾有起心歸佛者舉手合掌必向西方有怖厄苦惱開口發心必先念阿彌陀又範金合土刻石綉紋乃至印水聚沙童子戲者莫不率以阿彌陀佛為上首不知其然而然由是而觀是彼如來有大誓願於此眾生眾生有大因緣於彼國土明矣不然南北東方過現未來佛多矣何獨如是哉唐中大夫太子少傳白居易當衰暮之歲中風痺之疾乃捨俸錢三十萬命工畵西方世界一部阿彌陀佛坐中央觀音勢至二大士侍左右人天瞻仰功德成就弟子居易稽首跪於佛前願此功德回施眾生眾生有如我老者如我病者竝離苦得樂斷惡脩善不越南部便覩西方青蓮上品隨緣往生現在未來常得親近欲重宣此義而說讚曰極樂世界清淨土無諸惡道及眾苦願如我身老病者同生無量壽佛所文集戊辰二年觀察使裴休守宣城甞與名緇講道門人謂公曰敢問三界之言未立人不知脩行不見因果介景福者不為之少洎斯教也行乎中夏愚人畏罪損其惡賢人望福增其善增之不已則至今當盡善矣損之不已至今當無惡矣何昏迷暴虐無減於秦漢之前福慧聽明不增於魏晉之後歸之者殊途輻凑立之者萬法雲興宜使吾人盡昇覺路不宜庶類由古它若斯之迷也由之之固庸非溺乎公笑謂之曰大明肇啟法不齊備聖人繼出代天為工結繩畫卦文質滋改一聖立一法生天道人事顯若符契夫燧人氏之未有火也則天無火星人無火食龜無火兆物無火灾必矣少昊氏之未理金也則天無金星人無金甲龜無金兆物無金灾必矣及聖人攻木出火鍛石取金於是乎精芒主宰騰變上下則知世法時事隨聖人也探精神之源窮性命之表作大方便護於羣生羣生受之而不知蓋猶天道運行物以生茂皆謂自己孰知其然也於是問者廓然自得佛味及詔許立寺而宣之士民相鼓以請先立之于宣郛遂復新興寺焉是年裴休復禮請黃蘗運禪師至州寓開元寺旦夕受法己巳三年湖南觀察使裴休謁華林覺禪師休問師有侍者否曰有一兩個休云在什麼處覺乃喚大空小空時二虎自庵後而出休大驚覺語虎曰且去有客在二虎哮吼而去休問師作何行業感得如斯覺云會麼休云不會覺云山僧常念觀音休歎異而去覺隱居常持錫夜出林間七步一振錫一稱觀音號有僧來參方展坐具覺曰且緩緩僧曰和尚見個什麼覺云可惜許磕破鍾樓其僧有省庚午四年八月黃蘗運禪師示寂諡斷際禪師塔曰廣業丞相裴休紀其語曰傳心法要有一二十章皆直指之道傳燈辛未五年五月詔京兆弘辨禪師入內帝問禪宗何有南北之名對曰禪門本無南北自諸祖至弘忍大師有二弟子一慧能受衣法居嶺南一名神秀在北揚化得法雖一而開導發悟有頓漸之異故曰南頓北漸非禪宗有南北之名也帝曰何名戒定慧對曰防非止惡名戒六根涉境心不隨緣名定心境俱空照覽無惑名慧帝曰何名方便對曰權巧之門拔接中下曲施誘廸謂之方便設為上根言捨方便但說無上道者斯亦方便之談以至祖師玄言忘功絕謂亦無出方便之迹帝曰何為佛心對曰佛者覺也謂有智慧覺照為佛心帝曰有人念佛如何對曰如來說法隨根器而說為上根者開最上乘頓悟至理中下根者未能頓曉是以佛開觀門令念佛生於極樂帝曰有持經呪求佛如何對曰如來種種說法皆為一乘如百千眾流莫不朝宗于海如是差別諸緣皆歸薩婆若海帝曰祖師既傳心印金剛經云無所得法如何對曰佛之一化實無一法與人但示各各自性同一法藏當時燃燈如來但印釋迦本法而無所得方契然燈本意帝曰禪師既會祖意還禮佛看經否對曰沙門禮佛誦經蓋是住持常法有四報焉依佛戒脩身參尋知識漸脩梵行履踐如來所行之迹帝曰何為頓見何為漸脩對曰頓明自性與佛無二然有無始染習故假漸脩對治令順性起用如人喫飯非一口便飽是日辨對七刻方罷帝悅賜號圓智禪師是日有詔增脩天下祖塔應未經賜諡者所在以聞大常考行頒賜五燈壬申六江州復廬山東林寺刺史崔黯為略曰佛以諸法化人所謂救溺以手救火以水其於生人恩亦弘矣今天子取利益生人復其教江州奉列詔予訪茲地松籟冷然喜而復之甞觀晉史見遠公之事其辨若注其言若鋒足以見其當時且金陵六代代促俗薄臣以功危主以疑慘為四方之中有江山之美遠公豈非得計於此而視於時遠三相挾而為天下具美矣帝加諡遠法師曰辨覺廬山記癸酉七溈山靈祐禪師住溈山學者輻湊值武宗毀教遂空其所師褁首隱於民後值宣宗興教裴休請迎而出復到其所居為同慶寺諸徒復來其事如初師敷揚宗教四十餘年達者不可勝數入室弟子四十一人是年正月九日云八年正月盥漱敷坐怡然而寂壽八十三臘六十四諡大圓禪師塔曰清淨相國鄭愚為略曰天下之言道術者多矣各用所宗為是而五常教化之外於精神性命之際史氏以為道家之言故老莊之類是也然至於盪情累外生死出於有無之間超然獨得則浮屠氏之言禪者庶幾乎盡也非明達瓌宏之器不能得其傳當其傳是皆鴻龐偉絕之度也師居溈山恬然晝夕非夫外死生忘憂患其順大和者孰能與於是哉且生死於人得喪之大者也既無得於生必無得於死既無得於得必無得於失故於冥間得失是非所不容措委化而已其為道術天下之能事畢矣噫人生萬類之最靈者而以精神為本自童至老始於飲食漸加功名利養是非晝夜纏縛行坐則思想偃臥則魂夢以淫之利欲役老朽之筋骸曾不知息陰休影捐慮安神求須臾之暇以至溘然而盡親交不翅如行路利養悉委于他人愧負積於神明辱殆流於後嗣淫渝汗漫不能自主斯皆自心而發不可不制以道術道術之妙莫有及此佛經之說愚益神往然其歸趣悉臻無有全覺通論大安禪師初參百丈問何者是佛丈曰騎牛覔牛師云識後如何曰騎牛至家云如何保任曰如牧人執鞭視之不令犯人苗稼師領旨後同參祐禪師既創居溈山師亦躬耕助道至是眾請繼住溈山上堂有二十年在溈山牧牛之語五燈甲戌八終南山一僧住庵習定一日僧失伽梨乃見猴披在岩宴坐後見羣猴皆習定間有坐脫者今有五獼猴塔宣宗有偈贊云嗟汝獼猴能入定心猿不動幾千春罷攀紅樹三冬菓休弄碧潭孤月輪雙眼已隨青嶂合兩眉猶對百花顰自從坐脫終南後悟了浮生多少人乙亥九無著文喜禪師入五臺山求見文殊忽見士翁著揖曰願見文殊大士翁曰大士未可見汝飯未著曰未翁引入一寺引著升堂命坐童子進玳瑁盃貯物如酥酪著飲之覺心神清朗翁曰南方佛法如何住持著曰末代比丘少奉戒律曰多少眾曰或三百或五百著問此間佛法如何住持曰龍蛇混雜凡聖同居曰眾幾何曰前三三後三三遂談緒及暮翁命童子引著出行未遠著悽然悟翁即文殊也不可再見稽首童子乞一言為別童子有無垢無染即真常之語言訖童與寺俱隱但見五色雲中文殊乘金毛獅子往來忽白雲覆之不見別集丙子十師辨章為三教首座潭州道林沙門疏言詣大訪求藏經高士李節餞以序略曰業儒之人喜排釋氏論必曰禹湯文武孔子之代皆無有釋釋氏興於衰亂之際也宜革絕之使不得滋此論者之言粗矣抑能知其然未知其所以然也吾請言之昔有一夫膚腯而色凝氣而神清未甞謁毉未甞禱鬼恬然保順罔有札瘥之患固善也即一夫不幸而有寒暑風濕之痾於是攻熨之術用焉禳禬之事紛焉是二夫豈特相返耶蓋病與不病勢異耳嗟乎三代之前世康矣禹湯文武德義播之周公孔子典教持之道風雖衰漸漬猶存詐不勝信惡知避善三代之季世病矣道風大衰詐以覆信善以柔退惡以強用上下相仇激為怨俗釋氏之教以清虗為禪定以柔謙為忍辱故怨爭可得而息也以菲薄勤苦為脩行以窮達壽夭為因果故賤陋可得而安也故其云必煩惱乃見佛性則本衰代之風激之也夫衰代之風舉無可樂者也不有釋氏以救之尚安所寄其心乎論者不責衰代之俗而尤釋氏之興則是抱疾之夫而責其醫禱攻療者也徒知釋因衰代而興不知衰代須釋氏之救也何以言之夫俗既病矣人既愁矣不有釋氏使安其分勇者將奮而思鬪智者將靜而思謀則阡陌之人將紛紛而羣起矣今釋氏一縷之分不責於人故賢智雋朗之士皆息心焉其不能達此者愚人也惟上所役焉故罹亂之俗可得而安賴此也若之何而剪去之哉論者不思釋氏扶世助化之大益而疾其雕鏤綵繪之小費吾故曰能知其然不知其所以然也會昌季年武宗大剪釋氏天下祠宇毀撤如掃天子建號之初雪釋氏之不可廢也詔徐復之嘻釋氏之助世既言之矣向非我君洞鑒理源其何能復立之耶通論初令僧尼受戒給牒通鑑丁丑十一洞山价禪師初參南泉溈山次參雲岩晟因問無情說法話有省乃述偈曰也大奇也大奇無情說法不思議若將耳聽應難會眼處聞聲方得知後因過水覩影大悟有偈曰切忌從它覔迢迢與我踈我今獨自往處處得逢渠渠今正是我我今不是渠應須恁麼會方得契如如至是於新豐山接誘學徒次盛化於高安之洞山師甞問僧世間何物最苦僧曰地獄最苦師曰不然在此衣線下不明大事是名最苦五燈戊寅十二萬敬孺廬州人三世同居喪親廬墓刺血寫佛經斷乎二生川改所居曰成孝鄉廣孝聚宣宗表其家溫州瑞安本寂禪院僧無繹自會昌沙汰隱于東北谷結菴禪定閱十年藤蘿纏繞儼然不動號藤蘿尊者後人立祠至今奉之永寧編己卯大中十三年八月帝崩帝聰明仁愛恭儉天下稱為小太宗懿宗即位泉州龜洋慧忠禪師焚香安坐而化全身塟無了禪師塔之東後數年塔忽折裂主僧將發視之是夜宴寂中見無了曰不必更發也今為沈陳二真身無了姓沉見馬祖師姓陳懿宗庚辰咸通元年五月撫州守蔡京撰廬山東林經藏記有曰後周武帝以三教不同詔逍遙公定其優劣對以三教雖殊同歸於善跡有淺深理無階級京常以束教泥迹者徒見其異玄解達識者必會於同儒之忠恕老之柔謙佛之慈忍蹈之則福違之則殃君子之於三教無溺無毀探其玄精以翊真粹用是為治理必茂矣普化將示滅乃問人乞直裰或與裘襖皆不受臨濟令人送一棺師笑曰臨濟廝兒饒舌便受之乃辭人曰明日東門死郡人送出城師曰明日南門死第二日又曰明日西門方吉第三日曰明日北門遷化第四日自擎棺出北門振鐸入棺而逝郡人揭棺視之已不見唯聞空中鐸聲漸遠舒州投子大同禪師初參翠微無學得旨歸鄉居投子山一日趙州到庵師携油歸州曰久嚮投子到來只是賣油翁師曰汝只見賣油翁且不識投子州曰如何是投子師曰油油州問死中得活時如何師曰不許夜行投明須到自此師道聞於天下辛巳二時曹山本寂禪師諱耽章至高安謁洞山依此十餘年名冠叢林壬午三二月杭州大慈山寰中禪師不疾而逝壽八十三諡性空大師師甞示眾云說得一丈不如行取一尺說得一尺不如行取一寸四月敕於兩街四寺各置戒壇度人三七日上奉佛至信每於禁中設講席自唱經旨手錄梵本數幸諸寺施與無數癸未四制署法師知玄為悟達國師總教門事杭州徑山二世鑒宗禪師初參鹽官悟空决擇疑滯至是住徑山宣揚禪教後咸通七年閏三月示滅諡無上大師甲申五雪峰義存禪師自出嶺遊方久歷禪會三到投子九上洞山因緣不契後於德山句下有省自是入室日益奧旨是年與岩頭欽山同到澧州敖山鎮止宿岩頭睡醒猶見雪峰端坐岩云何不睡去恰似七村裏土地峰點胸云某這裏未穩在岩云我將謂爾高提祖印猶作這個語話據爾見處一一通來是則與爾證明不是與你剗却峰乃歷舉見處巖咄云汝若如是果然未徹不聞道從門入者不是家珍它後若欲播揚大教一一從自己胸襟流出將來與我蓋天蓋地去峰言下大悟便禮拜連聲云今夜始是鰲山成道於是二人分襟岩頭乃庵于洞庭臥龍山徒侶臻萃雪峰乃返閩川全錄乙酉六七月雪峰登象骨山曰真吾居也乃誅茅為庵學徒翕然其山屬福州侯官縣環控四邑峭拔萬仞先冬而雪盛夏而寒因以雪峰名山焉師住山後甞作頌曰光陰迅速暫須臾浮世那能得久居出嶺年登三十二入閩早是四旬餘它非不用頻頻舉已過還須旋旋除報與滿朝朱紫道閻王不怕佩金魚後僖宗聞師道風賜號真覺大師仍賜紫袈裟德山宣鑒禪師初居澧陽垂三十年自大中初武陵守薛延望剏德山精舍延請居之大闡宗風是年十二月將終謂眾曰捫空追響勞汝心神夢覺覺非竟有何事言訖端坐而逝壽八十六諡見性禪師法嗣九人全錄叶律郎何蟾作福州懷安縣天王堂記略云父母之思昊天罔極將資冥福式席玄因大夫彭城公除福州監軍使公離鄉積歲逢時得君霜露之悲每纏旦夕遂建北方毗沙門天王堂一所清梵一揚便同初地香煙不散若襲慈雲施入昇山靈岩寺下院兼請本寺僧居簡住持又割東湖田五十畝永備齋粥生生之具一無所闕既而朝昏脩敬贊唱禮懺則其席玄因資冥福信是無量矣丙戌七臨濟義玄禪師自黃蘗得法歸鄉住臨濟禪苑學徒奔湊尋以兵動棄去太尉默和捨宅為寺延請師居亦以臨濟為額次至河府府主王常侍與師道契晚遷太名府興化寺閑居存獎執侍師乃付法偈曰㳂流不止問如何真照無邊說似他離相離名人不稟吹毛用了急還磨是年四月謂眾曰吾滅後不得滅却吾正法眼三聖云爭敢滅却和尚法眼師云已後有人問爾作麼生道三聖便喝師云誰知吾正法眼藏向這瞎驢邊滅却言訖端坐而化敕諡慧照禪師嗣法二十一人其上首三聖興化也師甞示眾云赤肉團上有一無位真人常從諸人面門出入未證據者看時有僧問如何是無位真人師搊住云道道其僧擬議師托開云無位真人是什麼乾屎橛師示眾有云不如歇業無事去已起者莫續未起者不要放起便勝十年行諸人皆是有心求佛求出三界癡人爾要出甚處去爾一念心貪是欲界一念心嗔是色界一念心癡是無色界是爾屋裏具三界爾一念心歇得處喚作菩提樹一念心不歇處喚作無明樹師又云道流且要識取四種無相境免被境緣擺撲爾一念心愛被水溺一念心嗔被火燒一念心疑被地礙一念心喜被風飄若能如是辨得不被境處處用境東涌西沒邊涌中沒為達四大如夢如幻故丁亥八福州玄沙宗一大師師備閩人姓謝氏父以釣魚為業因夜泛船墜水玄沙鼓棹而救因見水中月乃云先達有言一切諸法皆如水月若父存與其同殺只益三途之苦今既不可救可捨緣出家報其恩也於是投師受具布衲芒屨食才接氣終日宴坐與雪峰義存禪師親近師資道契雪峰以其苦行呼為備頭陀甞擕囊出嶺欲遍歷諸方忽到險峻之處築著脚指血流痛楚歎曰是身非有痛從何來是身是苦畢竟無生休休達磨不來東土二祖不往西天從此回笻嶺嶠與雪峰同力締構玄徒臻萃師入室咨決罔替晨昏又閱楞嚴經發明心地由是應機敏捷與脩多羅冥契諸方玄學有所未決必從之請益至與雪峰徵詰亦當仁不讓雪峰曰備頭陀再來人也後忽夜夢父來謝云得子出家我得生天故來報汝通明集及五燈戊子九長沙景岑禪師初住鹿苑為第一世其後居無定所但狥緣接物隨請說法故時眾謂之長沙和尚甞示眾曰我若一向舉揚宗教法堂裏草深一丈不得已向汝道盡十方世界是沙門眼盡十方界是沙門全身盡十方界在自己光明裏三世諸佛共十法界眾生是摩訶般若光仰山問人人盡有這個事只是用不得師云恰是請汝用仰云作麼生用師乃踏倒仰山山曰直下似個大蟲世因名岑大蟲至是年示寂己丑十三月洞山价禪師將示寂謂眾曰離此殻漏子向甚處與吾相見眾無對遂剃髮披衣湛然而寂時學徒千餘人號慟移時師忽開眸曰夫出家人心不附物是真脩行勞生息死於悲何有乃召主事僧令辨愚癡齋一中蓋責其徒戀情也至七日食具方備師隨眾齋畢復謂眾曰僧家無事大率臨行之際勿須喧動明日浴罷端坐長往壽六十三諡悟本禪師師權開五位善接三根大闡一音廣弘萬品橫抽寶劒剪諸見之稠林妙叶弘通截萬端之穿鑿又得曹山寂深明的旨妙唱加猷道合君臣偏正回互由是洞上玄風播於天下故諸方推尊之曰曹洞宗福州寧德龜山原禪師初參五洩默師後住龜山為第二世是年示寂壽七十八諡性空大師庚寅十一相國裴休薨休字公美初刺洪州時於黃蘗高僧在甚處句下契入遂迎入府旦夕問法及鎮宣州亦命與俱由是深徹法源復與圭峰密禪師道緣尤密大中時執政六年次歷諸鎮節度薨年七十四公為人醞藉操守嚴正宣宗甞曰休真儒者公居常不御酒肉甞披毳衲於歌姬院持鉢乞食自以為不為俗情所汩可以說法為人尤善屬文著釋氏文數萬言其著圓覺經序華嚴法界觀序勸發菩提心文後世雖有作者無能過矣又著傳心偈見載於傳燈錄又著圭峰禪源諸詮序尤為明妙十一月帝誕節召兩街僧入內講道帝悅賜曇顯等十人紫衣統紀夾山善會禪師初住潤州京口道吾遇上堂見僧問如何是法身師云法身無相如何是法眼法眼無瑕吾失笑師請吾為說吾指往華亭船子處去師造華亭因船子問垂絲千尺意在深潭離鈎三寸子何不道師擬開口船子以篙打落水中才上船子又云道道擬開口又打師有省乃點頭船子云釣盡江波金鱗始遇師揜耳子云如是如是汝向去直須藏身處沒蹤迹沒蹤迹處莫藏身汝後不得住城隍聚落但向深山裏钁頭邊接取一個半個師辭行頻迴顧船子竪橈云汝將謂別有乃覆船入水而去師住後道聲既播學者交湊至是海眾卜于夾山遽成院宇廣宣法要五燈辛卯十二五月帝幸安國寺賜國師知玄沉檀寶座高二丈餘珍麗絕甚玄姓陳世號陳菩薩三學洞貫名蓋一時異迹尤多時宮中日齋萬僧帝自為贊唄宰相蕭倣諫以為天竺法割愛取滅非帝王躬踐況佛者可以悟取不可以相求帝雖不納然嘉美其言唐史洞山道金禪師於价和尚得旨暨价圓寂眾請接踵住持海眾悅服玄風不墜壬辰十三年道膺禪師初參洞山契悟宗旨甞因南泉有天上無彌勒地下無彌勒之語師問洞山天上無彌勒地下無彌勒未審誰與安名洞山被問直得禪床振動後結庵三峰經旬不赴堂洞山問之師曰每日有天神送食山曰我將謂汝是箇人猶作這箇見解至晚山召膺庵主師應諾山曰不思善不思惡是甚麼師回庵寂然宴坐天神竟尋不見三日乃絕師初止三峰其化未廣而每月一來謁价价呵其未忘情於道為雜勉令隨方接人遂焚其庵去海昏登歐阜盧山西北崦冠世絕境也就樹縛屋而居號雲居衲子亦追求而集散處山間樹下久成苫架說法其下至是遂成法席學徒至一千五伯眾五燈幼璋禪師見江陵騰騰和尚曰汝往天台尋靜而居遇安即上璋至天台於靜安鄉建福唐院符騰二之言又住隱龍院僧寶傳癸巳咸通十四年三月詔兩街僧於鳳翔法門寺迎佛骨羣臣諫者甚眾上曰朕生得見之死亦無恨廣造寶帳香𣄢蓋皆飾以金珠錦綉儀衛之盛過於郊祀元和之時不及遠矣以四月八日迎至京師綵觀夾道天子御安福門樓迎拜引入內道場三日後出京城諸寺詔賜兩街僧金帛京城耆老悉厚賜所過鄉聚皆裒土為剎相望於途考鼓鳴螺以日繼夜下詔曰朕以寡德纘承洪業十有四年憂勤在位愛育生靈遂尊崇釋教至重玄門迎請真身為百姓祈福今觀覩之眾隘塞路岐載念陛牢寢興在慮嗟我黎人陷于刑辟況漸當暑毒繫於縲絏京畿及天下諸州見禁囚𮞏減死一等七月帝崩僖宗即位明年四月詔送佛骨歸于鳳翔都人耆耋辭餞皆嗚咽流涕僖宗甲午乾符元年洛浦安禪師初為臨濟侍者濟常稱美曰臨濟門下一隻箭誰敢當鋒及辭濟濟稱為一條赤梢鯉遍遊罷直往夾山頂卓庵經年夾山知乃脩書令僧馳到師接得便坐却僧迴舉夾山云這僧看書三日內必來若不看書斯人救不得果三日後至才見山乃叉手而立山云雞棲鳳巢非其同類出去師曰自遠趍風乞師一接山云目前無闍梨此間無老僧師便喝山云住住且莫草草忩忩雲月是同溪山各異截斷天下人舌頭即不無闍梨爭教無舌人解語師佇思山便打師因此服膺數載乙未二杭州徑山三世洪諲禪師初參溈山宗乃悟玄旨自咸通七年住徑山法道大振光化四年九月白眾而化後諡法濟大師僧問如霜如雪時如何師曰猶是汙染曰不污染時如何師曰不同色丙申三年襄州關南道吾和尚初參道常禪師蒙印所解復參德山法味彌著凡上堂示徒戴蓮華笠披襴執簡擊鼓吹笛口稱魯三郎有時云打動關南鼓唱起德山歌有時執木劍橫在肩上作舞大闡宗風丁酉四年黃巢寇河南江浙睦州陳尊宿諱道明初遊方契旨於黃蘗尋住觀音院常餘百眾得數十載後捨眾住開元寺房常作草屨潛施道路或貨屨侍養老母時人號為陳蒲鞋巢兵甞至師標大草屨一隻於城門巢欲棄之竭力不能舉乃歎曰睦州有大聖人將捨城而去更不敢入以是民免兵宼擾攘師機峻急造旨者稀唯雲門一人契師意令嗣雪峰師一日忽召眾曰此處緣息吾當逝矣乃跏趺而終壽九十八臘七十六戊戌五年黃巢陷福建漳州羅漢和尚始於關南常拳下悟旨甞為歌略曰心裏疑團若栲栳遇師當胸打一拳駭散癡團獦狚落舉頭看見日初圓從茲蹬蹬以碣碣直至如今常快活只聞肚裏飽膨脝更不東西去持鉢又偈宇內為閑客人中作野僧任從他笑我隨處自騰騰己亥六年黃巢陷廣南荊湖江淮仰山慧寂禪師初參溈山悟旨執侍十五載凡有言句皆為後世宗範及領眾住王莾山一日禪床陷入地中地神告以此山不任和尚居止東南有大仰山乃人間福地遂遷止仰山庚子廣明元黃巢陷東都潼關帝駕出奔十二月巢據京師號大齊建元金統舒州投子山大同禪師值天下喪亂一日有狂徒持刃上山師乃隨宜說法渠魁聞而拜伏脫身服施之而去子湖蹤禪師居子湖說法四十五稔是年無疾歸寂壽八十一辛丑中和元僖宗幸蜀親王宗室皆逃亡龍湖普聞禪師僖宗第三子也斷髮逸遊造謁石霜諸諸與語嘆異曰汝乘願力而來乃生王家脫身從我火中蓮也聞夜入室問祖師別傳事諸曰待按山點頭即向汝道師因契悟依止數載乃請遍遊名山諸曰逢乾即止遇陳便住於是遠遊過昭武抵大乾遙望山顛然深秀問父老曰彼有居者否老曰有一陳嗣者久隱其中因悟師言即撥草至山陳嗣一見乃分坐同住因乞菜種於嗣願求斗斛嗣曰豈有斗斛與之一合遂入山墾種後谷口之人相謂曰前日僧入山經今不出必為虎所㗖往視之見茅廬一所行者數人指呼百諾而重崗複嶺菜已青矣蓋耕地播種者乃山神所投行者乃虎也陳嗣覺師道之勝乃曰吾居此每苦惡獸毒蟲之多公來皆屏跡道德吾所不及五種之緣其屬公乎言訖飃然而逝今陳嗣庵址具存是山寶乘禪院乃圓覺向日茅廬基也十一月七日夾山會禪師辭眾各善保護至子夜奄然而逝壽七十七諡傳明大師塔曰永濟夾山順世眾以洛浦安次補住持尋又移澧陽洛浦山十年宴處後遷朗州蘇溪玄徒奔湊壬寅二年長安大荒斗米三十緍鍾傳據江西帝避巢賊幸成都遣御史郭遵賷璽書召知玄國師赴行在引對大悅賜號悟達國師時九峰玄禪師寓止豫章南平鍾王執弟子禮北面而師事之王為買末山建精舍號隆濟以延之學者風靡而至癸卯三年李克用敗巢復京師知玄國師自成都行宮辭還九隴忽定中見菩薩摩玄頂而慰安之俄一珠入玄左股隆起楚甚上有晁錯二字玄知夙債即右脇安臥而逝世稱知玄乃漢袁盎後身盎與錯有隙也通論十月福州大安禪師告寂師大化二十餘載諡圓智甲辰四年克用追黃巢斬之浙東饑疫幼璋禪師於溫台明三郡收瘞遺骸數千時謂悲增大士溫州法空院僧惠升結廬北岩甞寫法華經精虔至普賢勸法品天雨舍利二顆郡以聞賜額普賢懺院祥符改今名永寧編乙巳光啟元三月帝歸京十二月兵亂帝奔鳳翔靈雲勤禪師初在溈山因桃花悟道溈山可之至是乃返閩川玄徒輻湊因到玄沙相看了沙問那裏何似這裏雲云也只是桑梓別無他故沙云在也無雲云常然沙云何不道雲云有甚難沙云便請道雲云三十年來尋劒客幾回葉落幾抽枝自從一見桃花後直至如今更不疑沙云甚生桑梓之能雲云向道固非外物沙云如是雲云不敢沙云諦當甚諦當敢保老兄未徹在雲云正是和尚還徹也未沙云與麼始得雲云亘古亘今沙云甚好甚好遂作偈送雲云三十年來只如常幾回葉落放毫光自此一出雲霄外圓音體性應法王玄沙全錄今人以前頌為靈雲見桃華時作悟道頌者非也蓋靈雲悟道之後歸鄉與玄沙相見時拶出此頌耳況其相見時語句曲折如此今傳燈所載不盡後人不能無妄議者故於此詳載之大慧武庫云我平生好罵人因看玄沙語錄大喜他勘靈雲道諦當甚諦當敢保老兄未徹在可謂壁立萬仞後來與靈雲說話了爾恁麼方始是徹後頭却恁麼撒屎撒尿却問員悟如何悟笑云他後頭却恁地我也理會不得遂下來歸到寮方知玄沙大段作怪遂舉似員悟悟笑云且喜爾知晦堂云今時諸方多是無此藥頭師云切忌外人聞此麤言丙午二年六月節度薛正己撰廬山廣平公舊因記略曰甞聞仲尼龍老聃老聃師竺乾竺乾先生即釋迦也雖桑田屢變而斯道不泯者以其智慧溥化也九江郡有匡山山有東林寺乃東晉慧遠大師所立時結西天淨社具載史傳大中壬申廣平公先伯父甞監於洪清河公黯牧於江先開府統左廣司公德因會昌之後復脩先開府於內庭首倡捨錢三伯萬大幅三十二兼收贖戶部東林西林遺愛三寺園林施者雲集功德俄就全自先開府之力也辛丑歲海內多難有頴川公來蘇八郡廣平公來護藩閫甲辰冬干戈漸弭固多暇日得訪舊因因閱大中復東林之化疏次閱名氏皆朝之英髦欲再刊紀公以列施之人皆居顯位慶孫令子充塞門庭安知東林皆種善果遂磨礲山骨悉刻姓名俾過者睹之前脩不墜豈獨以家之良因為念哉丁未三年王朝據泉州紙衲僧惟亮諡介空自龜山寺來福州長溪築庵於龜湖禪院之前山山崗有湖水與海潮準忽有大龜浮沉於湖循庵游止僧有所之龜輒以載師見餓虎乃棄身以飼焉龜化為石庵鞠為草湖亦隨而埋沒後人乃棄舊庵基今院至今興焉長樂集四月岩頭全奯禪師示寂師甞密啟德山末後句後居岩頭謂眾曰老漢去時大吼一聲了去其後中原盜起眾皆避地師端居自如一日賊至責無供餽遂剸刃焉師神色不動大呌一聲而終聲聞數十里壽六十一後唐追諡清嚴大師其嗣羅山能世其高風云戊申文德元二月帝歸京王建掠西川三月帝崩昭宗即位四月石霜慶諸禪師告寂師止石霜二十年學眾有長坐不臥屹若株杌天下謂之枯木眾也僖宗聞師道譽甞遣使齎賜紫衣師牢讓不受壽八十二諡普會大師塔曰見相一云二月滅五月杭州千頃山楚南禪師辭眾奄然而化師得旨於黃蘗初抵姑蘇報恩寺精脩禪定二十餘載足不踰閾尋住寶林支磵慈雲師雖應機無倦而常儼然處定或逾月或浹旬光啟中錢王請下山供養昭宗聞其道化就賜紫衣壽七十六師著破邪論行于世龍湖圓覺禪師自住山數年飯木實飲谷水甞危坐於路傍杉木之上占望形勢引錫一擲隨其所止即建堂殿既而道德播聞緇徒雲集遂成巨剎忽有老人跪請曰我乃龍也家于此山以行雨不職上天有罰當死願賜救護師曰汝得罪上帝我何能致力雖然汝可易形來俄化為小蛇師以錫杖引入淨瓶良久風雷挾坐榻山岳搖振師宴坐達旦天宇澄霽蛇自瓶出有頃復為老人形而謝曰若非藉法力則血肉腥穢此地矣無以報德山中無水何以安眾當以水延師道場也即於峻谷窮源刮石成穴湧泉一泓始雖涓涓終焉衍溢遂成一湖今在半山龍湖之名蓋始於此沍寒不氷大旱不竭其流四出灌溉田數百頃人神之建祠其上歲時享祀焉今遇上元乃師誕辰龍必朝謝有祥雲瑞氣之應人由是益歸於師富者施財貧者施力翕然而成樓觀院之右十五里有隋義寧歐陽太守之廟即今福善王也廟食至是年歷二百七十餘載其神極靈禍福此民畏敬之牲牢饗祭無虗日師見而憫焉一日杖策之祠下說偈見意告之曰悟道然同死死中生不忘虎用無心伏人來與惠降殺生及祭祀輪迴萬劫殃為報人天道無遮福最強欲種當生果今生足資糧到處人驚悕脩齋勸大王昔年地獄裏今日作天堂復與之約曰能食素持不殺戒乃可為鄰是夕里之父老夢神云我今受禪師戒我不復血食祭我當如比丘飯足矣於是易血食以齋羞至今遵之神人相安自是神顯靈異護持此山或云師甞與神以道力角勝負廟傍有松巨幹參天師舉手拗下佛地三匝而神實拂其二遂屈而從之右丞黃履作詩寄僧云龍湖曾與祐民談王曾祐民手轉松梢拂地三感得茹蔬今尚爾聞師孤潔可追參後有僧紹新偈云古木寒雅晝鎻煙靈風長在劫頻遷忽思圓覺當年事只與談因不論禪審此則或者之說又未必然今併錄之昭宗己酉龍紀元九峰虔禪師久參石霜諸諸歿時虔作侍者眾請首座嗣諸住持方議次虔犯眾曰未可須明先師意乃可耳眾曰先師何意虔曰只如道休去歇去一念萬年去古廟香爐去如何會座曰是明一色邊事虔曰果不會先師意首座炷香曰我若會先師意香煙滅則我脫去不然煙寂不能脫言卒而脫去虔拊其背曰坐脫立亡不如首座先師意則未會在虔廬于普會塔旁三年而去經行末山之下住崇福寺庚戌大順元洪州上藍令超禪師正月十五日齋畢聲鍾端坐長往曹山本寂禪師初居撫州曹山後居荷玉山二處法席學者雲集洞山之宗至師為盛溫州大雲寺因會昌例廢至是高僧洪楚投牒刺史朱誕請復建大雲寺誕上其事且請加晝錦二字為額詔從之楚師誦經說法陸地生蓮靈蛇聽法其後刺史錢元珪建楚師堂清泰年建高塔焉辛亥二年楊行密據揚州封吳王仰山慧寂禪師一日見異僧乘虗而至作禮而立師問近離甚處曰早辰離西天師云何太遲僧曰遊山翫水師云神通妙用不如闍梨佛法須還老僧曰特來東土禮文殊却遇小釋迦遂出西天貝多葉與師作禮乘雲騰空而去師又甞示眾云聖邊事且莫將心湊泊但向自己性海如實而脩三明六通是聖末邊事如今且要識心達本但得本不愁末他時後日自具去在若未得本縱饒將情學他亦不得豈不見溈山道凡聖情盡體露真常事理不二即如如佛先是師預示偈曰吾年七十七老去是今日任性自浮沉兩手攀屈膝至是於東平兩手抱膝而逝敕諡智通大師師之異迹及垂讖記具存本山實錄南塔光湧禪師初事仰山於石亭仰指謂人曰此子肉佛可以化人也石亭沒湧燃第三指以報法又燃第二指以報親壬子景福元泉州莆田國歡崇福慧日大師初名文矩為縣獄卒常往神光靈觀及西院大安所後往萬歲譚空禪師落髮不披袈裟不受具戒唯以雜綵為掛子復至觀所觀令禮西院去師擕一青竹杖入西院法堂安迨見笑曰入涅槃堂去師輪竹杖而入時有五百許僧染時疾師以杖次第點之各隨點而起閩王禮重創國歡禪院以居之後頗多靈迹乾寧中示寂癸丑景福二王朝據福州稱留後王鎔帥鎮定稱趙王錢鏐據浙西稱吳王釗仁恭為幽州盧龍節度稱燕王趙州從諗禪師初參南泉得旨後歸北地眾請住趙州觀音古剎道風大振一日燕王領兵至鎮府界欲取趙城有觀氣者曰趙州必有聖人者居戰必不勝因此燕趙通和聞有觀音院諗禪師道眼明白此必應兆一日二王命駕謁趙州和尚師見王端坐不起燕王問人王尊法王尊師曰在人中人王尊在法中法王尊王唯然而已師良久乃問那個鎮府大王趙王曰弟子是師曰老僧濫在化部不及趍見須臾王請說法師曰大王尊諱多王曰請去諱說法師曰我佛世尊一稱名號罪滅福生大王先祖才有人觸著名諱便生嗔怒趙州於是慈悲說法二王大悅稽首而退至來日燕王有先鋒將入院欲責慢君之禮師聞來乃出接鋒云昨日見二王不起今日見某甲來何故出接師云待都使似大王老僧亦不出接鋒愧而退又趙王擕諸子謁趙州入院師坐而問曰大王會麼王云不會師曰自少持齋今已老見人無力下禪床趙王加禮而去翌日令客將傳語師下禪床接之少間侍者問和尚昨日大王來却不下禪床今日軍將來為甚麼下禪床師云非汝所知上等人來禪床上接中等人來下禪床接末等人來三門外接趙王請趙州和尚供養師屆城王敕令合城具威儀迎接入內師下輦王乃設拜請上殿正位而坐齋罷眾欲請師演法師云這裏已坐却老僧那裏更問甚法二尊不竝化王乃止時王與后在師左右侍立后曰請師與王摩頂受記師以手摩王頂云願大王與老僧齊年甲寅乾寧元禪月大師貫休以詩謁吳越王錢鏐有一劒霜寒十四州之語謬令改作四十州乃可相見休曰詩不可改孤雲野鶴何天而不可飛乃入豫章之西山後入蜀謁王大王蜀僧齊己幼捐俗依溈山及仰山慧寂禪師住豫章觀音己公為總轄庶務有粥疏曰粥名良藥佛所贊揚義冠三檀功標十利更祈英哲各遂願心既備清晨永資白業其後居西山金鼓示寂塔尚存焉龍盤乃其書堂雲臥紀談乙卯二年九座正覺大師智廣自咸通六年至九座山忽逢巨蠎欲來吞師師錫自飛撑柱其口師入其口趺坐入定神來謝罪師不顧之逮師出定蠎化為石矣繼而雷雨湧沙夷成院基山神移山八維蔭映乾符三年示滅是年諡正覺號云五月灌溪志閑禪師將示滅問侍者曰坐化者誰曰僧伽曰立化者誰曰僧會師乃行六七步垂手而逝丙辰三年馬殷據湖南錢鏐兼鎮兩浙李茂貞焚長安宮室二月九峰玄禪師誡其徒曰無虗度光陰無虗消信施既已出家唯道是履名大丈夫於是寂然在定至三月二十日乃化丁巳四年閩帥王朝薨弟王審知據其地燕王尊仰趙州甞自幽州降至命服鎮府具威儀迎接持以奉師師堅讓不受左右曰大王為和尚佛法故以為奉請著此衣師云老僧為佛法故不著此衣諸官咨聞再三師乃取著諸官禮賀師唯應諾而已十一月趙州示滅壽一百二十後諡真際大師師臨化令侍者送拂子與趙王囑云此是老僧一生受用不盡底趙王贊師真曰碧潭之月清鏡中頭我師我化天下趙州趙王哭師頌二首一曰師離淲水動王侯心印光潛麈尾收碧落霧霾松嶺月滄溟浪覆濟人舟一燈乍滅波旬喜雙眼重昏道侶愁縱是了然雲外客每瞻瓶几淚還流二曰佛日西傾祖印隳珠沉丹沼月沉輝影敷丈室爐煙慘風送禪床松韻微隻履乍來留化迹五天何處又逢歸解空弟子絕悲喜猶自潛然對雪幃禪苑聯芳戊午光化元八月洛浦安禪師誡門人曰出家之法長物不留況其他哉切須在念時光迅速大道深玄苟或因循曷由體悟師二山開法語播諸方十二月一日夜坐化一云二日午時己未二年華嶽玄偉禪師編次貞元以來宗師機緣為玄門聖胃集龍牙居遁禪師初參洞山价洞水逆流語下大悟服勤八年日增智證至是馬氏據有長沙興崇梵坊請遁說法于龍牙法濟禪寺有徒五百餘眾僧問祖意師曰待石龜解語即向汝道僧曰石龜語也曰向汝道甚麼其僧亦悟庚申三年杭州文喜禪師初參仰山山令典常住一日有異僧就求齋食師減己分饋之山預和問曰適來果位人汝給食否答曰輟己回施山曰汝大利益尋止浙右千頃次住仁王光啟三年錢王請住龍泉廨署大順元年錢王表薦賜紫衣乾寧四年又奏師號曰無著是年十月告眾曰三界心盡即是涅槃言訖加趺而終壽八十塔于靈隱西塢後天祐二年叛兵廢師塔觀肉身不壞髮爪俱長武肅王奇之遣裨將重封瘞焉辛酉天復元曹山本寂禪師一日有紙衣道者來參師問如何是紙衣下事僧曰一裘才掛體萬事悉皆如又問如何是紙衣下用其僧拱立曰諾即脫去師笑曰汝但解恁麼去何不與麼來僧忽開眼曰一靈真性不假胞胎時如何師曰未是妙曰如何是妙師曰不借借其僧退坐於堂中而化時洪州帥南平鍾王屢盡禮請師師不赴但寫大梅和尚山居頌付使者曰摧殘枯木倚寒林幾度逢春不變心樵客見之猶不採郢人何事苦追尋至是年六月夜問知事今是何日對曰六月十五師曰曹山平生行脚到處只管九十日為一夏明日辰時吾行脚去及時焚香安坐而化壽六十二諡元證大師塔曰福圓壬戌二年錢鏐進爵越王雲居膺禪師居雲居三十年道遍天下南昌鍾王師尊之願以為世世師於元年十二月二十八日為眾開最後方便敘出世始末眾皆愴然是年正月三日問侍者今日是幾對云初三師云三十年後但云只這是乃端然告寂諡弘覺禪師塔曰圓寂僧寶雲居道簡禪師久入先雲居之室為堂中第一座屬先雲居將順寂主事請問誰堪繼嗣居曰堂中簡主事意謂令揀擇可當者僉曰第二座可然且備禮請第一座若謙讓即堅請第二座師既密承授記略不辭免即自持道具入方丈攝眾演法主事等不愜素志罔循規式師察其情乃潛棄去其夜安樂樹神號泣詰旦主事大眾奔至麥莊悔過哀請歸院眾聞空中連聲唱曰和尚來也是年同安威禪師示寂癸亥三年以王建為蜀王閩帥王大王請雪峰與玄沙入內王問佛祖究竟脩何因果乃得成佛峰云須是見性方得成佛王問爭得見性峰曰悟即剎那間不悟塵沙劫此事未可造次指示緣山僧各有千百人眾竝二三十年密用此事未有一二人承當得況今大王為俗天子日為萬民判斷山河有迷心念爭覯得此真實法門願大王且為佛法主宰於筆頭下救護生靈豈不是好事王大悅語錄甲子天祐元八月帝崩哀帝立錢鏐封吳王朱溫封梁王南塔光湧禪師道聲既著南昌帥南平王鍾傳禮迎之至府遂嗣石亭法席學者歸之如雲僧寶台州瑞岩師彥禪師初於岩頭得旨尋抵丹丘終日如愚四眾欽慕請住瑞岩統眾嚴整江表稱之師每自喚主人公復自應喏乃云惺惺著他後莫受人瞞一日有村媼來作禮師曰汝疾歸去救取數千物命媼忩忙至舍乃見兒婦提竹器拾田螺歸媼接取放諸水濱師之異迹頗多語錄哀帝乙丑天祐二年吳王楊行密薨子渥立蘇州永光真禪師上堂曰言鋒若差鄉關萬里直須懸崖撒手自肯承當絕後再蘇欺君不得非常之旨人焉廋哉丙寅三年南平鍾傳薨子匡時立尋為秦虜高季昌鎮荊南幼璋禪師初又嘗見憨憨和尚曰汝後四十年有巾子下菩薩王於江南于時我法乃昌至是師之道行既著錢王尚又遣使童建齎衣服香藥入山致請至府署志德大師館于功臣院日夕問道建瑞龍寺於城中延之禪者雲集乃契憨憨之語僧寶閩王一日問雪峰玄沙朕今造寺脩福布施度僧遏惡行善此去還得成佛否師云未得成佛但是有作之心皆是輪迴王云得何果報師云得生天報得福壽報王默然少時二師向王言見性是佛王云將何為道作何脩行師云一切業障海皆從妄想生若欲懺悔者端坐念實相願大王識取實相自然成佛大王起禮二師言相救生死事大師曰真如佛性三世諸佛十二部經竝在大王本性自具足亦不用求切須自救無人相為若作佛應須自度一若悟真如性不在多言佛言向無功用處證道矣願大王但觀本性若見了一切自通王聞二師指示大起信心誓志受持終無退志雪峰錄雪竇常通禪師初參長沙岑咸通末宣城郡守於謝仙山奏置禪苑號瑞聖院請師居之光啟中宼起師領徒至四明大順二年郡守請居雪竇然盛化是年七月集眾焚香付囑訖合掌而逝一云乙丑示寂長慶稜禪師於雪峰句下得悟是年住招慶道化日盛後閩帥請居長樂府之西院奏額曰長慶號超覺大師丁卯天祐四三月帝遜位于梁王朱全忠改元開平
